body:
  text: 魯齋集巻十宋王柏撰雜著大學沿革後論甚矣人心厭陳言而喜竒論也葢陳言人之所玩熟故易厭竒論人之所創聞故易喜殊不知陳言雖易厭而可常竒論雖易喜而必不能乆也譬之布帛穀粟朝夕服食而終身不能易譬之日月星辰終古常見而光景常新而況聖人之書正大而平實精確而詳明亘千萬世而不可磨滅平其心易其氣求之猶慮其不可得而可以新竒求之哉後世乃穿鑿而好異傅㑹而騁巧不幾於侮聖言而壞心術乎此所以為先儒之所呵斥也僕鑒此病久矣一日聞大學格致章不亡不特車玉峰有是言也自董鉅堂以來已有是言矣考亭後學一時尊師道之嚴不察是否一切禁止之此言既出流傳漸廣終不可冺乃欲以首章知止至近道矣一段充之未免躍如其喜是喜也若為新竒而然其意非喜其新而喜其復於舊非喜其竒而喜其歸於常以其不費詞説之追補而經傳儼然無有亡缺豈非後學之大幸僕嘗作沿革論而猶有所未盡既而以大學首章朝而讀莫而思退一段讀之數十百遍又添此一段讀之亦數十百遍沈潛玩味文從字順體正意足然後知其不可不易也人生至十有五嵗自小學升之大學故此書所以載大學之道以教人就以大學名其書也所謂大學之道者大以人言學以地言道以教言其道在於明明徳在於新民在止於至善此三句乃一書之綱領而全體大用盡於此矣夫天命是理為吾之性天命是氣為吾之心非是氣則理無所寄非是理則氣無以靈性合理氣者也心統性情者也今教之以通明知識謂之明理明氣明性明心俱不可得是理於心謂之德故曰明徳然此徳本虛靈不昧止曰明徳則體用混淆故又添一明字於上下明字本體也上明字教之之法也既曰明徳則不見其孰為理孰為氣孰為性與心也明明徳是大學之道之體新民是大學之道之用各止於至善然後謂之全體大用也明明徳未止於至善則於明徳猶有虧不可謂之全新民未止於至善則於新民猶未廣不可謂之大明之者因其本明而不使其昏之謂新之者因其既昏而復使其更新之謂至善則明徳新民之凖則也自古善字無正訓周子始以純粹不雜目之言其體則精矣言其用則未切也其用則是正好處是中節處是無過不及處朱子則曰事理當然之極事理當然釋善也極釋至也為善或未及一分或過一分不可曰不善也謂之至善則不可聖人言語雖極精宻而氣象却甚寛大既立三綱法當繼之以目血脉不斷而節拍從容非若後世之淺迫易露也第四節首曰古之欲明明徳於天下者此一句非聖人不能道也是之謂直指全提言古者所以開今之學也欲明明徳四字若自本而之末自始而之終此順詞也忽繼之以於天下三字其勢却翻轉自末而歸本自終而原始却是逆詞此文字險處乃以六先字貫之所以遡其用力之端自天下至齊家皆新民之事也自脩身及致知皆明明徳之事也致知在格物忽又變此句法而其旨益宻自三在六先而下其勢若建瓴傾瀉在致知二字上文法之力豈止萬鈞之重致者上之所以教也知者下之所以學也知字既重不可不授之以致之之方葢致知只在格物之中窮物之理所以致吾之知也第五節七后字方是自始而至終自本而及末欲學者知效驗之先後循其序則不差先之下后之上六字反覆而體用頓異第六節曰自天子至於庶人一是皆以脩身為本只一句總結不特關鍵甚嚴且包涵許多教法博而不露約而不晦於半語之中剔出脩身束定上下凡格物致知誠意正心皆成就脩身二字指此為本則齊家至平天下皆末也後又以餘意一句正結一句反結已含蓄傳中意思俱足此於聖人何嘗留意於作文而詞章自胸中流出自然如此若三綱之下無致知一語則不知其所以學自物格知至之下無脩身一語則不知其所以行聖人之言一字不可有無一字不可後先也今推首章法度典型如此嚴宻然後見知止一段雖若承接𦂳切而文勢語意反成緩弛矣葢知之一字教者之所主學者之所宗若等閒輕道破不特文字無精神而於教法亦失先後之序況未嘗窮事物之理如何遽能知所止而得所止哉如是則乃生而知之之知非學而知之之知也僕故曰不可不易者此也夫致知者知之始學之先也知止者致知之效而學之功也誠能知其所當止則思慮不雜意向不偏氣質不得而勝物欲不得而遷此所謂定也方事之未至也則此心寂然不動寂然言其靜也不動言其安也及其事之感通也必審而後發發必中節矣審其慮之謂中節則得所止之謂非物格知至能如是乎僕昔謂知止一章逃亡為甚自今觀之正見拙而非巧也然其錯簡於此不為無其因昔本在止於至善傳之後今乃逸在止於至善經之後此錯簡之由也非後世喜新竒而創為此論也朱子之門人亦有問曰定靜安在物格知至之後意誠以下六事未然之前慮則在意誠以下將然之際如此貫之可否朱子批云解云似已有此意矣朱子又曰知止至能得是説知至意誠中間事章句云物格知至則知所止矣意誠以下則得所止之序也或問又曰格物致知所以求知至善之所在自誠意以至於平天下所以求得夫至善而止之也此固已分明以知止章為致知傳矣但未决於遷也惜乎讀者未嘗玩味致此疑於滄洲講席之上耳此皆漢前論之所未盡者不敢不思有以補之是豈新竒可喜之論哉所以共天命追聖言以正舊章也朱子又曰大學首尾該貫失了多年猝急要討尋不見忽然討見即是元初底物事愚敢於致格傳亦云中庸論上自泰山梁木之音絶響而七十子之門人散處四方各尊其所聞各識其所得紛紛著書大略有記録之書有訓詁之書有立言之書七國酣戰鋒鏑腥聞獨洙泗之流風餘韻彬彬然人猶知所敬也雖縱横異詭之士或咋舌而失其辨秦燔典籍漢溺儒冠至挾書之禁開而後河間獻王及魯髙堂生得書為盛纂集雖勤而錯亂磨滅固亦多矣考其疏浚淵源恢宏祖訓端慤淵微無以踰於子思子也孔堂神䕶屋壁發祥大學中庸始見於世大學經傳如此分明猶參錯而不知正中庸之韋編苟絶而微言奥旨尤不易正也子朱子雖豪分縷析次第尚承漢儒之舊大書以提其綱細字以指其要章句宻矣或問詳矣學者之問答亦備矣又推出體用二字該貫一篇之大意故勉齋又曰皆所以明道之體也僕於是而又有感焉首章三句句句有體用也天體也命用也性體也率用也道體也脩用也總三句言之天固體也性則天之用也性雖用也又所以為人物之體道固體也實為性之用道雖用也又所以為教之體僕故曰首章三句句句有體用者此也子思子於性教之中提出一道字教學者所以脩上承天命下立民彛戒懼乎不睹不聞存天理之本然者此體也加謹乎獨知之地遏人欲之將萌者此用也未發之中體也已發之和用也此言性之體用至於中庸則言道之體用故朱子曰以中庸對中和言則中和是體中庸是用以中對庸而言則中却是用庸却是體古今言體用未有如是之宻者葢庸是常行不可易之定理中却是臨時權衡合乎此理者也而中之一字又有體用之分焉程子所謂不偏不倚者此中之體也吕氏所謂無過不及者此中之用也朱子合而言之曰中者不偏不倚無過不及之名也中間又以費隱分體用以誠明分體用末章又自為學立心之始至篤恭而天下平因用以歸於體故曰上天之載無聲無臭至矣澄心易氣玩味章句殆無餘蘊僕至愚陋讀此書雖有年矣始則茫然終則躍然及其乆也猶覺有所疑焉無所質証深竊病之葢子思子之為是書也義理精微而意味深逺規橅廣大而工夫縝宻有非初學之所能遽通其茫然也固宜於是子朱子提挈綱維指示蘊奥支分節解脉絡貫通句句字字粲然於心目之間烏得不為之躍然但固滯之見似覺文勢微有斷續宫商或相奪倫雖朱子亦嘗曰文雖不屬而意實相承乃指第二章以下十章言僕於此十章曽未見其不相屬也凡朱子曰承上起下豈非相屬者乎此後實有斷續不相屬者朱子却未嘗言之此正僕之所疑也知仁勇之分言最先也而三達徳之總言乃遺逸於七八章後行逺登髙之辟繼以鬼神之為徳若判然不相接也大哉聖人之道凡三章與至誠無息亦不相類也哀公問政與仲尼祖述尤相遼遠此皆固滯之見涵泳探索終未能釋然因見漢志有中庸説二篇五字心頗異之求於諸子之列已有子思二十三篇竊意大學中庸當在二十三篇之内矣今乃於此又捨大學獨提中庸之説而二之何歟沈思乆之豈非班孟堅亦有意於考異而傳疑乎僕不揆其愚乃搜厥原乃宣厥滯乃輯厥辭乃秩厥序嚴嚴乎大分之辨也􅎡􅎡乎大用之融也遐想舊規以意逆志庶幾得之姑整録識於後辭未達復著於論但坼裂古書搖動宗旨不待人罪之而亦自深以為罪也孟子曰權然後知輕重度然後知長短物皆然心為甚僕不佞尚有待於後之賢度之中庸論下或有問者曰二篇之析子固有證矣然則性之與教亦有不同歟曰非不同也正以其所指以示人者各有義也推其性之所自來則人與萬物同一原也推其性之所實有雖天地之健順亦不外此教非不同也曰脩道指其當行之路也曰明誠指其當知之理也知而後能行行固不先於知也夫性最難言也原其繼善成性之初理與氣未嘗相離也推其極本窮原之義理與氣不可相雜也於不可相雜之中要見其未嘗相離之實於未嘗相離之中要知其不可相雜之意方為淳粹峻潔不悖厥旨矣夫氣者性之所寄也性者氣之所體也舜之命禹曰人心曰道心此分理氣而並言湯誥曰降衷劉子曰受中此於性中獨提理言所謂性則理也告子曰食色曰生之謂此於性中獨提氣言故曰不識性也子思子曰天命則理氣混然在中曰喜怒哀樂本乎氣者也特以其未發無所偏倚故謂之中此氣而含理也發而中節發亦氣也有理以帥乎中故發而能中節矣中和之中主靜而言理也性也體也中庸之中主動而言徳也情也用也今既以中庸名篇而中庸二字不見於首章何也曰道也者非它道也非可離之道也即中庸之道也曰不可離豈非日用常行之道是曰庸乎是以君子戒懼乎未發者所以養此中也謹獨於將發者所以審此中也惟中而後可庸也雖天地位萬物育亦庸也非聖人推極其中和則天地亦有時而不位萬物亦有時而不育此感應必然之理非天地本不位萬物本不育必待聖人致中和而後位育也故首章非無中庸也葢中庸之義已黙寓於道之中不然則次章忽曰君子中庸與首章全不相屬恐予思子之文章决不如是之無原也吁不觀漢儒之訓故不知關洛諸子義理之粹明不觀中庸之輯解不知朱子章句之精宻僕竊妄意而猶有疑焉者以此書章節散漫易於錯簡朱子止從其舊乃於中提出關鍵字為之聨絡固為甚宻自次章至十一章以知仁勇聨絡之自十二章至十九章以道之費隱聨絡之自二十一章至三十二章以天道人道聨絡之於第二十章又以包費隱兼小大起天道人道之旨不復有纎毫間隙之地其用功於此書可謂宻矣皆所以開後學之耳目發往哲之精神而僕復何疑焉但第三章既是第二章之結語第五章亦為第四章之結語各分為二疑其太宻也第七第九章朱子既曰承上起下則是文相属而意相連矣竊疑止是一章恐不必分也第四章初言過不及此固申中之義次言人莫不飲食豈非庸乎第十一章索隱行怪此非常者明矣半塗而廢此不能常者也不見知而不悔此固能常者恐推上知仁勇反覺寛爾費隱之為體用亦精矣竊意凡言道之費處皆指日用常行人之所易也者所以申明乎庸之義也前言飲食日用之常也此言夫婦人道之常也天地之間陰陽感應庸之大者也天地而猶有憾者是陰陽感應之大者也天地而猶有憾者是陰陽失其庸也惟藍田呂氏以費隱以上論中以下論庸此最得子思子之本旨朱子乃以為未安思之不得其意但呂氏此下有以隱為至道或恐以此為未安也不然則子思子反復論中如此之詳不應論庸如此之略也豈以發越費隱二字之精神故掩其庸乎又何為有庸徳庸言兩字露出精神以是知非忘庸者也凡顯然易見形於天地之間者莫非庸也費隱之下當繼以行遠自邇一章九經之下當繼以大哉聖人之道言聖人之道雖如此髙大亦不過在經禮威儀之中亦庸也但無此徳則不能凝此道自用自専反古道皆不知中庸者也本諸身至百世以俟聖人而不惑亦能盡此中庸者也卒章四稱徳亦指中庸之徳而言雖自實用工夫天下平亦本乎天之所命無聲無臭非可求之於氣也僕之所疑者如此恨不及質正於朱子既不敢自以為然又不敢自欺曰無疑撫巻浩歎若有得焉與其抱所疑而長終豈若暴白其所疑以俟後之朱子云誠明論無妄之謂誠不欺其次之此反訓也子思子又以不二體之又以純亦不已賅之人之生也稟此真實有仁有義有禮有智粲然在中無感不應是曰誠明人之一心孰無知覺氣質物欲或錮或蔽必有先知覺後知先覺覺後覺物來順應不妄不欺是曰明誠前篇曰天命則性在命中脩道則教在道中然非誠則命不能立非明則道不能行此誠明之可以為綱而不可以為目次章曰至誠盡性此聖人之誠也其次致曲此賢人之誠學知之事也楊氏學問思辨篤行之説朱子於輯略亦取之竊意顔子喟然之嘆實似之形著明動變化六字程子推出於外承上章言也張子推入於内起下章言也曰成己成物言所以為教也至誠無息推而廣之言天地之誠也至誠前知與大舜文王之所以興相應鬼神之徳與武王周公之達孝相應哀公問政章移脩身一節入前篇之外舉夫子之答問以起明善誠身之義竊意夫子之言至其政息而止此下皆子思子之言申言其政之布於方策者如親親之仁尊賢之義等殺之禮其所以脩身脩道者皆明善誠身之功後之人欲舉文武之政行於天下者尤不可以不明善而誠身也博學之以下又明善誠身之本所以為教也曰誠者天之道以釋上誠字誠之者人之道以釋下誠字不勉不思從容中道此言聖人生知安行不待明而誠擇善固執此言賢者必待明而後誠非明不能擇非誠不能固皆訓釋之詞也漢儒悉亂於上豈有綱領未立而訓釋已見本末先後之無序何足以為典則之文哉一篇之中此章為最長所以舒徐容與開亮彬蔚盡明誠為教之義復賛仲尼道傳四聖徳參兩儀以結至誠盡性其意已足而猶有餘思其詞已終而猶有餘力再提至聖至誠開而又闔渾渾無涯至聖以徳言推其所以能盡性配天也至誠以道言推大經大本之所自出也葢能知天地之化育無所倚惟見此誠肫肫淵淵浩浩而已至此無得而名焉故結之曰茍不固聰明聖知達天徳者其孰能知之言至聖之徳非至誠不能為至誠之道非至聖不能知誠明明誠兩下極功關鍵尤嚴歸宿尤宻無以加矣子思子之書見於後世者止此三篇大學發明曽子之傳授中庸發明夫子之精蘊此篇發明自己之所得大學有三綱八目為易見也所以為初學入徳之門中庸推性命之大原闡道徳之明教為難知也所以為學者最後工夫此篇以誠明為性以明誠為教無形無色無聲無臭所以為尤難知也葢其胚胎造化橐籥貞元理深而又深辭宻而又宻但見其鏗鏘乎振家庭之金石雍穆乎開簡策之儀刑盛矣哉後世不足以追􅀢其遐躅矣孟子親受業於子思子之門性善養氣之論真發前聖人之未發可謂傳得其宗但其才髙氣雄有英詞偉論以駕其仁義之具或抑或揚竒采振耀鋒鋩所向石裂山摧雖子朱子亦每嘆服其文章何其妙也然終未能盡滌濯戰國之餘習警悟超絶之意多而和平醲郁之味䪥其所以異於戰國者猶以師友見聞之懿而義利王伯之辨甚嚴豈可望子思子之文章自義理根原正面大體自然流出淳粹篤厚無一㸃疵纇之可指今觀七篇之書述子思子傳授之言自在下位不獲乎上至人之道也而止乃中庸之殘章斷簡也動字之外更無他語發明此誠以是知孟子之得於子思子者尚淺而後世之知子思子者尤淺也韓子知孟子醇乎醇而不知子思子尤醇乎醇也濂溪周子心傳子思子之道於千五百年之後而得於子思子者反深其著於通書曰誠聖人之本此以性言次章曰聖誠而已矣此以教言曰誠之源曰誠斯立此以天道言曰五常之本百行之源此以人道言終其書推明誠之義不一而止精慤邃宻皆孟子之所未發嗚呼道無古今學無先後亦在乎人之自勉而已此僕之所以確然有俟乎後之朱子也原命命不難於原而難於推亦不難於推而難於立夫命至難言也吾夫子猶罕言之自伊洛諸儒先得義理之正傳訓故精宻非復漢儒之舊天賦二字之外無餘説也推其命之所有則有理焉有氣焉然理非氣無所寓氣非理無所主理氣未嘗相離亦未嘗相雜葢形而上者謂之道形而下者謂之器上下既分固不得而相雜然形在乎其中亦不得而相離也曰理曰氣形而後知天賦是理為人之性有仁有義有禮有智雖有是四端不得而見也推其已然而后知因其惻隱之發而知其有仁也因其羞惡之發而知其有義也因其辭遜之發而知其有禮也因其是非之别而知其有智也百行萬善皆從此出天賦是氣為人之形有清有濁有厚有薄雖有是四端亦不得而見也推其已然而后因其聰明之質而知其得氣之清也因其昏愚之姿而知其得氣之濁也因其富貴而夀而知其得氣之厚也因其貧賤而夭而知其得氣之薄也五福六極有萬不齊皆從此出故推其已然者不為難於此而又有數焉則可以推其未然也夫數者亦天之所賦也亦有理焉有氣焉河圖洛書數之始也有文五十有五竒偶重列者此河圖也有文四十有五竒正偶偏者此洛書也天豈能諄諄然授於人哉不乗之以龍馬神龜則造化之妙陰陽之機何自而著雖出於物而不囿於物物皆有理有氣惟神聖而后能推之伏羲因河圖而畫八卦大禹因洛書而叙九疇聖人則之者用之於厯數以推天地之變化用之於卜筮以推人事之吉凶循環無窮感應莫測此聖人神於用而妙於推也以卜筮言之卦爻一定之理也假大衍之數託靈蓍而揲之積其誠意凡十有八變方成一卦未然之吉凶可坐而知也以厯數言之以日月五星運行於天者有經緯離合之不齊以太陽一周天為嵗以太陰一周天為月分之以四時參之以餘閏皆求之於已然而推其未然越宇宙之無窮皆可坐而知也聖人之用數止於如此夫一非數也此數之所由始也天開於子其體圓而虛地闢於丑參乎天中其數為二故曰參天兩地倚數之元自是一陰一陽動靜變合而生五行天一生水地二生火天三生木地四生金天五生土五行各一陰陽是曰十干日月所㑹之次舍謂之辰周天凡十有二辰干辰相摩為六十甲子以六十甲子紀其年月日時此厯數之名號也後世於厯家窺見此理則以人之所生嵗月日時推其所直之甲子亦名之曰命此固不可謂非天之所賦也於此可以推其性情得於仁義禮智者孰多孰少可以推其氣禀得於貴賤夀夭者孰厚孰薄茍精其義亦可入神又有以五星之躔度吉凶推之今考其學以日計時得命十有二次其六十之十二得命七百二十計之以日又六十其七百二十得命四萬三千二百又槩之以嵗六十其月則得命二百五十有九萬二千矣夫以二十有二字之至約參伍錯綜甲子凡三周敷衍變化數之繁夥一至於此其術可謂神矣然以古今之遠四海之廣人生林林過者化來者續維天之命於穆不已迺俱囿於二百五十有九萬二千命之中又何其術之窮也又有不推五行五星而一依於數者紛紛衒騖於天下如太一之小遊三百六十年太一之大遊四千三百二十年軌革之九百六十年九戹之四千五百六十年楊氏太𤣥之八十一首關氏之洞極二十七家司馬公之潛虛五十五行尤局促而易窮也惟康節邵子之學衍而申之為最盛以三十年為一世以十二世為一運以三十運為一㑹以十二㑹為一元曰元㑹運世者不過又加一大年月日時也然囿於數而終不能無止法推其極亦不過五萬五千九百八十七萬二千而已愚不能又加倍也尚能自二十二字歛而約之愈妙而愈廣雖古今之逺四海之大人生消息變化之無窮葢有不得而異亦不得而同夫十干十二辰衍而為六十甲子推其所以相克者止於五行五行氣也五行之神則仁義禮智之性也性即天賦之理也君子脩之吉小人悖之凶此常理也君子脩之亦有時而不吉小人悖之亦有時而不凶此非常理也變也氣之不齊故有時而變理則一定而不可易學者當循其常而安其變秉其彛而御其氣要使理常為主而氣每聽命焉雖富貴貧賤夀夭之不同而仁義禮智信之在我者不得而泯此自昔聖賢教人之要法所以經綸天下之大經裁成輔相之道無以易此張子曰徳不勝氣性命於氣徳勝其氣性命於徳窮理盡性則性天徳命天理氣之不可變者獨死生夀夭而已孟子曰莫非命也順受其正殀夀不貳脩身以俟之所以立命也愚故曰命不難於原而難於推亦不難於推而難於立然不知其原則不能推不能推則不能立故作原命禱雨劄子伏聞某官憂農閔雨靡神不宗而又禱祈於社稷於義尤為至當葢社者實山林川澤丘陵墳衍原隰五土之祗而后土勾龍氏其配也稷者實専于原隰之祗能生五穀者而后稷周棄氏其配也自昔國家所以昭事祈報莫重於此與其屈膝於老子釋氏之祠與夫妖妄淫昏之鬼者相去遠矣愚又聞天子祭天地諸侯祭其境内之山川今用黄冠之教而上供其皇天上帝是禮之僭也又以髠緇夷族旋繞厠穢於宣布教化之庭是禮之亂也至於職分所得而祭於禮為正者則前後未有能舉而行之者誠為缺典夫山川所以為神靈者以其氣之所烝能出雲雨潤澤萬物故也今東陽之為郡北山奠其後雙溪嫓其前此所謂境内之名山大川是也愚自兒童時每見北山有雲冐其巔須臾必雨雨則滂沛周於四境近年以來雲雨多興于南山之西而所及者有限葢陰倡而陽不和其氣逆而勢不順縱有豐年而東北常歉葢北山者一郡之望山也今其氣欝亢乆矣誠得賢使君立其壇壝牲幣之制考其登降奠饋之節躬率僚寀精白嚴事必有昭應夫人之於天地均一氣之流行然是氣無所攝屬則决無感應葢天子命諸侯主是山川以蒞其人民社稷之事故其氣属我相聨接而無間夫山川者天地之正氣也人以正氣感之則正氣應以戾氣感之則正氣不應矣茍能正其祭祀之本先須闕其感召之氣凡政事之淹欝者疏剔之凡征催之苛急者寛弛之使千里人民之氣和而山川之氣已漸和矣然後齊肅一心積蓄誠意㑹山川之氣通幽顯之神何祈禱而不應哉昔南軒張先生嘗行於桂矣試取文集觀之信不誣也輙不自揆以書生迂濶之言恐可以禆賛愛民事神之盛心如或可采願勉强行之朋友服議咸淳戊辰臘月十有九日夜承北山何先生之訃次早排關往哭之既歛僕雖以深衣入哭隱之於心疑所服之未稱也自吾夫子之喪門人不立正服乃以義起若喪父而為心喪程子曰師不立服不可立也當以情之厚薄事之大小處之若顔閔之於孔子雖斬衰三年可也其成己之功與君父並其次各有深淺稱其情而已僕於北山受教為甚深豈可自同於流俗因思儀禮喪服有朋友麻三字此豈非朋友之服乎鄭康成云朋友雖無親有同道之恩相為服緦之絰帶又曰士以緦衰為喪服其弔服則疑衰疑之為言擬也緦麻之布十四升疑衰十五升即白布深衣擬于吉服也葢緦衰服之極輕者也他無服矣只有吊服所以擬之註云弔服加麻其師與朋友同既葬除之疏云以白布深衣庶人之常服又尊卑未成服以前服之故庶人得為弔服素冠吉履無絇其弔服圖云庶人弔服素委貌白布深衣士朋友相為服弔服加麻加麻者即加緦之絰帶是為疑衰或曰深衣吉服也而可為弔服乎僕曰註固已云疑于吉服也況非止為弔服親疾病時男女改服註曰庶人深衣又曰子為父斬衰尸既襲衣十五升布深衣扱上袵徒跣交手哭是孝子未成服亦服深衣也或者又曰安知深衣為弔服不為麻純乎僕曰純之以彩者曰深衣也純之以麻者曰麻衣純之以素者曰長衣以采緣之袖長在外者則曰中衣各自有名不可亂也又曰子創為此服豈不驚世駭俗人將指為恠民矣僕曰以深衣為弔服鄉閭亦間行之但未加麻耳是服也勉齋黄先生考之為最詳其書進之於朝藏於秘省頒行於天下非一家之私書也遵而行之豈得為過僕於北山成服日服深衣加絰帶冠加絲武即素委貌覆以白巾見者未嘗以為怪越數日通齋葉仲成父來弔僕問昔日毅齋之喪門人何服曰初遭喪時朋友以襴幞加布帶其後共考儀禮至葬時方用深衣加絰帶僕於是釋然知其無戾於禮也故作朋友服議魯齋集巻十
