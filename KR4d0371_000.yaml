body:
  text: 魯齋集别集類三宋提要臣等謹案魯齋集二十卷宋王柏撰柏好妄逞私臆竄亂古經詩三百篇重為刪定書之周誥殷盤皆昌言排擊無所忌憚殊不可以為訓其詩文雖亦豪邁雄肆然大旨乃一軌于理宋史儒林傳稱其少慕諸葛亮之為人自號長嘯年踰三十始知家學之原案柏之祖師愈受業於楊時其父瀚亦及朱子吕祖謙之門故史文云然與其友汪開之著論語通旨至居處恭執事敬惕然嘆曰長嘯非聖門持敬之道亟更以魯齋蓋其天資卓犖本一桀驁不馴之才後雖折節學問以鎔鍊其氣質而好高務異之意仍時時不能自遏故當其挺而橫決至於敢攻孔子手定之經其詩文雖刻意收斂務使比附於理而強就繩尺時露有心牽綴之迹終不似濓溪諸儒深醇和粹自然合道也特其勇於淬礪檢束客氣使縱橫者一出於正為足取耳集中第一卷有夀賈秋壑詩極稱其援鄂之功諛頌備至是亦白璧之瑕然核檢諸書均不載其有依附權門之事不知何以有此作其集乃明正統間柏六世孫四川按察司僉事迪所重編又不知何以載之集中略無所諱均不可解疑以傳疑存而不論可矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉文之為文關乎道也古之聖賢得時行道若堯舜禹湯文武之為君臯夔稷契伊傅周召之為臣善政嘉謨載之方册夫是之謂文或聖賢之徒不見用於時窮極天人之理考古帝王經世之道若孔子而下顔曽思孟刪定著述開示後世夫是之謂文是皆不倚於物而能與天地日月同悠久者係乎道也下逮戰國能言之士各以所見立為議論或戾乎聖賢之道者君子有所擇焉漢唐以下代有作者揆之於道醇乎醇者殆亦鮮矣宋濓洛關閩諸君子出然後性理之學天開日朗學者有所依據文章議論一歸於正道之明也辭則存乎人也金華王文憲公天資髙爽學力精至以其實見發為文章足以明道德使其見用足以建事功而卒老於丘園惜哉若其詩歌又其餘事也六世孫四川按察僉事迪裒而成帙義烏縣正廬陵劉同丞鄱陽劉傑政有餘力用鋟諸梓其亦知所用心者哉南郡楊溥序
