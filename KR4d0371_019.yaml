body:
  text: 魯齋集卷十九宋王柏撰祭文祭趙星渚文維咸淳八年嵗次壬申九月丙辰朔二十日乙亥金華王某謹以闕敬祭於近故待制侍郎星渚先生趙公之靈曰嗚呼惟公蚤聞至道浚迪淵源堅辭官牒髙蹈丘園河洛所啓考亭所論探討六籍如誦已言間其已發控制放奔驗彼未發培植本根貌恭而安色厲以溫恢崇日著聞望日尊帝曰嘉哉汝其通籍時酣利祿華膴是役孰嗜義理古訓是式易退難進翔而後集翼翼道山巖巖沛國水専闕亦闕熊軾一念如春一清涼骨紫槖逼人幡然闕蒼闕渚闕地靈人顯迹隱身闕後學矩彠斯世䪫諸闕春四闕不百年而遽棄傾舉朝失色天子震驚闕節惠為誠為明嗚呼哀哉某束髮讀書恨不立志慕德雖深登龍莫遂公鎮天台作成士類乃撤臯比束帛惠賁冒然而前來所未至一見傾倒若符若契學既同方合固以義窮深極微展也一致嵗云莫矣蹈雪告歸叮嚀宿約春以為期疾病事變一諾差池有懷斯愧公心不移書疏絡繹使者交馳乃請於朝督命下貽暨陟崇領公已交麾棠隂未改有黯其思已己之秋拜書寓里聞公卧疾英嗣報啓曽未踰時誨言纍紙慰此孤陋不寐而喜什襲珍藏如古罍洗十有大字嚴正瑰偉千載北山夜號萬鬼言志之傳神幾之似無極之妙太和之始家語之書少母之祀未終所疑未訂厥指水陸遙遙尚期操几誰謂絶筆遽同麟史斯文未喪世道方敉萬目睽睽為蒼生起泰山曷頽梁木曷圮識與不識莫不痛痞有訃莫聞有含莫吐匍匐一慟如刖斯趾內省而疚愧此生死南豐瓣香歸心久矣有炬傾筐有茗盈篚東望長號老淚滂只湛然清明鑒此哀誄尚饗祭常簿姪孫文維年月日王某祭于姪孫常簿之靈曰嗚呼莊敏擢第百五十年曠焉四世餘芳始傳家庭孤棘學校艱關官轍屢駕驅馳淮田耎春融卞幕風壯談塵躋名閨籍蜚聲縣譜列院開祥曲臺接武駸駸華要公論共許世道莫料再斥而歸幡然內省痛削町畦有感斯默有扁斯規志氣未倦疾病乘之原始反終急急作計衣衾棺槨整整咸備修身以俟夀夭不二疑定泰宇怛然而逝鄉閭驚駭宗黨痛傷回首冠子禮賓舉觴曽幾何時會哭此堂日月流邁音容永藏幽幽橫舟寂寂西廡一死一生交情可覩有酒盈樽有殽在俎我酬爾靈有淚如雨祭潘蔚平嗚呼某與仲氏憶昔送公長亭話别黯然秋容誰謂此行雙溪路絶一時分袂死生永訣嗚呼哀哉如公人物屈指無多乘時致用允為克副何志涉南海之鯨波再掉徐聞幸已北向征車復左更入煙瘴是孰使之然哉抑定數之不可挽之耶尤使人於此而極其恨也嗚呼士窘才調公獨迅敏風酬電酢神色暇整士窘筆札公得天葩氷清玉潤紙上龍蛇公之執謙和氣融融拱規蹈矩折旋蟻封一言相投坦然心曲抵掌劇談脫略邉幅內無聲色之奉外無玩好之供諳仕途之局面熟世道之機鋒當其勇往霆轟電裂意所不可萬仞壁立及其事定月霽雲收一絲不挂一痕不留南轅北轍﨑嶇萬里神臯一息飄然逺逝驚宦海之風濤豈甘心於避世公初入南通籍金閨公再入南雙舄鳬飛鼓滄溟而三駕去鄉關而益逺乃攝左符乃次五管及帝恩之重霈何宦情之頓懶乃正元日拜公題箋詞情藹藹歸興浩然挂冠之志堅不可破髙公絶識致書贊和計厮赤之半道俄訃音之已傳方驚疑而未信駭遺槖之遽南公果仙而不返矣掩涕泣之連連某等無似世莫我知公何所取獨契襟期綢繆繾綣久而未衰悵從遊之甚晚恨不識公之早嵗每誦尋梅之六絶遐想風流之髙致勒黎母之堅珉有邦人之雙識是亦足以不朽雖蓋棺而無愧斾旌悠悠津堠茫茫風輿露翣來返故鄉神其寧矣山深水長誼當匍匐伏哭道傍病不能往寫此悲傷祭徐彥成嗚呼自八行表公廬之望逮移巒分石筍之春蔚蔚故家之喬木森森玉樹之階庭雖芬敷而異圃實一氣之流行往嵗奪其冢嫡今年喪其元孫豈曰蘭自榮而蕙自稿我則同此痛而同此心也矧豫與子自昔相親憶子之幼也玉雪可念方子之壯也老氣夙成功緒沈著志慮堅凝颯颯霜穎琅琅夜燈或談古而忘寐或兀坐而不言尺度翦翦風鑒稜稜疾惡掀髯而張目見賢色暢而神溫扶義以竭其力責善以傾其情豈特一家之佳子弟實為吾䣊之良友朋也可謂得五行之貞淑意其開萬里之修程一夢不返前所罕聞割雙親之心膂飛病婦之驚魂風濤壯兮維楫失大厦落兮梁棟傾悵遺恨之襞積空搔首於冥冥日月滔邁即幽戒辰有梅花兮被壠玉露冷兮氷清何必豐碑於隧道此即千載之餘馨思昔聽月窗之曉角拄山行之老藤不復共此風致矣徒涕淚之交零有肉在俎有酒在尊以酹爾翣以祖爾靈尚饗祭松下胡子升嗚呼俗弊道衰大雅不作學不為已工乎剽掠投時射利不知愧怍一與已異立號嘲謔百鳥喧啾忽見一鶚衆寐方昏君乃獨覺刻意尚古若與世角早恱象慈晚會濂洛必論必孟中庸大學豈無他書束之髙閣嵗不我與難窮者博乃踐乃實乃守乃約一掩楚咻直居莊嶽尊賢慕義白首益勤聞過內訟聞善服膺自曰大欠書為座銘周旋俯仰格言盈庭匪事占畢亦反諸身惡衣惡食嗤彼世榮捫蝨談道倒屣迎賓清苦之味慷慨之評不求聞達婆娑一陵一鄉善士一家典刑夙興夜寐欲常惺惺易簀之際炯焉主人胡不世用汛掃貪氛胡不百年恢𢎞正音間闊幾何遽隔死生於乎某等狷陋與世落落君獨知心言真意確恨不朝夕更攻互琢二十年間能幾酬酢交友雲散反不如昨又弱一個惕焉共愕我來松下風度儼然有書在架嗟其可傳山瓢一酹野䔩加籩清淚如㵼君其鑒旃祭定海縣丞楊元定嗚呼元定奮太元之寂寞稟清秋之沆瀣夙就有道捷出行輩如佩珩璜如祼匜敦凝然而不仁者逺確然而有識者愛表羣居之月評動諸老之風裁乃聘斯孰乃館斯妃淡無與於得失之塗終自勉於命義之戒逡巡而出從容而退方垂裕於後來忽堅卧而遐逝貿貿井里寂寂斯世嗚呼悲哉某蚤聨姻婭晚契言誨迹若落落心實泄泄指伊洛之軌轍導盤溪之襟佩鳶飛魚躍兮遐不作人秋月寒水兮吾猶昧昧恨未窮幽而痛講交琢互磨於一致君其已矣吾亦何冀惟知自修而補過庶不負津堠之大惠君子有知鑒此芳酹祭鼓院叔父嗚呼叔父天姿璞玉渾金叔父學問陶鎔性情南軒先生侍講交承叔父及見服膺典刑晦庵先生講道於閩叔父綵侍北面受經由是得易之元得禮之誠餐和履粹仁熟理明當其處也則宦情淡泊志在乎浴沂而鼓瑟及其出也則不負所學有心乎致君而澤民其律已以潔兮撓之而不濁其接物以恕兮盎然而如春議論則正大而髙逺政事則豈弟而廉平何善人之不淑兮禍福之莫測嗟彼蒼之茫茫兮號呼而弗譍追念疇昔嵗在甲寅先皇御極羣才彚征於時叔父仕版疏榮越三十年僅綴廷紳造膝三事咸動帝宸眷注方隆意自此升叔父乃曰福過災生露章力請求老山林爰握符竹退安里門堂空晝永兮玉川之風腋更闌燕坐兮一縷之煙沈嘆雁聨之寥落弔隻影之煢煢意謂叔父獨殿於諸老天必萃餘慶以錫修齡何葆衛之素謹而疾疹之相承何梗芥於胸臆而憂念之獨深何鼎烹之弗御而藥石之莫憑語蹇步弱數日康寧方展初陽之慶倐驚長夜之魂竊意仲秋先皇上賓天以叔父先朝舊臣生不能大用於斯世死將收名於仙京鶴馭冉冉玉樓告成修竹繞屋兮霜風悲吟寒梅掩色兮夜月傷神徑畫淋浪兮墨猶新一室蕭然兮榻生塵風度凝逺兮尚可求於夢寐諄諄誨語兮不可得而復聞嗚呼痛哉石筍一氣棣華五人衮衮通籍奕奕家聲諸孤積釁降禍弗矜惟餘叔父亦繼湮淪澆風獵獵兮舟喪楫世路﨑嶇兮車析輪酹卮酒以慟哭兮雖可寓猶子之哀悃非相與以勉旃兮何以慰叔父之英靈伊冥懷之遼邈鑒此意以來歆祭吳充之哀哀充之粹如圭璧幽擢蘭葩伶俜鶴骨含英潄潤博觀厚積意其鼓南溟之九萬而乃夜移舟於四十君之先世百年積德君之諸父聨華桂籍鸞停鳳峙萬竿寒碧交一世之豪俊煥郊扃於改色何其盛耶鯉庭聞見螢桉専精渴硯枯筆手抄不停酌今汲古一綆千尋角銀袍於百戰追青氊之舊氛何其勤耶既不使之傳簪襲組又不付之振殘表微經營雞饌琴書屢移慨翟門之寥落炯心事之孤竒責重力渺羇愁夜噫精澤內耗形神外離又何其困耶某托親非一日過從幾十年氣味偶合交情遂堅月窗雪屋切磋素編春花蒔圃杖履盤旋聨洞天之野步扣西湖之畫舷握手道舊洞示肺肝謂家聲幾圮而未振幸王季奮迹於賢關一旦淪謝吾何賴焉由手足之愛也雖易簀而同卧致二豎之靈也乘氣弱之縈纒方養痾於寓館忽冒雨以言還枉緘題之欵密報近恙之差痊七月之初尺素來惠字益精妍誰謂數日倏以訃傳義當匍匐而往弔夫何事勢之拘牽幽明之間有愧莫湔嗚呼堂有老母兮夜哭孔悲下有稚子兮咿嚶繐帷庭前之寒梅瘦竹兮如故人之風度充之不可得而見矣無復訊之以來期銜詞薦恨涕淚漣洏祭汪約叟嗚呼伐木始廢谷風繼興翻覆雨雲老杜太息一貴一賤翟公署門惟先君子不茍交情金蘭落落倒指數人於公伯仲契好尤深豈酒食之詡詡豈勢利之營營破鐍削町敷肝露誠道義同趣憂喜一心燕話終日呼僮命燈清夜促膝曉雞屢鳴悵獨善之先往痛親庭之繼傾藐爾諸孤賴公尚存折節行輩言和氣溫勸勉期望如親父兄二十年矣景物飄零不替疇昔不問死生感義槩之猶古豈今人之可倫侍公歌笑曽幾何日忽報公訃驚悼失聲而今而後何所依承此故感先契而哭公也麗澤夢奠日月浸長邦人祀事春秋不忘而公薦祼於上龎眉皓首陟降乎夫子之堂起敬於上者相與指之曰是嘗親承乎道德之光重和染粹兮濟濟乎前修之軌度揚葩振眇兮恂恂乎後學之津梁瑞芝靈草霜雪摧謝猶有古松兮偃蹇乎孤岡玉繩璇象清曉隱滅猶有長庚兮煌耀乎西方嗟老成之雕落而典刑之遽亡此故為鄉黨而哭公也方玉卮稱比內之夀而璪旒推錫類之仁駘背黃耇詔以名聞安車駟馬將見其加璧之召前哽後咽兮庶幾乎親饋之勤此蓋熙朝之盛典豈徒梓里之光榮邦君謂公德齒俱尊一紙之奏方離於畫戟如綸之命將下於楓宸何掉頭之不顧乃髙蹈於冥冥錦誥奕奕兮竟不得屈公之膝青衫閃閃兮竟不得加公之身此又為朝廷而哭公也嗚呼人孰不有生所不足者期頤之年人孰不有死所可畏者疾病之纒公夀開乎九帙炯視聽之益妍蚤灌鍊於元鼎而陶鎔乎性天雪鬢燦爛鶴骨蹣跚與物無競神怡體安精覃孔孟之奧時吟約叟之篇近染微恙藥既告痊溢喜氣於簡牘慶杯酒以檀欒人影方散肴核未捐變忽生於肘腋舟遽移於夜川一劑不及進一語不及宣嗚呼痛哉素編記日兮墨猶未乾遺恨滿樓兮溪山黯然女牆寂寂兮愁夜月錡釜漠漠兮沈曉煙故公之生也人莫不敬及公之死也人莫不憐嗟先世之交遊至是而絶迹矣徒泣涕以漣漣敬陳薄奠侑以菲言祭南坡老人天挺濂翁太極溟濛知其有道惟程太中見其二子執經北面手授圖書異乎聞見春融天理弄月吟風德崇業廣百世所宗道否嘉泰黨禁奔駭考亭夢奠同志盟解維時勉齋獨得其傳弦歌百里孰相後先侃侃崇道義同契合氷雪交礪伯仲受業嵗月於邁兩翁俱仙淵淵盤溪吾道繫焉勉齋遺書悲哉散逸公獨尋訪劬劬手筆什襲來歸以開我人流傳四海私淑功深髙蹈山林塤箎迭知天相耆德風猷逺播少公不疾悠然考終長公驚悼亦既搆凶一門兩喪曽不旬浹閭里奔弔接武帶絰昔我侍坐肅肅雍雍皓首聨席誨我從容今我來思欒欒素韠有薄斯奠有啜其泣同祭北山何先生鄒魯云逺天啓濂洛理一分殊以覺後覺龜山之南宗旨是將羅李授受集于紫陽研幾極深大肆厥功縷析毫分惠我無窮有的其傳鰲峰翼翼孰探其源遂通其釋墜緒茫茫孰嗣而芳公獨凝然精思不忘莘莘學子孰定其力公獨屹然堅守不失衣錦尚絅世莫我知發揮師言以會於歸有育斯和誠意惻怛有實斯踐光輝四達先皇末命嗣聖訪落進之太史以輔帝學詔書屢下公志莫移各盡其義匪激匪隨髙風凜然厲世範俗鼎吕吾道云何不淑嗚呼先生夀考奚憾嗟我後人茫無畔岸立志不勇樞趨日稀儀型遽隔悔不可追春回萬象月冷夷清忍奠斯酒忍讀斯文祭時遁澤墓文憶昔兮杖屨幾度兮同遊倚晚霞之危檻泛夜月之輕舟杯中兮傾倒言外兮綢繆乃隔千古乃顓斯丘青山詩料兮供不盡句流水世情兮涵不盡愁曠落寂而無友兮誰為玩此芳草嗟來者之不我接兮往者之不我留渺八荒兮君逍遙於何所奠桂酒而歌大招兮君其來下祭王堂賓文壬戌之役首覿老成酡顔鶴髮玉裕金貞侃侃士檢藹藹鄉評於時實翁風教盡心肇啓蔡祚妙攬台英皎皎鑑裁歷歷分旌孰正孰糾孰諭孰賓襟佩有雅履屐亦精乃俾疏逺是講是承不我遐棄意氣盡傾公篤宗誼庚甲相鄰老及人老慰藉甚勤我歸故里停雲屢吟每至冬晚手書敘情敬愛無斁終始一誠去嵗之臘亦拜問音筆勢少異蜿蜓伶俜乃謂病瘍候證不輕已分必死賴天之靈攝養如故人曰再生我省斯語且喜且驚雖曰充實德齒已尊血氣幾何而朘其根曽未兩月倐爾訃聞有客對坐不覺失聲書猶在几已隔古今東望慘愴僅疏唁忱衰病跛曳匍匐未能日月逾邁交情就湮遙陳薄奠有淚沾襟立齋大祥祭文天道流行過化來續死生晝夜同此機軸立齋之喪轉矚再祥音容益逺悲悼彌長賢愚貴賤莫不有死名節苟喪為世大恥子德在人子書在笥子學有傳次第鋟梓子孫未艾足慰子心永安宗祏百世嘗蒸詩書燈火追念疇昔傷哉一奠老我孤立北山行狀告成祭文我昔問學莫知其宗有過孰告有偏孰攻淵源師友孤陋莫通有慨其慕天侈其逢得公盛名於船山翁獲瞻典則乙未之冬立敬居志首開其蒙自是尺牘載磨載礱不憚往復一告以忠逺探濓洛近述鼇峯理氣之會造化之工仁義大本聖賢大功體必有用和必有中無疑弗辨無微弗窮毫分縷析萬理春融匪矯而異匪阿而同曰味厥旨體於爾躬必平而實必拓而充偷墮弗勇霜鬢已蓬卒未聞道以此負公幸公耆夀身康氣沖不聞公病遽以考終有邦殄瘁吾黨閔凶茫茫墜緒卒業無從嵗月流邁行即幽宫公之仲子莫泄哀恫抱公言行囑筆衰慵強顔敘次慨想音容如持寸莛來撞巨鐘惟德之盛惟禮之恭蕪詞弗稱有愧蟠胸奉以薦陳鑒此微衷祭趙草巢文昔拱蒲璧有君烏傷撫摩雕瘵振起俊良昭揭仁問示之嚮方激厲小學誦聲琳琅訪我陋巷宛然舊識如惠之和如衰之日如飲醇酎如春著物不流不矯始終如一我亦造公清風滿庭左圖右書前籩後尊事平而理意疏而真聞善則服不矜已能自時厥後敬愛無斁忽賦歸來白駒無縶塵滿空囊面無慚色繼者數更竟成廢邑我至聖則公仕於京訪公桑梓識公外孫我倦而退臯比鼎新月旦精審無如老成屈公步武典教鄉國襟佩莖莖鐸音奕奕去公雖逺音問猶密去冬書來自言多疾意偶然爾或老之常龍津告我云公已亡驚嘆失聲氷炭我腸設位一慟子姪在行朋友道喪天倫廢缺勢利是競往往一轍人物如公陸沈莫挈豈無故人死有餘責公則有守出處恬然退不易介進不隱賢歸尋三徑野草荒煙一觴一咏所樂者天我實無似殿公庚甲亦豈能久千古契闊有味匪茗有歆匪香有淚斯痛辭短心長祭蘇愚翁文嗚呼昔别道左轉矚六年遺愛郡邑棠隂未遷雲橫太括音問間傳繾綣道義益久益堅思公典刑神肅氣寬敬公晚節髙蹈莫攀厲世範俗追古尚賢今秋英嗣道出舊㕓惠然過我聞公燕安辱公手筆字益精研喜公耆艾心廣體胖何音不祥謂公已仙不疾不藥遺墨粲然從容考終學力驗焉執訃駭􅌓乃䀌乃酸義當匍匐伏哭柩前有阻斯地無間斯天東望一慟公其鑒旃魯齋集卷十九
