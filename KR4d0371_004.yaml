body:
  text: 魯齊集卷四宋王柏撰辭詛楚文辭并序先秦之碑凡三有祀亞駝之文有祀大沈九湫之文有祀巫咸之文大抵皆詛楚也歐陽公以世家推之楚自成王十八世而至頃襄秦自穆公十八世而至惠文惠文末年嘗與楚數相侵伐疑此時所作豫按秦指楚忘十八世之詛盟率諸侯之師臨加我其為頃襄無疑秦自惠文始稱王不應自稱嗣王惠文之末當周慎靚王之三年楚固嘗率趙魏韓燕伐秦五國皆敗走乃楚懷王之初耳惠文不與楚頃襄相值也自是懷王數被秦兵紿以獻地而使與齊絶紿以㑹盟而劫執其君然後頃襄始立乃與秦昭襄同世粲然可稽豈稽古録考之亦有時而疏乎古者出師必聲敵國之罪求祐於神如武王底商之罪於皇天后土所過名山大川是也詛楚之祀其遺風與頃襄之時國尤不競今年失八城明年失十一城飲恨祈和逆婦於咸陽何敢率諸侯犯此氣焰方張之秦哉豫嘗讀蘇氏之論曰昭王欺楚王而囚之要之割地諸侯熟視無敢以一言問秦者田文免相於秦幾不得脫歸而怨之借楚為名兵至函谷秦人震恐割地講解自山東難秦未有若此之壯者此赧王十七年也司馬公通鑑失載後人幾不得而知詛楚者必此時乎秦之不道諸侯詛之蓋有不勝其罪者楚不詛秦而秦反詛之凡數其罪考其世家亦無其實豈有聰明正直之神而甘受紿於爾之浮詞而甘受諛於爾之牲幣乎決無是理也明矣其碑出於鳯翔開元寺土下後置於太守之便㕔蓋秦穆葬於雍槖泉祈年觀今聞墓在開元寺東南數十步則寺豈祈年觀故基耶見坡公手筆後之學古者謂三詛文惟祀巫咸者筆法最精王厚之亦謂筆蹟髙妙世人無復異論此杜工部所謂書貴瘦硬方通神者此為得之大觀間舁入御府人始不得而模拓渡江後間有臨模本失其真多矣寶祐甲寅之春金華王柏得於鬻書人見而歎曰此事固無足取也亦先秦之古文也中原之舊物也通國棄之而流落於陋巷之書生豈不異哉為之序而繫以辭曰於皇上帝鑑此下民一善一惡有炳其分興亡之感請觀於秦穆辭蹇叔悔誓孔明於赫元聖存之於經秦之於秦豈曰强兵昭襄詛楚虐民慢神言誣不怍勒篆堅珉自播其惡至今猶存鬻熊拓地城池雄深三閭既放舉國昏昏詐槐而繫强橫以婚稷兮稷兮胡甚不仁犧牲圭幣猶兾神聼神之聼之怒終弗平强弩之末六國自焚曽不百年吕已代嬴歐公誤考而曰惠文彼石弗泐彼篆弗堙日月磨蕩風殘雨淋揮呵守護奔走山靈事豈足法文豈足程一時之要萬世之針繆誓既録書生誦吟稷詛遺醜假託籒鳴彰善疸惡是曰天心彬彬爾籒大篆勃興未經斯鑿骨氣淳淳三代遺跡不一二聞大觀之後內府祕珍陋巷之士曷識鏤金臨摸至再大觀其真有來墨本求售且輕摩挲慨歎剝嚙嶙峋折旋圎徑隱然渾成玉鉤鐵鎖虬翔鳯騰忘其不道政以字稱第入神品庸長碑滕時在字辭景定辛酉仲春己亥遁澤時充之父冠其從子在於學古堂俾親友王某祝而字之其辭曰古之學者學以為已維爾之先有志斯偉巨扁猶在絃歌息音嵗月滔邁爾繼爾承爾宗爾命冠以追古以祝以醮秩秩賔主我觀大學三在在前德所以明由致知焉致知之要又在格物盈天地間物必有則格物之理致吾之知萬理同原皆可類推表裏精粗推至乎極真積力久豁然自得存之以誠謹之於思惟是古學絶今勿為或古或今是不立志豫也不佞字以一致禮儀既備敬哉敬哉於時保之以永方來汪功父字辭表姪汪氏子名蒙蚤孤以友愛克自植立亦有志於學欲從余游一日請所以侑其名者且求其義余以為字者固朋友之事因為之辭以祝之曰相爾父命名之曰蒙以蒙厲汝俾求其通通之之道學問是充母自暴棄而曰顓侗必浚而窒必逹而聰或狥爾欲蟊賊內訌匪學滋陋終身昏矇惟道有源惟學有宗載觀羲畫名卦是同艮止乎外坎陷於中如泉未逹莫適西東夫子贊易式唘爾衷乃曰育德以厚爾躬又曰果行以警爾慵匪育必陷曷大其容不果則止曷追遐蹤夙夜此訓業廣功崇是曰養正是曰聖功用力必勇立志必洪孜孜善問如木斯攻懇懇求友如石斯礱必澄以靜必研以窮日積月纍八忩玲瓏母間而斷百倍其功功甫字汝以要其終汝父已命匪豫之從吳子善字辭寶祐癸丑季冬吉日松隂先生吳仲淵父冠其子思齊而謀其字於友人金華王某再拜而祝之其辭曰古重冠禮筮人旅占筮賔戒賔必惟其賢我賔不敏為子之辱字之以辭尚能昭告后皇嘉惠降中於民善善惡惡是曰良心氣質匪拘物欲匪蔽毋自暴棄必先立志我懷古人德盛道尊赫然而奮我曷未能舜何人哉有為若是希聖希賢惟學可至服堯之服誦堯之言能行其行是亦堯焉爾醴爾醮爾冠爾服鍳爾嘉名祝爾成德惟豫祝子有言爾宜好善心切故能思齊我其字之曰子善父汝受而保承天之祐竹宇辭四章平生此君兮交歡挺徑節兮琅玕當窮冬兮萬木搖落貞獨立兮翠寒承嘉惠兮君子之庭昭爾扁兮追舊日之風聲抗塵容兮不屈中自守兮虛明周子言兮甚密聖可學兮其要有一止無欲兮二字故靜虛兮動直動直兮靜虛本立兮不孤有容兮乃大忤人兮任渠序續國語序昆侖旁薄之廣大前瞻後際之無窮宇宙之間人之所以靈於萬物者以至理獨㑹於此心可以知來而藏往可以原始而反終也天開文明河圖斯出聖心默契畫卦造書而後三墳五典八索九丘傳於世後一千八百六十有餘年吾夫子秉道統之傳任述作之責咸黜舊聞斷自唐虞而已夫子豈不欲備上古之淳風考制作之本始探幽賾而昭陽德也顧其荒誕鄙野厖雜殽亂或訛其㫖或失其傳非可以立人極闡世教為萬世帝王之法程於是因民心之感以正其情刪詩者所以導其和也因治世之事以逹其道定書者所以立其教也因民用之疑以極其變繫易者開物之書也因亂世之事以悼其失作春秋者立法之書也天地忽否吾道荆榛詩書厄於秦楚烈熖之中漢之儒者不能追亡補遺以足百篇之義乃過用其心於百篇之表矜功衒博詭聖誣經如畫鬼神誑惑群愚而莫能識其形似也大抵翻空者易竒核實者難工異哉太史公之為書也唐虞之上增加三帝曰黃帝曰顓頊曰帝嚳論其世次紀其風績驚駭學者以吾夫子之未及知也吁學至於吾夫子而止夫子之所不書太史公何從而知之缺其所不知不害其為學夫子也至我本朝蘇黃門始曰太史公淺近而不學疏略而輕信朱子屢稱此言最中其病及觀黃門之古史又上及於三皇以伏羲神農黃帝充之若與大傳同以少昊顓頊帝嚳唐虞謂之五帝終與大傳異其輕信何躬自蹈之乎堯舜吾知其為帝也禹湯文武吾知其為王也臯䕫稷契伊傅周召吾知其為賢也吾何從而知之以吾夫子之書而知之也夫子聖人也前聖之所傳至吾夫子而止後學之取信亦至吾夫子而止於吾夫子而止於吾夫子不得取吾信烏乎取吾信唐虞之上三皇五帝之有無離合吾不得而信也出於吾夫子之言吾之所信也其或出於諸子百家之書非吾之所敢信也雖百篇之義固不得而追補然其大經大法巍乎燦然如日月五星之麗乎天未見其不足也千載之下猶未聞有法而行之者以追帝王之餘風尚何求於茫茫不可致詰之外哉春秋之書吾夫子之親筆也其人可信也其時可近也傳之者失夫子之意多矣曽不是之求乃舍近而求之逺棄實而求之虛何耶天地之內一日之間事如沙塵何可勝紀大者無出於三綱五常而至微者亦皆有理三代既逺自漢而下其見於史者十有七不過存一二於百千萬億之中而學者猶罕能盡觀而遍考也我朝治平間先正司馬公奉㫖編成資治通鑑合一千三百六十二年之事為二百九十四卷君臣出治之本天人相與之際規諌之從違刑政之得失善可為法惡可為戒採托刋削井然有條最為三代之下甚盛之書也文公朱先生以之編通鑑綱目五十有九卷大書為綱分注為目綱倣春秋目倣左傳踵編年之成文還䇿書之舊制門人李方子為後語精核明暢發揮本㫖羽翼麟經殆無餘藴僕嘗聞朱子曰左氏於春秋依經以作傳復為國語二十一篇國别事殊或越數十年而遂其事蓋亦近書體以相錯綜云爾以建安袁公樞為本末其部居門目始終離合之間又皆曲有微意其錯綜溫公之書亦國語之流矣於是考國語之為書始於周穆王終於周定王凡四百八十有餘年止八國之書合一百八十有二章唐之栁宗元乃以國語文勝而言厖好怪而反倫學者溺其文必信其實是聖人之道翳也遂作非國語六七十篇以望乎世者愈狹而求相於吕化光豈不愚哉司馬公曰國語所載皆國家大節興亡之本宗元豈足以望古君子藩籬妄著一書以非之宋秦公嘗叙之曰自魏晉以後書録所題皆曰春秋外傳國語是則左傳為內國語為外二書相副以大成業凡事詳於內者略於外備於外者簡於內先儒亦以為然以是知左傳國語不可偏廢袁公本末之書歷年幾兩倍於國語而不過二百三十八章或者疑其太簡且病於無所發明然時益近而事益多此勢之所必至事益多而詞益少此可以見其筆力之精也不觀其博則不知其精不知其精則不切於用為士者以萬物皆備之身而不以古今自任不以經綸自期者亦自遏其躬而已僕因考通鑑之初語即外傳之終語也以是知司馬公之意未嘗不拳拳於外傳於是分門約語附諸儒之論辨編為續國語凡若干卷合若干章以備一家之支流餘裔竊嘗疑之左傳國語文氣不同未必出於古人之手左傳之文浮國語之文質浮者近於誣質者近於冗左傳多詳事情國語多陳制度然重見者亦少雖間有之而詳略且異者故相避然此可疑者一也見於春秋者猶有一百二十四國今國語止列其八他皆不足取乎况陳宋衛秦皆大國也亦無一語之可紀何耶此可疑者二也齊之內政不見於經而出於管子先儒皆以為非管仲書疑戰國之士僞為之豈有七百餘年之齊别無他語獨刪節此書乎此可疑者三也漢興之初亦以周之舊典禮經廢墜湮滅諸儒幸得其傳皆欣然存之而不疑司馬公已定為列國之舊史矣非左氏之文也嘗聞諸國各有史而不相知秦併六國始盡得之往往私相傳録皆非全書左氏文之而為傳國語疑未經穿鑿者秦其本國也宋衛非秦所滅所以獨無與自入通鑑以來周止亡國之語耳非可續也魏趙韓分晉而晉語亡田和篡齊而齊語亡越已滅吳楚𣸪滅越滅魯韓滅鄭齊滅宋故國所存惟楚而已吁中原禮義之國帝王聲教文物之地俱已丘墟雖秦楚亦未幾而亡矣此天地之大變古今之竒禍也烏在其為可續哉雖然僕之所續者書也非續其國也誠以國言之魯固亡矣而有不亡者存以吾夫子之聖亘萬世而不可磨滅門人子孫班班於後世逺夷暴君亦莫不欵謁致敬至今猶然雖周公伯禽之封國實成湯微子之苗裔也遂以續魯語為首上以黜夫子之所不取下以續夫子之所傳續魯語者亦所以續宋語也又以補袁公本末之所未備云重改庚午循環厯序維天之命於穆不已四時代謝循環不窮而元亨利貞之德未嘗須㬰間也人得天地生物之心以為心得天地生物之氣以為體子子孫孫曽𤣥雲仍千宗萬𣲖與天地相為終始此所謂民吾同胞者共此一原之氣故也雖其顯晦斷續之不齊而此氣初無間隔譬之水焉自一勺之微集而為溪澗川谷滙而為沱潛淮漢其間斷流絶港固不能無然渾渾浩浩不害其為長江大河也譬之木焉自一苗之生發而為幹支條葉養而為楩楠豫章其間枯萎槁落亦不能無然鬱鬱茂茂而不害其為聳壑昻霄也古人立大宗小宗之法所以合其同而嚴其别固已見之圗譜原其受姓之初考其遷徙之序烏乎吾不得而知之矣大宗之法有二義截然以始來在夲國者為始祖亦一義吾宗始祖三府君唐末自義烏之鳳林來居城下生死之年月無傳其子六府君實生於朱梁之庚午感天地生生之德流行不息惟吾宗生生之氣流慶無窮遂以庚午起厯凡我一原生息之慶悉書其日月於逐嵗之下周而復始若循環然雖百千萬年可同此一厯也續而成之尚有望於爾後人送倪君澤序士有求名而勉為自修者此世俗為人之學也士有好修而指曰求名者此世俗忌人之論也求名得名而實有未至不特人敗之天亦有以敗之非天故欲敗之也此理之所必敗也有其實而名自至豈人不得而掩之天亦不得而掩之非天不欲掩之也此理之所必不能掩也自其變者言之有其實而名不稱者有之未有無其實而能久盜其名者也夫以求名為心名茍得矣則所以自修者必懈誠以自修為心名雖得而自修者益篤何者愳其實之不稱是名也為人為已於是可以判矣若倪君君澤所謂有其實而名自至者也豫知君澤為最密其為人也外木訥而內精敏所積者深所存者逺真自修之士也未嘗求人之知雖終嵗同􅐼共案而莫測其學之淺深也一旦對䇿大廷結知聖主置之鼎甲人方驚歎駭愕恨知之晚今將趨南康幕戒行有日豫固知其必篤於實而不有是名也審矣然仕宦之實無他政事而已歐陽公一代文宗而對人多談政事或有疑而問者乃曰文章止能潤身政事可以及物斯言真可以針砭後世文士之膏肓夫流連詞藻不能政事者其病小玩愒嵗月而不屑於政事者其病大乃欲以不事事謂之養望者益誤矣昔君澤不憚千里之逺役甘遲四年之久次杜門山林不入城府與人謙恭不異平日此則所謂養望也今發軔宦轍已脫冗職之汚賤南康無二車太守之下即幕僚也千里之休戚所係也百姓之枉直取正也有貢賦之征焉有軍旅之事焉有官吏之宿弊焉有田里之隱憂焉又有書院前賢之遺範焉人未及太守而先議幕府矣四面之責方至非可以清談閒雅之為可尚也非可以體貌㳫施之為可習也茍以臺閣自命富貴自期厭塵勞而急小物吾見其名喪而望隳矣何有於養哉昔魏國韓忠獻嘗以大名為開封推官暑月汗流浹背理事不倦府尹曰此人要路在前而治民如此真宰相器也此豈非後學之所當法與君舊字希程今改字君澤夫致君澤民固儒者之事業亦朋友以是期君也自上而下言之能致君則澤民在其中矣自下而上言之能澤民乃致君也後世無莘野之聘無版築之求致君未有不自澤民始茍以此自詭不親細務而曰此養望也即異時持祿固位之根基可不愳乎君不憚其戅索豫言以相其行輒發是語庶朋友切切偲偲之義云宜晚堂序題扁之說亦有體乎齊居則有警戒之義堂宇則有頌願之情亭榭樓觀以寓興致其標示景物者次也義烏何公頎字碩甫取老杜翠屏宜晚對之句以宜晚題其堂而竊有疑焉夫山色青青萬古不老四時朝暮無不宜者何獨可對於晚耶豈非旦晝之間物交物而忘其山色乎至於弛塵勞於萬變納真靜於一時適有樂於吾心焉耳非山宜我是我宜山也今何公老矣其家人親友之所頌願亦人之至情也雖借是語而意實見於言外未必果有取於山也詠之者不為法縳可也坡老云作詩必此詩定非知詩人諸君子雅頌鏗鏘金舂玉應得此意者多矣豫何為者而可典引於前乎豫與公之子囦豫相别餘四十年一日䄂此集訪豫於陋巷各以蒼顔鶴髮幾不能辨道舊感慨且徴豫序固辭不獲因為之書云墨林類考序歐陽公集古之勤十有八年得千卷并包夷夏數千萬里歷周秦漢魏數千百年聖賢功業亂臣賊子事迹往往史傳之外證明僞繆其於所得之多雖勞而有益也其後東武趙明誠著金石録三十篇上自三代下訖五季鐘鼎甗鬲盤彛尊爵之欵識豐碑大碣顯人晦士之遺蹟見於金石者皆去取褒貶之凡為卷二千南渡後昭武李丙亦集録千卷越二十年天下之聞碑名蹟舉萃其家百世之消息盈虛粲然具於緗帙之上其他如復齊碑録東觀餘論及夾漈金石之類紀述不一謂之博古可也論之學則進德修業之士有所未暇東萊先生曰心思之不可囿而滯也其論精警豫固非有此癖好也亦非有力可以訪求也類秦漢之名碑慕其古也列晉唐之精刻善其字也分為六門便於討論也名曰墨林類考總二十卷亦未備也間嘗遐想在昔往古隱君逸士嘉言善行沉淪荒墜者何可勝道奸回之徒盜名惑世假託依倚者宜亦不少安得强敏有識之士於進修之餘追游藝之意裒金石之所載具其辭章考其真僞評其得失削其繆妄續歷代之典法補史傳之缺遺庶有益於後世無玩物喪志之嫌可以盡掩前人之編庶幾乎恢拓翰墨之囿疏暢心思之滯集金石之大成而玉振之矣吁焉知來者之不如今也顧豫所編不足以議此因其序以見此云爾考蘭序序曰考古士之常業也考聖賢之成法而后識事理之當然雖天文地理律厯制度凡所當考者不一至於治亂成敗是非得失之迹尤不可不考者也若夫書之為藝有六義有八體有脫簡缺文之疑有豕亥魯魚之辨考者考其字之訛謬也非考其字之妍􅑦也考其字之妍􅑦後世之末學也梁武評書按一時之遺蹟蔽數語以形容此烏足以盡其精微哉袁昻又評之唐人又評之本朝諸公亦從而評之大抵皆祖述其意而異其辭爾梁之庾肩吾又品第其髙下唐李嗣真亦效之此固未易工也亦不過論其大體而已未有提出一碑一碣縱論其善惡者尤未有一碑變數十百碑如蘭亭叙者也豫因觀蘭亭考而有感焉推其源流辨其同異列其所自出萃前賢之論贊亦可謂博雅好古之士矣問其考精者之所以為精不善者之所以為不善則未嘗有决詞也夫以一紙之字臨摹響搨數十百本而刻之雖不能不失真猶可曰互有得失蓋所傳者之未逺也然一石之字捶搨之間且有紙墨工拙之異濃淡肥瘠之不同豈有一碑轉相傳禪子子孫孫變而為數十百種而有不失其真者乎一傳而質已壞再傳而氣已漓三四傳之後尚髣佛其流風餘韻者鮮矣盍亦求其初乎孟子曰觀水有術必觀其瀾此觀其所㑹也又曰水無有不下性無有不善此觀其初也不揣其本而求其末不探其源而涉其流今為士者事事皆然何獨於蘭亭可歎也哉本朝黃山谷最善評書其論此碑也則曰禇庭誨所臨極肥張景元所得缺石極瘦惟定武夲則肥不剩肉瘦不露骨三石皆有佳處又謂定州石入棠梨板者字雖肥骨肉相稱觀其筆意右軍清真風流氣韻映冠一世可想見也今時論書憎肥而喜瘦黨同而妬異曽未夢見右軍腳汗氣斯言慷慨激烈似亦審矣東坡則曰放曠自得郭河南則曰神氣飛動殊覺天成或曰遒媚徑健或曰溫潤典刑或曰謝脫拘束皆未為精密也米南宫之贊雖竒崛鏗鏘殊覺滉漾其曰永和字全其雅韻九觴字備著其真標浪字無異於書名由字益彰其楷則亦庶幾乎得其實也或謂定武本仰字如針眼殊字如蟹爪列字如丁形而為曽公樂道譏之曰恐為九方臯所哂然而驪黃牝牡之不記則有之决不以犬豕豺狼麋鹿而謂之馬也茍能於永和九觴浪由仰殊列九字之中開九方臯之目亦未為過近世如尤錫山王復齊皆喜評碑帖陸象山謂二公於蘭亭一主肥一主瘦二公猶爾其孰能决之惟髙宗皇帝贊曰禊亭遺墨行書之宗真百世不易之訓豫嘗謂山谷之評以薛肥張瘦惟定武本不瘦不肥其論雖審而觀者未悟其意後之翻刻者止求於不瘦不肥之間則字畫停勻反成史筆尚何足以語蘭亭乎其意蓋曰定武本有肥有瘦肥者不剩肉瘦者不露骨此右軍之字所以為行書之宗也夫賞鑑識别之嚴各隨人品而上下昧者貴耳賤目矜已忮善未易以口舌辨也間有雅尚君子潔長度短博覽研校不過至定武重開本而止蓋初本罕落東南未易見故也葉公好龍見真龍而反疑之紛紛皆然豫見此序亦多矣雖不能盡知何處所刋每見善本亦未嘗不為之躍然及見中原故家舊本於是心降慮消氣融神暢又愳其見之未博也疑必有過於此者廣采近時精鑑之士所共推為善本者十餘家㸃㸃畫畫錙銖而考之未見其可以伯仲稱也其肥者必失之氣濁瘦者必失之骨寒神癡而質俚者有之意縱而筆狂者有之或同兒戲不知其醜而疥於石者繁瑣可羞也若後世再有王右軍則後之蘭亭或勝若後世未有王右軍則蘭亭當求初本無疑不見初本政自不必觀蘭亭也昔有所謂古蘭杵蘭禇蘭今豫作考蘭四卷逐字疏於其下云默成賜硯序昔大父幼師默成也期待之至乃以廷對之硯賜焉大父不負所期卒以此硯復對䇿於行朝其後宦轍南北必挾以自隨先君平生無長物所嘗用者亦止此先君卒保藏惟謹蓋其制古質堅後人不知必有厭棄遂屬內兄伯逺小篆銘文鎸於其下今雖廢曠遺芳不嗣者百有餘年矣誠得此硯長存或有感而自奮者烏知其不永為衣鉢之的傳况兩世手澤在焉可不知所保乎重改石笋清風録序夫天道流行發育萬物鼓天下之物而神變化之功者莫疾乎風起於空洞蒼茫之中而激越於山川徘徊於草木虛徐游泳於精神興致之表冷然而不可挹倐然而不可留其感人也深其動物也力有自然之妙莫知其所以然者其唯風乎聖人觀物察理擬諸形容喻君子之善而名之曰德風感詠歌之意而名之曰國風曰風氣之開以見造化之推移曰風聲之樹以示治道之興起有曰風教風俗風範風致皆取其感人動物有自然之妙故也蒸民之詩曰吉甫作頌穆如清風傳者以為清微之風養萬物者也蓋其薰蒸披拂也天地為之光華如人之嘉言善行流播傳誦後世為之奮起故聞伯夷之風者頑夫亷懦夫有立志聞栁下惠之風者薄夫敦鄙夫寬百世之下聞者尚可以變化其氣質而况夫先世之流風遺韻子孫所當觀感服習繼繼承承要不失其氣象而忍遺響之不嗣乎豫生最晚不克肖似十有五年而孤諸父亦相繼淪謝而於先大父之清規素範不得而詳也猶及咨訪故老探討遺書至於孫曽則已瞢然不得而聞之矣夙夜祇懼追求亡逸餘二十年存者無幾其幸而得者為之裒彚考訂表識序題亦既成編繫之曰石筍清風録石筍者先大父丘隴之名清風之所自出也豫今已年幾六十矣舊學荒蕪不足以顯揚先德家事雕落不足以增衍遺緒痛文獻之顛連尤凛凛乎殘毁散逸之至再則清風為之掃地若我羣從子孫書種不絶清風徐回凡今日之所以辛勤整比反復丁寧或可以為後日作成之助况是録也非有聲色珍寶之可悅非有鍾鼎爵祿之可慕玩之者有能思賢人君子交道之所以綢繆味斷簡塵編辭氣之所以忠厚必知紹述先志軌度前修兢兢業業勉勉循循盡其力於學問之所當為絶其意於性分不當得之外其間或有名世者斯無忝於爾所生矣是雖出於秉彛好德之良心豈無賴於父兄濡染薰陶之力至於觸其機動其志躍如其喜肅然而敬是孰使之然哉是皆有自然之感而莫知其然者此録之所以謂之清風也歐陽公曰七賢圗吾家之舊物且使子孫不忘先世之清風嗚乎若此編者豈七賢圗之所可並稱哉汝其保之無負豫拳拳深有望於爾後人研幾圖序河圗出而人文開八卦畫而易道顯九疇錫而洪範著書固不先於圗也成王之傳位也河圗在東序大訓在西序參錯於天球𢎞璧之間聖主之所寶可知矣古人左圗右書未嘗偏廢後世書籍浸繁而圗學幾絶間有因玩好摹寫景物以悅目而有關於理者固鮮圖學之中興非神聖不能作非明智不能傳洪範歷千有餘年非箕子孰能陳之先天圗湮沒者二千餘年至卲子而始出濓溪周子再開萬世道學之淵源者太極圖也而通書次之蓋有一圖之義極千萬言而不能盡者圗之妙實不在書之後也近世夾漈鄭公遂作圖譜略固不足以盡天下之圗而圗之名義亦可概見其論縱橫開閣援引宏博既富矣哉而於理非其所尚此為可恨焉耳豫曩自麗澤歸溫習舊書有未解者因手畫成圖沈潛玩索萬理悠然而輻輳益知圖之為可貴而靜中之有真樂也叙其所以貽之子姓非敢為他人道吁卲子垂沒始以先天圗授之伯溫未嘗不哂其過計也先天圗卒大明於後世者豈伯溫所能與於斯乎烏在其為能授也哉發遣三昧序文章有正氣所以載道而記事也古人為學本以躬行講論義理融㑹貫通文章從胸中流出自然典實光明是之謂正氣後世専務辭章雕刻纂組元氣漓矣間有微見義理因得以映帶㸃綴於言語之中是之謂倒學至於書疏尺牘亦日用之不可缺者尤宜爾雅筆勢欲圎而暢筆力欲簡而嚴非學問不足以至之學得其本此為易事學既淺陋不得不假借而􅊞取之也以是為學抑末矣昔姑溪李端叔善屬文工於尺牘東坡謂其得發遣三昧者釋氏之妙語也若與之實少之也然所以得此三昧者亦出於博洽之餘惜所用者小耳因見小姪編類尺牘以資筆端之芳潤嘗語之曰此非所以為學也不得已亦當求於古作者可也偶有姑溪三昧集出以示之亦非可取足於是編也又為之博採於韓歐蘇黃而下諸公分為十卷稍廣其見聞所取者有淺有深淺者誘其入深者冀其進豈不知導其茍而成其陋者非教也猶有望其能倒學以識文章之正氣云送立齊入京序立齊東轍南轅息肩未久今已艤錢唐之櫂矣念昔者同保嵗寒之盟杳未有期不能不使人浩歎雖然出處各有義茍能挽世道扶綱者見於行窮者見於言非屑屑於往來者則屈伸行藏同一機也今久軒一蹴而踐台席可以行其學矣立齊以義交而不相忘可以言其所見矣今天下事變其端不一非可一言而盡豫居山林讀書以求盡其分耳茍言天下事豈無出位之嫌乎昔顔子居陋巷樂簞瓢非有仕祿意也門人問為政者前後相望而顔子獨發為邦之問夫子未嘗以思出其位責之而直告以四代禮樂何也蓋學者學聖人之道豈曰獨善其身而已亦均有天下國家之責焉非彼為則此為也寧舍之而藏不可用之而無以行也夫當周之末諸侯日夜之所求者富國强兵之外無他事也異時齊景公問政於孔子而答之以君君臣臣父父子子此可謂迂濶而非急務者而景公猶能粗識其㫖曰信如以今天下父子之倫廢缺者固不止一端而莫大於氏族之無别絶人宗祀亂人婚􅊚駸駸乎夷狄禽獸之歸此唐季亂亡之證也以今天下君臣之倫廢缺者亦不止一端而莫大於始仕之無義德行掃地浮薄滔天誣經詭聖茍於一得無所不為其害有甚於焚書坑儒之禍茍幸久軒聼豫之言先圗其大者推其類次第而講行之亦可為世道慶而子今日之往亦不為徒行也視豫之白首窮經無得於道無用於時其行藏未易以優劣也子其勉之宇宙紀略序伏羲之世上上古也天機動而河圗出人文闢而八卦成天何言哉感伏羲之心假伏羲之手開千萬世文明之治伏羲亦何言哉得於心應於手而自有不可勝言之妙不知其幾千百年也至文王繫彖周公繫爻吾夫子又從而翼之詞則費矣圗將隱矣夫子憂其圖之遂亡也以四句十有八字紀之於大傳又不知其幾千百年也至我本朝康節邵先生始得而傳之及朱子夲義之書作而先天後天之圗於是粲然而大明矣豫往嵗於康誠求家見一先天圗規制甚簡古云得於徐毅齊心甚愛之每疑其中分一半若倒轉然於造化不合耿耿久之壬戌之冬上蔡書院納交於玉峰車君首出此圖示豫即向者之所見其可疑者已正之矣終日對之如在伏羲之世甚矣車君之能古其今也上天下地古往今來之紀孰有大於此者乎既而又出示以巨編曰宇宙紀略凡幾卷若干圖圖之後有證有考有釋有論至於乾端坤倪民彛物則禮樂制度之詳經傳義理之奧莫不備載皆經世之具哉書乎人見圖與詞之費也而不知所以然者實隱乎其中中庸曰君子之道費而隱又曰君子語大天下莫能載語小天下莫能破是書有焉車君名某字某黃岩人有三世家傳之淵源有四方朋友之博雅與豫一見如平生歡命為之序豫不敢辭於是乎序魯齊集卷四
