body:
  text: 魯齋集卷十六宋王柏撰辨詩十辨序曰聖人之道以書而傳亦以書而晦夫天髙地下萬物散殊皆與道為體然載道之全者莫如書既曰以是而傳又曰以是而晦何也在昔上古教化隆盛學校修明聖人之道流行宣著雖無書可也惟教化有時而衰學校有時而廢道之托於人者始不得其傳然後筆於言存於簡册以開後之學者而書之功大矣及其専門之學興而各主其傳訓詁之義作而各是其説或膠於淺陋或騖於髙逺援據傅會穿鑿支離詭受以飾私駕古以借重執其詞而害於意者有之襲其訛而誣其義者有之遂使聖人之道反晦蝕殘毁卒不得大明於天下故曰以書而晦此無他識不足以破其妄力不足以排其非後世任道者之通病也紫陽朱夫子出而推伊洛之精蘊取聖經於晦蝕殘毁之中専以四書為義理之淵藪於易則分還三聖之舊於詩則掇去小序之失此皆千有餘年之惑一旦汛掃平蕩其功過孟氏遠矣然道之明晦也皆有其漸蓋非一日之積集其成者不能無賴於其始則前賢之功有不可廢正其大者不能無遺於其小則後學之責有不可辭大抵有探討之實者不能無所疑有是非之見者不容無所辨苟輕於改而不知存古以缺疑固學者之可罪狃於舊而不知按理以復古豈先儒所望於後之學者雖後世皆破裂不完之經而人心有明白不磨之理縱未能推人心之理以正破裂不完之經何忍徇破裂不完之經以壞明白不磨之理乎豫因讀詩而薄有疑既而思益久而疑益多不揆淺陋作詩十辨一曰毛詩辨二曰風雅辨三曰王風辨四曰二雅辨五曰賦詩辨六曰豳風辨七曰風序辨八曰魯頌辨九曰詩亡辨十曰經傳辨非敢妄疑聖人之經也直欲辨後世之經而已毛詩辨愚嘗求三百篇之詩矣固非唐虞夏商之詩也固非盡出於周公之所定也亦非盡出於夫子之所刪也周公之舊詩不滿百篇先儒以為正風正雅是也夫子之刪固非刪周公之所已定刪周公之後龎雜之詩存者止二百有餘篇先儒以為變風變雅是也頌雖無正變之分而實有正變之體周公夫子合而為三百篇而總係之於周也然今之所謂三百篇者皆周公夫子之舊乎愚不得而知也昔成康既沒之後至孔子時未五百年雖經幽厲之暴亂而賢人君子之隱於下者未絶也太史册府之掌藏未亡也太師矇瞽之音調未失也而雅頌龎雜已荒周公之舊制夫子自衛反魯然後正之況東遷之後周室已極衰微夫子既沒而大義已乖樂工入河入海而聲益廢功利攘奪干戈相尋視禮樂為無用之器至於秦政而天下之勢大亂極壞始與吾道為夙怨大仇遂舉詩書而焚滅之名儒生者又從而坑戮之偶語詩書者復厲以大禁其禍慘烈振古所無漢定之後詩忽出於魯出於齊燕國風雅頌之序篇什章句之分吾安知其果無脫簡殽亂而盡復乎周公孔子之舊也夫書授於伏生之口止二十有八篇參之以孔壁之藏又二十有五篇然其亡失終不可復見者猶有四十有餘篇其存者且不勝其錯亂訛舛為萬世之深恨今不知詩之為經藏於何所乃如是之祕傳於何人乃如是之的遭焚禁之大禍而三百篇之目宛然如二聖人之舊無一篇之亡一章之失詩書同禍而存亡之異遼絶乃如此吾斯之未能信夫天下之書合千萬人之言如出於一人之口吾知其傳之之的也雖數人之言而亦不能不異者吾知其傳之之訛也以其傳之之的固幸其言之無不同以其傳之之訛亦幸其言之有所異也何者與其彼此俱失而無它左驗固不若互得互失而可以參考也是以漢初最善復古而齊韓魯三家之詩並列於學官惟毛萇者最後出其言不行於天下而獨行於北海鄭康成北海之人也故為之箋自是之後學者雖不識毛萇而篤信康成故毛詩假康成之重而排迮三家獨得盛行於世毛鄭既孤行而三家抵牾之迹遂絶而不得參伍錯綜以訂其是非凡詩家疏義等學合十有二種凡九十餘家至本朝又三十餘家無非推尊毛鄭崇尚小序學者惑於同而忘其異遂信其傳之之果的也且萇自謂其學傳於子夏按子夏少夫子四十一嵗至漢已三百年烏在其為得於子夏哉若傳於子夏之門人則流派相承具有姓氏不應晦昧湮沒詭所授受以誑後世惟魯詩有原見稱於史至西晉而已亡陸機雖撰毛公相傳之序上接子夏而又與釋文無一人合其偽可知愚是以於毛詩尤不能不疑也風雅辨昔者朱子破千載之惑退黜小序刪夷纒繞作為詩傳自詩之湮沒經幾何年而一旦洗出本義明白簡直可謂駿功無有遺恨惟風雅之別雖有凡例而權之篇什猶未坦然故其答門人之問亦多未一於是有腔調不同之説有體製不同之説有詞氣不同之説或以地分或以時分或以所作之人而分諸説皆可參考惟腔調不傳其説不可考也近世儒者乃謂義理之説勝而聲歌之學日微古人之詩用以歌非以説義也不能歌之但能誦其文而説其義可乎究其為説主聲而不主義如此則雖鄭衛之聲可薦於宗廟矣天作清廟可奏於宴豆之間矣可謂捨本而逐末凡歌聲悠揚於喉吻而感動於心思正以其義焉耳茍不主義則歌者以何為主聽者有何可味豈足以薰蒸變化人之氣質鼓舞動蕩人之志氣哉善乎朱子之答陳氏體仁也舉書曰詩言志歌永言聲依永律和聲故曰詩出於志樂出於詩樂乃為詩而作非詩為樂而作也又曰古樂散亡無復可考而欲以聲求詩則未知古樂之遺聲今皆可以推而得之乎三百篇皆可協之音律而被之絃歌已乎既未必可得則今之所講得無有畫餅之譏耶所謂腔調之説灼知朱子晚年之所不取也至於楚辭之集注後詩傳二十年風雅頌之分其説審矣其言曰風則閭巷風土男女情思之詞雅則燕享朝會公卿大夫之作頌則鬼神宗廟祭祀歌舞之樂以此例推之則所謂體製詞氣所謂以時以地以所作之不同等説皆有條而不紊矣竊謂朱子所條之凡例正以周公所定風雅頌而別之律以先儒所謂正風正雅者無一不合但於所謂變風變雅者有不得而同後學無以處此遂橫生枝葉以求合凡例而不能按據凡例以釐正舛訛所以辨義起而卒不能定故為之言曰先儒正其大義而不能不遺其小節以待後之學者此也王風辨詩何自而始乎於堯之時出於老人兒童之口者四字為句兩句為韻豈嘗學而為哉衝口而出轉喉而聲皆有自然之音節虞舜君臣之賡歌南風五絃之韻語與夫五子御母述戒之章體各不同歷夏商以來謳吟於下者格調紛紛雜出而無統周公於功成治定之後制作禮樂推本文王之所以王周者化基於袵席而風動於鄰國取其聲詩義理深長章句整齊者定為一體適有合於康衢擊壤之章而重之名之曰風被之管絃以為家鄉邦國之用止二十餘篇而已及其立為學宫取為燕享宗廟朝會之用亦因以放此章句總為一代之樂及夫子祖述周公之意刪取後世之詩以合乎風雅頌者亦不敢參以別體故周七百年之詩如出於一人之手非作之者共此格調也乃取之者守此格調也三百篇既同此格調而又有風雅頌之名者何也蓋作之之意不同而用之之節亦異今先以風言之周未有天下之時近而宫女遠而南國被文王之化形於辭者此風也周既有天下之後分封諸國列國之民感國君之化有美有惡焉形而為歌詠者亦此風也王國之中感後王之化亦有美有惡焉形而為歌詠者亦此風也凡在下之作槩謂之風初不系周之盛衰但當其盛時風如二南當其衰時風如黍離何獨於東遷之後雅始降而為風乎平王之雅不可降而為風猶文王之風不可升而為雅其曰國風者周為商列國之風也其曰王風者周王天下以後之風也風只此風也風之上所繫有不同耳安有可升可降之理哉後世因降之一字遂謂平王以前有雅無風雖風亦強名曰雅是皆於降字之義有所未明於是風雅之部分雜矣況周自武成以來至平王時且三百五十年成康之際仁義漸摩薰陶情性教化盛矣內而妾媵之微外而井里之衆環王畿千里之地卒無能吐一詞歌一語與豐岐江漢之詩律吕相應寂寥湮沒終無一章之風可以備聖人之刪存逮東遷之後土地日蹙一旦興起播之篇咏遽有十章之風豈理也哉至於何彼穠矣一詩平王以後之詩也合次於王風明矣今乃強尊之而名於二南或謂武王之詩則又強抑之列國之類進退無據以此推之它可知矣愚敢謂二雅之中不合於正雅之體用者皆當歸之王風焉二雅辨愚又考小雅之正詩其為體有二一曰燕享賔客之樂二曰勞來行役之樂朱子所謂歡欣和説以盡羣下之情者也大雅之正詩其體一曰會朝之樂而已朱子所謂恭敬齊莊以發先王之德者也據二雅之體而正今之詩以正小雅而亂入正大雅者有之而正雅亦不得為全無疵矣至於變雅之中有變雅之正者焉有變雅之變者焉有章句繁多詞語嚴密有似大雅之體者焉又有言語鄭重義理曲折又皆王公大人之作者然施之於燕享非所宜用之於朝會又不可無乃出於放臣逐子出妻怨婦樽酒慰勞之所奏者乎此又變雅之再變者也或謂決古人之疑只有義理證驗兩事今求之義理固亦可通責以證驗絶無可考不能不反致疑也豫應之曰諸經悉出煨燼之餘苟無可驗而漢儒臆度之説何可憑哉聖人於杞於宋尚有不足徵之嘆況求之後世乎有一於此與其求之於漢儒臆度之説孰若只求之於正雅之中詞氣體格分畫施用豈不曉然其為證驗莫切於此尚何外求哉且夫怡怡酬勤之情與譏刺怨傷之意其心不同也稱述先王之盛德大業與感慨後世之昏朝亂政其言不同也協之以八音和之以六律由是美教化厚風俗與夫私心邪念聞之而有所懲警者其用不同也發之於人心者既不同形之於言語者亦且異施之於事者俱無所合有是三不同而得以同謂之雅可乎雖聖人規模寬廣而條列不應紊亂如此其始出於降風之一言而不知其所謂降之義遂使後世不識二聖人禮樂之正意誦之者冥然聽命於小序良可悲也愚故謂變雅之不合於正雅者悉歸之王風其説審矣賦詩辨作詩所以言志也賦詩亦以觀志也觀其志不若觀其禮志無定而禮有則也夫歌咏者發於天機之自然而人心不可飾於倉卒之一語是皆可以觀其志之所向而吉凶禍福之占亦因此而定此春秋之時所以賦詩於盟會燕享之際而有不可掩其本心之情偽者蓋一吟一咏聲轉機萌事形詩中志形詩外真情故態不能矯誣自非義理素明於胸中而有能勉強不失於金石籩豆之間哉當是時惟鄭國七子六卿之賦為最盛而趙文子韓宣子於立談之頃猶足以定其終身之所就亦可謂善觀矣豫則謂善觀樂者不觀其志而觀其禮先儒所謂禮先樂後者蓋事有序而后能和此樂之本也以燕享而及宗廟之樂謂之褻可也以諸侯而奏朝會之樂謂之僭可也雖有事證恐不得謂之當然惟二南之樂得人倫之正為教化之先可以用之鄉人用之邦國小雅之樂已不同矣有天子宴諸侯之樂焉有上下通用之樂焉此則截然而不可亂舞位且有多少之數歌詞豈無異同之分玩其義審其音則樂之本不待索之於鏗鏘節奏之末而後知昭懿之後僭禮已多況東遷乎夫君臣之分天地之常經也毁冠裂冕暴滅宗周逆理亂常之事接武於史人心之樂喪壞無餘烏足以責之於鐘鼓律吕之中猶有降殺等威之別哉如晉侯之賦假樂賦既醉齊侯之賦蓼蕭此諸侯僭天子之樂也楚令尹之賦大明季武子之賦綿韓宣子之賦我將此大夫僭天子之樂也魯曰秉周禮其宴范宣子也為之賦彤弓宣子不敢當歸美於文公焉其宴寧武子也亦為賦彤弓賦湛露武子以為肄業之所及而詭辭焉禮樂之大分尚有間存於人心者魯之所秉亦微矣固無望於他國也是以晉享穆叔而奏肆夏奏文王穆叔俱不拜亦似乎知禮者其對曰肆夏天子所以享元侯也文王兩君相見之樂也此果穆叔之言乎抑傳之果無誤乎是皆未可知也棠棣之詩周公之詩也左氏以為召穆公之作楚歌武頌而三章六章與今詩差互亦何以知其為楚之差毛鄭之差左氏之差也至於魯三家者嘗以雍徹矣非有聖人之明訓後世亦將以為當然而反證雍之可以通用矣大抵左氏之言多失之誣而春秋之禮亦失之僭皆不可引為三百篇之證愚故曰宴享而奏宗廟之樂謂之褻可也諸侯而用朝會之樂謂之僭可也雖有事證不得謂之當然豳風辨豳何為而有詩也豳之有詩非周公之意也以今七月篇考之蓋周公推王業之原本出於后稷播種之功以成王尚幼未知稼穡之艱難故紀其天時之變遷人事之勤勞使瞽矇朝夕諷於成王之側與無逸之書實相表裏其忠誠懇惻之意篤厚如此然其詩不立之學官不播之二雅毛萇忽名之曰豳風則何以知其為周公之意也邪夫子感周公之作取之以為法於後世以凡例律之謂宜存之於變雅也明矣今儕之以風繫之以豳不能不啓學者之惑故昔人嘗考之於齊魯韓三家俱無所謂七月之章而毛氏獨有之謂其非周公之作固無所考以杜毛氏之口謂其果列於豳風之中則後世之疑不一而毛氏亦無以釋其惑也詩遠無傳也久矣且其事始於后稷係之以邰可也而其詩作於周公係之以周可也今不邰不周冠以公劉太王之豳上無以見其始下無以見其成曰七月曰九月夏正也曰一之日曰二之日周正也一章之中二正並舉何哉況公劉太王商之列國也豈有不受商之正朔乃上稱夏正下創周正是不待商紂之淫亂而先有篡商之志也愚故知其必非周公之意也或謂七月之詩恐與豳詩差互揉亂而傳者失其真歟歌豳之文見于周禮之籥章既曰豳詩又曰雅頌且無所謂風之文安有一詩以備三禮之用歐陽公遂併周禮而毁之則過矣王氏謂豳故有詩而今亡後世妄補之云耳此言近之矣是皆以部分未安章句可疑而生此紛紛之説也夫七月而系之以豳猶云可也使周公東征九詩而俱系之以豳無乃太遠乎是故文中子謂君臣相誚其能正乎成王終疑周公其風變矣惟周公能正其變故夫子系之以豳其意深遠可謂曲推其妙長樂劉氏則謂不使成王之世有變雅之聲而攝引其詩使還周公也其説益巧矣不知夫子之意果如是乎如文中子之説豳本變風以周公能復升為正風如劉氏之説豳實雅也變而為風曰風曰雅曰正曰變可降可升得以意定初無定體不知聖人之法果如是乎夫鴟梟之名見於金縢之書金縢之篇系於洪範旅獒之後聖人於書未嘗有回互委曲之意而於詩乃極其幹旋抆拭之功聖人之心光明正大必不如是之茍率也夫豳谷闕西北之陲也三監東南之壤也地之相去也數千餘里事之先後也數百餘載有周公自作之詩焉有軍士百姓之詩焉今雜然強附苟合於一風之中孰謂夫子之聖有如是之部分哉漢儒無識大略如此故愚願以豳風七詩以類分入於變雅焉或者難之曰十三國風其來已久今遽缺其一無乃太駭乎愚曰不然列國之有風既未知其果定於十三之數乎而十三國之名亦未知其果為弼鄘衛王鄭魏唐秦陳檜曹豳果有詩則當列於二南之上與其推本文王之化又豈若推原后稷之功之為深遠哉豳之為風可以知其決非周公之意也風序辨讀書不能無疑疑而無所考缺之可也可疑而不知疑此疏之過也當缺而不能缺此贅之病也夫魯宋之無風説者以為王者之後不陳其國之詩此亦因其無詩而強為之説而不計其理之未通也曰唐曰曹曰衛於魯為兄弟之國也曰陳與宋俱帝王之後也夫陳衛唐曹何不得與宋魯並而獨陳其詩乎其説窮矣列國之詩俱得陳之於周之天王固非關於魯也夫子刪其繁亂豈求之周太史盡舉而歸魯以定其黜陟也哉特以魯用天子之禮樂太師傳於周而奏於魯也夫子因得而刪之耳其傳於魯者固未必盡得周之所藏周綱不競諸侯不臣其本國之詩亦未必盡陳於周也則其所遺逸者亦多矣凡後世名為逸詩者不知夫子既刪之餘乎抑漢儒傳誦之遺乎此皆無所考而當缺者況國風之次序尤不必贅為之辭夫十三國之次序不同之説有三曰周召弼鄘衛王鄭齊豳秦魏唐陳檜曹者此夫子未刪詩之前季札所聽周樂之次序也曰周召弼鄘衛檜鄭齊魏唐秦陳曹豳王者此鄭康成詩譜之次序也曰周召弼鄘衛王鄭齊魏唐秦陳檜曹豳此今詩之次序也程子亦因今序而為之説謂邶鄘衛之所以先者衛首併邶鄘為亂首也此亦因文未有以證其決然為夫子之舊序則其先後之間不害大義誠有不必穿鑿者故歐陽公曰求詩人之意達聖人之志者經師之本也講大師之職因其失傳而妄為之説者經師之末也得其本而不通乎末缺其疑可也雖其本有不能達者猶將缺之況其末乎其説得之矣今又自為詩譜定其次序而又不能不惑於小序之失何躬病之而躬蹈之乎惟朱子去小序之外此等皆置而不復講其意深矣學者但當悼後世之不幸不得見聖人之舊經相與沈潛玩味其無所疑者斯可矣則其可疑者雖聖人復生亦將闕之也已魯頌辨缺疑之義為其無所考證不得已而缺之也或幸而有所考證亦何為而不決之哉夫魯之有頌亦變頌也惟閟宫一篇獨歐陽公歷考僖公之時初無所謂淮夷徐方荆楚之功深以為疑其所論辨亦詳且明若遂以為非僖公之詩乎則詩中有周公之孫莊公之子兩句終不可泯沒是以朱子於他篇皆曰無所考獨以此篇為僖公之詩無疑者正以此兩句為可信也愚嘗即其詩而熟味之固不敢以為非僖公之詩也意其間有顛倒參錯之誤是蓋傳之者之過也若引孟子之言為據則戎狄是膺荆舒是懲為頌周公也審矣又嘗考周公之世家雖周公亦未嘗有戎狄荆舒之役然亦無他明證不敢必以為非周公之事也孟子之時詩書未火宜得其實又不應無所據而兩闕就其説雖闕取義固善詩者之常至於提魯頌之號而以僖公易以周公亦恐孟子不如是之耄也或以為僖公四年嘗從齊桓公伐楚魯遂以為僖公之功也當是之時楚方強大桓公且不敢與之戰而卒與之同盟在齊猶為可羞況於僖公因齊之師從人之役進無尺寸之功而敢退為虛誕之辭侈大浮誇以誑國人夫子尚何所取以播其醜哉必不然矣若夫徐方淮夷之事則與荆楚不同聖人存之於書載之於費誓之篇其為頌伯禽之言昭灼明驗無可疑者顧讀之者偶未思耳又竊意土田附庸之下辭氣未終血脈不貫移泰山岩岩保有鳧繹兩章於此倫序方整既不害其為僖公之詩亦不妨以為伯禽之事至於則莫我敢承以下文意亦不相接俾爾昌而熾一段當承於亦其福汝之後方為聨屬古人作詩章句雖重而有味條理雖寬而實密必不如是之斷續破碎也觀此一詩命辭措意雅奧淵原必出於賢人君子之手而周公伯禽之魯氣象尚可挹也則其斷續破碎之疵可以知其為傳者之誤惟駉與有駜二詩未知其為何時之詩詳考其思樂泮水一篇則可以知其為頌伯禽之詩蓋其詩専以平淮夷來獻馘於泮宫而作也夫魯之盛無出於伯禽之時自是以後武功不競世為弱國烏有此雋偉之績哉祝而願之之説鑿尤甚矣蓋願祝之辭與鋪陳事實之辭語脈逈異且曰穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜味其辭氣雍肅句法莊重非伯禽其誰當之愚故曰幸而有所考證而求其考證之的又孰出於聖人之書既足以破後世之惑亦胡為而不決哉詩亡辨孟子曰王者之迹熄而詩亡詩亡然後春秋作集注曰王者之迹熄謂平王東遷而政教號令不及於天下詩亡謂黍離降為國風而雅亡也此朱子本程子楊氏之説而趙岐未有此論也二説本甚密以之釋孟子之言妄疑其少疏也蓋自穆王以來政教號令已不及於天下雖宣王修政教於幽厲之間晚已不競平王東遷而周道衰二雅於是不復作矣此程子之言確為至論黍離之詩周大夫之作也以王之大夫而作為是詩歸之於雅宜也然其閔周室之傾覆傷宗廟盡為禾黍其辭悲其意深與稱述先王盛德大業者固不侔矣施之於燕享非所宜奏之於朝會又不可繼之於二雅之正經無是辭也實同於風土情思之作謂之王風可也以其作於大夫也故曰降此楊氏之言包括詳盡然孟子之言實二經始終之要亦義理之所關也若謂夫子止因雅亡而作春秋則雅者自為朝會之樂春秋者自為魯國之史事情濶遠而脈絡不貫且孟子言王者之迹熄而詩亡非曰王者之詩亡也凡言詩風雅頌俱在其中非獨以為雅詩也是知迹熄二字包含有味然後二字承接有序所當涵泳而研究之若視為浮辭而刪節擺脫則情間而理迂恐與孟子本意不無少舛也惟河汾王氏窺見此意直以春秋詩書同曰三史其義深矣愚竊意王制有曰天子五年一巡狩命太師陳詩以觀民風自昭王膠楚澤之舟穆王回徐方之馭而巡狩絶迹夷王方下堂而見諸侯如敵國矣而政教號令固已不及於天下而諸侯亦豈有陳詩之事哉民風之善惡於是不得而知也宣王復古僅能會諸侯於東都二雅雖中興而諸國之風亦無有也諸國之風既不得而知今見於三百篇之中者又多東遷以後之詩無乃得之於樂工之所傳誦而陳詩之法則不舉久矣至夫子時傳誦者又不可得益不足以盡著諸國民風之善惡然後因魯史以備載諸國之行事不待褒貶而善惡自明故詩與春秋體雖異而用則同説春秋者莫先於孟子知春秋者亦莫深於孟子而後世猶有未明其義者愚每謂至此未能釋然乃因為之辨經傳辨自咸陽三月之焰熄而經已灰後世不幸而不得見聖人之全經也久矣出於煨燼之餘者率皆傷殘毁裂而不可綴補經生學士不甘於缺疑而恥於有所不知又不敢誦言其為傷殘毁裂之物於是研精極思刳剔輳訂雕刻藻繢日入於詭而傷殘毁裂之書又從而再壞矣江左儒先尊經過厚而忘其再壞乃以為先王之教未經踐蹂巋然獨全者惟風雅頌而止耳又謂聖人欲以詩人之平易而救五經之支離孰知後世反以五經之支離而變詩之平易是殆不然當三百篇之全之時而五經未嘗碎缺當五經之支離而詩亦未嘗平易又以後世傷殘毁裂之經視聖人完全嚴密之經又非所以言聖人之時之經也六經雖同一道而各有體猶四時均一氣而各有用此皆天理之不容已雖聖人亦不可得而以意損益之也聖人初何容心以此救彼哉若彼待此救則各有一偏則聖人之經在聖人之時已非全書矣於理有所未通然詩之為教所以異於他經者自有正説當周之初雖有易而本之卜筮雖有書而藏之史官儀禮未嘗著周官未頒麟未出而春秋未有朕兆也周公祖述虞舜命夔典樂之教於是詔太師教以六詩是以詩之為教最居其先然其所以為教者未有訓故傳注之可説不過曰此為風此為雅頌此為比興此為賦而已使學之者循六義而歌之玩味其詞意而涵泳其性情苟片言有得而萬理氷融所以銷其念慮之非而節其氣質之雜莫切於此此詩之所以為教者然也漢之劉歆得見聞之近乃謂詩萌芽於文帝之時一人不能獨盡其經或為雅或為頌相合而成吾故知各出其諷誦之餘追殘補缺以足三百篇之數耳烏得謂之獨全哉自是以來承訛踵陋訓詁傳注之學日盛而六義之別反堙至程夫子始曰學詩而不分六義豈能知詩之體其門人謝氏又曰學詩須先識六義體面而諷咏以得之故朱子亦以為古今聲詩條理無出於此是以於詩集傳每章之下分別比興賦之三義而風雅頌姑從其舊非謂風雅頌部分已明而不當易也亦非謂於六義中風雅頌可緩而不必辨也特以其無所考驗而難於定耳朱子且難於定後世孰從而定之哉間嘗竊思朱子之作易本義也因朝氏古易復其經傳之舊于以正後世離經合傳之繆以是知周公之詩與夫子之詩必不雜出於風雅頌之中夫子未刪之前周公之詩雖或龎雜猶幸正變之説尚存於既刪之後故敢祖是例以析之詳味其正經之旨則漢儒殽亂之病不待疏駁而自見矣昔朱子嘗謂分詩之經分詩之傳此説得之呂伯恭而朱子因立此例於楚詞集注今推本二先生之意而為是編因著其所疑於前以待有道者正之魯齋集卷十六
