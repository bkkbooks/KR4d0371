body:
  text: 魯齊集卷五宋王柏撰序書疑序聖人之經最古者莫如書而最難讀者亦莫如書以二帝三王治天下之大經大法孰有加於書者奈何伏生之口授蝌蚪之變更孰能保其無誤此書之所以難讀也朱子於諸經莫不探其淵源發其簡奧疏瀹其湮塞而貫通之縷析其錯揉而紬繹之無復遺恨獨於春秋不敢著一字書止解典謨三篇而已後又有金縢召誥洛誥說及考定武成凡四篇豫嘗多幸得觀典謨手筆密行細字東圈西補蓋非一日之所更定其用力精勤如此學者猶恨不及見其全書孰知書之果不可得而全解也朱子嘗謂眉山蘇氏書說善得其文勢或謂失之簡曰如是亦可矣謂金陵王氏獨不解洛誥猶能於此而不穿鑿亦稱之也又嘗問東萊先生於書有不可解者否曰亦無可闕後二年復見乃曰誠如所喻是亦難說者至於朱子教門人則俾之先讀其易曉而姑後其贅訛此固不得已之詞甚矣書之難讀也今九峰蔡氏祖述朱子之遺規斟酌羣言而斷以義理洗滌支離而一於簡潔如今文古文之當考固已甚明矣大序小序之可疑今已甚於帝王之詞與史氏之詞參錯乎其中今亦可辨有害理傷道者又辭而闢之有考訂平易者亦引而進之如天文地理之精核嵗月先後之審定用工勤苦久已成編後學可謂大幸然疑義闕文之難朱子曰未詳曰脫簡者固自若也分章絶句之難朱子不肯句讀者亦未能盡通也況讀書至拙如豫者豈能遽豁然於中哉諸儒之所能解豫固幸因得而通之豫之所不能通雖諸儒極融化之妙支綴傅㑹屈曲將迎然亦終未能盡明也在昔先儒篤厚信古以為觀書不可以脫簡疑經如此則經盡可疑先王之經無復存者後生為學所當確守先儒之訓何敢疑先王經也不幸秦火既熖後世不得見先王之全經也惟其不全固不可得而不疑所疑者非疑先王之經也疑伏生口傳之經也讀書者往往困於訓詁而不暇思經文之大體間有疑者又深避改經之嫌寧曲說以求通而不敢輕議以求是夫聖人之書萬世之大訓也與日月並明與天地始終不惟不當疑亦本無可疑後學非喪心孰敢號於衆曰吾欲改聖人之經然伏生女子之口傳孰不知其訛舛聖人之經不可改伏氏之言豈亦不可正乎糾其繆而刋其贅訂其雜而合其離或庶幾乎得復聖人之舊此有識者之不容自已漢唐諸儒智不足而守有餘泥古護短堅不可開逮至本朝二三大儒方敢折衷以理間有刪改譏議喧豗猶數十年而後定今訓注多已詳明而猶可略也惟錯簡繁多極問玩索若稍加轉移以復大體不動斤斧以鑿元氣不可强通者仍缺之是亦先儒凡例之所詳也元體茍正則訓詁不待費詞可以益簡而益明矣愚不自揆因成書疑九卷凡五十篇正文考異八篇藏之家孰以備探討嗚呼歐陽公曰經非一世之書也傳之繆非一日之失也刋正補輯非一人之能也使學者各極其所見而明者擇焉以俟聖人之復生也子深有感於斯言云雅歌序古之詩猶今之歌曲也但雅頌作於公卿大夫用於朝㑹燕享用於宗廟祭祀非庶人所敢僭惟周南召南通上下而用之被之於管絃之中以約其情性之正以範其風俗之美此王化之所由基非後世之所可及也其餘國風雜出於小夫賤𨽻婦人女子之口以述其閭巷風土之情善惡紛揉而聖人亦存之以為世戒非皆取之以為吟咏之當然讀之者悚然知所羞惡則聖人之功用逺矣正不必句句紬繹而字字精研求其美者玩味誦咏之可也若以為聖人既刪之後列之經籍而皆不可廢則又何以謂之鄭聲淫而放絶之乎今考桑中之詩曰期我乎桑中要我乎上宫送我乎淇之上矣其溱洧之詩曰維士與女伊其相謔贈之以芍藥雖蕩然無復羞愧悔悟之意若槩之後世怨月恨花殢紅偎翠之語艷麗放浪迷痼沈溺者又不可同目而語矣豫嘗謂鄭衛之音二南之罪人也後世之樂府又鄭衛之罪人也凡今詞家所稱膾炙人口者則皆導淫之罪魁耳而可一寓之於目乎然三百篇之音調已亡雖鹿鳴而下諸篇腔律具于儀禮集傳又非樂工之所能通識觀其章疊句整氣韻和平而淵永深穆之意乃在於一唱三嘆之表孰能審其音以轉移其氣質涵泳於義理哉至於習俗之歌謠辭俚而韻窒又無足取所以學士大夫尚從事於後世之詞調者既可倚之於弦索泛之於唇指宛轉縈紆於喉舌之間憂憤疏暢思致流動猶有可以興起人心故也間因暇日有傳冦忠愍陽關之作而子朱子為之感慨題贊其意深矣因併及他作可以麗於此者不間古今類為雅歌若干卷而竊有取於放鄭聲之遺意云先世遺蹟序某幼罹艱棘學蕪行荒慶源寖寖乎將堙先德垂垂乎就泯天開一覺豁然四顧茫無根蒂藉朋友之力粗知學問之正塗回首家庭之文獻已流落幾於盡矣既而自慰曰與其守先世之遺書不若得先世之遺志雖然伯魯之簡已失叔敖之孤徒存今不考諸遺書何以繼其遺志幸保手澤數紙晚遂裝整列其目於魯齊清風録之首使觀者知不肖孤不能自强終無以續先世之遺音將抱恨於九原猶可以為後人之鑒云某拜手敬序送曹西溆序僕聞聖人著明明德之教於後世曰大學其書有治國平天下之道於終篇曰潔矩後世不循其本而遽以治國平天下自任國且未治而天下得其平者尤鮮蓋潔矩之道未易明也潔矩者所以處天下以方正均一也三代而下所甚急者富國强兵而已富國強兵必以理財為本而儒者不屑為夫理財而不用儒者其害不可勝言矣朱子曰國富則民貧兵强則民病今民已貧且病也而國未嘗富兵未嘗强何哉夫財者天下公共之物也積於左而右必困聚於右而左必虛前後上下皆然今乃上不積於國下不積於民必有所偏聚者矣僕於是知潔矩之道為甚精密也故著孟獻子之言為公卿大夫之法且極言聚斂之臣其罪踰於盜臣其斥之也可謂深切矣自貢助徹之制壞而租庸調之法立庶邦惟正之供者止此它皆非立法也今勢家巨室以不輸王賦為能相習成風而有司惟困弱小户之是征至再至三無所訴告驅而為盜賊而後已咸淳辛未寶謨宗卿曹公分符寶婺下車之初悼帑藏之赤立恨勾稽之久廢不得已借鈔於勢家巨室以考其虧盈此救時之權也蓋一巨室勢家必兼百千萬小户之資督一大户可以寬百千萬小户之力庶幾乎潔矩之道財賦方輻輳而謗議紛然而遽止雖一時講行尚缺從容詳密而初無重催抑納之訴又何尤焉既而百廢具舉時和嵗豐民安其業且隂為水旱貴糴之備不止其數以求名人歌頌者不釋口獨於借鈔之事人不以為善吁可歎也吁亦不足嘆也可嘆者傷直道之難行不足嘆者吾知謗者之心矣上今以大農之長召公豈不以大農者國家財賦之淵藪正欲倚公經理之願公無以前事為鑑而自沮進而告于上退而告于元老理財無巧法止得天下輸其所當輸者足矣但輸其所當輸當自公卿大夫始是道也即潔矩之道也以義為利者也平天下無以易此僕誤辱眷遇之隆不能為祖餞之禮贈之以言古人所重敢以是告執事云樓說之名字序豫外舅峴山先生樓公晚而得子愛如拱璧方生計衰落僑寓金華自任薪水之勞鞠其子兀坐於枯椽敗牖之下或勉其為農或勉其從釋先生愠形于色又有勉之以讀書習字者則亦俯而不答年幾弱冠乃謂豫曰冠而字周道也吾將與之冠而名且未命子盍為我謀之豫謝不敢當曰命名父事也字則賔焉先生固請豫未有以對頃之有日者過我試以此子之五行叩之其言曰澗下有水源幽而地寒將東其流而巨山限其前退而西就兊澤則得其所矣豫心獨有感復命曰宜名此子為澤字以說之先生曰何義也曰山下有澤於卦為損此子生而家道替之象也水逆行非性之罪有山障其流回入於澤勢使之然也夫兌者說也陽剛居中中心誠實之象柔爻在外接物和柔之象故為說而能正此至善之道也象曰麗澤兊君子以朋友講習蓋兩澤相麗交相浸潤互有滋益此說之大者若夫汪洋演漾澄涵清泚上接洙泗之淵源下承伊洛之流𣲖是澤之德也不然則同流合汚濁斯濯足為澤之羞亦自取之也先生曰然得之矣因為之序好生録序天道流行發育萬物得天地生物之心以為心是之謂仁故仁為心之德而愛之理也愛莫大於愛親此本其所由生也其次則仁民而愛物此推其所並生也吾儒所謂理一而分殊者愛有等差如此自世教不修人欲橫流戕賊其天理本其所由生也既懵然而不知省又烏知其並生於天地之間者雖草木蟲魚之微亦不當無故而毁傷也故曰天子無故不殺牛大夫無故不殺羊士無故不殺犬豕是以孟春之月犧牲不用牝禁止伐木毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵仲春之月毋竭川澤毋漉陂池毋焚山林季春之月田獵罝罘羅罔畢翳餧獸之藥毋出九門君子達而在上立法定制品節禁戒其為教也順而易君子隱而在下著書立言開導勸止其為教也逆而難況愚夫愚婦冥頑蔽痼教化未易感刑罰未易艾不得不推天道福善禍淫之理多方以誘之開其不忍之端遏其稔惡忘返之念此令君好生録之所以編歟令君嘗宰金華律已甚嚴視民如傷百里旄倪愛之如父母忽浩然懷歸不可挽後四年以此編見寄三復披玩作而嘆曰至哉令君之存心也先之以列聖之寶訓次之以賢哲之格言雖佛書道藏稗官野史無所不載分門合類善惡粲然吁其用力亦勤矣雖非先王化民之正法是乃仁術也識者當觀其心云送王伯忠序淳齊王伯忠調浙江征官兼惠民藥局戒行有期先數日訪别索豫言為贈豫謝不敏而徴之再三惟伯忠明粹疏練處事暇密不患不見知於當世區區之慮正恐珠光媚海玉彩搖山不能不返起愚夫之疑敢以韜晦涵養四字為涓埃之助而申其說昔先正樞相筮仕之初西山真公為作潛齊記其所以推潛之義殆無餘藴大略亦韜晦涵養之意今登于文集刻于堅珉植于家孰樞相平生受用異時功名事業實基于此伯忠夙夜觀感服習亦既熟矣奚待豫言每讀魯論至亡而為有虛而為盈約而為泰此直妄人也聖人之言寬大止曰難乎有恆矣既不能常則其實可立而見豈能欺人徒自欺耳若夫以能問於不能以多問於寡有若無實若虛犯而不校亦幾於詐而曽子以之稱顔子何也茍出於詐亦豈能有常而從事於此哉善乎朱子之言曰顔子之心惟知義理之無窮不見物我之有間故能如此豫未嘗不為之躍然有感蓋人之美質難恃學問易畫惟知義理之無窮則學問自不能止此句地步甚闊根基甚厚工夫甚深有純亦不已氣象誠能如是又不止於韜晦涵養而已今輦轂之下四方智愚賢不肖之所轇轕也是非曲直利害之所囂豗也貧富貴賤禍福之所變化也榮華之所馳騖習俗之所薰染威勢之所怵迫或壓於上而不得伸或忌於旁而不得釋或謗於後而不能自明或誘於前而不能自禁必至於悼忠改錯追巧茍媚者相迹而奔也有能不變於初不二其守亦可以為難矣於斯時也不期於韜晦涵養而不容自已蓋不韜晦則蹈危機而不知不涵養則鼓輕躁而不覺然茍止於韜晦涵養則猶故吾也何有進乎惟能常存義理無窮之心而益求其所未至凡一事一物無易無難皆莫不為吾進德之助矣詩云衣錦尚絅惡其文之著此韜晦之方也故君子之道暗然而日章此涵養之功也為己之學入仕之初立心當自此始伯忠亦然之否啓䝉發揮後序冲漠無朕而萬象已具風氣漸開而人文漸明非一聖一賢之所能盡發故伏羲氏之畫八卦也仰觀俯察近取逺取得河圖而後成雖曰闡隂陽變化之妙而其用不過教民決可否之疑而已歷唐虞夏商有占而無文至文王始繫之以彖周公繫之以爻吾夫子又從而為之傳更三古四聖人而易之為書始備蓋非一時之所能備也文王變後天之卦而先天之易幾於亡大傳發義理之奧而變占之用幾於隱後世不能㑹通而並觀於是尚義理者淫於文辭尚變占者淪於術數而易道始離矣我朝盛時邵子密傳羲畫而缺於辭程子晚繹周經而缺於象先後不二十年而從游非一日乃不相為謀而各自成書皆臨終而後出書雖不同然各極其精微反若分傳而互足異哉易道之所以大明也由是朱子著為本義謂易本於占而義為占而發懼後學梏於見聞而未易信也又作啓䝉四章先開其祕而祛其惑首之以本圖書原卦畫示易之所由始也次之以明蓍䇿考變占示易之所以用也然亦各為一書而學者猶未能融㑹而貫通之北山何先生受業勉齊之門聞此義為甚蚤晚年纂輯朱子之緒論羽翼朱子之成書不敢自加一字而條理燦然羣疑盡釋至於引本義之彖辭參於變占之後使千百年離而未合者兩無遺恨真有得於體用一原顯微無間之深㫖豈不為後人之大幸歟先生無恙時因約齊王史君請刋梓于旴江嘗命僕序其首僕固辭不敢承先生今亡矣不可使觀者不知編摩之大意於是忘其疏鹵述其略于後云㑹拜題名序自後世宗法不立而尊尊之義親親之恩幾至於晦蝕泯滅而不存豈秉彛好德之良心不如古人哉亦以觀感服習之未至此正父兄之責也吾宗自始祖至五世大宗嘗中斷矣又三世嘗以儒學顯于時矣於是推親睦宗族之道立為序拜之禮每朔㑹于四大位上冡受胙亦然所以一人心定名分以培根本也扶持保守亦既有年諸長上欲立始廟而未得其所後因東軒虛曠而卒成先志然猶有所未盡間嘗考之禮經别子為始祖繼别為大宗注疏有二義一謂諸侯之庶子别為後世之始祖一謂始來在本國者今三府君自鳯林遷入城府固已合始來之義若以天子建德胙土言之尚書莊敏公胙土東陽郡侍講煥章公胙土金華丞相文定公胙土魯國皆得以為始祖也小四府君創業臨江子孫出仕亦得以附始來之義闔族建議請同享於三府君之廟所以共明命而厚人倫於親親尊尊之道庶幾乎有所觀感服習垂裕無窮云咸淳已已冬至奉妥禮畢序拜謹述事始書于題名之首記默成定武蘭亭記蘭亭修褉序右軍之神筆也所謂遒徑圓健已備其美七傳而至智永其徒辨才尤祕藏如護頭目越二百六七十年而唐太宗以術取之未幾殉於昭陵而真蹟亡矣唐初善書者多而臨摹不止一家惟歐陽率更為逼真勒石禁中石晉時契丹輿歸流落于定武此所以定武本獨貴重於天下本朝慶厯中碑出民間歐公集古所見已四五本乃以定武為别本蓋亦未深考也其後米南宫所得止褚河南臨本耳自熙寧後薛師正父子别刋二本以易元碑於湍流帶左天劖損一二筆為識行于世者往往别刋本故定武真本亦不多見南渡以來紛紛翻刻幾千石矣訛以傳訛僅同兒戲每竊哂之寶祐丙辰仲夏將晦內兄潘伯逺之子出乃父遺訓以家傳數碑授豫囑以後事而默成所寶蘭亭敘亦在其中豫且悲且􅘨質曰以承命久而玩之實熙寧以前定武本也何以證之字有率更體而所劖五字尚可見也諸家所識精筆儼然在目千石辟易莫敢仰視如皓月中天而萬緯沈暉如祥鸞覽德而羣飛斂翼自可獨步東南也方宣和紹興間胡馬南馳中原俶擾士大夫宜未暇留神於翰墨題識于後者猶二十餘人多一時名公卿也豈非懷古傷今而卒付之無言乎最後范太史冲一跋微發其機寓感慨之深意真足以瘖晉室羣賢之舌而奪之氣後之來者宜不復可措手矣惜乎元祐諸君子之故蹟脫落不存自是息影潛形百二十餘年而歸于豫以豫無所嗜好一朝而得北方盛時之名刻傳默成衣鉢之餘玩亦異事也暇日摩挲展觀對諸賢姓名肅然起敬豈特懷感世道之廢興而是物之託諸人者已不勝其可嘆未知後之視今復何如也因題其顛末于后云銘曰默成典刑百年雲散伯逺治命授此珍玩定武故寶諸賢題贊獨步東南永式清鑒淳化帖記本朝儒學獨盛非漢唐可比而碑刻尤多蓋太宗皇帝偃武修文一洗五季鋒鏑之腥以闡吾道伊洛之原天下甫定即遣使購募前賢真蹟集為法帖十卷而藏之鏤板于中禁每大臣登進二府者賜以墨本歐陽集古録云時禁中灾碑板被焚遂不復或云板今在但不賜耳故人間以官法帖為難得然當時命王著辨精粗而著之識鑒不明真僞莫察玉石雜揉遂為全帖之纍前人論此固多矣此雖不能無疵今彚萃古人筆千百年間一開卷而燦然在目使人擊節賞嘆不已豈不快哉後來未暇論其少繆政恨真法帖之難見絳帖銓次不同劉希白長沙帖字行疏密亦異陳玉本病於無精神臨江本病於瘦弱俱不足以比肩閣本紛紛各自夸張不特字體變動而摸拓亦無精墨是以山谷云當時用歙州貢墨摸打則色濃李莊簡云用李廷圭墨後用潘谷墨則色淡此墨色濃淡之分也李莊簡云初時板完好不用銀釘後來板漸拆裂然後用銀釘此銀釘有無之分也山谷又謂墨濃則瘦墨淡則肥此字畫肥瘦之分也然非閣本則此皆不足辨子所見閣帖凡四本一為李莊簡舊藏此為墨最濃而未見銀釘一為先伯文定家藏墨淡而肥已有銀釘一為聞人仲信家藏亦非先本一為潘氏維屏得故家物疑陳王本也淳祐癸丑之夏豫偶得鬻碑塵敗之帖兩卷人所不售者細視之真李廷圭墨打者也精神體致絶出前四本手自裝蹄分為四冊永為閣本之式以豫草茅下士邂逅而得中原盛時難得之帖亦大過分矣而敢望其全乎惟其不全故豫得而寶之錫山尤公有云鳯皇一毛麒麟一甲終是希世之寶況已得十分之二矣天下之尤物豈盡出於金題玉躞中耶靜觀堂記豫之宗人廬陵史君平生嗜易自號玩易老人晚於所居之西偏敞堂一區扁曰靜觀豫時得從容於其間而思得其義蓋易之道隂陽動靜兩端而已靜而觀萬物之理是靜涵乎動動而順萬物之情是動主乎靜也周子曰動而無靜靜而無動物也動而無動靜而無靜神也故又曰非不動不靜也朱子曰惟聖人全乎天理其動也靜之理未嘗忘其靜也動之機未嘗息此周子所謂神妙萬物者也史君學有淵源講動靜之理熟矣觀萬物之情精矣故出而試郡安吉也當嘉熙庚子嵗以歉告禱雨盡其瘁嗇其用廣其儲梳剔獄訟動恤民隱凡可自盡者皆得於理之所當然惟此郡苗額悉𨽻上供嵗仰和糴例責牙儈是時價日昂用日窘轉糴于大家亦理也豪猾訴于漕臺使者嚴止之告于朝廷都曹不恤也內有兵食之憂外有餓莩之責郡復可為乎於是再乞祠三自劾而歸矣動靜者進退之機也進退審則動靜之見定可以無愧淳祐乙已再守建昌未雨月盜發廣昌之管下蓋頑民蟠据山谷家植戈矛平時擅私販之利生長于冦略為患且久矣一旦因憲司保伍之令太嚴激其嘯呼勢漸猖獗侯亟作運調為捕招並行之計糾合諸塞請兵諸司欵賊謀散徒黨結內應利器械峙糗糧應變轇轕疾如風雨卒能平蕩八千之凶孽無延蔓之禍見于諸公之言者尤可證也有曰侯謂彼衆我寡法當欵之計以取之使之不敢逺離巢穴吾事濟矣此制勝第一機也有曰不動聲色密運籌䇿張聲勢倡隅總設招誘解脅黨郡賴安堵皆由深沈果斷應接得宜不失事機故也有曰子不聞比嵗漳浦之盜乎此其徒也譬之養疽不潰決不止侯能款以計一舉勦之除數嵗醖釀之禍根於旬月間四境無相煽以動者功不偉歟夫平冦之䇿不過招與捕二說招所以捕捕所以招應機者神執方則泥已丑之失必於招也今日之得招而捕也且招且捕不足以相病故也其後鄭公逢辰之奏尤為慷慨皆未足以得侯之心蓋其靜觀乎世道久矣故能以一靜獨立於羣動之表應倉卒而不􅘨者此也至於廬陵之功尤為敏捷始兵鈐挾驕卒劫制郡將一日號呶侯叱之氣讋而退鈐乃密申諸司謂卒為亂卒知之不平碎其車蓋罵辱之侯聞于朝逐去卒憤平而懼生慮憲司之追捕始謀作亂閣郡惴惴一日刻期縱火伺者密告侯止以夜直之卒出其不意悉擒之天風雷雨以助其威侯入教場施行如法民不知也歸理簿書獄訟如平時人咸服其從容兵鈐竟媒孽以罪罷邦之人士寃之方建靖亂大碑以紀其實作為歌謠以頌焉寓公歐陽守道為之序至今人德之凡此三郡之設施皆以靜制動之效觀其動而用者不失其當知其靜觀乎萬物之理豈不精哉侯以靜而觀豫獨觀夫靜而有感焉周子通書以䝉艮二卦終之何也山下出泉靜而清所以養其未發之善艮其背者靜而止所以全其已發之善一敬湛矣萬想不搖山光凝而夜月白野水空而庭草翠悠然自得表裏俱融此不特靜觀也而深造乎主靜之地果能如是有何事業之不可為夫子曰精義入神以致用也利用安身以崇德也其勉之哉史君名侑實豫之族姪云婺州都稅院記古先聖王屬意於商賈也厚矣其制法為甚詳其設官為甚密以其貿遷有無為民生之大利也故有司市之職分地以經之辨物以平之禁靡以均之與之行布徴儥止訟與之除詐去盜斂賖無所不備又有質人掌成市之貨侑有司關達貨賄以節傳出之何其慮之深而衛之周也孟子曰古之為市者以其所有易其所無者有司治之耳其後有登龍斷左右望以罔市利者人以為賤故從而征之蓋紀征商之所自始非若漢武帝窮兵黷武海內虛耗始稅商賈以充其欲此非賤其罔利也而實利其倍息而已涼法敝事一開其源而終不可窒然亦通都大邑燕車楚輦之交馳江艫海舶之輻輳征之未以為虐取之未以為苛猶將飭其詞曰所以抑末而厚本居是官者晨出坐曹羣賈在列或色動神喜於萬寶橫陳之時或朵頥染指於巨貝旅庭之後一念火熾百行瓦解知自愛者於銓曹不敢輕下願注之筆以其財利易汙也惟婺之征官則異於是地僻而道左物瑣而利䪥官寒吏瘠朝夕盼盼於刀錐之贏嵗額雖輕而課賦常負官多虛而吏専責矣故益不可為也按郡乘都稅務舊在西南二百六十五步宣和已亥煨燼之餘徙于今地去州西二里一十步實建炎庚戌也紹興辛酉又災郡太守龍圖周公綱即新之嘉定初又灾集撰王公棐在郡幕奉命重創嘗為精廨矣寶慶丁亥漫塘劉公宰為趙君琚作題名記及征官針人多稱誦之景定庚申居民不戒灾又及之咸淳丙寅侍郎陳公綺始創屋四楹於草莽荆棘之場洞無壁立不得與閭閻伍過者愈薄之越四年天台侍郎慥堂鄭公之仲子某不鄙其陋辱蒞斯職既至顧曕倣徨不忍周視愀然太息曰此實吾之責也默計事力蹙蹙靡騁何所鳩材何所僝傭首以從物之費别貯以立其志伐廢址大樟以定其本繩檢浮蠧對越實心以俟其機固有天幸修翁大資王公之伯子襯以大理簿來為員外司馬君以契家子受教於修翁之門有年矣理簿慨然曰成君之志非吾其誰於是請于侍郎趙侯孟傳願寬其期㑹以日額補虧之竒羡捐以起其役且自割俸米食之又以橋梁之餘材佐之遂得以因其四楹前後翼之以軒㕔堂門廡吏舍庖湢次第而完且美矣且斂牆縮地虛其四旁以防延燎斧斤斷續兩年于兹㑹其資凡十有五萬無一毫及于商賈皆欣欣然悅而願藏於市也君以某有一日過從之雅乃述其顛末來徴事記曰某之先君子更歷中外幾三十年屋不足以庇風雨田不足以贍妻孥夙夜懼不克紹此清規貿貿逐祿貧甚於家不敢以賤有司弛其責冒興大役僥幸有成何意深刻大書以述其勞念廢興嵗月不可以無考且冀後之來者增而大之以蓋吾陋豫竊謂天下無不可為之事業顧吾用心如何耳鄭君耳濡目染氷蘖之操不以貧纍其心見義必為所以如是之勇獲乎上得乎友天實相之蓋異時為仕者不自重官與吏為市吏與民為仇天降其灾屢剝其廬聖人觀剝之象曰山附於地剝上以厚下安宅此萬世為政之大教也嗣是居者警前日焚毁之慘思今日興復之難原先王恤商賈之心利民生日用之需誠能厚其下必能安其宅云保寧軍節推㕔建造記惟我國家肇造無一事不為萬世長久之基乾德間始詔官廨增葺創造對書新舊官歷其不葺者殿一選至景德三年定為印紙之目廨宇間數既書其虧損至添蓋則又問配民不配民皆所以防制官吏鞭辟其茍且至詳密也誠如是則官舍常新矣自印紙之式改後人不復見舊制矣官吏之茍日滋官舍之圮日甚咸淳辛未永嘉曹公以宗卿出守東陽郡政成民裕堂宇樓觀次第修整雄壯藻麗鎮壓溪山氣象偉然心孚義感而幕府亦從而效焉節推趙君某一日訪豫於陋巷曰敝廨幸已落成願有以紀其役豫以年衰學槁辭而請不置考諸郡乘節度推官㕔在州西二十八步它無碑碣而創始之嵗月已荒兩監郡之尊前後臨之城隍妥靈於其旁涖職者惴惴不敢肆往往視為傳舍茍焉支住而已前推官臧君某愳其㕔宇之將壓也嘗新之矣迫於替去而不遑它顧趙君來未久堂室之輪奐燦然兩序之榱桷翼如也非有嚴令迫於前而不可不為非有醲賞誘於後有為而為正以作於上者從容而有餘應於下者亦隨力而興起不過以吾職之所當得者為吾之職所當為爾區畫之暇藏焉息焉堂之中器用雅潔堂之後水石幽邃東序則經史橫陳琴聲清越足以澡瀹其精神足以涵養其志慮事至理形其應不倦蓋有以澄治其原也賢太守遂大書不倦扁其堂猗與盛哉意甚渥也竊謂不倦與無倦相似而微不同不倦者與之之詞也無倦者勉之之詞也人方困於色荒於酒役役於貨利營營乎進取此心之德已虧豈能不倦哉昔子路勇於有為者也而夫子慮其不能持久猶以無倦勉之況後世氣昏質懦者乎或始鋭而終怠或驟作而隨止曰姑緩曰少待者皆倦也凡勤其所不可勤必倦其所不可倦二勢之所必至非毅然有守確乎有常者不能不愧於斯扁與之者乃所以勉之也或謂昔韓忠獻嘗為推官有稱其理不倦為宰相器豈非賢太守以是期之歟君曰何可擬也忠獻以少年登髙科授監丞常丞通判淄州直集賢院然後徙為開封府推官擬非其倫則吾豈敢味此二字即張子警惰之意某雖不敏請事斯語不敢忘豫曰君之言善矣須知不倦者終日乾乾之路頭也非進德居業不能至此徹上徹下語更無餘法異日交承不必對書印歷請觀斯扁則告新之能事忠矣君黃巖人逺庵之從孫也復齊記詩不云乎上天同雲雨雪氛氛而終之以生我百穀余嘗疑焉方其朔風怒號寒威儦儦草拂之而色槁木攖之而葉凋水落石出山川寂寥於是天地閉塞而成冬矣所謂穀者投廪庾混埃塵瘁然未有生意也是時太史謹候玉琯輕葭飛灰陽氣潛動此之謂生生不息之機物無終困之理聖人之彖復於以見天地之心焉蓋萬物必有大剝落然後有大發生人亦必有大摧折然後有大成就豫友汪伯夀嗣詩書䝉故業有屋一區蕭然於茂林修竹間雜卉芳妍家具雅潔有晉宋間風致人所歆羡一旦流落飄蕩不與余相聞者十有餘年一旦過豫面有德色曰我遇異人授以醫學已療數十人矣貧者施之藥富者與之方日邁月往證熟理明我將謀數椽之居名之以復齊閉門靜坐益探索其所未至子盍為我記焉豫曰嘻醫道之難言也久矣此聖智之所盡心而後世庸妄者假為媒利之階由是以技名也士君子往往恥言之殊不知古人有不作宰相必為名醫之語謂其俱有活人之功也至於燮理隂陽審調虛實使天下享安靜和平之福則相猶醫也如是則醫之道亦大矣而豈易言歟今伯夀奮於久困之中得倉扁不傳之妙融幽釋眇剖機剔鐍采擷𡨕隱排迮老蒼萬尋而一綬逸鶖而髙翔而又廣求天下名方精論百餘家編帙華整不容他人手觸洗削纎浮織捕微奧反冲斂約守之於內變通達化應之於外竒意芽甲新語茂長欲自成家要使廢者復興仆者復起病有盡而藥無窮固已體天地生物之仁得復道反善之義以此名齊不亦宜乎豫力貧陋巷故交影絶獨伯夀時過我要盟於文字之間意則厚甚余不敢辭然伯夀燕坐於復齊之下仰觀精畫而思其義當存警戒之心茍或縱酒眩色以復其狂言浮意誇以復其誕膠撲凝固以復其癖此易所謂迷復也雖欲自附於庸醫不可得矣豫聞有萬卷堂獨善閣者君家之故物也君能開其道正其學嘗其勤範其亷不失先世之初意又能疏迪義理講求淵源以復漸麗澤之餘教藹然於士君子之間是亦復之義也而況於醫乎長嘯山遊記辛卯之秋八月末晦有六日長嘯子與客游于北山未至赤松三里而近有徐先之之别業焉一山倔起於平壤之中顧而異之啓柴扉穿小徑步至其顛勢如卧牛南望積稻山如覆釜當前皆赤松之應山也迤邐而邁步松隂之下徘徊兩山間水聲潺湲竹樹繁翳便與塵世隔絶入寶積觀遂吟招隱之詞曰金風瑟瑟兮斂素秋黃雲逝兮委空疇嵗冉冉兮于邁形役役兮奚求彼美人兮襆被命駕指北山兮爽氣朝浮揮囂氛兮逺卻䇿枝笻兮娛憂穿松關兮深以悄潛元宫兮清以幽仙道恍惚兮亘千古以難悟遺像寂寞兮想二子之精修吸清岑兮飲𤣥玉之液餐芝英兮嗽華池之流叱羣羊兮共化駕雙鶴兮同游朝崑崙兮暮𤣥圃挹羡門兮訪丹丘橫八風兮上下歸兩澗兮綢繆嗟彭殤兮均一夢之不返何虞象兮同一氣而不侔嗟子房之末智兮捨圯上之老黃石有約兮猶封留念豫生之多艱兮命與事仇髮已種種兮盍早為謀何時結茅兮憑井竈之餘休咽日月兮跨蒼虯飛紫府兮棲瓊樓二三子兮其從豫不見住持蔣道士鑿崖架室石磴﨑嶇名之曰清涼境界鶴計簡淡松度凝逺真修行人也次歷諸道房有樓峻峙於西岫丹楹畫楶奕櫨相因重閨旋閣雲縵霞敞幽闥深窈便户潛通器具精潔窗几灑然道士曰馬庵主烹茶焚香意甚勤愈復尋周管轄丁洞元童掌籍精舍軒池儼是人琴俱非屈指舊逰二十年矣一嘆而退登方丈轉至鐘樓之側有室曰隱齊階下一石玲瓏秀膩下鋭上展齊後纍石為山峰巒參差花木間發思致殊不惡樓三區在卧房之右一曰邀月正與鐘樓對曲轉兩間窗前修竹萬竿邃密環繞竹外即溪流也翠色滿樓泉聲滿耳坐久不能捨次至夢仙堂題嵗月經濯纓少憩于枕流亭上奕棋一二局草酌少許遍讀前賢石刻景慕髙風相與嘆咏因得四十字曰二皇不可見小酌酬清歡晚徑山林黑秋香院宇寬清泉噴白石翠竹護朱欄滿壁先賢句摩挲子細看再茶于過清入小桃源臨飛流澡滌滿面康衢之埃然後出觀門轉橋東謁二仙祠酌祠後井水清泚甘冽香味雋永久而不散登祠右經臺見山川融結之妙䇿杖回步而蔣道士邀諸塗呼酒于隱齊樓下遂留宿于邀月又得四十字曰黃冠輸勝景邀我上危梯地僻人聲悄樓髙山影低窗前列修竹檻外即清溪泉石偷風雨詩魂一夜迷時夜過半紙窗微明疑曉光之何亟也推窗一望月色皎然竹影落澗瑶光玉繩鑿落陸離於幽眇苴漏之間起坐久之餐靈山之爽秀吸皓氣之清英如已飛化於蓬島之上又得一絶云風露髙寒夜向闌月光穿縷萬琅玕寂然不是人間世多謝仙家露一斑黎明假山輿上丹山酌丹井井淺而渾逺不如祠後之泉也陟雲巢禮老君石像捫丹竈故址道士云昔年大雪他處幾半丈獨此數尺之地無之島嶼縈回連岡跨谷古松合抱林木茂密鬱乎蒼蒼由是披䝉茸跡山脈自丹井右分為兩支蜿蜒翔舞三川縈絡合鎖于赤松之原所謂卧羊山即二仙祠照山之陽也縻迤而上所謂煉丹山即寶積觀之主山也觀後所倚者曰屏風山觀前所拱者曰金華山此則赤松之大略可想矣自煉丹山轉而之右崈崈矗矗氣象雄偉名曰郭公尖或曰郭公占昔景純占于其上起伏奔馳至大溪而止是為馬鋪嶺實王氏之祖塋也自郭公尖轉西而北疊巘峨阜鬱茀綿邈沿崖成溪寂寞長邁俯瞰潛嶽一徑迢迢隨兩山之峽而入山橋未至山橋半里許有曰姜村籬落扶疏甍棟鱗萃蟠山帶壑平地曠衍田園雞犬晏如也爰居爰處以安以固使隱者得之足以畢餘生而遂至樂也山橋雖居嶺椒然危青峭碧戛霄摩漢逺眺城郭隱隱在晴光暗曖中杖屨穿確磽而上力憊息喘至一聚落縱橫十餘家皆汪其姓生涯隨足無甚貧者一老饋漿而辭余問其屋後最髙之山曰碁盤山而不識其命名之意山頂有徐公湖水旱之禱無逺無近神岫相盻嶄巖鈎鎖豈無意而然耶雜坐盤磯上有蒸雲一穗漨浡於隆阜之表指謂同行曰此雨雲也皆莫之信偶得一絶云每日城中喜看山却來絶頂望塵寰白雲何處為霖雨尚在山尖蓊鬱間由是踰岡下垤至于鹿田本一寺也今為東西有故相葉公養空潘公之題字皆鐫之石寺後有斷崖大石離立於竹樹間養空榜曰第一軒觀其亂山如城合圍于外魚鼓對鳴相呼於內衍平臯以如席分園廬之向背膏壤布濩廣袤數里而鹿之不耕也亦已久矣冠以朝真之險賔以馬面之雄碁盤蟬聨白望虎踞長蛇屈曲而下遊羣蛙亂躍而驚顧楊家山崔嵬其左後阿山蟠据而右雙龍繞其胸尖峰綴其肘名曰第一真不虛也少休于東寺午炊未熟雷聲􅞵􅞵須臾雲氣昏昧狂風振蕩驟雨飄忽晦𡨕隱滅淵妙屏迹遂賦四十字而出詩曰自陟山橋路青巒步步竒探幽忘倦懶脫險得平夷香火分雙寺風流訪斷碑我來風雨甚妙處未容窺頃之雨定冒濕而至金華觀觀方重建法堂虹梁雪壁藻煥明敞道士徐清臣進酒而先已醉甚遂宿於爽軒窗前一峰卓立烟雲出沒頃刻百變是夜薄冷松聲搖壑飛瀑潄風睡思清甚蚤作促炊入雙龍洞洞前有椒庭壁間句云一水穿開巖底石片槎引入洞中天誠絶唱也若夫峭壁擁地穹谷隱天清流亹亹𤣥䕃耽耽束緼分光葉艇航碧外洞可容千夫內洞深窈無極神鑱鬼削賦諸形似或如龍鱗爪轔囷或如象鼻腳贔屓獰如獅甲如龜寶蓋懸空霞帶拖繡有浴室有架衣溝塍刻鏤原隰畇畇此仙田也握拳撞擊鼕鼕錚錚者此鐘鼓也最竒者曰水滴尤妙者曰雪山瑤琳玫瑰璀璨玢豳銀屋閃閃皓質清潤非世間物也低而深者靈湫洋洋沸騰渺漫有神龍焉不可至矣路轉山腰屐齒印蘚探氷壺洞洞前一亭亦新創也下危梯觀瀑布續登朝真自鹿田西麓而上一徑如線草莽斜封一峻一險前呼後扶白雲深處碧竇大張石室直連三大間最後石梁雄架幾數百尺限以橫石圓淵谽谺瑟瑟有聲蓋莫知其幾深也有天窗有月巖素光淡薄破暗鏤冥外有小穴俯首盲進十餘步內復虛曠斜坡慢道上有雙室對敞支洞之側崖縫如擘狹僅容身上不見際曲進數尺一泓清淺漏泉㸃滴四時泠泠不液不涸其外怪石數顆對列洞前趺坐其上萬象森陳千古不老挹天宇之轇轕攬烟塵之吐吞溪瀨阡陌互相經緯樹色㸃綴錦出繡沒真竒偉絶特之觀也窮幽極眇杳然莫測靈以竒而生境以靜而融世慮消忘仙志遐舉竊謂地勢髙絶人迹疏逺非有神以司之則虎豹狐狸之所宅也勝域殊景未易久留歸授山靈猛捨而返次經石井潭飛瀑潄雪壯響轟雷小亭翼然當前野橋斜跨其上逺望洞山已入霄漢佳思飄飄所不足者修竹耳過秦國長主之塋樓墮五鳯孤塜巍然枯棘翦翦荒茅芊芊羊虎殘缺甲士不全四顧蒼莽無片瓦寸甃之存焉嘆朱門之不恃要後世之多賢斜訪法清寺僧有分謙者精廬倚翠曲池涵泚小橋低飛入養空所書浸碧軒軒後一亭雅潔花石濟楚鑿石聚泉標為玉乳便房曲閣折構華巧謙長髧而慧裝背古帖默然前輩尺牘頗識吾人氣味欣然不憚於相陪引至穆賔閣見養空昆中四詩板精畫飛動詞理超逸相與敬嘆而出訪智者寺坐雷音亭上尋雙澗之源其一始於廢事寺之右曰慈源山川相繆地靈闡露回入智者再飯於雙清堂欄外方塘龜魚藻荇游泳縈紆古木灌叢野草馨烈壁列侍郎陳公相國葉公尚書陳公參政錢公四君子賡唱之什知寺邀茶為禮頗敬叩龜巢歷覺報乃魯國文定之塋也方丈久虛一卒住守墳望尖峰四圍寬敞門前松徑里餘豐碑道旁規橅宏壯路由葛村而歸於時丹楓纈林香桂染袖金粟垂穎翠莢採豆芙蓉靚冶籬菊敷茂紫蘭兮抗莖濯蕊於深幽香稻兮舂玉簸珠於踐蹂懸顆苞於棗栗粲青黃於橘柚日暄而不熇雨寒而不驟正一年之佳景候也爰乃馳勝軌脫凡塵志同類偶心閒景妍不為酒困不為事牽烟霞甄冶神觀澄鮮首尾越四日各有得而還粗述梗槩竒妙莫宣足跡之未歷者復與同行尋盟焉同行者誰楊元定徐彥成汪必先長嘯則金華王某字㑹之也慕庵記金華令尹愚翁先生蘇公秋水之操而春風其德不以僕為邑子而鄙之辱交甚厚一日浩歌歸去來之詞百里士民不能回也鄉之寓公與當路使者俱不得而留也自公之去金華無令尹者今四年矣戊辰冬辱公之書曰某少孤先君久在殯始克襄大事越二十年地以泉脈沈浸遂改卜于帆遊鄉唐奧茶嶼與先妣合葬幽魄即安遷徙至再是皆不肖孤執事不敬致此後悔今又三十年雖謹叨末第而祿養不及哀哀之痛抱恨終天自度狷介之性必至忤物召禍以羞其親由是奉身蚤歸得以時拜墓下每誦康節先生之詩曰三尺荒墳百尺山生身慈愛在其間此情至死不能盡日莫徘徊又且還未嘗不為之心目悽斷近葺數椽為棲止之地榜曰慕庵子盍為我記諸僕雖不敏不敢辭竊謂聖人刪詩而蓼莪之篇特著于小雅蓋其推父母劬勞之恩周密詳盡所以感動人心有惻其隱而不能自已孟子所謂大孝終身慕父母者正以欲報之德昊天罔極也今公有味乎康節之吟徘徊不忍去故作精舍以奉蒸嘗以報顧復可謂不忘其所由生矣雖然誰云寸草心報得三春暉此晉之受業者所以廢蓼莪之講也今公以慕題其扁固無待乎觀省之助抑亦以示子孫云爾自吾父母之當慕也推而至于曽髙極而至于授姓命氏之初同此一慕也下而至于雲仍以及乎千萬世之逺亦豈外此慕哉非曰徒慕其慈愛而已必思所以修身厲行保一氣之流行而無間斷可也一舉足而不敢忘父母一出言而不敢忘父母不敢以先父母之遺體行殆懼虧其體懼辱其親也保一氣流行而無間斷者亦惟存此心之仁而無間斷耳此心之仁即父母生育之仁也父母生育之仁即天地生物之心也其所慕者不亦逺乎敢以是語復於公請以是語詔其子孫若夫創造之嵗月工程則有不必書者矣陳氏世系記陳氏之先居閩之侯官本朝古靈先生之裔有諱螽者自閩徙于台自台而徙居義烏螽字宜詵仕至祕書生常常生秉彛秉生潮潮生光明昭昭衢州路教光生峴崇峻峴生九齡九萬崇生九疇九鼎峻生九有九思明生嵩岑嵩生九澤九陸昭生田岱坦嶽遷稠巖岱四門助教生九成九章九用九齡生銓鈞鈺九萬生鋼鐶九疇生鏞九鼎生鑑巨九有生銏鋭九思生鐸鎬鐸湖州通判鎬太學直講九澤生鑾九成生鉉九用生錫鈞生涇渭綱生洙泗鏞生淵鑑生灝濟溥巨生溶洋銏生洪鋭生濘鐸生澄瀚澄為郡馬鎬生溍洵湛淘鑾生涪鉉生瀾潛錫生溫濓淵生模桓溥生杰森溶生楷栻洋生檟檜洪生林義烏教諭澄生世績世忠世績郡馬瀚生栦溍生橋洵生闕湛生相淘生樞機涪生棋瀾生槃格楂溫生柟濓生楧杙杙受業北山何先生之門由祕書以來何嗣𦙍之綿綿也豈非積善而致然歟魯齊集卷五
