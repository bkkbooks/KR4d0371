body:
  text: 魯齋集卷七宋王柏撰銘醫銘立志必仁察脈必明見證毋忽用藥毋輕惟仁則明惟審則精全此四德尤難其人其庶幾乎拙窟王君有真實見無茍利心我作是語匪誇爾能守之勿倦毋愧斯銘日新齋銘上帝降衷無有不仁剛柔雜揉智愚是分惟欲易汙惟已難克改過遷善惟學之力疏瀹澡雪如垢消亡存養省察無時敢忘與日俱新與天不息月異嵗殊昭然明德夜存齋銘性無不善同此良心茍得其養氣定神清持守一懈倐焉放失休息之餘求則復得物欲逐逐旦晝遑遑有濁斯寐無補梏亡學茍日新有不待夜一言蔽之謹厥操舍求志銘志學志道聞諸聖人尚志持志鄒孟亦云心之所之求然後得必有事焉講之貴力同曰此志有淺有深亦有不遂非氣不任立在求先志至氣次至與不至爾敬爾肆隱居行義達其所求二者能兼伊吕之儔昔吾夫子猶曰未見乃揭乃扁夫豈自僭斷章取義敢求兩全我心有感託字而傳在昔大父丱角賦竹願保嵗寒默成矚目求我先志幾五十年夙夜凛凛恐或顛連左詩右書相我陋巷有闢斯室神融境暢卓爾前後竹柏蕭森仰止精畫有赫其臨默成之書大父之操小子識之胡不慥慥大父之操默成之書宜爾子孫永表吾廬拱辰爵銘屹屹蔡公手授兹爵曰的其傳惟劉寶學乃俾爾侃以祈康勺執虛如盈爾念爾慤乃承乃盤乃銘乃斫允契厥初惟德其託善則堂銘為黃巖楊幼學作民有物則懿德是彛私欲一蔽萬善斯虧猗歟周子有精其思著書覺後百世之師謂本必端謂則必善親疏難易言簡而辨維揚行父揭為堂扁涵泳四卦其則不逺我觀其要心存乎誠朋友責善無怠斯銘文定公家藏淳化帖銘於皇太宗偃武修文遊心翰墨古迹效珍入神入妙發潛振堙邃閣翼翼墨板鱗鱗氣完體裕波點妍精引卷周覽人物彬彬考事鑑書如影隨形正邪忠佞實根厥心心正筆正千古良針自時厥後翻勒紛紛神昏體瘠浸失本真搶攘南渡故物罕聞博古君子撫几馳神維我文定淡然無營有寶斯帖有曄于籝紫宸仗退靈府淵澄槐庭景轉寓目典刑題識雅密印欵鮮榮肅拜啓玩手澤炳明所寶非帖清風是承詔爾後裔聿彰厥聲默成賜硯銘維皇大父幼師默成授此玉質曰端之珍相彼兩翁對于帝庭玄雲膚寸澤潤斯民清風寂寞畀于支孫于以寶之究此令名新聘端石銘有紫而腴有潤而密就礪砥之新功啓山川之老色中星炯然聿彰爾質發揮聖言神明厥德淳祐歙石銘有縠其理有規其形聘歙江之舊德締魯齋之新盟吟風㺯月露湛雲蒸毋涸毋泐母替斯銘瀘石銘暗而彰縝而密有砥其平表裏如一直內方外君子之德殆若忘年之友朝夕相親于几席清端石銘不瑕於飾有質粹如含章於內以時發舒不必鮮仁之語不濡干祿之書相在爾室汝為君子之儒饋臺銘禮饋膰肉有金有幣交際之恭君子所貴生鵝蒸豚匪戒匪贐是曰貨取君子所病我非用禦享是多儀母摽使者審此令詞愛日銘天地之化一息不停嵗不我與日月駿奔是以君子自強不息審已乾乾夕焉斯惕禹惜寸隂周公待旦矧是聖人罔敢或倦出作入息衆人蚩蚩自暴自棄老人傷悲我年嘗少我學不力明德昧昧噬臍無及嗟爾小子母曰妙齡髫齔幾何頎頎而巾爾寒襲裘爾飢重味師友琢磨家庭訓誨窗牖明潔硯席是夷於焉不學鳥獸須眉相期爾深爾勵爾勉毋視他人我鑒不逺一善一惡夢覺之關一喜一懼父母之年於斯二者兢兢業業毋怠而忘毋作而輟東方明矣圖書滿前視此名扁千程一鞭日云莫矣默計爾工歌此銘詩氷炭爾衷存齋銘為唐實之作惟皇上帝降此良心總攝萬化其德孔仁虛靈不昧神妙不測養而勿害則靡有忒為聖為賢立此人極誘交於前倐變而遷凝氷焦火飛天淪淵乃獸乃禽徒習人言驗厥操捨實未嘗妄欲知所存先求其放膏車秣馬不皇厥居馳騖如是欲存可乎利欲轇轕是究是圖所樂在此欲存可乎肌膚弗會筋骸弗束言肆則誕行巇則踣自旦及晝梏之反覆雖有夜氣亦惟不足我視斯扁萬里來歸禽獸是醜聖賢是依方其未發當養其微及其將發當察其機賔主有辨表表玉立貞元所鍾邁邁時運凛然髙風月落霜飛氷凝雪霽一點清芬足酬天地心事誰知圖不盡意充實齋銘為劉叔崇作惟人之性原于一善欲動情勝惡然後見人之好之我所固有若存若亡好未必久利害可移外物可改昔也所好今也何在君子為學必有諸已其所謂信實而已矣彼樂正子以好善稱從遊子敖有不足論二中四下毫釐不差其或未實充無以加既實而充于斯為美雖至聖人上下一理孟子之言具有等級充實一關最當用力萬善必備缺一不可過此以往幾非在我惟叔父有揭斯扁詔我銘之愧此蕪淺遺書銘石筍文獻嵗月浸荒爰輯墮簡于焉永藏有􅎡其光乾道奎畫有味其言名賢遺帖翼翼卷帙典則尚存願言寶之百世其承懷古厨銘好古博雅學在其中玩物喪志式病于躬是碑是碣篆籀欵識爾圖是書典刑思致我懷古人世逺言堙如或見之實慰我心四友厨銘端歙之珍雲煙郁郁爾毛如錐爾楮如玉天相四友得與斯文曰聖曰賢有翼其臨舍之則藏用斯不忒一與心會神明厥德界則銘縱橫妙用三百六十如䃆之方無閏是積一紙一年百千萬億是曰潔矩永為書式手板銘言必忠信行必篤敬在輿倚衡聖人有頌陳奧頌為天台施處士作人之一心滿腔曰仁義禮智信雖各有名總而専之以生道存推所由生造化之根心之不仁病於私欲孳孳為利惟日不足天倫斫喪大本殘衄民之顛連曽何能淑有偉處士此仁不虧非資于學不失秉彛逆天理事揮而去之推此一念俯業于醫五十餘年躬修炮炙劬劬濟世不為利屈有感其誠或報之德急義好施隨入隨出不問親疏視吾有無匪恩之市匪名之沽有惻其隱弗遏弗渝何待觀過始曰仁乎維天降祥自鍾于善子孫衆多厥鑒不逺咨爾子孫循循勉勉名世者出必大且顯橘榮頌羌爾錫貢姒氏之服兮頌爾素榮鬻熊之國兮與春無競嘉爾之志兮表裏純白抑豫之所嘉兮各一太極顆顆圓兮隂合陽開五行爛兮玉質金相方有道兮寂寂紅紫自知其醜兮銅彛涵泳色香異兮國風不采非世人喜兮皓皓獨立夫何求兮德聲而且實侯梅之流兮觀爾儀刑毋自失兮培之濯之數弓之地兮率性不變真畏友兮踰則為枳秉天之理兮願我德業與爾俱長兮柯葉茂茂無雕零之像兮知樂仁夀二頌人心本虛靈才昏便失腳一理茍昭融羣疑自揮卻物物有精義事事有歸著一智了萬變朂哉有餘樂衆星環北辰微月墮西岫夜氣澄中襟梏亡保旦晝存存淨人欲生生體天授一仁無間少朂哉有餘夀書上王右司書伯大在昔嘉定壬午得侍伯兄瞻拜于秋闈撤棘之後便蒙開述先契篤隆夙好情義藹然既而賜之迂顧衡茅至今有光倒指十有六載矣藐無再見之期未嘗一日不起髙山仰止之思凡親舊之經由治所者每問起居多傳執事亦時有齒及某兄弟之意又知孤露之蹤所以被眷存者始終不替如此兹聞召冠星郎密毗上宰直前奏事上沃帝心尤增慶贊伏念某生四十有一載矣先君棄諸孤今已二十有七載幼孤失學顛倒沈迷浸浸乎小人之歸矣一旦幡然感悟棄其舊習杜門謝客一意讀書屏絶科舉之業克去祿仕之念日夜探討洙泗伊洛之淵源與聖賢相與周旋於簡册者今幾十載然而氣質昏惰而未有人十已千之功以至於必明必強之地而又拙於謀生家事日就雕落雖有先人之故廬亦將有飄蕩搖兀之勢困窮至此足矣而終不自悔者每謂受父母至善之元得天地正通之氣所以命我者仁義禮智之性飽滿充足其初本無一毫瑕缺也今乃斫喪殘壞反汲汲乎外物之是保亦已過矣是以洞洞屬屬乎撡存持守之方戰戰兢兢於動靜語默之際不敢遺本而逐末不敢徇利以忘義於世味淡泊無一毫妄想也故平時書牘不題要官姓名不入修門今日之書雖非有求而來然亦有為而發痛念先君仕塗坎壈百未一伸尚有蚤識英器一事炯炯猶生某雖居山林友鷗鷺幸故人之得政幸朝廷之得人幸先君知人之效此意勃勃上浮而不可泯則其所以見於書者豈一時之私情哉雖然以十有六載間闊之久五百里水陸之遙一紙之敬道古今而譽盛德非所以答故人記存之厚也某竊惟吾儒之學有體有用其體則堯舜禹湯文武周孔孟氏之書皆格物致知誠意正心修身之要其用則齊家治國平天下之道齊家固在我所自盡也治國平天下蓋有不得已起而從之者非可自求非可茍得皆天之所命也雖官無崇卑皆可以行所學而見於用然職小者所施有限任微者所及不廣列郡之政不越於一州外臺之政不踰於一路內而九卿之不相侵六部之不相及必也其職無所不統而所施無有限量者其惟宰相乎習為宰相之事而佐其所不逮者其惟都司乎嘗謂君相者出治之原也君德之進不進經筵之責也相業之成不成都司之責也左右司雖曰宰相之屬三槐之下黃閣之中必得德量器識之才彌綸得失禆贊庶務宰相曰是都司曰非宰相曰可都司曰不可必使廟堂無過舉四海無寃民內而君子小人之各得其所外而夷狄姦宄之各安其分是皆都司職事之當然也國家數十載以來士大夫戕賊於利欲之塗良心熏染於貪濁之習滔滔流蕩無所底止其間能自拔於頽波之中者蓋不可以多數矣有如執事中立不倚氣節凛然精神風采赫赫於符竹之間聲名聞望衮衮於薦紳之口召還之初天下共徯之曰必橫經虎觀矣必執法霜臺矣執事方徘徊退避兩載而後進豈徒然哉必有一定之見矣今日之來豈不熟觀天下之大勢必以為世道尚可扶持化原尚可輔佐乎然而天下之勢日壞國家之勢日輕亂根日壯命脈日微如之何其可為也天下所共知者內而民生日艱而楮幣無策外而敵國日強而兵力單弱任今日之事者皆知其尤難夫生民之休戚固係於守令之賢否監司者守令之綱也朝廷者又豈非監司之綱乎兵力之弱強固係於將校之能否帥閫者將校之綱朝廷者又豈非帥閫之綱乎合內外治之原既係朝廷總朝廷之政又關於都司其任豈不為尤難端平更化以來朝廷治效其略可見雖都司潛毗密贊於幾微隱約之間而不見其迹異時識者考治道之得失曰此時此政為當此時此政為不然宰相猶若人也而政有異焉何哉則必於都司證之矣可不謹哉執事培埴之久敡歷之深學正義明志定氣飽當必有以處此矣然吾儒之學雖曰有體有用必體立而后用有以行又必體無不具而后能用無不周也世衰道微學絶教舛士氣不振風俗不振正以士大夫體不立而急於用借濟時行道之言以蓋其富貴利欲之私意近世一二賢者固有以異乎今之人矣進而未能盡副海內之望亦以其體未至於無不具所以用亦有所未周歟此古今之通患也而況都司之任尤非它司比也霖雨之原也舟楫之具也麴蘖之資也鹽梅之根也若夫天下之事變其來不一也國家之安危非輕也幾微之間節奏之會呼吸進退於毫髮之間得失利害之相去已有霄壤之異矣惟講學然後有以明夫心之制得夫事之宜昔王梅溪聲名節行為時巨人晦庵朱先生猶晚進也乃拳拳以尊德性道問學勉之而不以為僭于湖張公文章風采為時俊才其去荆州也南軒張先生送之亦告以講學之説而不以為嫌以是知無貴賤無老幼皆不可一日不講學也人之美質有限而嵗月亦有限學問無窮而事業亦與之無窮講學者豈有它哉亦窮理以致知也惟能隨事以觀理故於天下之理無有不察又能即理以應事故於天下之事無有不明如鑑照人如衡稱物自有以盡其公且平之德矣今執事上欲答主知次欲參廟謨下欲副人望不知以何事為當先何事為可後推本尋原萬弊蟠結蓋有不勝其可憂者執事其何以處之哉願執事審時度勢熟慮精思薰蕕同器決無久馨之理君臣際會從古所難日月逝矣嵗不我與毋為小人所先發也不審髙明以為如何謹齋沐裁書以道此拳拳之誠淺陋僭率不勝愧懼上呂寺丞延年某幼孤失學退處陋巷日知收斂身心於簡册間殊未有毫髮進也幸於仭牆有先世師門之舊雖聞養痾卻客亦未嘗一再晉謁而不獲瞻侍既而令表傳道尊意乃知不肖如某亦未蒙擯棄而在齒録一人之數感佩興起念不可無一言仰答隆知用敢僭陳尚丐垂察某竊惟平治天下之道莫急於人才教養人才之地莫急於學校後世教養之方固已大異於古而學校之政不修未有甚於今日則其化民成俗之驗固已昭然可見也南渡以來三先生鼎峙東南倡明正學浚衍淵源成就人才為國家數十年之用可謂盛矣年來師友凋落義理堙蕪後生小子倀倀然無所適從以其意之所便者為學雖有氣質之美不過沒溺於進取之塗而已至于汲引後進收拾晚生開導訓迪封埴培養以續不絶如線之氣脈捨麗澤書院何賴焉尊契丈負家世嵩嶽萬鈞之重誠宜充養氣體保育神明恢崇德業開拓規橅尊禮有德招引善類夙夜相與講磨實學以復還先世之舊也某得之友朋之餘謂尊意欲更文會之約久矣悠悠日月謀畫未定切慮旦夕宦轍驅馳不容久駐此事必至因循廢弛終於不振而后已也今幸天啓深衷凡聲氣所同曲意諏訪俾有志之士咸挹麗澤之風而陶泳講習之樂此其意豈徒然而其事豈可茍哉某竊謂朔望片時徒會亟散切偲之論不浹輔仁之意不孚則恐於髙明所以篤念先猷紹復師友之盛未足有稱妄意及此弭節里居之暇早定規橅請一老成有行義善講説為衆所敬者為之長嚴其尊崇體貌之禮優其飲食供給之需使真有志於講學者三五人相與左右之汛潔齋宇增置床榻接納後學不限其來許其寄爨止宿不以虛文利祿之誘入其心使之一意講明義理涵養德性果能如此則旁郡聞風而至四方視效而起咸知麗澤遺規久而復振作成磨礪日衍嵗豐有以輔學校教養之所不逮而培植斯文之夀脈以為國家無窮計益以顯揚成公先生以道私淑之功而於尊契丈繼志述事之孝孰大於此而於愛君報國之忠又孰大如此僭越犯分不勝震恐惟執事進退之社倉利害書社倉之法人皆謂始於朱文公而不知始於魏國録元履魏公初行于建陽之招賢文公效而行之於崇安之五夫然文公之法與魏公少異招賢之倉遇嵗不登則告發及秋斂之無貸息也五夫之倉春貸秋斂收息二分小歉則蠲其半大飢則盡蠲之此為小異魏公之法雖疏而簡文公之法雖密而煩二公同門友也杯酒從容之間未嘗不交病之魏公病文公曰不當祖荆舒聚斂之餘謀文公病魏公曰不當久儲速腐惠既狹而將不名也當時亦莫能決其是非要皆常得如二公之賢則法俱無弊奈二公之不常有也東萊先生常謂文公曰子之穀取之有司而諸公之賢不易遭也南軒先生則曰立法無其本用法無其人雖指荆舒實為朱先生發也此其深長之慮有朱先生所未及思者蓋仁人急於愛人利物念有生之類莫非同體其忍坐視其飢餓轉于溝壑化為盜賊哉惻隱之發如救焚拯溺何暇逆計其後日之不得人而遂已乎此朱先生之盛心也若夫二分之法與青苗異者蓋荆舒託濟人之名罔其利以供上之用朱先生因濟人之實儲其利以復為民水旱之防心之所發惠之所及何啻霄壤以青苗議社倉其不審亦甚矣及朱先生異日自悔其法之未盡善故謂元履之言雖疏而其忠厚懇惻之意藹然有三代王政之餘風豈豫一時茍以便事者之説所能及哉後日之請所以必曰息有年數以免者則猶以不忘吾友之遺教也逮其晚年又自憂其無守法之人故曰有治人有治法此雖老生常談然其實不可易之至論也蓋無人以守之則法為徒法而不能以自行況於所謂社倉者茍非常得聰明仁愛之令忠信明察之士相與并心一力以謹其出入而杜其姦欺則其法之難守不待已日而見之矣此又豫之所身試者吁朱先生晚年之意即張先生昔日之言也大抵後之好名者不深求朱先生晚年之意不深思張先生昔日之言自其立法之初考核不精周防不密則已與二先生之意異矣謂之好名可也由是婺女之社倉始終沿革有可得而言者恭覩淳熙八年朱先生申請社倉指揮若曰其斂散之事與本鄉耆老公共措置州縣並不須干預抑勒至哉言乎此行法者所當共守也今也不然領以縣官主以案吏各鄉又非有德望之人為官吏之所畏敬者俯首聽命茍且逃責利害不敢専決姦弊不敢自懲玩舞虛文壅塞實意吏既慕於前權宜伸縮隨時輕重吏則議其後故賢者不屑與之相抵牾也此立法之不審一也昔之法也先給以米貸以米斂亦以米今也不然斂以錢科以糴若能薄增厥直亦何患民之不樂輸哉價既不平穀不時至勢必至於敷擾以抑勒人情之所不堪小民未受其利中産先被其害此立法之不審二也後之繼者慮既貸而民不盡償則社倉之惠窮而追呼之害起故朱先生之法一轉而為魏公之法但儲于鄉以備嵗之不登及其嵗之小歉也又不以貸而以糶則魏公之法又轉而為廣惠之法矣然而積之既久則化為浮埃腐土果如朱先生之憂夫以天地生民之寶百姓日用之天棄之於陳朽敗壞之域而不顧是誠何心哉及其發之也雖痛損其直而民不以為惠有至不得已而食之者反不如糟粳之鮮潔直不以人類待之矣是又何心哉其未發之時主者謹視封鑰不敢以新易陳或差官檢視盤量既有酒食徵需之供又有人從偷竊之耗主之者凛凛度日有破家蕩産之懼此所以鄉之善士不願委請而多方脫免詞訟反至紛紛其甘心任責者率是豪霸之人即時移易私用空其封鐍及至撿核不過旋賂官吏當連年旱傷米價頓踴慮其賑給見底反巧為説辭以蔽當路寧科抑而不敢盡發也則社倉立法之本意果如是乎所可大慮者不特此也當其再糴而償之價不逮時例行敷抑或增會價或添斛面或責以上色之米或有數十里擔夯之費猶云可也有産者惴惴然恐後日之不給錢而白敷米如和買羅絹之類此亦不得不慮及此而況今日常平義倉之米即昔日敷科備水旱之米也原亦自鄉而移于邑自邑而移于州今若重敷民不堪命故當一畨敷糴之時吏持其柄以為乞取之資其害尤不小是豈治世之良法哉竊謂有愛人利物之誠心又須有無我之盛德既足以來天下之善言而后可以行天下之公法求名者不足以行法自是者不足以行法泥古者亦不足以行法然圖利者不可以奉法避事者不可以奉法不知民吾同胞者亦不足以奉法非特上之行法者未遇而下之奉法者尤不易得也所謂立法無其本用法無其人至是而益驗矣古人有言穀賤則傷農穀貴則傷民今之農與古之農異秋成之時百逋叢身解償之餘儲積無幾往往負販傭工以謀朝夕之贏者比比皆是也農人以終嵗服勤之勞於逋負擬償之時則榖賤而倍費及其不憚經營之艱苦糴於青黃未接之時則穀貴而有倍費是穀貴穀賤俱為民病也昔人既有廣惠之法穀貴則損價以出之穀賤則髙價以入之一出一入低昻適平其法至簡其事易行無社倉前者之弊法亦良矣自朱先生之法三轉而下同於廣惠者此所謂不泥古而善繼前人之志者矣然而前日出價既損而後日入價反髙原額不無有虧折今欲望台慈一以愛人利物為心而不計其原額之虧盈庶不失諸老先生之遺意茍以原出價敷抑人户糴償非特今日之重困是為異日白敷之漸也為民父母以若保赤子存心必不忍作俑於此或以原額為不可虧折乞就本州權暫關錢撥助以俟後日盈價輸償亦甚易行也僭越出位不勝震恐賑濟利害書恭聞孝宗皇帝後時失實之訓言簡而意周萬里民瘼如在目前真帝王之軌範也伏自某官開藩之初首舉是訓以警僚寀可謂得為政之要見于施行者今三閲月又似未有成效其故何哉孟子曰有不忍人之心斯有不忍人之政今執事訪求民隱虛已納善孳孳不倦舉行荒政焦心勞思此百姓之所共知也不可謂無不忍人之心矣然官吏奉行不足以識執事愛民之盛心文移旁午而膏澤不下流移日甚而糴價日昻或者議其政而併疑其心愚獨以為不然四方之風土不同田里之休戚不一以執事博詢羣議如此之勤而應之者泛然唯諾一無以仰助執事愛民之政此吾鄉士大夫之責也今不揆愚陋敢先陳吾鄉風俗之大略繼之以愚説二條恐或可以禆贊荒政之萬分敢祈采覽竊惟兩浙槩號富饒而東浙之貧不可與西浙並稱也人或有知之者婺女之貧不可與浙東諸郡並稱則人鮮有知之者金華今日之貧與三十年前亦不可以並稱人無有知之者矣夫均此郡縣也肥瘠頓異必有其故何者昔之為民害者版籍荒落而已雖胥吏持虧盈之數舞出入之權而猶有遺利在民也自經界以來版籍具在而有無虛實固不可隱其奈經界之時縣令朱中直匿鄉都之舊額勒保伍增添新數先為姦吏之地民受其欺而不能辨不特無遺利而民以暗被苛取矣其害豈不大哉況自南渡以來科配之數越為重婺即次之婺之七邑金華為尤重夏稅之輸十有三種雖間有蠲租之令而此賦自若及袁韶之長版曹也增羅絹重厚之數而民力始困加以十數年以來絲枲之價頓踴穀粟之價頓輕知民力始困矣富家巨室僅僅自保用度稍廣質鬻隨至中産之家往往一嵗之入不足以支一嵗之用日降月下而窘色不舒每至秋成如解倒懸烏有餘粟以待昂價是以勸分之政固荒政之所先而非金華之所急大抵勸分之政為富而積粟者設為愚而嗜利者設今穀價既隆數十年之所未有於此時而猶閉藏尚復何待嗜利者雖無厭而如是之愚者亦鮮蓋金華所謂富家巨室實不足以當江西浙西困弱最下之户昔之為富家巨室者尚有數年之儲今無兼嵗之蓄矣雖有閉糴之心而左支右吾其勢自相煎迫益不容於不糶故曰勸分之令非今日之所急也以今日勸分之令隨時直之低昻而無裁抑之患則富家所宜樂從然終未有欣然應上之令者蓋縣官奉行不察有無不審虛實持版籍之虛數例行告諭紛紛四馳反如白科上下相疑糶者束手而糴者無措是未足以濟民適先有以害民矣書生私憂過計不慮富家巨室之閉糶也方慮其喜於得價傾囷倒廪而盡泄之矣天命靡常豐凶難必萬一不幸嗣嵗復以旱告雖有良平之智不知善其後矣可勝寒心然則為今之䇿奈何曰賑荒之體先公庾而後私家賑荒之要抑有餘而補不足嗟夫田不井授王政堙蕪官不養民而民養官矣農夫資巨室之土巨家資農夫之力彼此自相資有無自相恤而官不與也故曰官不養民農夫輸于巨室巨室輸于州縣州縣輸于朝廷以之祿士以之餉軍經費萬端其始盡出於農也故曰民養官矣不幸凶年飢嵗在上者不得已散財發粟而賑恤之使之得免於流離溝壑之憂尚有是可以寓其愛民之心耳春省耕而補不足秋省斂而助不給此王政之所先也竊惟今日義倉創于慶厯初令民上三等每稅米一斗輸二升以備水旱其後興廢不常今不及小户矣是官無以賑民使民預輸以自相賑恤已戾古意今又移易它用數額常虧遇歉嵗則復科巨室此何義哉其後又有效社倉廣惠之遺法盡將前賢立法之美意顛倒紛亂以為沽名買譽之資始也低價以強民之輸先為中户之困既而官吏侵漁所積朽壞民得之而不可食今幸新陳相易而積日未逺而州家顧乃深藏固閉其所以備水旱者一切倚辦於私儲愛民之心何以敷於百姓公聚朽蠧三老凍餒此晏子之所深嘆也況今朝廷猶特發粟而侯國殊無發粟之意竊恐百姓德巨室而不德官府巨室怨官府而不怨朝廷甚非所以承流而宣化也昔成周荒政十有二以聚萬民一曰散利縣都之委積以待凶荒者恐不如此今不若先發官庾如常平義倉社倉廣惠倉之類盍盡數散之官庾竭然後及於私家名正言順義感仁暢既足以廣君上愛民之心又足以成州家愛民之政百姓德官府而巨室心服亦庶乎王政之遺風蓋設施先後之序實意之所孚義氣之所興起故曰賑荒之體先官庾而後私儲者此也昔成周之衰王政不行莫甚於戰國梁惠王猶能移民移粟於河東河內故孟子之所不取以今觀之能如惠王之用心者尤鮮且糴價何為而驟髙也以嵗旱而無糴也是糴價不髙於豐稔之地實髙於旱歉之鄉然髙價之利不歸於旱歉之鄉實歸於豐稔之地彼歉者既歉矣而又盡索其家具積數倍而僅可易常年之一彼豐者既豐矣而又坐享髙價以常年之一而可得數倍之利是豐者再豐而歉者再歉甚非平準之意夫天時豐歉之不同地利厚薄之不一此為政者所當輔贊天地之化裁制其輕重之宜豈有坐視其偏倚之勢而無以權其低昻之中恐未可以言善政矣今縣官勸分之令乃隨時直不與減損此巨室之所喜而細民之所不樂所徇者小而寡所害者大而衆不可不審也然又不辨其鄉之豐歉不察其家之有無例令賑糶其豐而有者固可以濟民之乏彼凶而無者自謀且不給又何分之可勸哉是以富益富貧益貧勢不均平人心不服互相推托遷延日時民將餓死誰執其咎今蠲租之數既定而七邑之豐凶大略可見有上熟之邑有中熟之邑有下熟之邑又有最旱之邑中旱之邑不旱之邑以上熟之邑自可以補最旱之邑州家何不裁損其價直求糴於上熟之邑復裁損其直以賑其最旱之邑也其中熟中旱之邑又有最旱中旱不旱之鄉亦有上熟中熟下熟之鄉所以裁其直者亦如邑焉其庶乎無輕重偏倚之勢無甚休甚戚之民彼受抑者無怨詞彼受濟者有實惠豈不善哉今最旱者當賑濟而上熟者亦賑濟上熟者當勸分而最旱者亦勸分恐未可以言善政矣故曰賑荒之要損有餘而補不足者此也愚之二説若迂闊而實今日之急務惟髙明詳察而進退之答劉復之求行狀某早嵗疏慵知學最晚人所擯棄乃蒙尊府撝堂先生一見偉視進而教之遂獲嗣交於下風既得親炙典刑文獻於前又得漸染芝馨竹韻於後情均魯衛義重金蘭受知篆感如海斯深兹蒙扎誨諄喻先夫人行狀尤見至孝顯親所以期待不肖者乃欲推而納之文章之籙雖自信甚篤不應犯此大不韙然詳誦來教情深禮隆懇懇惻惻即合痛鞭駑駘奉命唯謹其敢辭乎但有一二委折交戰于中有不容自默者願略陳之某嘗謂行狀之作非古也又嘗考之衛公叔文子卒其子戌請諡於君曰日月有時將葬矣請所以易其名者請諡之詞意者今世行狀之始也周士大夫以上葬必有諡而勳德著見於時人所共知不待其子纍纍之言故請諡之詞寂寥簡短不能數語後之士大夫勳德不盡表表於當時而人子哀痛之中難於自述遂屬以門生故吏具述行事以狀其請自唐以來有官不應諡亦為行狀者其説以為將求名世之士為之志銘而行狀之本意始失矣夫觀昌黎廬陵東坡之集銘人之墓最多而行狀共不過五篇而婦人不為也又知婦人之不為行狀之意亦明矣若以行狀而求銘猶有説也今先夫人已有墓銘乃撝堂之門人述其師之語理已當矣若又為行狀不亦贅乎愚謂行狀之不必作者此也況某幼失怙恃而行狀墓銘因循至今而先世一時交遊知心之士零落淪謝不復存者此事往來胸中日夜如坐針刺豈自親未有狀其行而志其墓乃為它人為之其忍乎使某果粗有文彩可觀而先夫人猶未有志銘則亦不敢為也然所以不克奉承者誠非飾偽若夫師生之稱古人之所甚重顧某何者乃敢偃然居之尤不敢當所有家傳志銘及所賜染扎併用納回仰惟先夫人淑德懿範苦節貞儀固足以光耀女史垂於無窮然顯親之要實在復之立身行道日進日盛而不在乎區區之文也君子愛人以德豈可麗於世俗之交惟髙明識察而恕之答何子恭書來諭某之病往往出於鄉原之口彼鄉原者趣向卑陋志識鄙淺驟聞欲求聖賢之正學欲聞先王之大道方將驚視駭愕以我為狂為妄未能得其講學之淺深且要吹毛求疵去點檢教它立腳不定此今日成材之所以難也愚謂後生小子乍脫於荆棘坑塹之中方欲著身於正大光明之道未曽講得一事行得一步豈能每事盡善縱有病痛且要是大路上人它日志向漸定移步漸熟然後可以逐旋敲點它使之澄治未晚今若遽然四面責備束縛太緊鉗鎚太酷彼將疑為君子如此之難幡然退安於舊穴却是吾輩為淵驅魚顔子所謂循循善誘恐不如此世衰道微向此學絶少只得且容它樂親吾輩開其是非善惡之見令其通透不惑持守不遷然後進以細密工夫可也必切而後可磋必琢而後可磨亦理也髙明以為如何魯齋集卷七
