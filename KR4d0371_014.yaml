body:
  text: 魯齊集卷十四宋王柏撰傳宗忠簡公傳宗澤字汝霖婺之義烏人天姿沈毅識度深遠才敏而用周至大至剛之氣始終不屈讀書過目不忘尤邃於春秋左氏程文有心不可欺之說有司喜曰吾為朝廷得人矣登元祐六年第宣仁聖烈垂簾有詔對策限以字數同輩相告必如詔可中程公曰事君自今日始豈可希前列效寒蟬乎遂力陳時病幾萬餘言八年以將仕郎調大名府館陶縣尉嘗攝邑事吏以少年易之及聽訟迎刃而決不淹月大治吕惠卿移帥鄜延以幕屬辟公力辭不受調衢之龍游令丁內艱除服調膠西令按治宿姦不畏强禦捕羣盜數十焚其廬威譽赫然丁外艱服除調晉州趙城令言於朝曰趙城前有并河汾陽之險後有晉絳䝉坑之固左霍邑右太行沃野百里實用武之地乞援楚之漣水澶之德清命以軍額屯兵以備不虞不報公曰今固承平無虞他日當有知吾言者政和三年知萊州掖縣部使者以朝命科取牛黃公力拒得免公曰吾之為邑始之以信濟之以威信既孚矣威亦何用五年通判登州時朝廷遣使由海道與女真結盟公憂形於色曰軍釁自此始矣有道士髙延招倚林靈素凌滅郡邑公窮治其罪不顧及公丐祠而歸結廬山水間有終焉之志道士以公改建神霄宫不當訴于朝而靈素主之遂褫秩羈置鎮江公聞命就道無纎芥慍宣和三年始復承事郎就差鎮江府酒官靖康元年北敵犯闕既退詔侍從舉知御史中丞陳過庭以公薦八月召擢宗正少卿使金以和議名公曰敵情不可測名不正則徒取辱耳請改為計議使且謂人曰此行必不返問其故則曰某豈能屈節外邦上辱君命邪必死敵議者以公太剛改命劉岑九月出知磁州時太原失守真定被圍即日單騎渡河繕城浚隍治器械募義兵增價入粟為必守計不逾月而備上疏乞邢洺磁相趙各募精兵二萬教習之使常有十萬兵遞相為援上嘉之諸郡議不合敵再南騖公大治兵與滑濬相掎角敵知有備乃東趍大名魏縣由李固渡渡河乃分兵攻磁公命神臂弓射退出義勇追斬數百級士氣益奮時王雲隨康王使金議和至磁公迎謁曰聞敵已由李固渡渡河矣萬一如肅王為敵所留雖悔何及力請輟行㑹百姓亦怨王雲邀王徇敵殺王雲遮馬留王王遂還相州敵已圍京城十一月上除王為兵馬大元帥公與汪伯彥為副元帥以師入援十二月丁丑公與禆將秦光弼張德邀敵于李固渡口夜搗其壘破三十餘寨翌日王檄諸郡發兵㑹大名癸未公至大名王議師所向公請直趍開德入解京城之圍汪伯彥猶以和議難之獨王以為然戊子公提兵二萬趍開德擊敵十三戰皆捷㑹京城遣張澄持詔書同敵騎叩開德問王所在且言敵再議和援兵未宜遽進公曰此為敵所脅來款我耳命壯士射之敵遁已而王命與黃潛善分統勤王諸軍王檄諸帥以敵懷詐僞和實杜四方之師宜審料敵勢可進則進公示諸將曰王已灼知敵情吾等可坐視乎請王遍檄諸道約日同進時趙野為北道都總管范訥為河北河東宣撫使合軍南京號宣總司偃然自衛殊無進兵意公移書以大義切責之皆不答向子諲駐宿趙子嵩守陳何志同守許閭丘升守濮曽懋守曹列屯環京城無敢動翁彥國以經制使總東南兵駐泗不行公獨以孤軍進至南華命禆將陳淬出敵不意擊之敵自宛亭逼興仁府分兵寇開德公遣孔彥威與戰又破之公度敵必犯濮密戒權邦彥為備敵果至濮公遣二千騎為援敗之敵復向開德邦彥邦威合擊又破之公親率諸軍進衛南曰兩國搆兵我欲入覲君父遂揮而前敵陳兵以待公曰今前後皆敵壁進退等死耳當死中求生人人爭奮無不一當百敵遂大敗斬首數千敵益生兵陽敗而却公曰彼十倍於我一戰遽却是必有謀若襲我則殆矣即徙軍南華敵果夜至得空壁大驚次日公自南華過河􅊞擊又敗之公所得俘囚問京城動息又得王檄知二聖北狩天族偕遷公北向號慟即日自臨濮趍滑州由黎陽大伾邀乘輿孤軍進戰它軍無一㑹者及聞張邦昌僭位即回戈內向先遣健步持檄慰撫京城又得王書言僭僞義當征誅聞其出于權宜未可重擾京城不若按甲近畿移書問故候得其實討之未晚公即移師觀釁且復王書曰姦臣邦昌竊據寶位改元肆赦止勤王兵篡跡顯然自古姦臣其初未嘗不僞為謙退中藏禍心今二聖諸王北去惟大王在天意可卜正宜有以歸天下之心不可緩也及聞都城反正貽書于王曰今日國之存亡在大王行之得其道與不得其道耳所謂道者其說有五一曰近剛正而遠邪柔二曰納諫諍而拒諂諛三曰尚恭儉而抑驕奢四曰體憂勤而忘逸樂五曰進公實而退私僞公謂人曰結怨王之左右矣不恤也又纍表請早決大計王命公總諸將於長垣韋城衛南南華屯衛五月王即位於南京詔公入對一論人主不可以喜怒為賞罰二論人主職在任相願于稠人廣衆之中不以親疏不以遠近虛心謹擇參以國人左右之言爰立作相毋使小人參之三論臣下有懷姦藏慝嫉賢蔽善者當使耳目之官實心彈糾毋有所隱上納其言將留公黃潛善汪伯彥惡之出公知襄陽府復有割地請和之議公上疏曰陛下初紹大統奈何遽聽姦臣之言欲割地以啖敵乎前日靖康姦臣未嘗議遣朝說一言以告和暮獻一說以乞盟詞卑禮厚惟敵是狥終有前日之禍宜人臣弗與敵共戴天而俱生臣意陛下亦赫然震怒一洗前日之耻未聞有所號令作新斯民豈可復徇姦邪之議哉為是說者既不忠不孝又壞天下忠義心而褫其氣臣願躬冒矢石為諸將先上壯其言改知青州㑹李綱入相公與語及國事慷慨流涕綱為上言綏集舊邦非澤不可遂徙知開封府是時敵兵初退守備廢圮盜賊縱橫公下令曰為盜者贓無輕重並從軍法由是羣盜屏息人情始安王善者河東之巨寇也領兵七萬寇濮州謂京城殘破不足語勇直欲據之公自料勢未易敵戒都統以下守城吾將親招之單騎竟造賊巢善亦訝公之來約與公㑹公略不出一語但執其臂仰天號慟徐曰朝廷二百年涵養當危難時無一人出為時用使當時如有公一二輩豈復有今日之患今正立功之秋王善為公忠義感動亦同聲而泣且曰敢不效力公附耳語之曰來日當以節度使相處諸將謂公此行不復返矣及公歸諸將出迓公曰事畢矣善隨以狀至欲卜領衆歸降且有解甲帶甲之請公書從便二字善益心服越三日來降衆疑不決人情洶洶公獨信之篤也善以五百甲騎從餘皆解甲既至左右止之曰此留守司門擅入者處斬善乃下馬趍入拜于庭公繼以禮接之曰公禮相見不得不如此延之以飲臨行曰昨已許公節度使先授照帖當即具奏善大喜且請到寨撫諸將公許之不疑既入寨筵賞有差自是軍聲大振又有王再興掠西京李貴往來淮上楊進者號沒角牛及王進等頭項人所至侵掠公遍遣人諭以禍福招來之群盜素服公名相繼而至楊進者尤所敬慕公曰軍中老弱婦女久被驅虜吾不忍其無辜宜盡釋之進等奉命諸軍所放幾二萬人楊進屯城南王進屯城北二人氣不相下一日領衆相拒于天津橋都人頗恐公以片紙喻之曰為國之心固如是耶當戰陳立功勝負自見二人相顧慚沮而退公之去磁也以州事付兵馬鈐轄李侃中軍將李世隆與將校郭進殺侃為亂至是與其弟世興將三千人歸公世隆入拜公詰其亂之由世隆詞服笑曰河北陷沒而吾宋法令上下之分亦陷沒耶命引出斬之時衆兵露刃于庭世興佩刀侍立左右皆悚公徐語世興曰汝兄犯法當誅汝能奮志立功足以雪恥世興感泣其後敵犯滑公謂世興曰試為我取之世興欣然受命勵衆至滑掩敵不備急攻之斬首數百以歸公復厚賜之丁進者亦巨寇也其初來降人情鼎沸謂非真降者或請以兵陰衛公曰不然正當披心腹待之雖木石可使感動況人乎及進至公慰勞存撫又呼首領者數人飲食之待之如故吏明日按其寨進益感畏黨有陰結為亂者進自擒殺之有相率遁者進自追治之馬臯者進之次也每戰必先登一日傷而還公方撫勞而羽報又至公曰誰可代汝行者臯曰非臯不可裹瘡而前數日擒一將而歸趙海亦招賊之雄也屯板橋輒塹路設橋以阻行者閭勍百芻者八人過海營海怒曰我畏閭太尉邪悉臠之偵者以聞公呼之海以甲士五百從公方接客遽語曰殺芻者誰海曰無之出報狀示海具服命械繫獄客曰姑徐之奈甲士何公曰何怯邪治海者某諸公何預喻次將曰領衆還營趙海已械送所司告偏禆善護卒伍明日誅海聞者股栗㑹公拘囚敵使議者紛然獨許景衡言臣聞宗某之為尹政術卓然過人誅鋤强梗撫循善良都城帖息莫敢犯者又方修守禦之備歷歷可觀臣雖不識其人竊用嘆慕開封乃宗廟社稷之所在茍欲别選留守不識今之縉紳其威名政績亦有加於澤者乎伏望上為宗社下為生靈特賜主張厚加任使疏入上大悟封示公公感上知益自奮勵且造決勝戰車千二百乘每乘五十有五人十乘為隊坐作進退周旋曲折可以應用又據形勢立二十四壁於城外駐兵數萬往來按試周而復始沿河鱗次為壘結連兩河山水寨及陜西義士開五丈河以通商旅京畿瀕河七十里命十六縣分守開濠植鹿角守備已固乃上表略曰今强敵尚熾群盜繼興比聞遠近之驚傳已有東南之巡幸此誠王室安危之所係天下治亂之所關慮增四海之疑心謂置兩河於度外因成解體未諭聖懷不報又疏云回鑾汴京是人心之所欲妄議行幸是人心之所惡京師乃祖宗二百年基業今陛下一歸王室再造中興之業復成每疏奏上以付中書黃潛善汪伯彥皆笑以為狂張慤獨曰如澤之忠義若得數人天下定矣二人語塞十二月敵駐兵於河之北稍稍南渡西犯汜水北侵胙城時擾滑濬公所屯河上諸寨欲併兵禦之因乞濟師或曰敵鋒未易當不若堅守自固公曰去冬之變正坐此也命統制劉衍趍滑劉達趍鄭各與卒二萬戰車二百乘以往初嶽飛犯法有司將正典刑公一見奇之曰此將材也不加之罪留之軍前至是遣為踏白使以五百騎授之曰汝罪當死吾釋不問今當為我立功往視敵勢毋得輕鬬飛謝罪禀命鼓勇而前竟與敵接敗之公喜擢統領後遷統制自是每出必捷建炎二年正月敵復自鄭抵白砂鎮距京城四十里都人恐甚僚屬議守禦之策公方延客圍碁談笑自若衆不敢言而退各以己意部分兵伍撤城隍之梁乘城而備公曰何張皇如是命諸軍解甲歸營曰吾遣劉衍必能禦寇復選精鋭數千益之潛戒曰宜繞出敵後設伏以待同至擊之又諭吏曰上元在邇可舉舊例張燈因弛夜禁士民遊觀如平時敵不敢進衍與戰大破之遂復延津胙城河陰收其輜重甫及收燈捷書已至衆益大服時有詔諸路兵馬以勤王為名因聚為寇議所以杜絶之公上言曰向者京城被圍天下忠臣義士憤痛爭奮越數千里勤王當時大臣無謀不能撫而用之致有前日之變勤王之兵例皆撫摩犒勞賞給不霑流離困死弱者淪于溝壑强者變為寇盜豈其本心皆上之人無以處之故耳今乘輿移蹕淮甸中原民無依歸故姦宄乘釁而起且河東河西不肯從敵者皆自保山寨黥其面各立名號以堅報國之心今所攽黃榜有云遂假勤王之名公為聚寇之患如是則勤王者解體而河東河西民皆失望臣固知非陛下之本心乃代言者不能推廣德意失言願別降詔以慰元元二月敵犯西京公命統制官李景良閻中立郭俊民等領兵萬餘趍鄭大戰為敵所乘中立死之俊民降敵景良南遁公捕得之曰一勝一負兵家之常不勝而歸罪猶可恕私自逃遁是無我也兵法固如是耶命斬之繼而俊民與敵將史官人燕人何仲祖王義等以數百騎直抵八角鎮與丁進遇擒之初欲持書誘公既生致麾下公曰郭俊民吾統兵官也失利就死尚可為忠義鬼後有知者不失血食今全軀苟活反為敵人用何面目見人乎命斬之謂史官人曰京城不守主上巡幸領重兵在近畿命我守此有死而已何不以死敵我反為兒女子語脅我邪亦斬之謂何仲祖曰爾本吾宋人脅從而來豈出得已犒而縱之敵又犯滑公曰滑衝要必爭之地失之則京城危不欲再勞諸將我當自行梁州防禦使張撝請自效公大喜即以鋭卒五千授之撝至滑率將士迎戰敵衆十倍或請少避之撝曰退而偷生何面目見宗元帥鏖戰至暮敵少却公遣統領王宣以五千騎往援未至撝再戰死之後一日宣與敵大戰於北門外士卒爭奮敵退河上宣曰敵必夜濟收兵不追及半濟而擊之殺傷甚衆公命載撝喪歸為之服緦厚加賻恤仍請于上贈撝拱衛大夫明州觀察使録其家四人敵自是不復犯東京矣王策者遼之舊將善用兵敵以千騎付之往來河上公密遣統制官王帥正擒之釋縛解衣坐之堂上喻以歸義協討策感泣誓以死報且具言敵中虛實公益喜大舉之計遂決時招撫河南群盜聚城下又募四方義士合百餘萬糧支嵗半公聞西河州縣敵兵不過數百人餘皆脅使從順日夜望王師之來復上疏大略言今之士大夫曽不為陛下思祖宗基業為可惜父母兄弟徯望救援之意西京陵寢為敵所據未有寒食祭享之所又不為陛下思京師者天下之根本億萬生靈之塗炭陛下不早回九重則天下靡有定止上遣中使撫喻時契丹九州人目歸中國者公引近座側推誠與語期奮忠義給資糧遣之且賜以公憑候官軍渡河以為信驗各令持數百本又為榜文散示陷沒州縣及為公據付中國被虜在北之人連結諸路豪傑曰事可舉矣㑹諸將約日渡河故表請上還京尤力且言丁進有衆數十萬願守京城李成願扈從還闕楊進等領衆百萬願北渡兹三頭項人皆同寅協恭共濟國事陛下速歸九重强敵羣盜皆無足畏矣不報五月再上疏且言今城壁已增固樓櫓已修飾龍濠已開浚兵械已足備寨柵已羅列戰陳已習熟人氣已勇鋭蔡河五丈河皆流通陜西京東滑臺京洛敵兵已皆掩殺望陛下毋聽姦臣之言以失兩河之心沮萬民之氣又奏曰臣欲乘此暑月追王彥八字軍取懷衛濬相等州遣王再興護西京陵寢馬廣等取大名洺相真定楊進王善李貴等各以所部分路並進既渡河則山水寨忠義相應者不啻百萬願陛下早下還京之詔臣當為諸將先則我宋中興之業必可致疏入黃潛善等忌公沮之公尹京幾嵗武備不擾而辦屢出師挫敵抗疏請上還京凡二十餘奏初述都人之言曰陛下何不認我宗廟乎何不眷顧我朝廷乎何為使我社稷無所依乎何輕捨我生靈使無仰乎是都人之望陛下切切如此中則斥大臣之姦臣託曰時巡意圖偏伯忘宗廟朝廷之重違天地神明之心棄大一統之規模毁二百年之基業且天下陛下之天下彼姦臣何恤于存亡如京師陛下之京師想憸佞安知夫去就但知親屬歸在江湖寧顧中原陷為敵國終則力陳其不忠不義者持祿保寵動為身謀謂我祖宗二百年大一統之基業不足惜謂我京城宗廟朝廷府藏不足戀謂二聖天眷不足救謂諸帝陵寢不足護謂周室中興不足紹謂晉惠覆轍不足羞謂巡守之名為可效謂偏地之伯為可述儲金帛以為敵資樁器械以為敵用禁守禦之招募慮勇敢之拒敵也掊保甲以助軍慮流移之復業也欺罔天聽凌蔑下民凡誤國之事無不為之言極切至而忌者益深公嘆曰吾志不得伸矣疽發病甚諸將排闥入問公矍然起曰吾固無恙正以憂憤成疾耳而能為我殱滅敵人以成主上恢復之志雖死不恨衆皆掩泣曰願盡死諸將出公曰吾度不起此疾古語云出師未捷身先死長使英雄淚滿襟遂薨實七月十二日也年七十遺表猶贊上還京先言己涓日渡河而得疾其末云囑臣之子記臣之言力請鑾輿亟還京闕大震雷霆之威出民水火之中夙荷君恩敢忘尸諫上已除公門下侍郎御營副使依前東京留守命未下而訃聞贈觀文殿學士通議大夫諡忠簡以杜充代公留守都人請于朝以公子頴得士卒心請繼其任詔以頴充留守判官充無意于敵盡反公之所為將士去者幾盡兩河豪傑皆不為用頴力丐終喪以歸葬于京口之峴山公平生律己甚嚴自奉甚薄方謫居時饘粥不繼吟嘯自如晚年俸入雖稍厚食不重味衣敝不易曰君父方側身嘗膽臣子乃安居美食邪親戚故舊貧者輒豫之家無留儲同舍生林迪先公登第音問不通者纍年一日挈家謁公繼以疾告公往視尚能以後事屬公既卒公恤其家偹至以其女妻修職郎康森且以己女妻森弟劦以申親好其子從公討賊補官為文登令公之急義如此者衆依公活者幾百人死之日風雨晦冥異常連呼過河者三無一語及家事都人號慟朝野相弔出涕三學之士為文哭公者千餘人子頴終兵部郎中孫五人嗣益嗣尹嗣旦嗣良嗣安曽孫十有五人曽懋志其墓云大庾公世家傳天地變化后皇妙合有子五人曰混沌氏赫胥氏若木氏金天氏中央氏帝出乎震木德先王封若木於東方賔出日啓土功掌萬物之生列受姓氏爵為上公子孫繁茂散居四方有三萬八千種其顯者有柏皇氏栗陸氏其餘材器皆足任使惟不失若木氏作酸之正性者獨梅氏之宗焉梅氏二子長曰不次曰仁不字伯華仁字仲實伯華者精神玉雪德馨遠聞風霜不得而摧沮東皇不得而料理也故世世以風節自髙仲實者生意滿腔敕身堅苦方其青純年少世味生澀遇之者裂吻蹙額縮舌憊齒及其體胖德老衣狐裘佩金玦色和氣溫時人美之曰樂只君子遐不黃耉既而祚國於燕被𤣥衮與魯咸共治正天下精淳醲郁之味養民生日用之和與聖人同功在武丁時得傅說爰立作相以代咸命之曰昔甘盤虛己受和惟咸惟仁交濟厥德沃朕心用協調于萬邦為治若和羮爾尚式乃前猷允協于中罔俾咸仁専美於我有商後世稱賢相者皆咸仁之緒餘云五世孫摽仕召南為大夫佐文王之化男女得以及時詩人歌之周公采而次之國風用之於閨門鄉黨邦國之化天子思摽之績徵其子䕩爼豆乎祭祀賔客之間俾修其祖業裂江南之地封之襲若木之爵都於大庾從孫卉仕王國與栗陸氏之後同封為嘉侯以病坐廢依終南之族不遷遂分南北枝周衰秦一海內大興宫室渡渭屬之咸陽荒淫怠政事皆決于李丞相拔擢同彚凡杞梓楩楠柳櫹楔㮨檍檀杻橿之徒連茹並進封五大夫而黜扶蘇二世降軹楚羽屠咸陽舉若木之族而悉焚之昔之被服青黃丹堊之榮者皆煨燼之末秦尚才棄德而梅君幸無以材稱者伶俜澗谷固自若也雖免于難而蕭條亦甚矣于是南枝獨盛北枝寒落漢一再傳朝錯用事假託臭味疏間骨肉腥穢東南大庾之裔不復登廟堂浮沉于世為醫士染人冶人輩之所敬事曹操引兵迷道三軍病渴䕩之雲仍有名林者避世山澤操詭于衆曰吾引若等見林矣軍士津津然喜躍名重當時尚如此嗣伯華者卒不偶于三代盛時歷漢魏亦無聞人當宋文帝時陸凱于江南見名春者字一枝玉立瓏首驚喜嘆賞采而驛薦之上國天下始知名又有名莊者風姿清麗尚武帝夀陽公主副笄六珈充耳琇瑩光彩莫比時人榮之然伯華之風流醖藉髙蹈塵俗蕭散孤特喜徜徉於深山絶谷斷橋流水竹籬茅舍之外與雪月爭妍雖與徂徠十八公渭上蒼庭筠為莫逆之交然二子者徒耐嵗寒不改其操當是時英彩煥發清芬滿天地二子拱手下風不敢班也後世乃有如莊者慕富貴失身帝王家伯華之家聲頓減一宗含垢長往唐宋文貞公鐵石心腸為時端人伯華之枝始有出而與之交自是騷人詩士爭先延致茍非其人語言無味也至我本朝如蘇黃輩傾心從逰播之歌頌惟處士林和靖有暗香疏影之句識者以為善於形容夫以氷清玉潔之姿雅度孤標與騷人詩士酬風酢月於荒寒寂寞之濵聲音氣味之孚感宜也自三代以下未與有道者交也引而置之莊嶽之間自伊川程夫子始夫子中興聖學英才萃門嘗進梅生藻而與之言曰子知萬物之榮枯乎此陰陽升降之大節也然逐枝逐葉自有一榮枯蓋各有一乾坤也藻曰物物各有一消長亦不外乎一大消長此理一分殊之謂乎夫子莞爾而笑曰藻也始可謂言道也矣梅生得聞大道之要頗有矜色同門有龜山楊先生者深戒之俾其好藏清艷由是涵養益粹紫陽朱夫子一見如故人有尊中句裏說盡心期之語南軒張先生識於長沙王令尹坐上自謂平生佳絶無以踰此往往因伯華而思仲實慨然懷古於鼎味之中遙遙世胄人咏其德久而不忘根深本厚者如是哉東海之外真臘之墟有隱士者黃衣紫裏清馨亹亹襲人慕梅君之令聞願為假子風骨絶不相似世人安之而未察又有名梁者世傳其嘗佐禹治水能興雲雨越人祀之其言荒誕君子不取也史臣曰梅氏之先有二族一在商末封為伯以忠誠諫紂為紂所醢屈原賈誼深悲之漢成帝時乾綱解紐九鼎將移南昌故吏名福者乞斬佞臣頭而姦邪為之縮頸至我宋有名堯臣者與六一居士為金石之交以詩文稱而忠諫不逮吁何其寂寂也伯華仲實之後晠衰不齊毋足怪者獨以愛華棄實之際于此可以觀世變近世好竒之士又訪梅君之長老耆厖龍鍾槁項而黃馘者爭貴重之華實之衰不問也此又世道之一變後世鼎鼐不調尚僞忘真至以鼻吸斗酢為相業獨魯咸子孫衍裕於天下廟堂之上日夜思所以重其聲價為國家之大利乃以回天下精淳醲郁之味以養民生日用之和為不急之腐談嗚呼人莫不飲食也鮮能知味也託物作史以文為戲自韓昌黎傳毛頴始當時貪常嗜瑣者呫呫然動其喙笑以為怪惟柳柳州竒之又有革華傳非韓筆法它人竄入無疑至坡公又作羅文葉嘉黃甘陸吉江瑤柱俱傳屏山劉公亦有蒼庭筠傳李忠定公又有武岡侯文城侯文信侯三傳亦各有寄興焉豫與大庾公託契舊矣病暑無與語遐想風致為作世家其源深流長有不容不盡著見者未必怪也終自愧其常且瑣耳魯齊集卷十四
