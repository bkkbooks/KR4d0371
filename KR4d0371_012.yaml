body:
  text: 魯齊集卷十二宋王柏撰題跋書仰觀圖後昔在帝堯命羲和厯象日月星辰以昏見之星定四時之中其義審矣聖人創法之初亦立凡例欲後人推而通之蓋舉其中氣則孟季可以類見此南面之占法也於是帝舜又北面而占之以昏見斗杓之所指以齊七政只一句而四時十有二月月有三旬其占俱備其法益精此所以天象之圖南北各異不可合而為一也後人又分二十八宿定為四方按以四時往往穿鑿而不得其說蓋地之體方故可以東南西北而定天之體圓動靜無端運行無始何以截然命之曰此為東方之星此為西方之星乎月令占以昏旦比堯時可謂又審姑以仲春言之日月㑹于奎此降婁之次也昏弧中旦建星中弧則輿鬼是為鶉首之次建在斗上是為星紀之次以何為東方星乎古人未有以夜半占者茍能當于子初考定則春九十日之星次苐而見是為東方之星也他時亦然間嘗推之古今厯法莫難于度數之一黃道之分二事定則推步不差矣豫嘗有厯議嵗差議象氣議凡三篇當綴于此圖之後丁巳夏蘭江金吉父與希夷姪孫夜觀天文辨星象求其圖之善未有如此本之精者因手摹之併題其說于後云跋東村得朱子帖考亭設教多士景從登門而問者類録其語修書而問者則條其目然記録易差手筆無失也吾鄉如月林潘公之子端叔恭叔半山潘公之子文叔皆在弟子列尺牘條答見于文集者文叔公獨少止書三答而已此卷所有者皆在焉最後一書則此卷無也僕每讀到悠悠度日永不到真實地頭光陰可惜既以自嘆又不能不以世道人物為憂也未嘗不聳然流汗子孫不能保愛流落於人間固多矣茍能於言下省悟亦不異於及門也觀者其毋忽跋朱子與訥齊帖訥齊趙公登朱子之門為最先其後逺庵昆仲相繼而進開之以道義締之以婚姻往來尺牘其多可知見于文集者訥齊止二通而已此帖亦不與焉今以辭語考之實慶元丙辰先生乞改正從臣恩數之後沈繼祖未上疏之前也當是時國論大變善類奔波海內震駭審觀此帖不勝感慨其餘則家庭間真情實意契誼藹然寶藏宜謹後七十有七年當咸淳壬申之冬訥齊從孫某來赴保寧幕出以示其後學王某敬拜手書嵗月姓名于后跋徐毅齊帖咸淳壬申之冬豫畏友通齊葉仲成父出示毅齊先生徐文清公遺其先正監丞都運之帖一巨軸後學王某肅容敬觀藹乎仁義之言也確乎朋友之義也枌榆之人物尚盛也縉紳之公論尚明也其於出處輕重之間講之尤密視民輕則為己重為民重則視己輕簡而裕辨而正事關父師情深誄些豈止為家庭之天球𢎞璧而已所以嗣先德存大範鎮家乘也發舒融暢實有俟于後人跋曹昌谷敘荆門遺事開禧初姦臣柄國啓釁開邊一時附和者枵然無逺略無一事不欺誕也何止荆門城築之事而已不有諸賢峙柱激湍以去就爭國勢其危哉昌谷曹公亦有感於漢陽之辨故書之為甚力此實有關乎邊備之大計豈一家之私寶乎後四十有七年監丞都運葉公之英嗣由庚示其友人王某謹拜手識于卷後實之蓋公之字云跋字韻鐘鼎甗釡槃彛尊爵之欵識罕傳于後世而籀篆寂寥六義荒墜斯變小篆邈變隸書二人雖同時而斯猶有所宗也邈則無復絲毫籀法矣隸轉而楷楷轉而行行轉而草行已不莊草尤放蕩世變所趨淳厚斫喪可勝言哉楷書首以元常稱惟江左諸賢頗得之至隋唐其法漸壞歐虞禇薛顔柳諸公皆不能逮也今之學者不能推其原以復乎古乃欲炫其詭以揚其波蓋部分偏旁俱壞於能書者之手取妍好異惑亦甚矣後有作者必將以六義正之偶見屏岩上人集字韻而有感遂識于後跋先訓右嘉泰癸亥先君班改在京時賜某之字此蓋小學之教先致敬於言動之間告戒諄諄祝望甚切未及聞詩禮之訓則先君已棄不肖孤距今六十有一年矣艱棘顛危上辱先訓幸延殘喘大有身分未了之事何以見先君于九原嗚呼無恤之簡雖存鄭公之業莫贖悲乎痛哉咸淳癸酉十月朔再加裝整泣血拜手謹識書先君遺獨善汪公帖後先君少有大志中年慨然以單騎遊荆楚入武當幕雖國家和好方堅無以經營謀略亦遍歷邊徼弔春秋戰國之遺跡訪靖康建炎之逸事如地理之近逺形勢之險隘敵情之隱微邊防之踈密如指諸掌見於簡册形于書問者多矣某幼罹荼毒不能搜訪僅得此一帖大略可見今正恨襄樊失守人物渺然蓋于安平無事時士大夫念慮不及此一旦事變之來莫不束手無策作此帖時實慶元己未距今七十有五年矣感今昔之盛衰為之永慨深慮散逸略加整固附于先訓之後云跋汪公祭文公諱大章字時晦與其兄時法公為先君莫逆之交公獨後死克享上夀哭先君之辭甚淳而實非他人所能及于是藏之惟謹公之遺墨尚新俯仰已六十餘年感念疇昔為之泫然先君交逰至公于是盡矣悲夫跋櫟庵潘公帖公諱友文字文叔半山翁旬之長子也半山與大父為丱角之交公以契家子相過從書問甚多今存者五帖而已公嘗登考亭之門亦有答問近為好事者所有矣悲乎傷哉跋信州使君李公帖公諱知微字中甫莊簡之長孫也嘗為吾郡録曹登麗澤與呂門諸友甚相好也賢譽藹然後以愛女歸于我季父少尹而孫女又為易岩兄婦書帖往來甚密今僅存此三帖於散逸之餘于此亦可以想像其氣樂易也跋果齊時公帖公諱闕字子源自其先登麗澤之門而公又師事朱子有語録昔我先姑生于臨江校官之舍後奉公之琴瑟公亦分教臨江遂作氷玉堂簡帖往來固不可勝數今止存四帖跋史君梁公帖公諱安世括蒼人公之大父家頗富教子讀書甚鋭一日有劍客過門忽令諸子棄所業而學焉莫不怪駭久之睦寇大作諸郡殘破獨梁氏率鄉人共保守出與之戰屢捷卒全一鄉賊既平復命諸子讀書公遂登第仕至郎官南澗韓公銘其大父之墓云先君勾稽青田登公之門亦以先契故以行第稱先君系之以賢契友則其齒德俱尊矣餘此五帖亦見其相與之真情近因朋舊訪問其家世似亦不振云跋陳中書帖公諱希㸃昔為學官時先君得其書慶叔父銓闈之魁中言時兄之數見問大愚之官況當亦呂門之朋友其帖餘七耳跋鄭大卿帖公諱如岡與先君始闕也故有傾蓋如故臭味之同之語亦及大愚之姓字必嘗師闕矣後嘗知鄉郡豫少年不敢見之蓋不知契好之始終也帖闕其二跋銅官三公帖昔先君之宰銅陵闕開禧用兵之時防江之備甚密流徙之民無綏政亦勞矣柏闕得以目擊其大略一時書尺盈几今不復見止存三公之帖闕代張公于湖之季也書詞爛漫習乃兄之遺風而無法度其書慰先妣先叔之喪而已太守韓公諱茂卿倉使王公諱柟亦相與探問邊境之消息形于言詞殊無長官待屬吏之傲亦賢矣跋李侍卿五公帖李公嘗受大父特達之知此交訊於初登朝之時後知鄉郡篤敘甚厚僅存此數帖於敝笥滕朱二公契好皆深索諸叢雜各餘其一孔山三帖乃臨江叔父之所受先君不應無有也一詩一詞銅官餞別之貺云先友尺牘總跋先君端方嚴介擇交寡與然久要急義無愧古人某為兒童時常侍獨善汪公呈秀汪公無虛日自先君即世故交亦相繼淪謝猶得拜櫟庵潘公博士戴公白石錢公餘皆不及拜其履舄矣當時書尺後皆類成大軸如二汪公夏公戴公皆已歸其子孫矣諸父書問亦然凡今所存姑表契好之大略此皆不肖孤不能保守遂致寂寥泯滅不得傳于子孫則其繼志述事之責可知慨其永歎嗟何及矣跋麗澤諸友帖昔東萊先生呂成公講道于金華四方學子雲合而影從雖儒宗文師磊落相望亦莫不折官位抑輩行願就弟子列況止齊水心年實下之固心悅而誠服非貌敬而面從得時止齊與大愚之帖謂哭郎中先生其言不可誣也白石不及登成公之門而師止齊止齊既為成公門人則白石行輩又降一等其後作文但欲尊其師而與成公並稱幾于無忌憚由是橘坡王公力辨之所以正人倫之分厲風俗之偷也古人于行輩最嚴於師弟子為尤重蓋人生三事師與君父一讀昌黎之師說則知所師者道也而不計年之前後此與長幼之序並行而不相悖者乎近世無求道之實心而好人之諛己也先生之稱交口相說心實不然不以為非亦不以為恥於是先生二字輕於一羽矣可勝歎哉水心之帖致問同門諸友於叔度獨稱曰丈以其年德之最尊餘皆兄之如曰德章公謹仲益憲甫溫仲日强敬仲伯廣叔昌仲謀凡十人情義繾綣且恨不得長相從也師門之敬亦篤矣後九帖獨善汪公之尺牘也諸公皆有聞望於時汪公師門篤實君子也觀其交際可以知諸公之情觀其稱與可以知獨善之德惟呂公泰然自悔學問剝落殊少振起及黨禁方嚴獨上書斥托胄之姦至杖流嶺外不憂不懼及托胄誅朝廷官之則已客死矣白石為志其墓而聞者竦然麗澤私淑之功其可既耶因有是帖而後及是人云跋曾樂道帖公諱槃雅望甚偉善筆札大愚夫人同氣也獨善左右大愚在貶所往來問勞甚勤大愚終于筠相靜軒奔喪護其師則獨善之季呈秀公也故有一門節義之感是時獨善同行歸則橘坡往後則呈秀公終其事曾公以手足之情不容不拳拳也跋陳鄭答問目亡友汪君元思諱開之條問二公之目有二公親筆答于其後元思蚤亡遺書存者百無一二其父死始得此二卷於塵網中豫平生視元思也深有愧焉元思未離小學即罹家難蹤跡茫昧不可尋意其必至流落矣丁亥之冬忽得其詩二首驚喜過望然後知其寓止豫往訪之於循理廣教寺之門側大布之衣襲之以紙栖栖一室文集數種在几議論確然有守一洗世俗輕浮纒繞之習自是招其入城府尋再世之契豫賴其切磋之益甚多同志翕然願與之交君又能叙先世師友之舊遍求當時名公而參請焉如船山楊公克齊陳公毅齊徐公直齊錢公皆嘗叩問或登其門或拜其書劬劬不倦後遂得壻於撝堂劉公之門晚又遇三山鄭公存齊諱師孟字齊卿専叩通釋之疑甚詳既而鄭公終於郡齊久之元思亦不起疾朋友斂之而欲遂葬焉其父堅不從越十餘年其父死朋友然後得與同窆其父子叩其諸公遺書俱無有也朋友悼之甚哀豫獨思之久而不釋豫遂追述其懿行狀而求銘於北山何子恭父以附不朽於北山何先生之集云適莊友于帖跋某自幼被先兄撫摩教詔之恩非言可盡嵗晚同居友愛尤篤平生罕離侍下書帖甚少有時更唱適意而已暇日為某書聖賢格言大字無非教也又小楷書太極圖說通書西銘易傳序春秋傳序又書韓信登壇問答草廬三顧問答王朴上世宗策共為一集以為學問功業之勉某崦嵫甚迫深恨無以稱且約以生既同一門死將同一壑又書懷原二字表之自古友于之愛生死不忍相舍者鮮矣詩詞一軸姑取一闋書于前以先兄期望之意回授後之子孫云跋東峴帖豫少無雅問而婚於東峴之樓風聲氣習亦恝恝乎其難入也室人之從妹壻胡君恭叔諱景聲嘗薦於鄉貧依于甥館處之終始無間言只此非豫之所能及也亦嘗致書餽後入城見顧風度淳確議論醲郁臭味既同交情日固其終也了然而逝求其遺帖凡三十有七藏之惟謹豫之妻祖克享上夀中有一帖致感謝之意甚篤此亦君之餘風也嗚呼賢矣跋南山倪三愧帖豫因見北山而識叔行因叔行而識孟陽因孟陽而識其二兄孟容最長主家嚴毅每聽豫之言與二季評于既退之後對坐肅然少唯諾時然後言堅確典刑一鄉行其言而未嘗有失孟德純實寡言始亦未相孚也久而後相契縱談劇論無隱情亦無世俗矯飾之為孟陽清介廉直仕塗有聲惟長公得天者厚既夀而康寧且多男子二子收大名迭登朝列赫奕方殷孟德僅至中夀孟陽最不得年豫每謂叔行孟德孟陽三君皆非今日世運可亨者宜其困窮而長往也慨斯人之寂寞而斯帖之僅存交道日險論學取友之事益落落矣如之何而不于此長太息也孟德風雅質疑一卷附於後其子明原以墓銘請豫不敢辭為志之于石云跋何無適帖君諱欽字無適北山先生之嗣子也天才不羣有晉宋之遺風焉豫得其帖甚少止二十有五遺硯帖其絶筆也豫不敢受姑勉其意少留數月將面還之未幾君死矣方恨無所歸適元鼎令豫作書與趙星渚求題墓大字遂以此硯將誠又得君銅爐一蟾蜍水滴歸其女矣止有遺墨數卷而已跋徐彥成考史豫為學之初志不立不得明師良友導其進修之方不過求於詩史竊其華藻蓋鄙陋之譏直淺之為丈夫也是時表姪徐彥成名順頗熟于史而好談兵每與之劇論其人嚴冷矜持非特為豫之益友亦豫之畏友也方從師於王德固之孰見朝野雜記假以示豫豫喜甚質錢傭工以抄寫未幾又示以文公語類豫驚喜如獲異寶方悼部帙之多難於盡録吾姪請助豫抄之抄且過半豫於是始知聖學之正塗入門之次序此意未易悉也他日就正于撝堂船山北山三先生之門蓋已粗識伊洛淵源之大略矣未幾彥成暴卒豫悲痛不能堪每見其遺蹟未嘗不為之酸楚噫昔豫妄集陽秋小編品論中興人物吾姪為之考訂精確周密即此一卷自足以見其學識之逈異也豫自覺此編之僭率雖已焚棄而此條論尚存故篋為之感嘆書于後跋劉楊二先生帖撝堂提孟子將以二字大有餘味昔猶未悟今始知之二先生雖皆登考亭之門而未相識也撝堂為豫作魯齊銘船山見之既稱贊宏毅之說而病孟軻秋殺之一語謂撝堂之壻汪君元思曰不若改作孟兼秋殺撝堂亦嘆服其言而未及親改朋友切磋一字不放過義當如是其餘帖亦皆鞭辟豫者甚至且循循善誘不激不隨尤拳拳以看語録為囑意極忱篤每觀衆帖如日侍杖屨於滄浪之上嵗月遒駛今四十年矣豫亦垂垂暮景學且不進有負深期不勝愧嘆皆前卷所遺今共為一軸以識吾過跋寬居帖君諱子舉字師尹少年以英邁之氣挾麗藻之詞談笑功名之場中更排根始就收斂闖北山之籓籬探伊洛之旨趣移以北山書為介紹下顧豫於陋巷之中自是交逰十餘年敬愛無斁丙寅莫春忽得君之遺領往哭之明年暮春得君之壙記哭君夫婦之喪於摩訶樣授之以挽辭豫之情備見于此矣歸而訪其遺帖凡二十餘紙間以一二見於雅藏録云跋介巖潘公帖公諱墀字經之仕至祕書監以修撰華其歸公之喪以病不及往弔公之葬不知其時又不及挽其車而哭幽冥之間負此良友因整比其遺帖繫之以辭曰繄戚畹之柄國兮倡僞風以賊夫天德賴星靈之下燭兮亟移柱而調瑟正氣傷而未易蘇兮學問之原難一豫方杜門陋巷兮神營營乎紙上之遺則雖丹溪之弦誦洋洋兮恨求道之不力幸朋友之意氣感孚兮一見如平生之舊識譬諸草木同臭味兮有不求而自得柔兆敦牂之嵗兮維夏之日別誠求于淨明之蘭若兮同門畢集有美一人兮氣肅而貌晳凝乎其觚兮不偏而窒淡乎其靚兮絶去雕飾是曰介岩兮聽其言而充實曜靈遙遙兮健而不息再㑹于嚴子之故鄉兮樂得朋而欵密君翺翔乎中祕兮壯資善之羽翼亦胙之以茅土兮兩駕熊軾暨息影于蒼山之麓兮景翳翳以將入柴車闖門兮庭宇閴寂勉勉言笑兮若有味乎枕席嵗律甫換兮感訃聞之孔䀌我將匍匐而往兮兩足如縶慿瓣香以致唁兮東望涕泣吁􅐵哉前乎聖哲之不我待兮後乎賢者之不我接薰者未必夀兮蕕者未必折幸同志而同里兮又不得漸摩于朝夕何㑹君之不數兮復棄豫之甚亟思君無以為懷兮孰論心而自釋攬遺帖之炳炳兮儼若見乎其玉立倐莫色橫空而來兮聽雨聲之淅淅跋蜀帖嘉定初鶴山魏公首請周程之諡其發天理正人心所關係蓋甚不淺其後鶴林吳公亦嘗曰河洛輟響斯道荆榛朱先發孤咏于朝陽洞析微義以告後學必羣居相與講明而求為至當之歸二公皆西州之士而學得其正如此豫每愛其文而不得識其人也後乃得識平舟雲山亦西蜀之珍而學皆有原委昔平舟守吾鄉矣每一門必揭二句曰十二時不忘恭敬三萬息皆要和平自修工夫可知也首屈千乘訪豫於陋巷既而以厚禮聘豫於麗澤後以寓公議論不合而止臨行豫請其一講而去公巽謝且恃天時人事之相符後招豫於上蔡拳拳留其歸趣其來始終如一今亡矣雲山之父南疇公嘗師晏先生亞夫諱淵有文集雲山後卒業饒雙峰諱魯之門其宰臨海也惠政藹然即以同門見稱意甚勤篤既而有位于朝出守於台朝廷委以救荒之政盡瘁而終上以其廉貧賑恤之典甚厚暇日聨二公之帖以慰髙山之仰嗚乎參井之墟既以淪陷蜀士之落南者尤恨未盡識也右平舟二子西賔趙曲溪嘗遣至書堂其姪源為臨海尉嘗見訪其族見山名文仲尤相豫厚遣子就學齊職張達善䇓亦蜀人跋趙星渚帖韓昌黎曰白頭如新傾蓋如舊顧意氣之何如曷時日之足究豫嘗為之言曰此無他特一知與不知耳昔吳公子至鄭見子産如舊識即有縞帶紵衣之交贈何也蓋季札知鄭有子産子産知吳有季札久矣是以深相孚于未見之前意交歡于既見之後堂下一言亦先知鄭之有蔑也坐間少異亦先知溫之有嘉也昌黎又曰士之修身立節而竟不遇知己前古以來不可勝數或接膝而不相知或異世而相慕以其遭逢之難故士為知己者死吁此正昌黎之病根也士之修身立節為士者之所當然知不知在人何足以嘆遭逢之難哉聖人曰人不知而不慍不亦君子乎又曰不見是而無悶斯豈非學者之大戒豫踽踽陋巷朋友雕落言之而莫豫聽也倡之而莫豫和也不敢與世混混相濁若可慍也然有尚友古人之一路豈不在我壬戌之秋忽有軍將打門傳示天台使君之書恍不知其所自觀其姓名乃果昔聞于朋友而欲見而不可得者蓋招豫主麗澤書院之講席豫欣然從之吾道之將行將廢豫不敢知也以未見之人有相親之機亦人情之所共樂然其相與之厚相敬之誠亦事理之必然何者以知之非一旦傾蓋之比故應然耳茍無因以㑹面亦不害其為知也觀其遺帖可以見其真情矣壬申之春忽聞其訃豫涕泣東望拜發其誄詞歸而搜諸遺篋得其帖為一卷時展玩焉未見其為死生之間也跋趙傃軒帖公諱希悅文公之甥孫昔倅于婺不欲見之及為守乃䝉下顧為上蔡書院趣豫之行一再招飯言論典刑無一俗語氣象終與人異後以庾節去後専介於書堂相勞問甚篤迫嵗而歸竟不及一造黃岩以謝之公之喪僅能以書弔而已其子與科以行狀見諉豫以編遺事疏甚不敢承命跋韓初堂帖君諱境字仲容相臺之秀寓居于越嘗以架閣言事貶於婺稱適莊先嫂為姑而篤親誼焉議論磊落可聽詩書筆札皆工豫以詩凖翼與之即能頓知其本末形于謝帖其胸次已加人一等宜其眇視一世終于再貶亦可傷也跋林宗山帖君諱拾東嘉人與初堂同貶於婺因初堂而識之二人趣向大不同一未忘富貴之餘習一不忘儒素之清風荷其相與之意頗真後趨朝聞麗澤之擾擾戒以勿為已甚不失於君子之厚尤相愛也自其入言路則不復通姓名矣後敬岩君玉皆其彈也自以為恩焉跋蘇愚翁帖君亦居東嘉嘗參保寧幕既而攝金華令相與之意亦真後不堪征賦之令迫飄然賦歸歟而去上官留之不從親舊辟之不出時得其書以慕庵記好生録序見囑道謝之詞甚謙其死也豫酹之其子朴乃以墓上之碑囑豫勉强綴輯未知其果入石否跋趙草巢帖君諱必叔天台人初來為義烏令首來訪豫從者不識而差池余知訪焉一見略去岸谷如故人自是情分甚密與余同庚而月長余之辭聖則也以臯比遜之徘徊久而後至不數年而謝世矣余専介酹之觀書詞氣象坦夷和易非世俗能勉强而企及也王石潭帖跋君諱賁天台人介特有守隱居于頑惡之鄉習俗化焉不敢為非王實翁之創上蔡書堂也欲求領袖無策以勉其出乃置一社倉於其鄉令鄉人自求一賢士主之一鄉之人咸造其家致請君遂欣然出見實翁受條約實翁言其情懇其將書幣請平舟為山主星渚為堂長二公皆領略既復命即歸于故棲不再出矣後星渚竟代實翁為郡乃聘豫而至久之始具古服執弟子禮來謁豫敬其氣貌儼如三代之人物也自是情相浹洽吐露心腹無隱及豫將告退也欲得君綱領一堂乃具書幣對使者拜發乃勉强至堂三兩月而已及其死無以斂門人爭經理其喪至於葬道有兩岐一大而逺一狹而近門人請于其婦婦曰先夫平日不曾由徑不可違其志聞者嘆息曰有是婦哉君之德益彰矣因拾其遺帖并及之以為有志者法林省吾帖跋君諱正心學雖無師承亦以科舉為業乃能博覽群書非取辦于黃册故粗得其大略著書授徒從者亦衆連三舉於鄉及入太學乃屢垂翅而歸自實翁之經理書堂也君始終與其事聘之為堂正及豫之至君不來矣及豫至者三君始來謁望之儼然玉立如泥塑人已可敬矣退而省其私始終如一非一朝一夕所能至尤可敬也與之語則坦然明白出示心腹略無隱情豈今世俗所望而有也直宜于古人中求之乃不得年而死車君玉峰以書來囑豫志其墓豫不敢辭終不足以發其潛德也跋胡怡堂帖君諱夢魁淳安人來為東陽簿入郡幕忽來訪豫其人耿介諒直其言醇謹質確大有古人之風其聲如鐘然兄弟相隨怡怡如也故以名其堂於豫敬待如親故更無岸谷相期待者無浮詞無非吐出真心仕塗坎壈處之泰然三代之所以直道而行也於君見之或問其堂之在何所曰隨身云大安迷道詩跋端平乙未九月六日往拜船山先生楊公于蘭江之大安中涂不審所向屢迷屢復因成小詩自警而辱諸友和焉易嵓兄立齊姪亦有作也久不見此卷矣己巳夏姪孫璞忽以見還恍然如前日事倒指巳三十有五年和者今悉亡矣感嵗月之滔邁悼朋友之零落傷學問之無成而隻影之伶俜也嗚呼悲夫後之見者其亦有鑒於斯云鄭文振帖跋鄭公文振諱南升建人受業考亭有語録時考亭弟子多登先大父之門大父為閩曹時先君為青田簿故不識公及先君以大父行狀求銘于朱子亦納于公而回帖如右且言閩中之政不止一鹽事恐有未盡者其知大父也詳矣二帖偶存亦可寶也跋如山東坡魚枕冠頌坡公八􅙘玲瓏天機飛躍矢口成章視佛語何有哉一超直入三昧現前借渠拍板門槌逢場作戲耳後世以公為好佛是不得其情者自古知道之士未嘗不闢佛其徒怒且怨公慢佛亦甚矣其徒反歡喜讚嘆尤為可笑若此魚枕冠頌雜入大藏中佛亦不能辨也與六馬圖贊同此一機方坡公之授朝公授藥寮也雖當中原極盛時此紙方罹大禁藥寮于喪亂流離而不忍捨其深愛可知咸淳癸卯人日如山出以示僕距元祐癸卯巳一百八十年矣豈真有龍天護持乎因書於後云跋東村繹山碑東村趙公出示繹山碑屬豫綴名其後此固豫之幸也而未得其說徐而思之好古者先當以其人之可尊次當以其事之可傳又其次始以其字之可法耳三者咸無焉雖古不足貴也此碑徒以其篆之古也然登繹山者不見其石著史記者又無其詞踪跡茫昧不可致詰自唐已有棗木本徐騎省模唐刻于後今不可見矣徐文寶刻于長安者亦不易宋公本今刻于墨妙堂者正與此本同自騎省以下又三橅矣所謂雙鉤者亦隱然可見趙東村謂此雖摹傳之餘然亦自可貴此言為不誣云跋葉氏家世墓銘後興滅繼絶聖人之盛心治天下之大政也慎終追逺故民德亦歸於厚甚矣世俗之偷也無所為而繼絶者千百而不一二數吾見其人焉不可以無紀婺之蘭溪知吳縣葉公諱誕師東萊先生呂成公先生為銘其父之墓先生之季忠公為銘其母之墓二親足以不朽矣吳縣不得年而未有銘其墓者猶有冢子諱紹彭志嵗月於幽宫冢子又不得年生于乾道壬辰卒于慶元戊午葬於邑之金氐塢言行堙蕪而不可考後四十有餘年其弟諱大同始命其幼子元煥嗣之且無寸土之可紹曰能明義利之分則吾兄真有後矣偉哉公之識乎世有繼祀之訟者可不愧死益見吳縣家庭之訓久而不泯如此元煥追念所後無傳俾僕粗述其顛末僕生也晚亦不及接侍音容何敢僭列于二先生之後然奚以它求公娶王氏僕之諸姑也堅誓柏舟歸死於婦家親黨樂為之銘觀諸此則知其夫之刑于寡妻者有其道敢以是拜手書于後云魯齊集卷十二
