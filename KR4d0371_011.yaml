body:
  text: 魯齋集卷十一宋王柏撰題跋跋道統録立天道者陰陽也立地道者剛柔也四時行焉百物生焉此非天地之道統乎聖人以仁義設教為天地立心為生民立道所以繼絶學而開太平此則聖人之道統也道統之名不見于古而起于近世故朱子之序中庸拳拳乎道統之不傳所以憂患天下後世也深矣昔陳君平甫請于張宣公本六經語孟遺意將十四聖人槩為作傳而國朝濂溪河南橫渠諸先生附焉洙泗門人至兩漢而下及程門諸賢凡有見于道有功于聖門者各隨所得表出著成一書宣公遜謝不克堪曰若裒類聖賢之言行聚而觀之斯可矣雖有是言而未有是書也後幾百年天台玉峰車君始成是書理其緒而分之比其類而合之曰大原者統之體也曰明訓者統之用也曰分紀者統之序也有經焉有傳焉有史焉可謂善繼朱張二先生之志而述其事者也嗚嘻偉哉書乎所以間先聖之道而大一統也矣使近理而亂真者不敢與於斯云跋時遜齋遺言豫生晚不及拜遜齋時公少年識公之名字於考亭麗澤二集中後聞公之言行於公之子若孫起敬之日已久今始得拜觀公啓手足之遺戒嗚呼是豈勉強者能之乎死生固大事也亦常事也不以死生怵其中垂絶而精爽不亂者非平日有所養者不能觀其屏絶釋老治喪一依司馬書儀可謂得其正而斃者于此可以驗其學矣勉二弟加意養老悲哉孝愛之至情實著罔極之恨於言表使人泫然出涕又公之跋若未滿而實深與也挈齋以其季之賢為公不亡而未知其子若孫克世其家而孫曽頭角已嶄然流慶益未艾也若公者真可謂不亡者矣跋朱子與時遜齋帖昔紫陽之門四方之士雲集不旋踵而倍其師説者亦有之未有一再世之後而能守之而不變者也科舉之壞人心猶未若今日之甚而朱子當時已諄諄言之豈非遜齋後知自悟必有以叮嚀告戒其後人所以東阿遁澤俱廢舉業於少年蓋此帖有以啓其秉彛好德之良心也今之士者方攘竊紫陽之緒言以求進取之利者紛紛皆是觀是帖而顙有泚者猶庶幾乎仁心之未亡也跋麗澤遺文録後遜齋昔嘗羡里之藏書母夫人欣然出簪珥為致書費曰吾家非窮空特欲汝曹異時見此不忘吾此意東萊先生常志此語於墓今觀麗澤手書遺文密札細字粲然於緣督書局者幾百年矣豈非先生嘉其母子之志以成人之美者乎子子孫孫猶不可忘此意也拜手敬觀書其後以歸之跋季兄大學編大學之編明白整潔悉落窠臼非用工深者未易到豫交季君之日淺觀其辭氣宜未稱此編者何其善於韜晦也為之驚異且自愧知人之難性翁問曾見小學否實言外之教云跋汪約叟髙安紀程後慶元縉紳之禍豫不忍言也今又拜觀約叟汪公紀行之卷而重有感焉蓋大愚忠公之謫也獨二汪公著始終之義長公裂裳裹足以道其行少公舉舍擕孤以護其喪嗚呼是豈不足以增天倫之重哉天倫有五惟君臣朋友以義合友朋者又君臣父子夫婦長幼之所取正者也於平居相與講論者易臨變故不顧己私者難至於斥權姦而敢言扶禍患而勇往則平居相與講論其可知矣嗚呼大愚公之忠既已昭白於後而二汪公之義尚未大顯于時豈非後學所當發揚者乎二汪公皆先君子所敬愛之友也豫自童丱蒙教誨為甚至敬觀此卷遺墨尚新俯仰已五十年而公之墓木拱矣悚然為之感慨輒記嵗月於後跋張魏公憂居帖豫每觀魏國張忠獻公之行狀見其一再奏疏於謫居二十年之後寢苫枕塊之時忠孝之誠真足以立天地之心壯綱常之本未嘗不為之泣下髙宗皇帝初不以為忤而逆檜之餘孽未殄群吠喧豗而公復貶矣又未嘗不為憤恨今觀公憂居三帖正此時之筆也讀其幸教使不悖孝道之情又足以想其篤厚淳至之素心此又忠孝之本也未知此帖所與者何人而能問公之安否於憂危可畏之時信賢矣哉考其嵗月則紹興乙亥之夏至今寶祐甲寅正及百年吁綿竹之塋域何在今方兵連禍結其存亡未可知而公之後復冥漠而不振讀公之帖者必有感于今昔者矣嗚呼悲夫寶晉小楷跋寶祐丙辰元夕後五日邵君出示米南宫小字詩稿一册再三囑豫為之序豫不善書何足以知此寶晉之字幾滿天下而小楷不多見濃墨大書以逞其逸邁竒倔之勢是其長也人亦以是愛之至於蠅頭細字而間暇平安篇什雖多而始終如一何此老之不憚煩也非故態時露一斑幾不能辨靜軒先生所指其精神風格亦正在故態中若夫收藏跌宕之氣運功於毫芒如觀魚紫硯間而甲胄森然如走馬蟻封內而動中規矩此寶晉之異事而豫之所獨愛也邵君又言其所自來得於米氏之子孫此固其家藏之物無疑子孫不能保而他人是保此不足深怪政不必子孫保而得它人常保之乃所以為可貴也邵君力學自好其所保者何止此哉豫將次苐而請觀焉題九老圖後唐有洛陽九老圖傳於世久矣我朝洛之諸公繼者凡三其二圖形于普明僧舍蓋樂天之故第也元豐中又集于韓富公之第凡十有一人圖形於妙覺僧舍時人謂之洛陽耆英圖此則普明之本亦九人對奕者文潞公司馬溫公觀者富鄭公舞者趙公正南諱丙回視持書人則王公君貺諱拱辰也餘則忘其姓名矣此乃花溪胡氏表所摹當時已誤書棋局為戲笑今四十餘年憂患薰心笑不上於眉端欲如往時不可得而此書亦復流落廢棄於道左見之惻然收而表蹄之書其本末于後時展玩以自警後之觀者亦有感於豫言者乎常卿王忠惠公家問跋人主固不可有輕天下士大夫之心也士大夫至為人主所輕盍亦返躬而自責乎吾宗忠惠公自言路劾柄臣而去國屢詔不起死之日猶有柄臣奉公之書久之而俱不啓緘又數年柄臣者敗天子思公之言褒以遺直遺愛表以徽諡錫之土田以恤其孤獨蒙天子愛重久而不替如此今觀公之家問藹然篤厚之真此其所以為忠君愛民之本若公者非特一宗之瑞一鄉之瑞實天下國家之瑞天之未欲平治天下而不夀公嵗月逾邁使公尚在始逾六十非止宗黨之思有識者莫不思之至於天子亦思之後千百年有思公而不得見者得見此帖猶足以慰其髙山仰止之敬希夷其謹寶之跋朱子帖第八卷寶祐丁巳夏六月得此卷十有一帖于昌父弟得之於針奩忩牖之間使人遺恨感嘆者纍日往往前此所得之帖皆以前後去其素紙而此卷迫切更甚亟加裝蹄尋考嵗月其具位稱雲臺者淳熙乙巳之春稱南京鴻慶則丁未不久也江西臬事之稱則丁未戊申之間皆大父在福建漕臺之時最後漳州一帖則庚戌六月越月而大父已捐館矣此為絶筆之書也追惟疇昔肝鬲酸楚計前後之帖搜訪十有五年猶未盡復一日不謹散逸難收可不愳哉卷中所稱黃壻則勉齋先生也一時筆札之間四句該盡德器可見察之之精道其人於大父不敢不實且言有以教誨之又何其敬愛之兩至也其餘通情無間繾綣周密無書無之子孫苟不知寶護心德已亡前鑒不逺也跋唐致政詩卷豫自兒童時已知有鄉之尊老曰致政唐公亦間嘗得侍杖舄聽話言兩臉如丹雙瞳如漆步履如飛和氣郁然豫固未嘗不起敬而莫知所以請教也後得見公自夀之詞曰君欲問余年八十有七百嵗十分尚留一世間滋味嘗盡酸醎苦澀時今倒食蔗無甜汁豫亦不知為何等語也公即世始聞公壯嵗嘗失明舁置赤松蕭然默坐於山水間忽遇異人兩目豁然自是始歸取科第得祿以養母仕宦所至有聲未衰輒挂冠享上夀骨健神清挺然故家之喬木而嶷然宗廟之大蔡豫因是有感而嘆曰禍福不常得失難料顧所以自修者如何耳方公蕭然默坐時自分病廢百念俱息天君湛然何有于世味則其所以瞽而明養而祿仕而聲夀而健者豈有它哉即此時便是養生之要訣其修身俟命之要旨亦在此也人之所以酣富貴溺聲色傷生喪節靡靡成風者正墮蔗境之甜耳有能咀嚼公之詞淡然太古之餘味可以見羲皇而失安期矣陳氏子元紹一日出示此卷墨色清徑如新跋者已備公之懿行豫不復述止原公所以得夀之理而已後生能保愛家藏而尊尚之志亦淳雅推此志而不倦進德其可量哉跋桐岡書舍記景定壬戌之冬豫始於上蔡書堂納交於玉峰車君而未獲識桐岡於君也一日桐岡之子以玉峰記文示豫三復興嘆噫君之所與是誠君子也四非之言叮嚀忠厚實書舍之坐右銘與子曰魯無君子者斯焉取斯跋董氏族譜遺迹理一分殊之旨每於宗譜見得尤分明人之宗族盛大繁衍千支萬派其實一氣之流行知其分之殊固不能無親疏之別知其理之一則不可忘敦睦之義今獲觀董氏譜諜井分棋布精確簡明必知所以篤其恩義於宗族矣至於寶先世之遺墨愛護如拱璧又必知其所以寶先世之遺體尤謹于愛護者也董氏安得不興乎盛哉題賈菊徑龍眠馬圖龍眠之馬皆少年之筆也初龍眠好畫馬圖馬所在至忘食縱觀神遊於群馬變態之中有一僧語之曰觀君胸中無非馬者得無與之俱化乎龍眠大愳始絶筆故曰龍眠之馬皆少年之筆也人寶龍眠之馬正犯其所甚愳者矣昔有名僧獨愛養鷹與馬人問之曰獨愛其風神峻聳耳雖所愛異於人是亦著物也菊徑世事佛敢以二事告之跋趙逺庵帖右逺庵先生趙公手帖四紙得於撝堂劉先生遺書中某寶藏于笥近三十年及搜訪撝堂往復遺稿則已散逸而不可得獨於挽詩見傳心識顔冉折衷辨師商之句而已又每以未獲見逺庵文集為恨今觀安得三益之會於朋友之義可謂甚篤及池録刪節之語於師門之慮可謂甚深誦理一分殊之跋得龜山以來一𣲖宗旨為甚的未嘗不注心景仰也景定癸亥先生之嗣子工部來鎮東陽惠政藹然某蒙禮遇為尤厚用敢裱蹄四帖歸于家廟之藏拜手書嵗月於後云跋勑額代明招作臣聞人臣之事君功在社稷德在生民死之日國有彛典哀恤之有賻有弔有祭有諡有輟朝之禮有護葬之官有紼披鐸翣之行列有明器範器之名數有崇甃豐碑之式有石獸翁仲之衛又即其梵宇晨昏香火以奉其神靈之遊息皆所以旌表其功德也而寺獨以功德名所以示世世子孫無窮之思恩亦厚矣本朝大臣功德之盛未有出於呂氏之右者自許國文靖公申國正獻公父子相繼輔相兩朝下至右丞東萊公扶中興之運雄勳碩望書之青史書之太常固已焜耀今古加以滎陽公得洛學之親授文清公載北學而之南貽我太史成公寺丞忠公學問淵源羽翼道統兄弟相繼為百世師子子孫孫慶源有衍而未艾猗歟休哉惟呂氏之先葬于太原天禧中文靖公遷祖父代公魏公於鄭州之管城寶元中建寺墳側賜名薦福禪院公薨詔改賜懷忠薦福子孫從祔建炎初右丞葬夫人於新鄭賜寺額曰元淨明招因右丞隨駕南渡薨于桂林暫殯於寓地紹興十六年駕部初葬于婺之武義明招山惠安院又得地於墓之東二十三年奉右丞之柩窆焉自是子孫悉祔于左右三十一年遵先志請於朝於惠安之上冠以元淨二字其後文靖公葬於信之德源亦以永安院請于朝改曰懷中永安之院皆所以遙望上世之兆域以識終天之恨然子孫之精神即祖考之精神蒸嘗祼饋一氣通流固無南北之間也山僧昔嘗備灑掃于懷中永安已勒勑額登之樂石今又承乏于元淨惠安詢之父老寺舊有勑牒之碑慶元戊午燬於火敢不重刋以侈聖朝報功之賜以興故國喬木之思云跋蘇滄浪二詩真迹老米評公之字以五陵年少方之亦太貶矣觀其神韻意度終非南渡後人所及三復二詩尚想幅巾小舟灑然滄浪之上其人逺矣墨猶新也悲夫題碧霞山人王公文集後文以氣為主古有是言也文以理為主近世儒者常言之李漢曰文者貫道之器以一句蔽三百年唐文之宗而體用倒置不知也必如周子曰文者所以載道也而後精確不可易夫道者形而上者也氣者形而下者也形而上者不可見必有形而下者為之體焉故氣亦道也如是之文始有正氣氣雖正也體各不同體雖多端而不害其為正氣足矣蓋氣不正不足以傳逺學者要當以知道為先養氣為助道苟明矣而氣不充不過失之弱耳道茍不明氣雖壯亦邪氣而已虛氣而已否則客氣而已不可謂載道之文也吁若蟠浦先生王公之文亦可謂得其正氣者乎豫學也晚未及識公而豫之族姪侃少嘗師之為豫言公之學頗詳公嘗客諸侯於邊郡數經搶攘之變而能相與備禦計畫周密拊定反側勇往直前真當世有用之才卒不與時偶歸而講道枌社莫不嚮慕固已起敬日久一日得公碧霞之集窮日夜而讀之其詩清麗間雅其文典核有法度於醞藉中得其精實之味尤恨其不得識公而相與從事於斯也又恨其詮次未約猶以少年之作雜於其中貴多不貴精後世文集之通患若考其後先因得其進學之序亦在乎人善觀之而已某不窺荒淺有感公之文而著其正氣之説於後云跋唐侍御家問侍御唐公清德徑操吾鄉之典刑自幼知所敬仰今始獲拜觀公之家書於敦厚謙和之中有剛毅不撓之意言行相顧表裏如一藹然見於家庭父子間之真情誠之不可掩如此夫當孝皇嗣服之初厲精求治從諫如流公於是時以敢言受上知被親擢諫行言聽宜也公已逆憂其甚難何哉今百年矣其難易視昔又果何如也有能如公忘私徇國先辦一去亦何難之足云嗚乎九京莫作感今懷古使人掩卷太息實之能繼世科又能刻苦自勵是豈特顯揚其先烈而已其有關於世道者甚大也不知僭而題於後題呂申公試卷自科舉之法立而鄉舉里選之制壞此無足怪蓋取士之法壞於淫亂之婦人歷數百年聖賢之君不能復此為可恨然猶有可諉曰國朝兼采時望也至糊名之請行而士之進退一決於三日之虛文雖綱常淪壞之人販繒屠狗之輩不必擇也既登髙科則清官要職執卷取償朝廷雖欲不與不可得也取士之法至是不復可言然名公巨卿未有不出此塗者蓋同行而異情耳非法之果善也乃法之大幸也以一二人才之偶得遂謂千萬人之皆然不亦太疏乎凡誣經詭聖希求苟合莫不中選而抱道守義拙于華藻者莫不屏黜是豈法之果幸哉乃士之大不幸也嗚呼因觀呂申公試卷中稱名是法猶未壞也科舉之法不復古天下無可治之理三嘆而書於后古貴人押字跋我思古人嘉言善行不能盡識也每見其一點一畫未嘗不玩味其意趣注心髙仰之寶祐癸丑得此碑於鬻書人異哉人之癖好也何彚萃者不憚其勞何刻石者不吝其費是果何益於世哉豫則因可以觀人物亦可以觀世變蓋古人之押字實書名而花之後世乃不然與其名而不相似直著其心之精微寓于數畫之中字者與人同未足以深知其人押則我之所獨人焉廋哉豫觀司馬文正之押署名而小花既不失其制押之原而精神風致自然見於誠意之表特此法未易盡識之耳以大略言之凡氣稟之重厚輕浮心事之坦夷巇險趨向之邪正力量之強弱皆可見也既押字以得其人又於人以驗其世故自唐末終五季諸人固無足取觀其押字莫不狂詭飄揚傾欹放蕩宜乎亂亡之相尋及我國家盛時諸賢之押何其簡易而平正也君子之於物不以其末而棄之亦必求其本也嗚呼是雖筆墨間至淺事也其可忽諸跋武昌解氏善居圖天地間所可大恨者氣運之不齊也天理固未嘗須臾亡天理之亡此氣昏之也自陽明一染於陰濁氤氳轇轕而陽明不得以自全矣於陰濁之中而陽明湛然不雜者實不易遇故清淳精一之會鍾而為大聖大賢或千百年而一得是天地之間氣也以大舜之聖而頑嚚象均不能同德於一家而管蔡之愚不率德於周魯封域之間於聖賢之外求其世世一德相傳之久固無是事也無是事則不敢輕責天下之人故先王之教厚人倫美風俗者所以不可一日廢也武昌解氏去聖賢固逺矣而能獨得夫淳厚之氣所鍾者衆所傳者逺隱然仁義之遺風豈人力所致哉是亦間氣也歟若謂其不識字故能全其天此有激之云以愧世間識字者可也不然先王之教詩書之澤豈敗人倫壞風俗之物哉何必讀書然後為學此夫子之所大惡也草巢趙君之圖此也知先王之教不可一日廢所以示化民成俗之方借解氏事以興起感發人之良心善性其旨深矣若欲以此表章解氏政非其所願也使其知表章之為榮則解氏淳厚之氣漓矣因有感而書于后跋趙宰先天圖嘗讀康節之詩曰皇王帝伯經褒貶雪月風花未品題蓋直欲以是為勳業為事權比方聖經為古人之缺典先生之詩未易觀也朱子曰康節之學其骨髓在皇極經世其花草便是詩草巢之為編已於花草上見造化更能敲出經世骨髓使天下之民皆擊壤而歌之豈不幸歟跋張氏家傳蘭江張氏家傳一卷豫友伯誠甫之所撰述紀其所自出既詳且尊文有法矣謹家諜而不忘其先塋此孝之大者也敬觀其本末蓋自深澤至于瑞壠積纍豐厚而其所以致富者以躬耕為本一再傳則又以儒學顯而其所以為學者以信古好義為本張氏之晠也宜哉無其本而望其族之昌大固無是理伯誠之季今又以世業薦于鄉書種之茂未易量也祭義曰古之君子論撰其先祖之美而著之後世者也其先祖無美而稱之是誣也有善而不知不明也知而弗傳不仁也此三者君子之所耻也伯誠其得之矣跋文公梅詞真迹昔南軒先生與先大父石筍翁在長沙賞梅分韻有曰平生嘉絶處心事付寒梅今又獲拜觀文公先生懷南軒之句曰和羮心事履霜時節由是知二先生之心事與梅花一也然此八字雖甚平熟極有深意蓋和羮之用正自履霜中來自昔賢人君子有大力量立大功業者必有孤潔挺特之操百鍊於竒窮困厄之中而不變者也異時先生又曰絶艷誰憐真心自保所以指示學者尤親切梅花與二先生之心果何心哉不過保一真字而已天台吕居中學朱子者也保愛此詞如護拱璧惟獨為其推所以知愛之道昔朱子嘗書寇忠愍陽關詞而題于后欲使百世之下有以知先生與萊公之意繼之以於戲悲夫豫于此詞亦云跋沙隨易雜記贈賈師父文公朱先生著易本義謂易本卜筮書而當時學者皆疑焉惟沙隨程先生好以卜筮説易有雜編一册蓋親筆也其門人得之以呈文公公以所疑書於後俾歸以此説質之沙隨先生不審以為如何也可以見先生待前輩之禮其恭如此沙隨亦稱劉公曰元城先生稱喻公曰玉泉先生稱汪公曰玉山先生稱文公則曰南恭父為序於後易道之淵源經傳之因革殆無餘蘊念是書考核之精辨析之詳疏其羡文缺字之相承訂其分章絶句之或異精神粹密盡在音訓不敢以既退而纍後人越明年遂用紫陽書堂本足成之敬識其嵗月云跋昌黎文粹右韓文三十有四篇得於考亭門人謂朱子所選以惠後學觀其體致氣韻議論規橅可謂出乎其類拔乎其萃者也程夫子謂韓子之學華朱子謂其做間雜文字多故曰華然亦有些本領大節目處不錯有七八分見識氣象正大又曰韓文不用料段直便説起去至終篇却自純粹成體無破綻又曰韓文雖千變萬化却無心變只是不曽踐履玩味不見到精微細密此學者不可不知若以之資筆端發越義理可也摹倣其所為則非朱子教人之意云跋勉齋北溪文粹右勉齋黃先生文粹三十篇北溪陳先生文粹三十一篇經説十五篇金華後學王柏之所編集而又附以雜著四十餘章北山何先生亦嘗增定焉在昔乾淳之士登考亭之門而親傳面授者不知其幾人矣窮鄉孤陋未能遍求髙第弟子遺書而盡觀之但見端的固守其師説而接引後進敷暢演繹而不失其本意者惟二先生之為可敬勉齋先生辭嚴任重充拓光明而通釋尤為淵奧北溪先生辭暢義密剖晰精微而字義實為階梯皆所以為後學之津梁以達于紫陽之室者也此編非敢妄有銓擇亦以其嘗玩味誦讀者開其子姪云跋歐曾文粹右歐陽文忠公南豐曾舍人文粹合上下兩集六卷凡四十有二篇得於考亭門人謂朱子之所選觀其擇之之精信非他人目力所能到抑又嘗聞朱子取文字之法文勝而義理乖僻者不取贊邪害正者文辭雖工不取釋老文字須如歐陽公登真觀記曽南豐仙都觀記萊園記之屬乃可入此可以知其取捨之意矣又曰歐陽公文字敷腴溫潤曾南豐文字又更峻潔又曰南豐文字説通透如人會相論底一齊指摘説盡了歐公不盡説含蓄無盡意又好曽所以不及歐是紆徐曲折處又曰文字好處只是平易説道理初不曽使差異底字換尋常字自蘇東坡文出便傷于巧議論有不正處只就小處起議論此皆朱子論文之法學者不可不知因併識之云跋朱子大愚帖先君子仙郡府君與獨善汪公契好至厚某為兒時未嘗數日不侍容色也嘉定辛未獨善先逝先君子亦相繼棄諸孤不數年伯夀流落其子開之追尋其乃祖遺書劬劬懇懇志甚可悲紫陽之帖大愚之詩尤所寶愛某故樂與之從遊為其摸刻于堅珉撝堂劉公船山楊公克齋陳公皆感其事慨然題跋于後不幸元思蚤亡此一段流風餘韻漠然不接于耳目今年伯夀死元思始克同葬原帖與石刻亦次第而出某復與舁二刻龕于麗澤書院使獨善之髙風義槩與麗澤相為終始非特有以慰元思泉下之靈亦所以勉薄俗而助風化也嗚呼大愚先生忠公於是竟終于貶所今六十年矣世變轇轕師友雕喪學絶教乖風頽俗弊不堪回首獨善之子若孫今已迹滅祀曠天難諶命靡常惠迪從逆之訓不靈善人懼而世道來復之期益未可知也慨念疇昔烏得不為之泫然再與裝蹄此卷於腐壞塵蠧之餘使前賢之遺響尚洋洋乎入耳觀之者忠義之心庶幾油然而生扶世教于下者何能已哉北山何子恭父箕谷倪孟德父立齋剛仲姪皆元思之所敬豈可無一詞相與起其墜於後乎跋周吳蔣三君帖山谷時猶曰師帥之職不知行道以先覺覺民學校之教不知明道以啓迪後進故學者不知重道而尊師士亦不復論學而取友三復斯言為之永慨豫讀書陋巷不求聞知有志於學者彼此固相知名有願交之心其交契已在於未見之先矣五山王抑之克齋陳公之門人也特訪豫于雙溪之上為豫言果齋周君希顔之賢淳祐乙巳𨗳豫訪于天府石林軒風度粹和義理該洽相與傾倒如舊識然泛西湖之煙棹步楊園之泉石談論終日甚樂歸來間以書尺相勞問意尤渥也松林吳君字淵仲龍川陳公之甥由武博出二廣德由二而守歸鄉求士甚篤於豫尤拳拳焉相敬愛未幾復謀居龍窟遂成疏濶矣浦川蔣君叔行自端平乙未識之夷清堂上後館玩易書孰契好始密相知為甚深補太學幾十年僅一奏平等科名竟不遂二君皆北山之親表吳君樂易溫雅蚤脫場屋晚求有道以訪師友之淵源為政尚德厚俗決不以健刻求知當世者蔣君寬和機警蚤知學問之原委未能免科舉之纍然其早察物情巧中事會每一見之未嘗不與之劇談而撫掌也此三君子者皆非今日世運可行其志困窮而長往也宜哉慨斯人之寂寂而斯帖之僅存交道日險問學取友之事益落落矣如之何而不於此長太息也跋久軒定齋帖豫幽約不勇不能尋師取友於四方求乾淳諸老私淑之遺訓以變化其氣質與世參差交道枯落淳祐乙巳之秋因事入京始識久軒蔡公蓋西山之孫九峰之子是時給禮玉堂初除正字與友人王抑之敬巖立齋二姪契誼頗密豫起敬其家世甚久遂往訪焉公即以故人相待削去岸谷意氣篤厚有前輩風越再年出持江東憲節後移節本道豫以部民未敢納謁而攬轡已在門矣既而兼綰郡紱再至尤欵密於松齋道院之間及登政府相與如一日公凡兩去國後一出尤偉皆以事關學校力爭不得而去善類恃之如泰山天下想望其風采以元祐相業期之間居三年而薨矣嗚呼悲哉定齋鄭君子文之自太學博士出為東陽郡長史朋友間誤道豫姓名忽一日求見甚勤郤之不可自是情誼少欵其人博洽通練議論軒豁實有用之才也僅一持武岡之麾丁內艱哭愛子困頓家居近亦聞其捐館二公皆閩人今不可得而復見矣吁淵明有云知音茍不存已矣何所悲摩挲遺帖凡十有一紙聨為一卷攬涕而書于後書伯兄心針後右心針一卷適莊先生晚年之筆也鋒藏力健氣定神和非天君泰然焉能至此嘗以鄉之前輩曾書不欲鋟梓子孫宜寶藏勿墜跋默成詩卷默成此詩筆豪氣逸歸宿有味非特一時題咏而已此所以為可敬也不幸幾毁于簾箔間若有神護再還舊觀仲志之子若川知所寶愛不輕於授豫亦不敢輕於得遂與李花詩重加裝禙以夀其傳魯齋集卷十一
