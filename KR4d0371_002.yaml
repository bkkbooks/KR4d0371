body:
  text: 魯齊集卷二宋王柏撰五言律詩代夀忠王髙宗皇帝生於丁亥與藝祖皇帝聖誕之嵗同孝宗皇帝生於南渡之初元丁未光宗皇帝生於丁卯是時益國公周必大和東宫之詩有云一丁昌火運三合聚皇家以為仙源衍慶之符既而寧宗皇帝生於戊子今皇帝陛下生於甲子而大王殿下又生於庚子甲戊庚命書謂之天上三竒敢叙其事見於詠歌敬祝無疆之慶天眷中興業丁年拱慶基皇圗開一子寶厯出三竒象奏前星瑞光依太極儀一巵眉夀祝敬和益公詩立齊游山不能偕次遁澤韻二首色動山行約令人憶舊遊地形雖險易坤道自剛柔路繞岩頭石烟橫洞口舟十年塵土夢此志幾時酬山人真漫浪隨處得清遊雪瀑方爭勢風雷不肯柔詩光浮玉板酒灔㵼瓊舟一枕斜陽裏清歡各自酬題屏岩詩卷有偉屏岩稿溫淳擷衆芳波瀾雖未濶骨骼巳先張盡掃江湖氣且無蔬筍香若參詩本旨却恐費商量台山周詠道别五年因詩寄借韻以謝二首邂逅松齊日曽知學共程心期千古逺世味一毛輕孰謂暌離久猶垂故舊情何時風月夜得共插文盟中處乾坤大同時總弟兄行藏雖有間道誼豈無情欲向忙中定先須靜處精光隂如電走慎勿騖虛名題徐觀之字說堂堂一鑑懸萬古光瀲灔彼自有盈虛我要無虧缺隂祲不能蝕塵埃不能掩只於事上觀足為操舍驗舟中和葉聖豫三首雲欲回風勢先埋逼曉山催程推路險破冷覺杯慳帆腹欣初飽篙師相對閒卧聞嚴子瀨只在片時間桐江波漸滑霽色午方開香火嚴蘭若烟霞老釣臺崕髙微徑險水轉萬山回欲訪先生裔相從買一杯江濶風帆急潮回沙露痕寒林無剩葉茅舍各成村雁落烟波渺鴉歸野色昏未知孤客棹今夜泊誰門野興文字飢難煮為農䇿最良興來鋤曉月倦後卧斜陽秋稼連千頃春花醉幾場任他名利客車馬閙康莊題效竒未識效竒處得於詩卷間屋邊環翠竹窗外即青山月向女牆過煙凝老樹閒不緣心匠巧何以發天慳題適莊茅亭屋角園雖小幽深隔世塵杖藜時自適杯酒樂天真松磴規模古茅簷日月新閒花三十種相對四時春和趙師日韻二首佳士溫其玉相親意豁如窗前千個竹燈下一編書交道無窮逹人情自密疏清風明月夜或可訪吾廬我生無燕頷四壁笑相如門巷堪羅雀燈􅐼且讀書老來心事懶貧後故人疏尚有多情月時時到子廬水仙翦葉葱偷巧氷㽔獨耐寒梅兄雖有伴礬弟不同看山谷詩猶在逋仙影不單玉纎捧金􅊦誰遣慰儒酸瑞香呈外來香國瓊敷四出葩嬌姿不受暑睡思却便茶心裏藏金粟枝頭簇紫芽長安厭歌舞還肯到儂家蘭早受樵人貢春蘭訪舊盟謝庭誇瑞物楚澤擷芳名蒼玉裁圭影紫檀含露英奚奴培護巧苔蘚緑菁菁梅影梅花巳清絶明月忽橫窗孤影知難並羣花巳竪降淡痕開畫帳皓色掩書缸寂寞素娥冷須臾擁去幢自述身坐衆香國蒲團詩思新一貧雖纍我此興未輸人陋巷誰為侣寒窗不染塵五言盟四友筆下頓生春過故家有感衣冠零落久今日事堪傷厨起青煙薄門關白日長殘梅欹古道枯栁卧頽墻山色依然好興衰未可量過白鶴寺小泊古蘭若雙櫧發舊柯山光浮夜氣栁色媚春波僧類胡孫瘦農師盜伯多野人時問我新守政如何晚興散髮風簷下沈沈日暫曛鷹拳擒野雀蛛網獵飛蚊羣鳥能為計吾生亦謾勤塵緣難著眼晚興寄青雲新愁愁逐西風動伶俜祗自憐家貧因纍重學陋缺師傳白髮還生矣青氈尚杳然髙山流水調何日奏朱絃題蟄菴一蟄了千悮心安境自寬軒昻就收斂自在覔艱難龍怕烏臺勘人疑蕙帳寒欲知舒卷意編簡靜中看題寧庵寂寂鐘魚冷松楸蔽杳冥雲侵晴路濕衣染晚嵐青天未生人物山應銷地靈何祠香一瓣遺恨滿空庭宿倍儡店感舊諸老皆仙去遺蹤嵗月深主人今易姓客子亦傷心來燕傳新語群蛙試閙音欲將興廢事歷歷問雲岑宿仙山浸碧軒二首冒黑投精剎呼燈讀舊詩平分禪榻穩共聼雨聲馳魚鼓催行色溪山挽故知人生萍聚散後㑹復何時浸碧去崖谷琅然語夙緣水雲藏定力霜雪護華顛漸喜虛形槁祗求實行全曽隨癡鈍子當已得心傳遣興初向坡頭下風霜入鬢毛味長濡竹簡熖短沃蘭膏家與人俱瘦年隨氣轉髙朱顔無藥駐􅐼下勿徒勞催雨人世如居甑驕陽不可鉏未聞芻作狗安得夢維魚賦斂生民槁干戈國計虛安危關一飽雨意莫躊躇喜雨滃鬱雙雲合雱𩃱一雨通新凉驅積暑喜氣薄髙穹點㸃含生意聲聲起死功田家雖少歉尚可及年豐和汪元思喜雨韻龍蟄金瓶小神驅雨陳斜建瓴飛素練走澗舞生蛇風使開雲磨雷香隱炮車農人有驕色一飽不須賖題抱膝庵一室方方丈名標抱膝新有書宜勘古無學可留賔靜坐神明固清談滋味真傳家名刻在長對草廬人冬至和適莊即事韻跛躄廢人事來投大士家清談半忩月淡坐一杯茶燕豆來霜果鴝瓶浸蠟花葭浮才一日芳思巳無涯七言古詩汪功父聘石友一片寒姿蒼玉質久作歙江秋水骨磨瑕礲垢飽風霜䄂手南遊來楚國我曽研破青烟痕露華半勺拖𤣥雲文理細密溫而淳伯樂一顧空馬羣癯癯好古子汪子雅有半面如舊情巧取豪奪俱不敢聘以厚禮强委禽吉日良辰新勸駕絳帳交歡相慰藉斟酌洙泗闖紫陽大義發越添聲價紫陽是渠􅮏梓賢久矣驂隨輯墜編㑹心不惜時磨研至理神授珠瑩圎我今贈君明堂一柱金書墨霜毫冠帶來蟾窟禇先生者白而腴即日相邀來覽德絃歌聲裏春光半净几明窗風日暖四友參前無間斷俯首循循而勉勉萬里一鞭途甚坦太極門開初未逺和叔􅀈橘花韻二首清和景氣巳非春午隂濃處延詩人一杯佳茗沃嘉話粲然主禮羞蘩蘋洞庭手植清香發金粟銀須照膚雪薰風十里漾芳思萬斛明珠剖胎月素華緑葉騷頌中光生南國德橫空朗吟受命不遷屈對花不飲無慚紅厥包錫貢三千春為花著句曾無人顆顆珠璣香萬斛薰蒸天地勾風蘋充實先生詩興發韻嚴不數陽春雪龍蛇一紙開天荒琅然吟破夜光月炯炯后皇嘉樹中精白任道言非空秉心髙潔寄清賞世人只解歌春紅贈葉緑澗有客有客訥而腴手携數冊堯夫書八八從而之八八四千九十六無餘小游軌革何足算大游九厄相乘除太𤣥洞極亦無法更有司馬推潜虛茫茫古今四海濶動靜禍福無能踰玉苻金鑰竊元命自合抱道山林居堯夫堯夫初不死精神炯炯先天圗元㑹運世未為密一畫未畫元非疏自從泄漏加倍語便覺造化無工夫吾儒更欲窮造化造化尤解窮吾儒且將餘法供劇戲君識此意亷無需世人逐逐不知止誦詩還肯安心無和立齊畨君吟日月星辰天之精山川草木地之文本乎天者既圎象下者何不皆方形此疑千古不能决讀盡六經無異說依稀子夏微有言譬諸草木區以别草木之間操孰堅僉曰此君耐嵗寒虛心直節表真徑窮冬大雪青琅玕平生正坐一圎纍末堪全德君子比內圎猶是智之餘外圎無乃德之耻我聞楚東有雲仍生來氣骨青稜稜觚哉觚哉出乎類長大益覺亷隅分自從大學悟潔矩四面正直各得所獨秉重坤六二爻斯可以為民父母厥初受命莫不然世衰俗弊失其傳商周之際斯為盛孤竹二子何曽圎再詠畨昜方節士博物君子識鑑精包羅錯綜能成丈夫何吳興戴慶豫慨然譜竹擬諸形非草非木言甚决品類繁夥難盡說九江五嶺多逸遺維此方君更無别隱彩韜名志行堅萬里臨卭族最寒文饒携來甘露寺聲價壓倒萬琅玕眼節鬚牙如積纍四面對出莫與比不有芝田紀録詳後世莫知深可耻我聞此說亦相仍未嘗親得見觚稜江東使者返行部招來節士畨中分個個折旋皆中矩什什來歸敬岩所有斐良朋保嵗寒凛然如對齊充父后山居士知其然心事曽將詩句傳老來不復人間事寄語山翁莫削圎和立齊蠟梅韻蠟花檀暈香如梅攛號入譜名京垓立齊形容消息大濃芳不受霜雪埋疏影橫枝雖未足淡淡中色攙先開薰然不待詩料理詩人無奈清香催詩清香韻兩竒絶詩香相感從何來只緣人與花相似心香灑灑俱無埃坡公衣鉢何敢睨簡齊香酒非吾裁有時靜聼群兒讀繞樹日走數百回仰賴生意已如此俯視百草方枯荄和立齊喜雪韻生意原原如襞積隂閣陽開有繩尺風霜氷雪豈少思到此自宜天地塞凛然帝則亘古今此外不知還不識連年冬令太陽遲君子憂時長皺眉萬物驕矜不自持落盡􅐼前年後梅深山芽茁無空枝更疑麥隴青離離一夜風號陽氣伏𤣥冥奮威正當局翦氷裁花兩日飛更撒珠璣三萬斛攬柄收權應恨晚明朝已迫東方木却恐春風未肯和顛倒天時難善俗寄敬巖泳飛堂前橘柚香田田荷葉浮波光主人攬轡度閩嶠馳驅端為蒼生忙天生人才不虛出必使事與才相當爾才綽綽有餘力豈容䄂手窺其旁平生正坐嚴冷相不解嫵媚相頡頏前時固亦與國論莫肯默默安周行老子九百何自苦艱難險阻須甘嘗玉溪飢民昔嘯聚至煩禁旅來張皇繡衣彈壓甫三日猩鬼屏蹟消叢篁露布一語不自伐猶有忌者羞回韁今年玉節蓮峰下約束海若無驚艎頗聞屬郡微有警往往鹽子多陸梁此輩未易以柔服必至腥血膏鋒鋩由來受病非一症莫將已效誇良方規模貴濶謀貴密當以虛心來衆長局面布置要合節自有勇士爭激昻堂堂元老熟戎事幸甚赤舄歸故鄉豈無惕然桑梓念囊底餘智應恢張同心相濟一堂上誰兵誰將誰于糧不然箋天啓壇鉞老熊當道驅群狼甲兵錢榖亦分內事機捷出真難量豈豫所至輒多事老天驅入功名場橘柚黃時聼好語緑綈四輩催歸裝題魁星天樞之宿為貪狼引領三台朝帝旁典司多士擅文場名在第一聲播揚因此氷炭癡兒腸倣佛肖象祈流光題定武蘭亭副本玉華末命昭陵土蘭亭神蹟埋千古率更搨本入堅珉鹽帝歸裝投定武薛家翻刻愚貴遊舊石宣和龕御府邊塵橫空飛渡河中原荆棘穴豺虎維揚蒼茫駕南轅百年文物不堪補紛紛好事競新模傾欹醜俗亡遺矩如今薛本亦罕見仿佛典型猶媚嫵清歡盛㑹何足傳右軍他帖以千數託言此筆不可冉慨然陳迹興懷語今昔相視無已時手掩塵編對秋雨和易嵒兄芙蓉吟天専肫肫分四氣曜靈西征駕新霽人間萬寶告成時白帝疇功有良貴后皇嘉惠放一頭霓旌鸞轂恣晨游蜀錦步帳數千里爛然一抹眼波流玉容沐露月梳曉翠䄂蹁躚舞微笑雲舒霞捲競芳穠照水迎風為誰好水中木末眩騷人拒霜宜霜名字新平生不識春宵暖甘隨青女嫁花神易岩胸中五千卷景物驅歸句中錬賞花不是少年心見花依舊少年面石丁作主事難憑子髙那是夢仙瀛何如醉鄉自廣大幕天席地山為屏詩魂醒處風光轉梅花巳築受降城用易岩韻夀易岩天地之氣秋惟清清之極者為聖人惟皇降衷本均平賢愚美惡氣質成有偉易岩萬人英聖涯涵泳心即經人心道心惟一精怡然融洽萬理明矩度逈出風塵表視履元吉祥素考義利兩關路分曉富貴功名何足道一枝緑玉暢幽聲殷勤拜捧夀吾兄明朝西現長庚星芒寒色正占千齡老而有子希世珍一念種出無邊春他年頭角昻俊聲安車迎養雙朱輪用適莊賜韻回祝大椿蟠根雙幹矗秀色各分元氣足共占百五二十年八千春秋從此卜西方無量不可思南華寓言不須讀造化發育自無已天根月窟互相逐霜挾獰風夜推戶日碾晴空曉烘屋氷輪載魄將冉弦寶律浮葭欲飛玉天公作意表弧瑞學子分題剡箋軸揆豫受教自髧髦嵗月十分今已六我翁早出名利塵我翁天縱清閒福眼明猶足察秋毫腳健不肯支笻竹友善堂前髙揭扁懿德道心新萬目人言腕力健於虎更須萬供毫秃不買駝峰換清供不買蛾眉歌夀曲嵗寒兄弟嵗寒心敬和長篇侑醽醁和遁澤武夷石乳吟遁翁聲價為時重幾年勤學方繇統麗澤門人已寂寥衣冠奕奕皆遺種當日詩編誰尚存遜齊今幸傳聞孫平生工作風刺體近來琢句如春溫靈芽來自幔亭里貯以紗囊紅與紫一掬槍旗分雅供七碗盧同為驚起贔屓古鼎親烹嘗清風習習生詩腸雲根不受塵土汚舌夲豈帶臺閣薌學海茫茫了無際一覺回頭有餘地世味醲鮮多螫毒無味之中要精嚌燕閒消息己全通滿閣遺書須細窮淡而不厭真雋永不在松風蟹眼中薰風歌代夀節齊玉麟堂上歌薰風周公分陕方居東霓旌龍節更號令長江萬里消狼烽櫜鞬帕首多名將夙興拜舞占乾象紫氣浮浮軫翼間宗星炯炯銀潢上甫申飛下鼎湖山汝陽天人未足言八紘納納入經濟一柱岩岩久具瞻岧嶤陪京新命尹虎踞龍蟠壯根夲關中鎮撫必蕭何北門管鑰須寇凖運量恢恢妙轉旋一念體國心通天璽書錫勞下閶闔珥貂十輩來傳宣天子令聞洽四國令儀令色山甫德江漢湯湯告厥成衮衣歸兮式百辟薰風薰風自南來解民愠兮阜民財不賡殿閣微凉句拜手喜起明良哉菁菁葑菲公猶采世沐恩波深似海春風一鶚又橫空敝帚蕭騷價千倍翹材油幕羅群英夀觴瀲灔難同斟客星灘頭頻矯首夜夜遙瞻南極明和遁澤惠豆粟韻民曰同胞豈異根萬殊皆自一本分燒萁舂粟不忍聼詩翁感慨何憂勤我有兒拳蓮實中共房􅋾􅋾笑秋風平鋪春色殷勤種終鮮他年又怨公秋深萬物盡歸根五榖從來不解分以長而食了無事南山有種何曾勤遁澤真情在句中薄俗三歎曹劉風識得異形同一氣應無管蔡怨周公題平心堂洛龜圎文錫神禹箕子陳範畀周武九疇自天倫既叙嚮用一以夀為主人生富貴何足數最要康寧安厥處爾其好德全付豫惟皇之極必福汝君侯有德存此心居官居家堂兩銘强弱人已無留情湛然方寸如砥平藹藹庭鯉雙趨庭指此良方垂後昆信受奉行不敢輕宜爾子孫皆千齡和叔􅀈春寒韻知和而和當有節節貴得中忌超越造化神機豈易窺天上不知誰理燮東皇面目似非真我聞四時皆有春春來天地已交泰肅肅群隂豈可伸金谷笙歌未嘗吟莫張威勢嚇詩人題東村所藏宫錦圗后德相成帝業昌不耽歌舞誇新粧六宫婦式頒蠶事職雅心専清晝長忽見雙娥理絲把寬急對牽身勢强轉輪飛轉一縷細文茵獨坐迎微凉髙捲翠簾三四侣織就五采成龍章獻功不闕出宫閫手授縫人成帝衮端拱明堂萬國朝文物聲明光四境何人遇此一段竒追記丹青描不盡器用鋪張規制精默寓經綸合繩準世間畫手無此圗疑是當年閻立本賦雙松堂和平堂前列四皓雙松為主雙檜賔深山大澤不肯住鞭霆駕雨來重闉蒼髯梳風音瑟瑟霜皮凝雪氷鱗鱗靜有精神觀世變悄無顔色阿緌紳朱幡皂蓋幾來去丹楹藻梲方更新魏武子孫敦夙好十八公子欣相親世間靈物妙難測一氣常存天地仁巍巍堂下萬休戚左右冷眼時笑嚬或然一念私欲勝垂垂二老能相嗔起居出入知所敬願言共保千千春侍伯兄宿履菴即事呈本老朔風蕭騷霜正濃追隨雁影來城東樓閣寶門八字唘一超徑入青蓮宫老師槌拂活潑潑臨機一喝開盲聾舌根拖地無死句何曽一字粘虛空管帶忘懷聞妙義豁然暗與吾道通諸方善人忽聚散黃昏方打齊時鐘明極堂前吞箇棗畫灰爐畔捉條龍須㬰八萬四千偈盡在蒲圑默坐中拍手行五雲縹眇護天關輿金輦寶來如山上有封題三道印多是中朝清要官一膏一縷盡民命荆箠新痕蝕舊瘢東麾西節步霄漢公私赤立生意慳年榖豐時無盡藏那禁水旱相摧殘黃馘槁項卧溝壑獾奴狼子生狂貪輟耕太息鴻鵠志乘牛讀史需時艱忽如妖禽嘯清曉泥丸初不勞驚彈何人把玩張聲勢直令聚蚋奔醯酸竹兵烏合本兒戲伍籍久蠧心先寒吁嗟身世狹於掌北望神京雙淚潸國家有紀誰敢犯濟彼德惠防民姦何曽假借汚暴手病入心膂何時安堂堂正氣不久熄自古東南多造端誰出華山拍手笑䄂中三尺山河寬七言律詩和碩夫兄五松韻重開甲子舊年華莫問行程差不差幸有數杯澆舌本不須一筆鏤心花嵗無臘雪非人福時到春風不我賖兩手托天原有氣簞瓢陋巷也為家蜀葵韻亭亭弱幹裊新凉露浥精神導太陽紫粟緑房醫士寶黃裳紫袂道家粧宗華衣錦趨炎晝蜀本鎔金耐素傷千古無人歌實德騷人只解逐餘香和秋澗惠蘭韻竹蘭臭味古來同同處無非造化工墨竹方生秋澗上紫蘭已到魯齊中築臺移玉尊清惠運筆揮金尚古風却似髙人來伴我幽芬日日透簾櫳和得全喜雪韻天道流行自有經一冬常燠大無倫臨期飛雪粗成冷只隔明朝便是春窗外曉山髙積玉夢回夜月更鋪銀𤣥冥恰似輪臺悔改過雖新巳悮人瞻彼西山紫翠間百年遺族備艱難一區濟濟雖孤立萬物原原得舊觀舉世莫知黃髮貴何人肯伴白雲寒相將共折長亭栁况是殘梅已著酸贈吳晠襟佩青青白面郎未成占畢已飛揚深嫌實學規模拙只把時文日夜忙志氣峥嶸謀富貴身心荒落敗綱常他年窮逹皆無據却笑儒冠誤可傷和遁澤喜雨韻二首久欲飛山試笋車避炎情緒未能嘉讀書有道調心馬製藥無方遣睡蛇天地秋來催祭鳥池塘雨過閙私蛙病夫推枕幡然起骨健神清眼不華葉下亭臯半月秋風飛雷厲起雲頭一奩返照收林樾萬𣲖飛泉響澮溝放鄭賢侯初下令乞靈拙士未能瘳吾儕且說維魚夢那問驅車相國愁和易嵒蘭菊韻小春天氣未和平冷暖於人孰重輕幽菊瘦蘭皆有味凄風楚雨自無情披來破衲便身穩寫到新詩徹骨清箇裏不知誰得失薰蕕境界要分明和易嵒雪豐年嘉瑞有根原碎剪銀河到底懸古有諸侯延辨孟今無令尹訪飢袁狺狺犬吠思騷楚茂茂貞松記漆園險韻忽拈真寡和茶烟起處屈髙軒八詠新樓翬飛髙插女星光可是溪山屬沈郎眼力拓開千里逺樓身擡起一尋强爭觀王謝新題壯不數齊梁舊事荒誰識倚䦨真樂處清風明月朗篇章題康湖偉觀蒼翠雄盤一古村新樓面面納乾坤隂晴朝暮天容變開闔榮枯春意存萬壑精神融寶鑑千峰氣勢拱端門松楸冉冉白雲下一盞寒泉罔極恩和易嵒首夏韻垂老東君戀舊寒惜春情緒正孤單哂他功業傳千古還我詩書博一安芍藥階前風味淺酴醿架上典型殘勒回春色憑詩句生意津津上筆端次前人韻彈冠事業耳邉新我夢何因到紫宸自古為仁知不富如今學道豈憂貧與其鞭撲朘民髓孰若簞瓢樂此身志士不忘在溝壑不應後世便無人寄立齊團欒未久又分襟踽踽嬛嬛老不禁陋巷更無佳客語殘編幸得古人心熙熙農父含生意濟濟官寮喜德音欲共功名須好漢微陽何以勝重隂春歸春來春去果何心靜坐焚香細細評太極流行千古事一元發育四時情黃堆稼穡誰勳業緑到桑麻已老成舒慘榮枯人自異此中生意夲分明舉業有感後世求才術太疏三年三日判榮枯消磨嵗月莫知老奔走英雄不覺愚與死為鄰猶未巳雖生闕如無聖門反在揶揄內何敢忠言請改圗和遁澤初夏韻二首萬古南薰與舜同何時吹入五絃中百年喬木支秋嘯一旦新萌長露叢世事漸如宣子日詩情猶有大王風來牟緑枲新勳業更有何人詠大東深深陋巷更深藏襪線曽無一寸長學問不宜隨茍且傳聞何敢喜張皇一池科斗書千古滿徑風騷竹萬章此意寂寥誰與共美人只在水之陽重題八詠樓壓重城萬井低星從天闕下分輝傷心風月詩應瘦滿眼桑麻春又肥山到東南皆屹立水流西北竟同歸倚䦨莫問齊梁事斷石凄凉卧落暉和易嵒喜雨韻轉移劇暑若艱難誰謂炎凉反掌間狐鼠就擒元憤鬱旄倪相慶便清閒雨聲恰似政聲好天意翻嗤詩意慳一飽所關誠大矣吾儕安得不開顔歊煩一轉亦何難只在邦君念慮間社鼠城狐方就縶土龍芻狗便投閒平時真見天人密順處不疑霖雨慳夢裏忽聞風力猛定知千里破愁顔送馬秋山寄友人赤城千古一東湖誰肯重開太極圗要得斯文傳氣脉定須吾黨立規模聖賢不盡七分易天地長存三字符念念服行方是學莫將枝葉費工夫用前韻答車玉峯人物如君屹鼎湖髙山仰止我儀圗講篇損益開新式略紀刪修有定模目斷交情殊恨濶心涵古道若相符去年不客東湖上幾失人間大丈夫題涵古梅花之外竹扶疏矮屋明窗著此癯生意多從閒處見天機却向語中枯通身總是先天易開眼無非太極圗㸃㸃若知河洛意庖羲豈有古今殊平生意廣奈才疏學未成時家已癯蚤慕滄洲窮廣大晚依麗澤沃焦枯先儒凛凛今如在聖道洋洋孰與圗兩字髙題時仰止千江一月幾曽殊魯齊集卷二
