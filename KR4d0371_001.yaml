body:
  text: 魯齋集卷一宋王柏撰賦宋文書院賦蔡子明講於鵝湖用文公白鹿洞賦韻示學者以墨本見寄因用韻和之繄奎躔之珠粲闡文教於無疆涵纍朝之樂育萃慶厯元祐之忠良雖陽九之震蕩復王氣於錢塘梟有時而號晝鳯終翽於桐岡抑理大之矢謀達此道於八荒錫書堂之四號揭儒隱之遺芳因宏規而恢拓立郡縣之膠庠發天地之清淑導濓洛之洋洋自龜山之復南開太宗之世運繹分殊之一語極精析而莫渾彼憑虛而夸毗忌所蔽之難遁盛哉乾淳之大儒四合朋簮而辨問有昧性質之異同惡此知行之並進蓋入德之有序孰先傳而後倦此紫陽之學之為無弊所以紹龍門之適孫合萬殊而一統黜百家之異論眷鵝湖之古剎寓昔日之琴書鎖凄涼之嵗久堙切磋之舊模偉膚使之絶識攬六轡以爰諏新黌序之壯麗儼衣冠之進趍坐臯比而振鐸啓襟佩之良圖乞題表於天陛聘師範之勤渠邀綵衣之歸騎肅奠謁於前除賡先覺之古韻著後學之貞符羌豫隱約於陋巷忽拜駢珠之華集恨車輪之生角望室堂而莫入粗識為學之為巳何敢龍之而口給幸羣經之粲然盍遺音之細緝願言忠告於我人請絶時學之陋習惟窮理與居敬要此志之先立咏洞賦之末章矢一心之允執既爾的而爾張亦何勞於決拾亂曰玉不事雕琢曷成爾璆兮木不就規矩曷正爾樛兮曰明誠與敬義於以泳遊兮志所志學所學亦伊顔之流兮慨往哲之不作何以解憂兮矧明訓之具在它又何求兮寶婺新樓賦炯乾象之轇轕兮麗元運而不息殷七政之後先兮表輝躔之清則謂四星十有一度兮獨司女職剪帛裁繪兮供衮衣之黼黻問機杼之友兮隔河漢以相望御真氣之皎皎兮籍人間之隂陽郤綵藻而衣青雲兮製白霓以為裳珩璜深杳兮德彌彰姓爾國兮湯沐據地勢之曠逺兮潔神宫之穆穆皇靈靈而來下兮瑶席而瑱玉絶塵囂兮夜氣肅眷千嶂之相繆兮東南最佳架修梁而承宇兮豁往古之壯懷自家令之著句兮意俗而辭俳雙溪㶁㶁兮流恨無涯當其出守兮腰猶未瘦昧於榮利兮不償厥售夢回劒舌兮史有餘臭吁嗟乎赤章兮終莫宥紫志兮重瞳篤學兮博通一念差兮百智窮八詠八詠兮胡為乎樓中士生斯世兮莫先乎器識富貴不可茍求兮聲名不可以虛得孰有不養而成兮不耕而穡所以設為庠序兮綏猷而明德大厦渠渠兮有赫泮宫像闕里之森嚴兮巍巍乎樓之東山川斯拱兮清淑斯融藹圭璋兮卭卭顒顒時習兮矻矻日邁兮志奪安得方寸之清明兮人欲絶與君來此兮吟風㺯月亂曰風月常見兮景常新清明光霽兮胡為而異名存爾天兮不昧湛一氣兮孔神與風月兮無愧斯能評古兮談今氷壺秋月賦子男列爵兮國有常居襟三洞而帶雙溪兮分女宿之墟誰作燕坐之室兮有扁氷壺相爾室之耽耽兮是敞是虛主乎中兮志趣萬殊孰有甘心乎冷淡兮詩書之癯求名義之凛凛兮斯焉何取或無所為兮又何足以為觀省之補彼東風之蕩無檢束兮物物是與夏日亦長且舒兮有酷斯暑氣象不我侔兮耻焉爾伍氷壺氷壺兮一以清有月有月兮秋更明清明相涵兮璀璨光晶極表裹之透徹兮煥采凝瑩彼君侯之心兮鑑空衡平一寒自力兮千室自春朱絲鼓兮淡和晝簾垂兮暇整俯焉撫字之勤兮不計嵗月之遒緊西風生兮逺林白露斂兮煩景榖璧有餘最兮猶從容待秋之一稔豈不懷歸兮去爾民之未忍眇扁舟兮家具表遺愛兮旌旗行行青雲之步武兮亷德久簡於上知念世道之已熟兮此為何時聚斂慘於盜賊兮甚東南之瘡痍傾倒瞑眩之劑兮勿留刀圭既無欲以掩其剛兮仁必有勇飲蘭露而餐菊英兮豈富貴之能擁惻有隱於民瘼兮不知震霆之可恐人懷襟度之寬兮我覺丰神之甚聳蓋任重道逺之士兮聲色凝然而不動我非有風鑑兮察所安之甚精見公雖疏兮知公獨深畏此簡書兮勢不得而日親鳶魚同一天兮各適其情人生聚散兮如太空之浮雲少歌曰今人薄交誼兮古重離别人合有離兮月圎有缺人别不易見兮南轅北轍彼月之缺兮或團圑乎林樾安得長官兮皆公如處處氷壺兮貯秋月喜雨賦已丑之秋七月將望長嘯與客命駕經從於南山之下農人告豫曰兩月不雨驕陽盛熾傷禾稼之就稿竭陂塘而莫溉溝澮眢涸草木病瘁渺一飽之未期斂雙眉而墮淚長嘯愀然歸而與客曰四海蒼生望霖雨不知龍向此中蟠此非王金陵之詩乎想新法之紛張瞻青苗而色沮澤民之事業如是乎金陵之所謂霖雨猶今春之淫潦所以基後日之禍也當其太空潑墨雷奔電掣溪原為一桑麻冒沒菌衣生於用器蛙蚓行乎几席麥欲秀而泥蟠蠶正飢而葉濕墻壁苔穿鶯花狼藉於是足沈礎潤之氣衣費香篝之煙望元雲之坱鬱慨沈穡之永歎何斂散之失時紊盈虛之大權而乃巽二閉户阿香熟眠魃鼓舞於煩世龍深潛於九淵幸玉清之悔禍遣六丁而下觀翕炎煦畢疏河浚泉祝融斂迹而退避屏翳振馭而著鞭長嘯不寐側耳而聼初淅瀝而萃蔡忽砰􅀈而奔騰如獰風兮入溝壑如怒潮兮來海門又如百萬慓悍之衆銜枚赴敵而戈甲夜鳴滴馬鬃於李靖洗牛背於鬱林點滴瓦溝兮有碎玉韻建瓴屋角兮有瀑布聲激竹溜之宫徴煥花徑之精神自是渴者澤仆者起枯者沃華者成如沈疴之邃脫如亂邦之中興又如光弼入子儀之軍一號令而旗幟鮮明化雕瘵而豐裕消愁歎而歡欣一點一榖如坻如京童子不識秋事之可慶但喜新得涼於戶庭也長嘯於是誦孟氏勃興之語賡詩人有年之篇獻於太守太守不有歸乎天子天子謙謙功不敢専讓於皇天皇天冥冥不得而名本大德之好生也歟四言古詩疇依元會開物風氣渾厖聿生神聖惟包羲皇始畫八卦人文炳煌大道之書誰云已亡巍乎大哉堯之為君其仁如天其知如神鑿井耕田出作入息擊壤而歌不知帝力虞舜側微重華協帝父頑母嚚蒸蒸以乂天理之極人倫之至恭巳當天雲行雨施禹乃嗣興載平水土天錫九疇彛倫攸敘克儉克勤不伐不矜有典有則貽厥子孫昔在帝堯咨舜一語允執厥中舜亦命禹危微精一義復兼舉三聖授受獨晠千古湯聘莘尹五進就桀天命人歸鳴條自葛以義制事以禮制心日新厥德鑑此盤銘於穆文王順帝之則身蒙大難小心翼翼三分有二以服事殷可謂至德萬邦儀刑武王逹孝善繼善述盟津既誓干戈載戢訪於箕子洪範以陳惟皇建極反覆丁寧於皇周公勤勞王家赤舄几几德音不瑕思兼三王以施四事坐以待旦制作大備生民以來未有孔子金聲玉振始終條理五經之道天地同流立此人極萬世東周賢哉顔子好學獨稱既竭吾才欲罷不能不二不遷庶乎亞聖一簞一瓢不幸短命曽子雖魯纎細不遺吾道一貫以魯得之易簀得正手足斯啓仁為己任死而後已至哉子思憂道失傳推本遺訓中庸一編提挈綱維開示藴奧無聲無臭孰窺其妙惟孟軻氏雄士絶識伯仲禹功力距楊墨性善養氣前所未聞歷選諸子實醇乎醇聖道不行自周公歿聖學不傳由孟子卒上無善治下無真儒章句訓詁煨燼之餘皇宋文明周子天畀不由師傳道體默契建圗屬書以覺後覺上接洙泗下開河洛厯紀明道祥應兩程吟風㺯月有的其承體用一原顯微無間惠我光明如夜復旦於時張子崛起關中虎皮端坐多士景從瞻彼洛矣道淳所宗訂頑揭牖表表正蒙恭惟道統一絶千載何絶之久何續之易師友之盛東南洋洋曰尹曰謝曰遊曰楊迪豫朱子理一分殊汛掃淫詖煌煌四書有析其精一字萬鈞有會於極萬古作程流澤未逺口耳復迷纂組斷碎倚託媚時大本斫喪擾擾胡為淵源微矣豫將疇依右二十二章章八句冽井冽彼井泉蓮華斯名有美一人於焉載沈夫也不二昊天曰明父母愛我曷慰我心冽彼井泉蓮華其號有美一人於焉是蹈琴瑟既合載言載笑父母不允中心悼悼有冽彼泉絃歌之東所謂伊人宛在其中我心既得皇恤我躬匪一死之義之從容有冽彼泉在絃歌內所謂伊人之死靡悔人孰不死我無昧昧是心之存炯千萬載冽并四章章八句金華胡氏女既嫁矣夫不良父母奪之欲更其偶五年不許白於令尹進而問焉曰理無二夫令尹義而歸之父母怒從夫三日赴井而死國人憫之而作是詩也五言古詩和立齋對菊二歌秋至百芳歇籬邊佳色圑遙思古節士愛此黃華蕃我生千載下恨不相同看叢叢夜氣厚曉葉千珠漙中表自芳潤對花發長歎真固非素積動色形豆簞悠然露真意猶云欲忘言淵明一寸心細嚼供晨餐之子歌逺遊征車事奔逸歸來東籬下一洗四方色靜觀草木蕃若不與人力茍無浸灌功造化庸有忒今年秋苦旱五榖廢嘉殖梅化竹亦焦枯芝稿蘭茁一朝去酷吏甘雨解衆惑天人本無間喜氣滿城集奈何倉廪虗一飽竟難得不如菊花乾醫方賸稱述和暘谷春郊韻一春風雨多連日幸開霽清尊酬芳菲嘉約起豫意邁邁溪南國樂只群英萃俳佪曲徑迂老脛尚堪企竹修君子容花向少年媚俯挹百草香尚友萬山翠往事動深感髙談出中祕莫色排空來一笑散襟袂不有短長吟寂寞此風致用玉成韻題秋臺詩卷杳杳南風琴洋洋大雅音復古心未古難以筆力任秋臺千古調淵乎樂不淫天然絶雕飾無非情性吟掩卷三歎息式如玉與金夜觀野舟浩歌有感康衢久寂寞擊壤音微茫南風啓簫韶拜手賡明良周衰二雅廢鳯兮歌楚狂楚狂巳再變三閭竟哀傷俯仰千載後嗟嗟情性荒梁選尚逺思淵明粹而莊開元生李杜我宋推蘇黃宗𣲖亦淪墜紛紛師晚唐吟骨不淳古記魄不自強雕鏤心肺苦何曾徴宫商濓翁著和淡感興開紫陽紫陽尚六義六義興已亡鄭衛日盈耳氷炭攪我腸章貢有竒士野舟刋名章古城夜酌句正義尤洋洋遊談到巍蕩百世流遺芳贈仙山剛公新創香林佛説菩提泉其性夲澄徹人乃無蕪穢誰能還瑩潔我觀浸碧泉泓渟貯芳冽恰如老師心風止雲迹滅憶昔著詩句無乃太疏拙彈指二十年相看頭已雪老師闢新軒眼方頗虛徹得得穴山竇一脈引幽絶清泚貫花徑冷暖資衆啜一動一以靜誰盈復誰竭水性本不殊地勢差有别即此兩水間盡是廣長舌學子來問話當以無説説但見香林香薰蒸千萬葉宿寶峰呈玉澗默成已仙去北山久寂寞豈無愛山人時時訪林薄心境不相當丘壑自丘壑誰知百年後秀氣才有託的的盤溪孫精光發河洛神龍躍天津鞭霆駕飛雹相逢玉澗翁筆底銀潢落江湖四十年萬象恣搜摸從遊八九子天才皆卓犖漲起十八灘曺溪原一勺愧我局陋巷瓢簞粗知樂遙望詩壇髙勢與芙蓉角掩旗仆金鼓不敢事攻略弔古得名勝盟府定虛爵𣲖長竟先歸白雲冒南嶽牧歌寄謙牧翁山前牧羊兒群羊化為石山後謙牧翁雙牛挂虛壁仙佛道不同妙處各自得我來牧坡上牧翁巳牧出風行麥浪髙日暖栁隂直沙平草正軟隔林數聲笛試問翁牧意著鞭還用力牽起鼻撩天踏地四蹄實渴飲菩提泉飢來噍芻苾步行顛倒騎神光背上射因悟角前後通身白的皪勿使蹊人田毋乃失其職舍策脫蓑歸人牛兩無迹天基節雨有感嵗嵗天基節晴和萬國歡今年侯國宴疏雨忽􅏰􅏰允矣天人際機緘妙巳宣聖心方感慕雲意慘天顔誰識天倫重端為萬化原一時名未正事事盡拘攣父母惟生繼昭昭大義存節文斯二者此外豈容干在昔權臣謬區區欲怙恩私心崇義斷強抑所當尊近日劬勞報猶云厚薄嫌一言誰誤主孝道未純全此事書青史千年不可刋勿云今既往熟視所難言父母人皆有何稱考叔賢只將誠意感各盡此心天夀潘介岩寶祐重頒厯祥開甲子三一分春色滿喜溢夀巵寬去嵗霑餘慶連宵飫豆籩今年東望處紫氣護天關正值松椿祝難忘契誼覃只將生硬語便作瓣香看天不生賢數人培厚德難幾年涵養力方到介而安出處隨時義從容最可觀青雲平步進中立了無偏一解星屏紱扁舟歸故山修門無一字已決此身間卜築遷新宇除書動笋班勤渠朱邸講公論藹朝端善類頻回首爭先徯奏篇忠嘉當有力聖德夲天涵和立齋書懷二首病暑巳成痼塵埃凝簡竹蕭蕭北窗下閉門哀煢獨曜靈欲西邁風露浣心目仰觀牛女星相望明河曲誰能却鳯凰共此鶩雞逐美人天一方郵音空往復寥寥明月懷翳翳談間玉歡喜聞歸期縶彼白駒谷幸自有長林尚可停鸞鵠平生景風操慷慨懷賦竹恨無百畝地相與種黃獨只有滿架書可寄千古目何敢偭規矩周容競追曲彼不見泰山政以鹿斯逐子酌芝山泉天運兩回復應感鶴鳴章聊以石攻玉遷喬豈不佳嵗寒須入谷天地何方圎吾將叩歸鵠小酌敬岩梅下和立齋韻化工忘慘舒但起姑息念一冬漏陽和未識六花片屈指不十日冉冉嵗華禪我聞敬岩下梅英照清淺尊酒酌嘉友薄批明月薦披圗論人物行子戲角戰回首九君詠清賞恨疏逺從今蒞新盟談笑恣雄辨多藉氷雪章細澡塵埃面嵗嵗臘殘時檢舉舊公案又平生手種梅不作和羮念其所起豫者嵗寒心一片孤芳以氣傳萬物自形禪暗香疏影句知心亦巳淺雖以乾􅢀餘亦可清廟薦今年花最蚤思之心膽戰花蚤豈不佳當開時尚逺隂陽貴順序難與俗人辨我豈事逺觀急欲識春面此意與誰論珠璣謾堆案書隱和韻謝冉答之我已百念灰只有敬賢念事之云乎哉敢分席半片不思笙鶴隨猶望衣鉢禪舉杯邀杖屨同問春深淺俳徊梅月下不嗔蘋藻薦公詩太過情置我氷而炭年來從公遊琴瑟幸非遠一謙生萬和一默屈大辨今日知公心他日識公面朝夕願趨隅稽首侍香案和立齋芙蓉觀三十韻我觀神仙傳詭幻何紛紛或生歆慕意方士爭愚君政徹既多欲仙材隔幾塵澄神黜麁穢有時翻黃庭年少不我待日月斯邁征含霞飲沆瀣聊助神氣清何須超大壑濯髮晞崑崘天道有常運過化續者新長生非受命莫使邪念興淡然養至德自可康頺齡古今共一理萬法同一心世事互起滅反覆如碁枰赤松事黃帝至今何不泯安期干楚羽對奕非邪真徐公何為者得得捫蘿尋惝恍紀一夢浩不知涯津馳神上無極竭思下無垠長吟追去古抗論貽來今於我政無益默計空辛勤不如素心友相與尊舊聞聖道無隱顯人心有晦明正論歎剝蝕危如線一綸舉世闖月窟何人開天根浮華正焰焰元氣方堙淪毋起逺遊念而起凡子評為學有精要莫作隔壁聼淵源祛滯吝德義開胸襟毁譽何足問死生何足論飢食渴而飲願為堯舜民和伯兄新竹韻叢竹太踠跧一鞭忽伸腳穿石作斜勢朝宗意穆若片緑吐新梢員粉露殘籜今年造化深稚子六七作群居不嫌密獨步豈疏略是為石笋瑞不負嵗寒約清標凛三友有倡不豫酢誰與共栽培莫至風聲落懷古不成寐傷今政作惡縱有題詩人人面定非昨和立齋荔子樓韻我久抱離索加之憂患薰血氣日以耗話别難為情之子行邁邁征車從仁兄閩嶺在何處目斷遮行雲素闕播芬郁丹荔嘗鮮新重樓一以眺千古乘桴心海風駕空來俳徊振書襟遙知意軒豁塵袂何由親惟有清夜夢栩栩踰南岑曜靈倐西邁剝啄來嘉音見書如見面瑰詞襲魚鱗朋友正歡慰喜氣騰家林呼童烹露芽蟹眼時一斟是中有雋永透入肝腸深和敬岩韻迓其歸生涯魚上竿世事鼠入角民膏既煎熬民髓復椎剝上下急交征絶口政與學孔明痛桓靈厥德修罔覺自古辱與疏其機在一數歸來有嘉士尚可理商𣙜駕言一寸膠救彼千丈濁精意自入神端可鼻端斫趙孟自貴賤玉女皆天渥如彼角斯磋如彼玉斯琢不患工不浚所患志不恪秋陽日以暴江漢日以濯真積而力久自見所立卓庭前梅粲粲梅下石確確雲飛川泳間俯仰自不惡獨立萬物表誰能伍齪齪雨露𢡟蕭艾霜風妬荃藥天意孰云逺鑑此歸意確寄言順應人大公一以廓效希夷和陳北溪韻北溪真有道出語涵芳鮮覺彼群迷句真與梅爭妍一花一太極獨立形氣先逋仙名浪得未必知其然甚矣天地閉獨有一花鮮未論色之潔未論香之妍只於氷雪中誰占生意先萬物心自服敢問何能然和立齋宿友韻吾儕有何樂同志味自長天髙與地下參我人中央痛掃物欲蔽放出元明光力學日不足遊宦那可長山人暌間久嵗晚歸南荒會友魚貫臥展轉幾異床老我失此快獨卧風雨窗回思少壯時此味曽親嘗白髮真可愧觸事方面牆喚醒舊時夢吐哺歌新章髙風行懷本齋人皆喜君出我獨喜君歸君出豈不媺事業生光輝君歸亦不惡風味髙一時人才有消長世運有盛衰公論不可泯隱顯觀姸􅑦隱者未必是顯者豈皆非遁世愧無悶貧賤不可移得時必行志斯世相綱維無悶是在我行志非可期一處特易易一出真難持利欲政滔天四海皆瘡痍世俗所榮者君子方鄙之君開青雲步要津夫何疑手揮體國略口訥阿世詞長揖群玉府拔足逃阱機黃鶴巳髙舉甕盎喧醯雞苕霅有清泚一洗京塵緇故舊述間濶松楸慰時思蘭茁濯庭下菊蕊黃東籬酒熟蟹螯健橙香鱸膾肥至哉天下樂何須卿相為解我槖中書極深更研幾聖門八字開廣大涵精微或參華山席先天探包羲或巾髙陽車同載膝上兒茍足經世具小需時運宜天意欲平治當今非吾誰和立齋橘花韻梅花已仙去草木同蕕薰萬物競妖冶二氣勞氤氲南服有橘隱春風罔知聞濃露浥清曉落月籠夜分玉圎太極判蚌合開天真芬芳滿宇宙那肯媒東君再和適莊韻客從東方來喜甚屐折齒鼎烹石乳精談笑秋月裏中有八十翁宴坐維摩椅遁澤瑚璉器玉瓉間罍洗立齋持修綆汲汲古井水參也魯依然商聲從曵屣翹首諸俊遊霹靂燒蛇尾雙鸞輝九苞翩翩奮棲枳桐陽有卧龍共踏風雲起翁當沽美酒炮龞膾錦鯉送立齋入閩哭久軒雙溪秋氣深送子臨古道古道如掌平四顧行人少行行復行行向日度南嶠故人今已矣未必死非好世事浩無涯愁雲黯江表夀秋壑皇天分四序春生而秋成春風渙九野秋氣呈清明萬物一以實物物含生生我公秉元化全體涵金晶義概包宇宙智略吞群英五行互相制自昔誰去兵代馬飲江水赤舄司専征神謀運玉帳靈旗繞氈營韅靷鞅靽備廣距甄角精殘醜肝膽破束手祈受盟肅肅荆楚淨湯湯江漢清東西亘萬里齊民競春耕歸來輔皇極一稔舒群情翼翼周鼎重亹亹宸慮輕前星耀垣象德星萃神京旗常偉實紀前史辭虛聲當此秋正中角亢迎長庚於赫衮繡瑞綿綿綵綬榮玉露滴鳷鵲珥貂宣寶觥陛下千萬嵗與公同太平送希夷之江西小雨斂輕塵秋聲壯亭驛驅車過南浦别懷徒襞積世道一以壞為善不自力一朝魯兩生為人作行色后山薄命篇竟不待它日送子行復行一步一歎息誰知離索悲有甚萬鍾失此事已忘言此情未能釋有時誦吾句或為千里益秋熱西風不力征老火未甘退蟬聲亂耳煩癡蚊健姑嘬一雨洗天來不復有故態天序自分明人心其少耐和立齋踏月韻我觀天壤間何處無此月對月兩心同正自欠此客月清人更清心景兩相迎平生負此約鬢影今星星我有一句話願與月同盟清光無晦蝕與德時時新和叔􅀈禽聲放言天以鳥鳴春鳥聲不敢止天以人鳴道斯人其可已爾鳥固無知喧啾亦何利鼓㺯枝頭晴瀾翻林外起不學九臯鳴聲聞何止此不學千仞翔一鳴來瑞世古以鳥名官列職有理致只有歸去兮陶公不爾愧人豈不如鳥鳴則震天地不鳴千聖傳則鳴千古事詩翁莫浪鳴文武道未墜和寬居見懷韻北望戲馬臺荆榛滿中路英氣一何多懷古渺難泝山河腥日月虎豹沐雨露纍纍楚猴冠異哉天所賦豈無濟川才淹留秋又莫清風從何來灑灑定吾故贈我金琅玕鑿落雙魚素佳菊何青青寂寞籬之東濁醪二三友一醉涵鴻濛緬懷陶靖節邁邁無遺蹤誰知千載下譜入處士宗我生亦已晚百拙勞化工上無學古心下無適俗容聊自樂其樂君子固有窮赤松即景平生百慮懶尚有丘壑心佳哉二三友歃盟同幽尋壯懷豁虛曠元宫窮邃深時方釀薄暑萬緑張雲岑新篁凝粉翠日影篩碎金瘦笻扶野步羽扇搖清吟漱齒掬清泚雪瀑開風襟脫巾挂琪樹露頂涵重隂山禽自在語山醪隨意斟物外轉栖碧二亭名石險蒼苔侵路窮不可去半山聞語音山路未為險世路尤崎嶔何時侣麋鹿結茅入深林和葉聖豫山中韻赤腳忙晨炊掉臂會清招相如僮御盛浩然韁轡調遙指白雲邊乘興尋夷巢古殿金碧悄元冠綵翠銷怪石壯熊卧老樹蟠龍腰清隂團野色習習生涼颷懸崕斜斷處槎木成飛橋刺膚起霜暈小小飛蚊驕日長詩思渴香冽供山瓢清狂驚四座浩氣摩丹霄書岩苔礙筆題葉攀柔條語默任人意無庸發輕嘲和前人小桃源韻二初何如人夫豈古隱士道成遡泬寥羊卧不再起鸞鶴舞松聲蕭騷快心耳金竈清塵生餘丹不輕委我來桃源遊直窮路所止飛蘿搖春煙素雪噴清泚了無一根桃此名安可紀豈是牧羊兒即劉阮二子不然命名者亦别有深旨何時駕草堂深入此山裏翛然逃世慮錬魄繼遐軌題砥齋古劍蟠雙螭瑞景騰豐城耿耿涵義氣凜凜無俗情塵世三十載世事嗟􅀈􅀈當道舞狐鼠白晝嘷山精秋風清夜發匣內鏗然鳴故人耿介士有砥靜且平寄語善持保功用真難輕莫授刀錐銛耗蝕徒欹傾許我礪英芒一抹霜花明北掃京洛暗南擊猩鼯腥彈鋏倚霄漢掌上風雲驚物莫不有用時兮非人能魯齋集卷一
