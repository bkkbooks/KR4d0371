body:
  text: 魯齊集卷十七宋王柏撰尺牘答季嚴州藕花秋潔水㵼明河侯度奏功朝班趣覲江山戀德台候某賤軀病暑遂成年例杜門謝却人事者三越月矣故一節不能陸續奏記徒有引領北望仁政於千峯松月之下軍將扣門有出望外端拜函書披讀詞染於粲奪目髙風襲人且有折俎泉符以裕其溝中之瘠兵厨名釀以澡其愁外之塵庭雀驚呼階苔改色書生有此竒事何感如之厚齊郎省人物也斜飛外藩豈心上得已哉曩者斯民昏墊仄席憂勤遂以右馮纍君摩撫襦袴之謡天低易達兩載成資曲培望實豫環之命多出於垂滿此今日之造化所謂謹名器有定力之新機今其時矣緑綈方底當已駕夜潮而上舍雙溪道太末未必能遂雅志且異時衢婺遏糴常為嚴病今年白粲之舟舳艫相銜自西而上波及兩郡頓消翔踊皆君賜也不然兩郡決不能奠枕前之為政者聞之當愧死矣鄉守嚴明官吏斂束雨暘以時數十年無此政甚幸甚幸敬岩進職移節廟堂所以處之者密矣厚矣社倉之創其心是也其事非也今州縣大家以不納常賦為雄孰能推民吾同胞之心捐廩於賦外謗議之興理所必至但當自責難以尤人若利民諸事今日固有掣肘難行之病但往往初未嘗出於確實惻怛之心且無纎悉周密之慮講之不精託之非人其齟齬不合未必一一皆有掣肘未免使茍且架漏者指以自文矣使吾發之以誠處之盡善如是而不能行斯無愧也髙明以為如何頂夫兄一出不審僑寄外家昌黎所謂磨肌刮骨吐出心肝企足以待置我讎寃名曰交窮者端為此兄發也是可浩歎豐貺已領却當轉寄昨聞令弟都運館寓燕堂夜雨對酒塤箎交和其樂無涯某以未曽瞻識不敢拜書怡次乞道此傾嚮長公少公名滿天下定當聨韉入對映照班行尚能杭一葦面賀於大室慶禮幅紙抒謝言不盡心尚冀台照慰鄭定齊某踽踽陋巷幾與世隔春初剽聞執事丁太夫人之艱非有的說道路云邈無從訪問又不敢率易奉唁得罪慶門孟夏望後時天彝出示所惠書始知其詳且悲且愧越二日陳廣文來訪亦言得書嘗辱寄聲存問愧且感者以平生知已如執事者不一二數而慶弔絶不相聞豈人之情哉然山川悠阻影響昧昧勢既不得以自通習懶廢事亦山人處士之常態執事誠以古心相照決不以音問疏曠棄絶之是故隱淪不振之姓名猶在湖海容納之內而記存勞來之真情悠然發於寢苫枕塊之餘藹然見於故人尺牘之後吁是豈今日士大夫之常德哉此愧猶可諉也此感則永矢弗忘也執事自罹大變戴星奔馳跋履險阻勞悴甚矣攀號劈踊茹哀飲痛嗟何及矣卜其宅兆負土成墳大事終矣毁不滅性聖人所戒酌飲不入曽子所悔雖欲致拳拳愛助之祝今已臯矣不復措辭矣雖然蓼莪昊天之恨寸草春暉之感豈有新故之間哉况恩深滄海如何報之語執事之素心也讀禮之餘益思盡其逺者大者斯為達孝矣愚聞居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋友不信非孝也戰陳無勇非孝也將為善思貽父母令名必果將為不善思貽父母羞辱必不果此皆執事躬行心得之餘而某又不能忘言者是欲少補前日愛助不及之誠而已某近得魏國張忠獻憂居三帖中謂故舊由公不以其哀若而幸之教使不悖於學道是區區之望也魏公功業之盛年德之尊而其言猶拳拳如此蓋其孜孜求善出於中誠豈勉強者所能此所以為魏公也盛德之事學者莫闕有北山何先生之跋而某與舍姪亦綴數語敢以為執闕將誠不敢效世俗禮仰惟台覽答湖滄王全夫觀下諭之目深見讀書不茍不為入闕學甚善足下可謂有願學之心而缺勇往之志有涵泳闕講辨之工所以義理孤單而滯礙未融也來諭一有所闕未至而其心已有偏倚此三語初看時甚異既曰有所闕事物未至既曰事物未至又安有所偏細玩之則知語滯闕蓋此章大意如當喜則喜而不留其喜當怒則怒而不留其怒有可怒者不以喜而忘其怒有可喜者不以怒而忘其喜此闕失其正留其喜怒此朱子所謂一或闕之也當怒不怒當喜不喜此朱子所謂不能察也忘其當喜忘其當怒此朱子所謂欲動情勝所以失其正也朱子謂於心上理㑹是見於念慮之微者也後章大意是此心既正矣知其當親愛一向偏於親愛雖有可賤惡者而不加審也知其所當賤惡一向偏於賤惡雖有可哀矜者亦不加審也如父子之當愛此心不可謂不正也而不復審其惡焉此正是事上病耕種之欲豐碩此心亦不可謂不正而不能審其已碩亦只是事上病此正是正心以後之事朱子所謂是見於事為之失者不可謂之未安若敖惰者即敬畏之少殺者也非今人之所謂敖惰肆其無禮之謂也曰當然之則明敖惰止可如是而已亦不必疑而缺之也又來諭潔矩一段舉本文斷續不貫而難曉本說君子能潔矩然後上行下效而天下平恐人不識所謂潔矩又解其義於後今如來諭但欲識潔矩之義而不必行潔矩之用也而可乎所謂自得者乃自然而得是集義所生者獨自得之如義襲而取其弊至於尚新竒立異論為吾道之害矣不踐迹聖人病之也非取之也此外已言之更不重述通蔡子明曩䝉謙光訪别於今五年中間僅能一上主書之敬䝉答教甚寵且有名詩巨編之賜嗣是影響昧昧益守隱約雖聞榮登魁甲分教上饒慶事蟬聨俱不敢修一紙半行以溷氷矑者非慢也雖以禍患相仍亦山人處士固陋之常態意足下仕路崢嶸交逰日廣東閣之下英俊如林那復念及疏懶無用之書生哉立齊姪出示手書乃䝉寄聲存問恍然自失不自意不肖姓名猶在齒牙悠揚之間捫心感愧銘篆難忘仰惟久軒先生負一世之重望結聖主之深知坐廟堂參大政天下想望其風采鈞衡之拜四海蒼生日夜延頸以俟况如某者久䝉賢父子顧遇之隆其為矚望蓋可知也竊聞議者曰方世變之轇轕國勢日輕國計日匱弊幸日繁民生日困天下事幾不可為矣久軒抱經濟之學行其所無事物來順應未嘗作意也今天下之大本在前星之名未正關雎之求未廣雖妙選宫僚往往牽於避忌之多端而不得盡其針規涵養之實又今日天下之大患在北司之勢鴟張羣隂磅礴衆正塞瘖蔽惑人主之聰明斫喪士大夫之心術未形之幾不可不慮又舉一世之大弊士大夫奔競無廉恥茍且不事事州縣之疾苦不聞財貨之本源不講邉備之單弱不恤甚而綱常淪壞而不知但有富貴一念浩浩乎不可遏此所關者豈不甚大而廣又恐不可以不作意也愚嘗謂天下之官莫尊於宰相亦莫難於宰相凡一時粗有才望莫不於此敗其所長者前後相望何也蓋天下之事機無窮一人之志慮有限彼皆欲獨運以專權徇私而固位此其所以為取敗之道人主無職事在論一相宰相之職雖無不總其要止在於收拾人才而已賢者養其望能者責其成智者竭其謀勇者盡其力合一世之人物共一世之事功各因其才而公用之吾何容心焉此真所謂不作意而行其所無事者也然人才不易知非廣詢博採參伍其賢否何由可以得其長而當其任顯趍庭之際盍請於久軒竭一時之祿賜大作規橅闢翹材之館廣聘天下之名士以居之日孜孜而訪問焉須得平生不識面之人凡目下稱師稱恩而有求者不使充斥乎其間當有竒謀精畫效忠於前者則深謝之謹識之熟講之力行之其私謁者斥絶之果能如是何世變轇轕之足慮乎豈惟相業規橅光前絶後而於東閣令譽休美亦有關也此呂正獻張宣公之遺範左右其勉之謹發愚衷上答記録之盛心若夫為治之大原大本動關上德非草茅之所敢言及於政事之至纎至悉綱目多端亦非筆舌之所可既青燈夜坐嘗與立齊商略之或恐自能詳布于左右謹奉書不宣答季伯韶幸甚得𨽻部封一氓之數遙望使星炯炯斗牛間可仰而不可近豈敢以一字干其常分哉自顧隱微不肖何足以辱眷記而不忘如此特枉墨妙勞問劬劬且有折俎之饋此尤出望外下拜極其感愧屬以郡政不綱居民延燎燬其七八百年之星祠井里惴惴度日寓公率以義約為救焚之備貧乏如某亦在推擇不免質衣物以奉承不知造物者於何處持盈虧之權隂有以助之義也捧來諭不覺失笑賜問三政何先尤認謙處不鄙夷之盛心若社倉有名無實義役豐歉不齊又非一路通行尚可緩也若夫歸併一事即過割稅賦也此則今日州縣之通患婺郡二十年不過割矣貧富之不常年異而嵗不同烏有許久不進不退之理此勢家巨室之不願聞而暴官汙吏之不肯行也由此逃亡戶絶者不與釐正而稅長代輸破家蕩産比比皆是而爭役之訟自是而擾擾矣不清其源不行之力未見其有益於百姓也此不望於厚齊將誰望賢昆仲當今偉人皆清廟不可缺之器明堂不可捨之材豈久於外臺者顧即矜念民可少蘇非賜問不敢僭及云云答何師尹某迂疏無用茍全性命於陋巷誤䝉識察即以臭味相求開心布誠傾倒無餘藴雖平生故人有未能然者自顧何以得此於當代之偉人哉自是以來此心炯炯依嚮頃刻未嘗忘書疏之疏密政不足計也好風西來氷函飛墮龍蛇滿幅英論竦然遙聞康廬彭蠡彌髙彌深敬審朱明未垂暑氣未生羽扇牙籌敵塞民飽合候某憂患餘息生意剝落殆盡所以自治者甚疏亦無以淑人而况利欲波蕩士習風靡安有向此冷淡生活者杜門自安其拙而已北山先生時有失血之證氣體多倦年來亦少講說以是無足為執事道者執事去學校而治兵理財世俗之見宜有未解者吾儒之學無精粗皆當為之事牛羊會計聖人亦盡心焉自古言理財者多矣未嘗知善理財者莫善於儒者自古稱儒者多矣未嘗知理財亦儒者分內事今廟堂何所見乃以執事為之此漢唐以下之所未識是豈果有取於此乎亦偶中暗合耳不然何他事之未善也執事之不鄙夷其職隨事輒效所以寬民力以培養國本嵗蠲百萬在他人為甚難在執事特餘事也有如神機絶識而可但為國用支局而已乎大則當運籌決策於用兵之所次則折衝禦侮於形勢之地可也今在外不離於九江之境豈天意亦有所屬乎使之習風寒熟事情將以大任也察敵勢之虛實審兵將之勇懦上聨襄蜀下援長淮善用兵者未嘗不於此而展布焉此豈酣豢富貴者所能識此執事向者不勝西事之憂言於當路增湖右之戍誠為急著似聞未能盡如執事之請而招軍已至內地人心驚疑無肯應者似聞已有中輟之㫖此蓋長沙所當深慮竊聞其幕府泰然未審果何如也區區之愚不若且移副閫舊治練袁吉之兵亦次者也台意以為如何書生不識時宜然亦同此憂國之心願執事專意講求西南之衝要於閒暇未及然之時今之攫攘官職者必退避於緩急之際未必非執事當此重擔惟髙明更加之熟慮若夫豐碑巨碣意則雅矣句則健矣讀者知所警矣執事談笑翰墨自是出人數等於斯時也而可以此為事業哉區區所望於執事者非止此也執事交盡天下士亦何取於某豈以其無用於世而不以戇直為嫌乎今之士捨科舉之外無他學也世之所謂有才具者又皆出於俗吏之手豈識儒者之實用哉惟執事當以儒者之實用立門戶世俗伎倆屏去之幸甚九江乃陶士行之故治也其事業亦有當於髙明者乎答吳松林近聞逺趍邉閫密贊機謀將有千里之行正恨不得攀送且不得專價導嚮往依戀之忱忽拜誨緘謙德滿紙感甚愧甚又䝉傾倒真情敷露出處之意以寓别尤極感佩執事自桐川歸入山堅坐今四五年矣未嘗不歎咏髙蹈絶識之過人今乃為一議幕牽挽而出方疑執事自待之不厚也來諭以為無官可做謾為祿仕計固非知有榮進之想白首舍已以從人亦甚屈矣今未論因不失可親之人而聖人嘗度時義教人不可榮以祿者其㫖深矣成事不說某不當贅瀆區區之愚更惟裁處於進退久速之宜或恐可以少答知遇之隆也名集細芽拜賜珍藏和靖所書東西銘四針石刻敬以侑書大風正寒乞金玉鼎茵為時自愛自重不勝拳拳之至賀陳本齊共審榮膺帝命分任史權自業麟經久斟酌百王之大法始參鵷序即刪潤四朝之巨編必是非賢否之大明想邪佞姦回之甚愳應笑昌黎之怯懦要追司馬之雄深豈特儒者之榮抑亦古人之幸仰惟慶愜某自安隱約於陋巷不求聞達於當時誤入眷知始終如一平生得此於人指不多屈感佩何可忘自别朝軒恍焉如夢五栁溪山冷舍風月猶如故也風致與人俱往矣如之何而勿思行看進書褒擢正色要津與其誅既往之姦諛不若鋤當今之佞幸此拳拳深為世道有望於君子之得時者如此偶看得隱逸傳中有魏國録掞之胡正字憲與焉此二人自合入儒學中豈有身為朝士而謂之隱逸可乎蘇雲卿之事蹟徒欲節文血脈精神處俱廢矣據所知者如此推之他傳可想日子既迫不知髙明何以處此雖不𨽻卷中有顯顯礙理者恐亦只得早舉而白之無為後悔若大費爬梳亦當且展進書之期可也回鄭親求岩桂賦跋兹䝉寵示岩桂賦倡和欲某掛名其末甚感某嘗整襟端玩皆軒軒然有淩雲之氣誠得當今魁彥印證於后為宜若使潦倒無成於陋巷者㸃綴則為此卷之羞不祥莫大焉由是不敢措一詞謹謹歸璧然既荷不鄙夷又不可不少見微忱佳掣有曰孫枝孰可繼其芳惟子足繼又曰盛美不在豫而何在其自任者可謂甚勇其所以自期者無乃太淺乎何其眇視宗族旁若無人大略矜夸之意多而非所以培養退讓之風也政使盛族果無可繼前芳尤宜哀痛感慨厚自豐植以逺者大者自期可也每舉進士不下數百人賢否邪正雜然並進縱在髙甲又何足以繼先烈仰惟先正師保氣節勳業著在國史播之天下後世豈在區區一第哉某亦潛觀密察賢親天資俊敏自可有為願以器識為先窮探學問根本見於躬行者篤實無瑕則人稱之曰北山之後有此賢孫曽可謂源深流長矣盛美如是始可繼芳也非恃親愛不敢出此語惟髙明亮之回潘丞近嵗得幸獲奉英標於琴瑟書冊間辱眷與厚甚鳶飛魚躍各適其適終不可得而同趣也故人戾青雲翔天表一舉而知山川之紆曲再舉而觀天地之圜方猶肯下顧雞鶩之栖栖耶一札度垂虹而南飛委餘光於陋巷恍然落月之照屋梁驚喜起舞賜諭令姪之事某久服髙誼當時固嘗從臾一語豈知麛鹿之性習荆棘草莽而無長林豐草之志今已備嘗艱難須有悔艾之意彼筆生者不患其不從此却在髙明思有處之庶可終此大惠蓋不徒曰飲食之而已必加教載撫存之然後可玉其成耳未知台見以為如何鹽官趣戍不審合符在何日亦略歸鄉否某病暑入秋尤甚筆硯久荒聞便丞書此以答雅意莫能盡傾所欲言家兄辱賜問尤感令再三拜謝伏乞台察回葉成父某伏䝉不賜鄙夷再辱緘示問仁之疑義肅容三復渙然氷釋尤見舍已之勇求善之力無纎毫固吝之意二章改本已極明瑩剖析甚精不可強指瑕纇矣以愚見淺陋觀之克復二字雖是著力用工非是先存此心如何遽能如此用力所以其他弟子不告之以此正是未有顔子不違仁之功其不能不違於三月之後者便是要他克復以全此仁也其餘日月至者如何便能如此下勇猛手段朱子所謂教顔子以殺賊手段者此也若仲弓正是教他一個敬字以防賊入來耳程子下皆盡二字朱子下一全字亦是合此意思程子云方始是仁者以全體言也此是於令尹問目外因及此耳未審髙明以為如何此間朋友先來多是以為訓做字看來做字不特是粗而亦有病仁是人元自有者何必去做他乃知文公下一個全字是有萬鈞之力來教於此一段恐未明瑩寵示先天圖却於此備見此公之為學矣想是他自有願學之心只是不得師友不循塗轍往往自盲撞剽些道理來說便欲將來立論悮矣康節之學非是難學蓋是不可學若一一定之於數則王道可廢世教可息三綱五常任他作壞不必扶持亂臣賊子任他縱橫不必誅戮何者其數當如是也數之為學固不可謂無此理自是天地間一珍祕物事不可將來治國平天下此聖人所不學也以二程與康節如此密熟甚欲傳與二程而二程不肯承當者是誠無用於世教也但渠精於數因用心推得天地萬物之理於吾道無悖是以程朱以來推尊之而不敢非也若是正面工夫只是數學後學求聖人之道自有正當常行大路正不必向康節腳下喫辛苦討道理也於此可以見他無師友盲撞處亦甚可憐也非䝉尊兄下問之勤何敢放言如此然亦不敢以為是惟髙明有以印證之答未發之書尤更直截分明不知疏菴新昌之講是何人後便乞賜報夫仁義禮智信性也皆未發者也本不可形容孟子是將情來說因其見於外方知內有此理耳未動之時如何下注腳不知毅齊如何說未發之體併乞推教復陳本齊某於臘月二十有六日拜書修慶凂唐實夫轉達未知何日可徹氷矑嵗正之四日伏領賜書正某修書之日也是日金華有雷電之變知契好不替吻合如此何感如之某學識淺陋不敢妄論古今兹因執事與修史筆敢陳管見亦不暇詳其條目姑以大綱言之太史公之八書嚴矣所包固有未盡而封禪何足以專一書其後立儒林傳乃與佞幸滑稽雜流並列何其識慮之不髙也猶有可掩瑕者能以夫子列諸世家而門弟子附焉以老莊等自為别傳亦知所尊矣班固作十志視八書有分有合有增有損而藝文之為志名既不與諸家雜出而崇儒重道之意比太史公益下矣范􅎡之紀東漢不得與班固並稱自古之論然也􅎡乃别出文苑一傳於儒林之後既知有本末又别立黨錮傳於前則其識不可謂不班如也此傳雖前所未有義所當立且東漢之盛孰有踰於黨錮諸賢哉魏晉以下固不足言共推國家之所以逺邁漢唐者亦以周子再開萬世道學之傳伊洛諸先生義理大明盡掩前古今上聖德巍煌未易形容其有關於世道之最大者莫如封五子列諸從祀崇尚道學表章四書斥絶王安石父子之祀也今四朝大典成於今上之朝舍此不録縱史筆極其典法而五子之徒浮沈出沒於列傳賢否之中便無精彩豈不為千古之羞嚮者敬岩姪嘗奏請於朝乞立道統傳朝廷不肯取㫖收索宣付史館區區之愚以為道統立傳却小了道統當作一志豈不勝於經籍藝文之志乎若欲作傳則當曰道學傳終不如志體所該全備伊洛以來門人弟子著述書目悉可類聚首載吾道今上臨幸辟雍之詔吾道粲然可以上接夫子世家下陋東漢黨錮豈不偉歟此非導諛於君也將順其美是以格其非心大臣愛君無所不用其誠蓋如此某因有白事雖私實公乾道庚寅先大父諱某宰長沙葉丞相某宰於潛劉史君藻宰崑山皆婺人也皆以邑宰聞孝宗留意字民之官幽隱必達一日三公俱被召天下翕然聳聽莫不奮厲五月大父面對稱㫖即差知嚴州實代南軒張宣公辛卯信州驕卒作過兩易大父知信州壬辰冬召赴行在十一月十五日奏事十六日徑除金部郎官繼賜奎畫訪及治道癸已五月兼崇政殿說書秋以讒者謂大父漏泄禁中語出知饒州自是老於麾節間恐此事實録中不曽登載不特大父被遇上恩之隆如此尤足以見孝宗考察州縣之能否破削資格而用人無朝蹟而徑除郎以庶官而䝉御筆兼說書皆當時異恩也是以宏模偉德之一端恐秉史筆者之所欲聞子孫沈淪無由録送上官幸執事左右史事不敢不聞大父事實見朱文公文集第八十九卷神道碑銘之內大父官不至立傳今不至立傳而得傳者亦不少某之事力不能進狀今聞從伯祖尚書諱某新得入傳按史法亦有附傳之例大父與錫山尤公為同年進士情好甚密大父卒錫山亦賜誄辭或辱鼎重轉達史長得附傳以垂不朽豈特存沒被惠而亦足以補孝宗聖政之分毫進退惟命非某私情所敢必也某家藏宋秦公唐史吳兢傳稿一卷其蹟粲然惜向者不曽拜呈當時李文簡公亦為大父跋數語即模勒鋟木于史館某亦得墨本今以納上不知此刻今尚存否吳公真足以為萬世作史之法則而秦公刪潤之功大有警發恐或可以少裨大手筆也答王景梁昔往南溪攀别而逸駕竟已先驅悵然而返耿耿至今之日伏奉手畢之光慰感柏懷謙詞滿紙推豫過情此則非所敢當宗兄坦夷磊落刻厲辛勤青雲之科不占已孚舉業如是足矣邇此青春鼎盛蓋亦用功於根本之書以培養其窮達之良心開眼闔眼無非受用之實地記得朱子語録中有一段說用舍行藏云他人用無可行舍無可藏惟孔顔有以行有以藏於有字說得極重雖未必當時聖人之意於學者警發有功若夫家貧親老别無妙法只有敬德修業四字須是念念在心以聖賢為標凖蓋自古無餓殺聖賢也此某平生勸勉友朋之拙策聞者莫不笑其迂自謂忠於告人莫出於此若欲别求妙法則墮坑落塹者紛紛皆是不審髙明以為然否吾儕逺書諛語彛儀皆在倚閣之數併惟識察答蔡子明某此月初得之郵傳天下開悟王言載敷尊公久軒先生升華邃殿暫逸琳宫知衮衣之將歸副鼎鉉之素望政恨未能求端便肅晉賀櫝立齊歸反辱寶墨雙函以宗文賦警策晦陋上原大道之傳下閔邪說之害指示後學之正極其坦明伏讀竦然起立又知褒拂過情將有堂職之命尤極愧惕但某學不自力老未有聞上不足以窺聖賢之藴下不足以騁功名之塗抱塵編蠧簡於陋巷守天下之至拙何足以宜振德之賜此蓋仁齊平日以人物為已任不忍一夫之終棄政恐鼓康瓠於大雅之側適以纍知人之鑑既聞時論一新得以全純愚而安隱約豈勝大幸竊惟仁齊以髙明之資更練世故洞達物情運量斯世如鑒如衡不失毫髮天假閒暇正欲培益其積纍之原益礪其問學之精願於此時寶育神明使心廣體胖上以左右尊公副四海具瞻之望下以蕃衍英嗣續三世慶源之長區區之愚不敢道諛於尺牘中以為盛德之報狂生故態不入時大率如此伏丐錫察答何寬居某自去嵗修貢謝忱匆匆不能盡所藴而書生疏闊當世事情妄議天下事既而不覺自笑政欲髙明知山林腐儒真無用世之才可以置之度外而某亦不敢以尺書復進於氷臚非敢忘德也出處塗轍不同也伏自榮登朝著擢用日穹曽無一字詗候起居頌望經濟真不足置之齒牙無疑矣因北山之回介拜書餽之甚渥雖曰錫類之仁真無所為而為者尤見義利之限界甚明也發書啓篚則精畫名刻在焉盥手揭之素壁蓋執事以平日之所受用者開論後學甚切但塗轍分限俱含兩端使學者何所擇至於詞真氣溫量寬鑑嚴自是名言亦恐方圓大小二句終未能勝也人知此二句出於孫思邈而不知孫又出於淮南子渠更有一句云能欲多而事欲鮮雖與上二句未稱亦自有味也髙明以為何如又䝉録示西南備禦之方尤見憂時體國之要策蚩蚩熟寐誰慮及此不必伏波聚米而形勢瞭然在目西邉防禦添兵雖不多已為兩路之重因只得且如此經理古郢之要衝非識古今形勢之精不能及此蜀運之急尤今日之最當先者若止取辦於荆襄似亦非計不如勉其復四川之險要護成都之沃壤則蜀運自寬若夫屯田清野之二病非一黃榜所能革此則恐缺區處愚不知兵妄意如此但今日之患上下無一定規模若主議之人在內則恐奉行於外者易差主議之人在外則恐居中主張者易搖所以今日事事無終始績用不成者此也或得於西邉專一道之事力略如維揚之任責使之經營積纍以數年為期庶或可以稍成頭緒但君臣之遇合難保古今功業之難成其成其否天也非人力之所能必也然食人之祿立人之朝義當自盡其心焉耳扶三綱不至於沈淪拯百姓不至於塗炭賢者未嘗無此願也事之不如人意者何限豈得盡如所願哉畎畝微生日夜望聖君賢相以天下為心損上而益下瘠已而裕民邦本固而公道昌庶幾如執事之髙明翕合衆志赤心任責尚可為也未知能副此願否未知何日得拱丈席以聽開濟之規臨風馳神通陳本齊孟秋既望風露已清濯纓垂佩人望益髙后皇嘉相五月末因碩夫兄行嘗附一書以道仰德之誠必已上徹氷矑繼是天氣向熱痼疾微動兼為濕氣薄腰腿間屈折頗艱由是尺書不嗣七月初忽聞執事去國為之惘然繼之以喜執事之去甚善矣猶恨其差晚也審執事之踪跡固明矣猶恨心事之未盡白也雖然頽波滔滔峙柱獨立信賢矣哉某嘗愛坡公之言曰問世之治亂必觀其人問人之賢不肖必以世考之然亦如之何而考也不過出處行藏進退語默之間見之君子不容於世君子何病時之羞也君子茍容於時時亦何病君子之恥也能各知所恥則世與人兩得之矣執事之去盍力請於師尹得郡之時乎師尹之去固甚巧矣章貢之行未盡善也心迹俱明者於此時惟陳右司一人而已師尹之歸匆匆一見且曰少定再入城當從容也既而又匆匆過城挾無適行矣無適於是得脫陷阱其言謂西澗迓從回至此催迫就道若果未有行意亦何妨却之我之遲速豈吏輩得以持其柄哉此事姑置之鄭定齊曽聞其消息否昨傳其得興化既而興化屢易守獨不見其姓名心甚疑之執事必知其詳願垂一報潘介岩既歸則為終焉之計亦無一字入城府但聞其卜築為人所誤未為穩也書生舉事不免一疏尤見此老之淳德林國録秴韓架閣境皆寓金華二公人物雖不同皆佳也亦得時奉從容餘非淺陋所知執事一出五年乍歸家山其喜可知僭有髙風行一篇姑見頌美之意幸垂藻鑑謹專人詗候起居家兄臂痛不果修書立齊姪别已拜書令似諸位德業日進和父既得胄牒魁占無疑不敢拜狀乞斥名瞻見未期敢乞康濟一身自致中和倚需時運之復以大發揮回楊行父一别芝宇轉矚十餘載回首遊髙明諸同志如在天表清夢栩栩未嘗一日不懷想瑞岩便至忽領藻緘髙誼不忘既慰且感浯溪古刻分惠此意尤厚緬惟即日嵗云暮矣霜旭烘晴侍學有相雅候萬福貴集中外鴻祉惟均某冉冉餘齡待盡陋巷幸有殘編翻閲如見聖賢此心不敢怠也垂諭堂扁極荷不外某素不以字稱何足以承盛意只此二字觀之則知學識迥出世表所以處家持身得其要矣遂欣然勉強一書併綴數語以復來施未必可用更惟裁處某近刻何北山所著魯齊銘以墨本納呈至希一覽無由會晤願言力學躬行善保斯則為千萬世子孫之基不勝拳拳謹奉狀不宣回陳樵翁維時急景凋年雪慳寒薄共惟梅邉雅興塵外髙談白龍薦祉尊候動止萬福雲關仙輯錫慶川融某束書聖則獲並英游餘十載矣每辱加念墮筆底龍蛇之寵光彩陋巷式重斷金嵗寒之心度越世表不勝起敬不勝懷感仙都水患固久未聞連嵗之頻仍濕氣著人故易成疾此亦氣數適然非一人所關係於不堪其憂處樂亦不改方見學力也物價翔湧非實貴也會日輕而物日昂勢所必至小民從容不見窘色此最是好時節不敢歎我生之不辰某雖無用於世七十六年喫了二百七八十石米可謂古今之幸民造物之賜侈矣旦莫入土尚何言哉尊諭書堂氣象翕習聞之不勝欣慰以諸賢扶持作成之盛自應不同但欲求前廡於他部殊非策也第一是人情不相知風俗不相入却與仕宦者不同他職尚不可况於直學乎此尤不知所以上承雅意敝卑士風不競久矣如某掩關衡茅後生英俊望望去之罕曽識面何由知其賢否苟未有交承則前職未可解組或先有才望佚之已久不妨再任儲材當在平時若求於臨期必至於苟且矣惟執事加之意風鰻之賜甚感久要不敢不拜靜念疏陋無益於聖則每嵗必䝉專價問勞固足以見嵗寒之盛德但舊朋友在堂甚少新者不相知妄叨重惠掛名簡書起人厭薄今天運將周不為不久用敢拜手控辭乞注於籍今後不必專價或因有便一札半行足表交情臨楮忱禱非敢自取疏外不盡歡竭忠聖賢之訓也瞻際無期願言金玉體府以棟吾道拳拳不宣回於晦仲某老境寂寂急於嵗莫幸未寒殘編斷簡之盟思我良朋恨無飛羽齊藏忽有好音璪緘在手垂露粲然欣審即日霜旭烘晴綱維聖則台候有相萬福來諭纒繞塵俗此固人家所不能免然日用酬應何莫非事事所當事即此是學一事一物之中有無限道理不當厭棄事物閉門獨坐方謂之學也且聞堂中依前翕集只是舊友甚少耳况今右司新被朝命主此精廬神交氣感多士景從當襟佩雲合也某衰盛無益於書堂每嵗必䝉遣價訪問生死此意甚厚甚感激無窮但年運而往今已十載無益有損後之來者聲問不相接必出勉强或為虛費之纍使拜受尤不安願嗣嵗倚閣此例庶幾安分免貽殘喘之羞幸甚玉峯得書云今年書堂再被水浸濕氣能為人患殊缺良策不審可山頭起幾間否今夏荷周平之來欵數月唤醒舊夢但某生意甚微不足挽其久處為之慊然某被嘉惠甚腆公帑私覿兩極其至祇受皇恐無以侑書謾以絳炬百兩凂使價復於執事切冀容留會叙莫期願言力學自愛益大逺業不勝忱禱不宣回韋軒某不敢以籖府彝儀自取疏外近領台誨光風襲人違仁滋永思仁感深曩者髙軒數過蒼苔間今猶隱隱有石聲也伏䝉紆念寂寞華豫嵗莫五雲之朵先春而來欣備彩衣受命玉筍催班難為弟難為兄一出一入賢哉父賢哉子拜後拜前真體元為萬化之基兼思孝備一身之美朝於王所允若天心豈特親愛之交歡亶為國家之盛事聞郵音而倍喜就慶牘以非恭仰祈鑒宥某衰伏窮簷賴庇茍安尚勤綏軫頒寶劑以扶其龍鍾封名畫以寓其繾綣意重丘山感深河海少延殘息實出大生揭雙軸於坐隅拱髙風於天表匆匆治報未盡精微惟洞然相白不宣魯齊集卷十七
