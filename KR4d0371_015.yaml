body:
  text: 魯齊集卷十五宋王柏撰續雜著皇極總圖四元辰元日元月元嵗元世元運元㑹元元㑹辰㑹日㑹月㑹嵗㑹世㑹運㑹㑹㑹元運辰運日運月運嵗運世運運運㑹運元世辰世日世月世嵗世世世運世㑹世元嵗辰嵗日嵗月嵗嵗嵗世嵗運嵗㑹嵗元月辰月日月月月嵗月世月運月㑹月兀日辰日日日月日嵗日世日運日㑹日元辰辰辰日辰月辰嵗辰世辰運辰㑹辰元右一日水日火日土日石日辰日星日月日日月水月火月土月石月辰月星月月月日星水星火星土星石星辰星星星月星日辰水辰火辰土辰石辰辰辰星辰月辰日石水石火石土石石石辰石星石月石日土水土火土土土石土辰土星土月土日火水火火火土火石火辰火星火月火日水水水火水土水石水辰水星水月水日右二乾坤乾艮乾坎乾巽乾震乾離乾兑乾乾兑坤兑艮兑坎兑巽兑震兑離兑兑兑乾離坤離艮離坎離巽離震離離離兑離乾震坤震艮震坎震巽震震震離震兑震乾巽坤巽艮巽坎巽巽巽震巽離巽兑巽乾坎坤坎艮坎坎坎巽坎震坎離坎兑坎乾艮坤艮艮艮坎艮巽艮震艮離艮兑艮乾坤坤坤艮坤坎坤巽坤震坤離坤兑坤乾右三八一七一六一五一四一三一二一一一八二七二六二五二四二三二二二一二八三七三六三五三四三三三二三一三八四七四六四五四四四三四二四一四八五七五六五五五四五三五二五一五八六七六六六五六四六三六二六一六八七七七六七五七四七三七二七一七八八七八六八五八四八三八二八一八右四元㑹說元之元至元之辰此所謂無極而太極也元㑹運世嵗月日辰雖未有跡之可尋而其理已粲然備具于中矣元一㑹一此太極動而生陽動極復靜靜而生隂靜極復動一動一靜互為其根之時也㑹二此分陰分陽兩儀立焉之時㑹三此陽變陰合而生水火木金土五氣順布四時行焉之時無極之真二五之精妙合而凝乾道成男坤道成女㑹四此二氣交感化生萬物生生而變化無窮之時惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣惟人也以下當在㑹六之首㑹五上古結繩而治穴居而野處葬者厚衣之以薪葬之中野不封不樹之時也㑹六聖人始定之以仁義中正立人極之時於是有伏羲氏之王天下也仰則觀象於天俯則觀法於地旁觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情作結繩為罟以佃以漁蓋取諸離庖羲氏沒神農氏作斫木為耜揉木為耒耒耜之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之垂衣裳而天下治蓋取諸乾坤刳木為舟剡木為楫舟楫之利以濟不通致遠以利天下蓋取諸渙服牛乘馬引重致遠以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫斷木為杵掘地為臼杵臼之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽易之以宫室上棟下宇以待風雨蓋取諸大壯葬者易之以棺槨蓋取諸大過易之以書契百官以治萬民以察蓋取諸夬邵子於堯之世始紀甲子於甲辰之下書唐堯即位於是即其數而推之具管見于左一元十二㑹一㑹三十運一運十二世一世三十年嵗月日辰如常數此邵子經世之大數也蔡西山曰一元有十二㑹三百六十運四千三百二十世猶一嵗十二月三百六十日四千三百二十辰也又曰一元有十二萬九千六百嵗一㑹有十二萬九千六百月一運有十二萬九千六百日一世有十二萬九千六百辰皆自然之數非有所牽合也愚竊窺之以為元㑹運世者先天大運也布算推卦宜如先天圖一定而不可易嵗月日時後天小運也布算推卦宜如後天圖微有不同而實本於先天也述民志辛亥之秋婺當大歉皇天仁愛下民特啓上心賜之良牧仍以部使者之權鎮撫之以活千里百萬生靈之命旄倪鼓舞而相慶曰而今而後吾知免于溝壑矣竊以為下車之初所當先者莫急於講行荒政輒述民志條具如左一曰大寬民力首乞出自特筆勿與官吏議亟行曉示及帖諸邑將淳祐十年下五等稅賦盡行倚閣候來年麥熟起催蓋周官以荒政十二聚萬民一曰散利二曰薄征方當萬目睽睽觀政之時首聞此舉出自特見喜躍可知實荒政之先務收拾人心之大機也議者曰既倚閣十一年稅賦而不言十年者何也蓋善良下戶真實貧弱者往往保長催納無遺所負者多是姦民猾吏計㑹拖缺以希橫免其善良者實不霑惠今止言十一年分以其當年旱歉之故均行寬大之政非欲惠姦猾也所謂勿與官吏議者無他意也蓋官吏往往不識治亂安危之大體徒能剪剪以目前窘乏為憂其言必曰郡計赤立倉庾無再月之糧軍士冬衣錢未有指凖大閲未有支散今年大禮諸軍未有給賜此皆至急至迫不可闕者安有餘力可以倚閣稅賦哉此則固所當慮者其實不然小戶斗粟尺帛何足以補郡家之大計郡計之匱非實空虛也幸自有遺賦在民但不在此等下戶耳州吏無遠謀大濶略於外邑止取足於金華縣吏無遠慮止取足於在城大縱弛于外鄉然其所以濶略者豈徒然哉皆有所受而不敢督促今若察見此弊改絃而理之不一二月不慮無財所謂無政事則財用不足豈欺我哉必不得已茍欲作急解目前之匱窘州庫自有金銀器皿責付郡吏時暫質之大家便可從容矣何至過憂乎二曰急聚糗糧首乞申奏盡借常平見存之米及申奏告糴于浙西劄下樽節通放目下雖未當便行賑濟急借常平之米何也蓋數年以來求外邑之米顆粒不到州倉一郡之遣盡仰給於金華一邑所以州倉無儲積金華米價翔踴故目前雖知旱傷之可畏州縣仍舊預借十一年秋米以應軍糧公私交窘便覺氣象皇皇今急借常平之米便可抵數月之用待檢放已明然後起催民戶無詞次第輸送亦自不誤賑濟也且得上下無煎迫之態足以差慰人心申奏告糴須當寬作數目以二三十萬石為約其實未必用十分之一也事固有先聲而後實者寬作數目不特人心大安有米者不敢閉糴矣須乞行下臨安府嚴州置歷批放不許阻節三曰置局講行一乞親書數劄于上寓公次則吏書問所以救荒之策庶幾博盡群議其要自在籌度其可行者行之一乞牒通判主局見在中寄居如季通判鏞徐通判邵孫王知縣夢得等皆號通才或請為局官同共商議一乞便請局官探訪士邑見任官吏七邑寄居士友公廉通練者姓名類為一册以待差委一乞即差官檢踏旱傷抄劄戶口檢放雖曰有定時往往率意遲緩民不能待耕荒以布麥所差官不見腐苗朽穗不敢多申分數所謂檢放者止得蠲少秋賦而夏稅科賦凡十餘色之費固無所從出況又秋賦蠲放不實民力必至大困今早禾雖已收割趂晚禾尚在田委官得分數之實也若抄劄戶口之官乞即與檢踏官相繼而出使千里之民知有賑濟之望民心自然大安必不輕棄家業流離四方矣一救荒有二名一曰賑濟二曰賑糶夫賑濟者皆老幼病患無依倚無經紀之人也既抄劄姓名審核給歷直計口食而供養之而已若此者料亦不為甚多既有常平之米又有社倉廣惠倉之積皆當撥為賑濟然社倉廣惠有名無實有害無利不于此時而盡散之空誤朝廷指擬此米為害未已也其間亦有已糶者索其錢凑為糴米其未糶者預期告報撥𨽻何所先常平之散若以此三項米賑濟度亦不為不足夫賑糶者減價收錢而授米也價不減無以謂之賑價太減或能激其穹視市價之低昂而略損之可也使人人知州郡有米其如此之多而不知者無所規利價亦不至於太穹價不穹而市有米荒政舉矣一局中不可令富室干預蓋為富者不仁巧為謀計以便己私書生陷其中而不知也昔趙都承於此講行賑荒也官吏嚴明規模詳密深山窮谷亦有米可糴民到于今或稱之然當時之大害政與巨室為謀其一以物力敷糶其二抑價太低以物力敷米者此富室之大利貧弱之大害也婺之上戶非浙右江西之比號至富者不可班于兩路至劣之家其所謂第二三等戶蓋有極窘匱者今以物力敷糶例以上三等為凖則當敷者戶名多實富者得數少言若均一而姦計正在此中物力之不足憑也尚矣自經界來不曽推排物力數年來不曽過割稅色其産去稅存者至多此物力之虛實不可憑也兼物力中墳墓山樣竹腳池塘無米可收故貧乏之家為物力之纍無力陳乞畏憚號令不免破家賣産糴米以應官司之敷而上戶富實者不肯與人收割物力反少可以拱手安坐以待髙價之利富益富貧益貧其大不均有如此者大抵人戶得歷頭受賑糶者無戶口十分之二而告糴於人者不可以數計也官既立價太低有米者必不肯甘心盡出低價耳目之所不及威令之所不行必閉糴而不售無賑糶之例迫于一饑必將哀乞于人盡力私增倍價期於得米而不敢言官價雖平而私價不期穹而自穹矣當時私價踰於官價二倍是知物力均敷名雖甚公而意甚私官價太低乃所以激私價之必髙此不可不鑒一下本局選有心力官吏往平江糴米須於目下即料理啓行要在運司大農等未和糴之先趂辦庶幾價廉而米易得緩則價穹而無可糴之理彼蘇秀之民勢須應副朝廷和糴豈敢糶與外郡兼浙東旱傷之州亦多若他郡皆出此計則後至者束手今以郡計盡數約之或可糴三萬石米既至則糶常以萬石之資循環于道路旋糴旋般隨糶隨糴雖果至三萬石可也仍給榜外邑召募客販許陳乞實數借本州米歷于關津通放却欲此米在本州出糶只依時價更不裁減如此則應募者亦必多向者但能科米於一境之內而念慮殊不及遠故施狹而民困四曰消弭盜賊周之荒政十二曰除盜賊凶荒之年民迫饑寒盜賊易起與其除之于已動孰若消之於未形今州郡講行荒政既早轉糴米數又寬姦民固已無詞搖動民心更能疏剔獄訟不致淹延禁戢豪强不相侵奪如此周防曲慮庶或可保奠枕近城間有一二宗子把持州縣専以欺詐白奪為生者或足以召變又聞逺鄉有數處専為羣盜之窩藏逋逃之淵藪晝伏夜出三五為群帶刀塗面牽牛椎狗劫掠財物幸未至於殺人此亦嘯呼之端也城中則有開匱坊停賭博者其風甚盛多是十數為黨倚驕惰之卒無藉之胥為之持局引誘良民欺騙博脫合分財物恣其醉飽此盜賊之所由生也遠鄉無窩群盜無所歸著不能糾合其黨城中不與廂吏通同則為盜易敗無以行其術廂吏窩家皆盜賊之盟主也須行痛治此外又有鄉村惡少平時無藉挾刃劫奪雖未成黨歉嵗既無一飽之資乘間抵隙亦能倡為不靖如此等人乞帖鄉都官密竊體訪以姓名來申視其人數多寡或令津遣前來就教場擘試武藝精者或補刺軍額次者充巡尉司弓手又次者或給賑濟口劵或責付義役莊量給廩稍使充本都緝捕盜賊此皆欲消盜賊於未形之策也五曰斥逐貪官暴吏此等人於樂嵗豐年未見其甚害當此凶荒其能激變召禍也必矣廛氓不敢指斥姓名乞採之公論壁立萬仞力行斥逐之右五議未能詳盡又有不能自已者蓋千里之民深恃賢使者為更生之命厚我所以厚蒼生願明公勞于求才逸于委任執要以御煩舉綱而振目愛養精力為應變周慮之本毋自困于簿書期㑹之中此又吾民之深懷干冒崇嚴不勝震愳魯齊集卷十五
