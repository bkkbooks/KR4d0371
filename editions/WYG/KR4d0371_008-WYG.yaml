body:
  text: 魯齋集巻八宋王栢撰書上宗長書論掃松某竊謂人之所以為萬物之靈者以其明天理秉禮義不忘其本也是故先王之制禮自天子至於庶人所以祭其先者節以世代之數今掃松之祭野祭也古無是祭也古無是祭而今世俗行之無敢廢者雖閭巷小人貧無立錐當清明之時一陌之紙一豆之飯猶徘徊於火塟之所而寓其追思之誠何也所以約天下歸於厚敬其所自出也敬其所自出則凡塋域之所可考識者固不以世代為限此所謂報本反始之禮禮者節文此天理也吾宗亦金華之望也其聚族之㑹者有二曰月旦之㑹曰掃松之㑹月旦之㑹所以示長幼之序掃松之㑹所以致追慕之思月旦或有時而缺掃松則不可缺也雖閭巷小人猶不敢缺況吾宗其可已乎自始祖而下至於一府君其塋不過七所上世諸尊長約以三位輪掌丞相位一年十一府君𣲖下共一年三三府君與尚書𣲖下共一年大約所費不過用二十有餘貫故尚書位計錢十有二貫九中散位計錢六貫十八承事位計錢六貫此例行之非一年矣十八承事位下每次係三五叔三位主辦前日䝉三五叔賜訪以三七叔位窘之辭又䝉三九叔賜柬欲行權免然某人㣲行卑非主宗盟者何敢容喙但以卑下奉承尊長之命豈敢恝然而不報退而念之所費本不多而此事之所闗係甚大不特有以啟鄉黨之譏議而天理之在人心者其可冺乎則某之躐次而言不為無因夫子孫之不能以皆盛也固也亦幸而不至於皆衰則盛者其可保乎今族人咸曰三三府君𣲖下之最盛者莫如尊叔今之人往往謙冲遜避不敢以盛自居然於此事則不當不以盛自任也咸欲屈尊重與三五叔合之則每位不過用三貫而已通以三年輪掌計之則每年不過費一貫之貲固尊叔之所不足計然所以植立門户持扶天理誠非小補諸族人不敢以此禀聞某竊謂尊叔握空披荆創造基業親戚鄉黨莫不推重是豈僥倖所能及乎而況二賢弟學問卓然此理洞明何待愚者一言之悟正以每年循習舊例不知此曲折也誠使尊叔知之豈不飜然驚奮大抵不以此禀聞者抑以待尊叔甚薄也然某則不敢不禀拱聽尊命答嚴陵史君書比聞嚴之彫匱甚以為憂辱書乃知傳者之太過深以為慰此無它葢它人不能措手而賢者不勞游刄耳若人人皆可為則又何以見大才别利器乎又聞史君入境减騶従儀飭去供帳浮費大艘運米尾尾隨至仁聲仁聞固已先入其心教條一頒自然樂従也甚盛甚美區區之見以為賢史君不常值也朝廷之米未易常撥也嚴之民未易頓裕嚴不産米其來已久每視上游之商舟至否為之豐歉年來米禁既宻賑助不至軍儲日窘民食日難嚴固有疾視婺人之意今欲平其氣厚其生不若請于朝乞蘭溪一縣撥𨽻于嚴然後嚴可為矣蘭溪𨽻嚴不特此縣之米饒裕足以充嚴之虛而衢婺兩溪之米俱可通矣使禁截極嚴宻不能俱絶也嚴合六縣而不足當蘭溪一邑之輸而尚可以為州乎議者不過謂嚴𨽻浙西婺𨽻浙東難以錯雜割地殊不考嚴之建徳梁晉通嘗𨽻東陽矣婺之浦江亦嘗割富陽之地矣二州雖屬兩路均呉國之境土或分或合各得其宜何拘攣之足徇以今日行都言之嚴猶王畿之内豈應貧陋如此甚非所以拱衞王室藩屏京師之意或不得請只乞割蘭溪水西六鄉又其次焉以地言之既與嚴接境又居浙水之西屬嚴尤便更或不得請則奏疏敷陳不厭再三或朝廷終不肯従亦當列其利害及奏請始末大書于石植之郡治以待有力者繼之可也儻幸此請或行永為嚴之大利邦人感史君之恩世世無窮松椿之祝祠像之嚴當不減范文正公之盛自昔仁人君子膺民社之寄不以一時之恵及人而自足也必欲興大利除大害要使其徳澤深長行于千百年之久是可為今之俗吏謀富貴者言哉惟賢者平日抱負在此故使如愚言亦得以罄其繆至于維持學校振起儒風旌賢勸善亦必次第而舉矣拭目以俟答倪孟徳來諭日月往矣精力邁矣雖有願强勉之志而無可强勉之時足見感慨之深而某亦政坐此病此言為後生者勉固亦甚切所以自為之慮恐未然也夫日月之已往精神之已邁者不可得而復追矣在今日亦自有得力處葢血氣向衰則志慮定更歴既多則識見明即其欲强勉之志便是可强勉之時不必徒追悔於既往而自絶於將來此吾人尚可著力也未知髙見以為如何復呉太清書某疏鹵之學至不足道況當垂垂衰老之年方切慚負平生之朋友乃厪下顧賜以長書若施於所敬者顧某何以辱此惟有愧感既而聞嘗登當今大人君子之門而所得以平實古雅為主此為學第一義嘗謂平實是躬行工夫古雅是講學工夫躬行不可不平實講學然後能古雅若論輕重則躬行重若論後先則講學先則知己得造道入徳之門深切起敬及觀所恵書陳誼甚富立志甚髙論孔顔之所樂及周程之傳授又皆洞究大原曲折詳宻自非深造自得何以至此斂袵三復為之躍然某往年嘗與趙星渚議論間問北山何先生何以教學者某對北山不曽開門授徒不曽立題自作話頭接引後進某登門之初嘗䝉舉胡五峯之言曰立志以定其本居敬以持其志志立乎事物之表敬行乎事物之内星渚曰文公已病其頗傷急迫某曰急迫之病乃在下一句知乃可精上此四句於初學似亦有益星渚曰然某無以私淑同志敢復以此為足下獻足下所以定其本者似亦古雅矣至於以尋樂扁其讀書之室恐未合乎平實之訓也似覺求上達之意多於下學之意少竊謂茍無下學之工决無上達之理朱子於此一段公案固曰學者但當従事於博文約禮以至於欲罷不能而既竭吾才則庶乎有以得之吁此千古不可易之教而傳之無弊者也更望於博文約禮居敬持志益加勉焉何患不真見孔顔之樂也惟髙明察焉答葉都倉書逖違偉度轉目三載東閤邃嚴而枯冷姓名無路可達雖聞恭膺醲渥即拜異除亦不能致一牋之慶非慢也翔泳之勢不同也惟髙明諒之某衰老待盡于窮櫩奄奄泉下人耳何心與時競哉伏辱寳帖諄諭勤劬備感謙虛此某之所望於足下者而足下反以見囑何耶此事之造端實出於足下篤念亡姪之良心長顧却慮之美意此亡姪之所感激一一聴従宗族之所以稱賛正在於此狂瀾激衝惡猘狺噬誠出於意料之外當是時也明目張膽力辨其萋斐之誣鎮定其搖杌之勢使其家紀綱粗立九原無有遺恨豈非足下所當任之責乎事變至此可勝嘆哉竊意足下事定心平亦深悔前日之無情必為其思善後之計今詳來諭上委之於従臾者之過下脫之以不足責之言往往正名定分之意少黨姦恵惡之意多此則非所望於髙明所欲言者何限要非筆舌可既尚賴恵顧前好不忘初心以大公至正成始成終之是猶有餘望也匆匆謝先辱毋罪率直幸甚不宣與何無適昨令弟元鼎下訪首傳雅意出寳庋之古端為老境之重鎮恵至渥也某再三研磨躬自滌濯誠温淳明粹如亞聖為妙品但某書齋荒陋平生未嘗有此受用然其三益之友俱不在目瑣瑣駑才舉無足以慰其意静而觀之大有愠色況其詞章之拙㸃畫之繆皆足以獻笑於大方縦令含羞忍垢不敢違主人之命而某當垂盡之年豈足以久淹此賢哉其勢必至於埋没至寳得罪造物已勉承厚睠挽留㡬月敬用復歸寳藏非敢固守一亷為不情之遜尚匄矜體視收如䝉篤叙先契振其枯落側聞編集古文甚精却望賜借一録庶可以廣私淑之教乃不朽之大賜也通趙星渚即日白露横江黄雲棲畆恭惟暫韜經濟妙養中和顧諟天明相在爾室某輕去誨範七年于兹自赤城無借留之路而某亦夢㫁於東湖不謂崇情篤雅有請于朝給劄以驅其出不免一再往回有愧於山靈海若多矣幸得草巢之肯來遂因風變而謝絶也瞻望道徳之聲光服習提警之精實非不切切于衷終不敢以山林之姓名驅馳於龍尾之道門籍之下㡬至堙蕪不自意懐人憂世之念深欲以枯根朽質置於造化爐中誤玷鶴書不勝驚愳恐吕公之夾袋掌記陳宻學司馬公之薦士槀編無此様人才也未免為知人之累益重愧悚惟是大賢君子之進退足以卜時政之得失足以驗世道之盛衰雖聞暫收朝蹟歸隠故山陶鎔水石於世味之外酬酢聖賢於徳履之中行蔵用舍本非二致皆所以敬天命而植民彛也且聞屬車豹尾中稀如晨星切恐緑綈方底之詔已飛下岞崿起安石以副天下蒼生之望恐終不可得而恝然也某幽屏衡茅過従絶少舊學剥落㡬盡尚有一㸃真實不隨血氣而消殘編故書時時涵泳向侍坐隅䝉舉陳克齋所記暮春章改本緩誦稱嘆某自昔亦以為此甚端的也近年來以今集註細細較之深以為疑又以文集參考則知其反為未定之本大不如今集註之精宻也近嘗再講此章未及録呈不知髙明後來亦曽再入思慮否某平生於無極而太極一句見得未透朱子謂無形而有理非不明白但於周子命詞之意嚼咀未破故象山未能釋然某不揆淺陋妄揣先儒之心謂此是周子太極圖說只當就圖上說此一句不可懸虛說理若又有所謂無極之理葢周子欲為此圖以示人也而太極無形無象本不可以成圖然非圖則造化之淵㣲又難於模寫不得已畫為圓象擬天之形指為太極又若有形有象故於圖說首發此一語不過先釋太極之本無此圓象也後人殽亂疑惑故朱子曰此只是無形而有理言簡而盡然必于圖上指此一語方為親切無疑未審髙見以為然否朱子之說中庸至矣精矣而某妄有所疑朱子平時謂家語為孔叢子偽書今於集註反取之以證中庸之悞愚尤惑焉哀公問政子曰云云至其政息竊意夫子之答只此數語自人道敏政而下至及其成功一也皆子思之言又舉夫子三句以證之故又著子曰字恐非妄也此下子思又自說去家語中間又舉哀公曰此恐不足信其妄謂其中仁者人也義者宜也此非夫子平時語自是孟子得於子思者其為子思之言明矣未審髙見以為然否某固陋之質於經書疑處甚多無筆吏抄寫未能一一質於髙明先述此三條以求開悟之方敢乞始終提誨庶不抱此鶻突道理歸全於父母天地受賜大矣某謹専人省候起居其輕凟賜之容留不勝幸甚未卜待拜更乞為斯道自重為明時自愛精調鼎食佐吾君開萬世太平之基某頓首忱禱不宣回趙星渚書即日冬令權輿霜明風勁恭惟勇退要途表儀世道誠無間㫁神相後先尊候動止萬福某近者僭上之教以贖門籍之荒凉旋領令嗣承奉賜書知己上徹電覽乃聞尊體偶違和裕未敢繼馳尺牋敬詗藥石之慶方引領東望日切泰山北斗之仰専使逺臨俯授寳帖聨題累牘蓬蓽生光驚喜下拜盥手剥緘仰見郁郁情文勤渠謙譲如親侍函丈之間恭聆金聲玉振之韻感慰無斁某崦嵫甚迫衰病日侵無由可以航一葦躬拜於岞崿山下請問平生所疑以袪其固陋之見而尺書之敬亦復曠闊㡬於自棄重荷不鄙矜其荒淺賜之規正又䝉振其廢惰復以三日俾入思慮將有以儆䇿而陶鎔之幸甚過望敢以愚魯之見陳于别楮更乞始終提誨誠所願望某近得車玉峰書賜報大學致格傳未嘗亡也欲以知止而後有定一段接聴訟一段即是元致格傳某聞之躍然若不動斧鑿而元詞儼然誠追亡之上功也後又聞昔日嚴陵呉守槃亦有此說見盧新之跋嘗以此說請教于西山葉先生先生云且去涵養不知尊明曽聞之否此說以為如何某又䝉玉峰以所編道統録稿見教題目甚大采摭甚詳愚意以為尚欠綱領也未知嘗達尊聴否某竊嘆世衰道㣲同志絶少仰惟星渚先生海内範橅􅆒歴且久不知朝野中可以與之切磋論辨者誰歟後生晚進有志於學所以傳道授業者誰歟某孤陋寡聞待盡窮巷了無聞知敢告疏其一二因便以開其昏䝉尤所願幸使介不敢久淹謹拜飭牋恭脩大貺之謝氣候向寒更乞謹䕶鼎茵柱石斯道大展經綸以副四方善類之祝某拳拳無任不備一浴沂一章區區所疑已䝉印可足見太公無我與人為善之意佩服佩服一無極而太極一句某非敢妄疑先哲但疑其既是無形而有理則圖中圓象非形而何此周子於圖說之首不可無此一句也然其精宻㣲妙之㫖拓前聖之所未發自在其中初無牴牾也某妄謂當時朱子若說入圖上來則此句有著拍未必起象山議耳一前人以家語為先秦古書此句稍寛竟不知為何人所録疑其為子思以後子孫所編如疑顔子竊飯之類誠為可鄙决不出於子思之前明矣若以子思之言證家語之失可也以家語證子思之書於義有所未妥竊謂一部論語門弟子問仁者多矣夫子止語之求仁之方未嘗有仁字親切之訓至孟子方有仁者人也義者宜也之語則疑其得於子思未必夫子之言也尊見以為然否更乞不倦之教一賜問張子言氣周程言理㫖意不同某竊謂理氣未嘗相離先儒不相沿襲雖言不同而未嘗相悖言氣者是以氣為道之體理已在其中言理者是以理必乗氣而出氣亦在其中雖有形而上下之分然道亦器也器亦道也二之則不是張子言氣數段朱子固嘗置於近思録道體門中此意可見朱子又曰張子說得是好終是生受辛苦是也伏丐尊照一賜問㡬有吉凶夫子與朱子之言不同某竊謂周子曰誠神㡬聖人也此言聖人之㡬在誠神之間自是有吉無凶又曰誠無為㡬善惡此言衆人之㡬既有善惡安得無吉凶若衆人之㡬能動以正亦無凶之可言夫動以正者天理之本然也動不以正此人欲之或然言雖不同實不相悖伏乞尊察一賜問伊川言奉祀之人是繼室所生當以繼室配為不易之禮固為的確所謂不易之理者祭祀時母子一氣感通也然於禮有所未盡是或程子有為而言也或有謂春秋之法以元妃配而繼室不得配故程子如前之云未可知也但今所謂繼室與古之繼室不同古者諸侯一娶九女若元妃薨凡繼室皆其妾媵也雖有子不得並配今之所謂繼室亦皆禮聘與元妃固等夷耳但有先後長幼之分所以不可不並配今之庶母却合古者繼室之義雖有子死當祔于妾祖姑别室以祀之有此曲折未盡未審尊見以為如何敢乞開曉謝得御書某伏䝉分頒理宗皇帝親御奎畫旌表懿號墨本某百拜敬觀而天光發祥於蓽門圭竇之陋草茅賤士日瞻寵靈以為厚幸伏讀下方跋語獲知廣厦細氊之上君臣都俞之中天下於是䝉被大哉乾元之澤雲龍風虎真千載一時之遇猗歟盛哉又知清徳精白孚感上心如是則百僚之貪亷四海之肥瘠舉莫逃於日月之明推是心而往太平豈不指日可冀奈何氣運未回聖志未遂而天下百姓攀龍髯而莫及矣嗚乎悲夫慶元遺民對揚帝渥下情無任欣幸追感之至回趙税院某昧昧陋巷掩闗自守曩者悞䝉尊翁星渚先生逺賜招聘俾與聖則多士共陶賢師帥之徳化浩渺東湖沾溉無極雖聞詩禮親傳淵源溥洽未敢遽脩東閤之敬嵗莫告歸竟不獲瞻際英標實為曠禮徒深髙仰近者家奴歸自名門恭捧手筆謙光􅎡􅎡透出紙外申誦睠雅感激無斁兹又辱尊翁専使下臨教賚優渥尤深感愧謹勒短劄以謝隆施庸證契家齊盟之始末由面覿敢冀定省之暇金玉厥躬上承家學以踵光大之業遡風不勝拳拳伏匄台照答車玉峰陋巷無仙里便風如隔滄溟秋雨窮櫩闃焉人跡忽有持書立於黄葉堆裏乃吾畏友軫綏枯朽訪問安否徳甚渥也敬審云云英嗣神童秀慧日裕當已能讀父書矣某伏䝉頒教道統録三巨編盥手莊誦大哉書乎自昔聖賢儼然臨乎其上世間未有是書也非有大學力如何有此大制作照曜萬古與天地相為終始無疑昨見蔡九峰嘗編一本曰至書次第亦如此而不如此本之詳敬巖姪亦曽有一書名與此同但止始自周子至于黄勉齋門目頗雜皆不及此精當愚見更得於逐門内更與次第之為尤佳葢此莫難於顔子子思之詳亦莫難於朱子之簡若孔叢子家語之類未可全用要須揀擇某自前嵗已拜觀序文無便失於拜報今始得見全書尤以為幸願蚤入梓開我後人拳拳之望外䝉賜諭大學致知章不亡尤見洞照千古錯簡紛糾不能逃焉已經二程朱子各有定本而尤未盡甚矣考古之難也某亦嘗見人說聴訟章為致格傳不敢以為然今若合此一段共為一章却自分明程伯子改本亦以知止接至善但首章三傳亦在前次方及八目以此觀之知止為傳詞亦是一證知止既是經文而後無傳此尤分曉使朱子得聞此語豈不莞爾一笑今若以程伯子本移知止於八目之後誠意章傳之前尤為省力前三綱自為經傳後八目自為經傳未知髙見以為如何河圖分合說見加倍法之始亦佳若一三五為天數二四為地數朱子謂此積數也非倚數也要將參天兩地倚出此數今來說却有此意開發多矣若謂因何畫卦只是竒偶而已此不必疑但曰四者之變不知何所指更望賜教省吾挽詩髙古非某所及珍重之言過矣區區之愚猶有所未盡嘗觀朱子編書必先立一規模未嘗渙散無收拾或立綱目或立經傳或曰嘉言善行或分内外篇一時易成恐不能久葢道統之名大學者人人要看須是一條一件不可移易不可有無方為盡善固陋之見猶未能識編次之大畧敢望開曉某奄奄晚景瞻侍無期惟有一心尊嚮不間朝夕一年之間尺書往復曽㡬所欲言者何限臨紙耿耿答王栗山某幼孤失學晚親有道曽未知嚮方巻藏不謹姓名誤落於人間遂為當路牽挽一出不自意陟峻嶺臨東海之濵冒登聖則講席獲友諸賢一洗平生之寡陋所恨不能久旅於荘人雅士未及摳衣叩請此皆質弱氣餒求道不勇之過至今愧悔無已憶昔齋扉暇日聞月旦之公評固已知栗山之聲望久矣性拙且懶未能奉咫尺之書致殷勤於左右反使栗山以書先之其為慚負何可量也竊計春秋亦已髙而所施於某者反若後生之於長上小官之於達官然此則非某之所敢當也某譾焉枯朽無用於世䝉不鄙棄辱以講篇諸作逺賜推教肅容端拜誦詠甚久仰見君子之所養發揮於詞章老健簡古不鑿不晦實有以激衰惰而増髙明也每謂後世文章之所以不古者止不本諸經而已茍能於大學以求其用於論語以求其教於孟子以求其通於中庸以求其原如是則義理沛然此文章之元氣也此四書者固非為文章設也乃經天緯地之具治世文教之書潛心涵泳有自然之文故也近世之文大壊於舉業浮而誕鑿而誣其次壊於駢儷弱而鄙麗而諛間有厭今而嗜古者不過求於竒詭艱澁以揜其淺陋空虛固亦有出入史漢根蔕韓栁者終不免墮於博而寡要勞而無功之中此病沈痼莫能藥也自王兵部創書堂於仙郡此風頓變每得朋友書此意猶未冺今栗山有職位於其間領袖多士更望左右扶持以引以翼俾勿壊是禱不審近來新進有可者否聞有黄巖杜則卿誠佳士也不知尚留否如此君者更得數人常在堂中則聲應氣求不患不翕合矣髙見以為如何某一向以無書堂便久不得仰答腴施魯人之臯有如此者惟髙明察焉某崦嵫景迫無由可以承下風奉餘論願言留情鼎餁謹護體府藩維斯文棟榦吾道不勝忱禱復天台陳司户天瑞字景祥某頃辱下訪不憚數百里之逺意亦勤矣寵以長書示以巨帙禮甚度徳甚謙已足以藥世俗自滿之病顧衰耄殘息何足稱此至於奨譽過情擬非其等此則謹不敢聞也既而捧巨帙而敬觀以蘓氏古史為題占地步已甚闊以朱子餘論為主立門户又甚正竦然異之曰大哉書乎此近世之所未見也老眼為之頓明嘗謂漢當暴秦煨燼之餘典籍滅亡太史公作史記一部上出唐虞下包春秋戰國羅網放逸黜削稗野開天下之盲聾後世得之如至寳尊之如聖人孰敢議其非者遷亦自謂厥協六經異傳整齊百家雜語蔵之名山副在京師俟後世聖人君子其自負至不輕也至本朝歐陽公始譏之其序帝王世次圖先立一準的曰孔子定書㫁自唐虞所以畧其逺而詳其近謹其所不知也司馬遷逺出孔子之後述黄帝以來詳悉其世次不量力而務勝及訂其繆可以發千古之一笑止以惑世二字㫁之蘓黄門師歐公者也習聞其說亦謂遷淺近而不學疎畧而輕信切中其病其詞已激昂不如歐公之従容温潤也至於自編古史又叙三皇反加詳焉豈臨文之際而忘之乎抑不免於務勝而惑世也朱子曰近世言史者惟此書為近理而學者忽之止於本紀中提出七章以訂其未醇今足下乃用朱子之意削其世次益以事實黜秦伯而不汚其紀降三晉田齊而不作世家増虞夏商周名臣于列傳而春秋戰國之賢亦與焉别立孔子及弟子傳止於孟軻斥老子荀卿於異端其立義凛然其用力甚勇其地步闊而又闊復加以正其門户正而又正復濟之以闊豈非欲推本於經折衷以理邪若以是為識本原而可達於聖賢則不可必識本原可達於聖賢而後能推本於經折衷以理也然雖非學者之先務而程子所謂考古今别是非亦致知之一端今此編考訂有證綱目粲然亦曰可以名家矣若曰著書垂後有必於名家恐為計太蚤而自待太凉竊慮後之視今亦猶今之視昔也此則不敢不以忠告某血氣既衰學問枯落記魄不强掛一漏萬不足以識足下纂輯之誤不誤論議之差不差姑以愚見有疑於古史之一二為足下陳之歐陽公春秋論辨魯隠公非攝如此之明蘇學於歐豈不聞之今魯世家一信左氏語豈忘之乎蘇氏以管仲智有餘而徳不足亦過矣當是之時利欲汨沒人心已亡其所謂智亦只知得利欲一路而於天理民彛未嘗知也愚方病其不足安得謂之有餘獨蘇氏以管子之書為戰國之士假託其名而為之言治國則以智欺其民言治外則以術傾鄰國此則非習俗之所能識視國語全本管子無它語豈不陋哉然猶取内政之制此為可疑夫子之於春秋凡諸國變先王之法度如爰田丘甲刑書之類悉書之不應於内政獨不書也既無其證何以信於後至謂管仲既没齊國因其遺業常强於諸侯此亦誣矣蘇氏之叙㣲子也未免徇左氏太史公之無識曽不少悟夫子以㣲子去之為殷之三仁去之之去是去紂而隠遁也豈曰去商而歸周乎紂雖無道有必亡之勢是時周猶服事殷也不應㣲子遽畔其國棄宗廟社稷而先降于周不仁孰甚焉設如其說紂既克㣲子又何為面縛銜璧衰絰輿櫬于軍門於是時也武王不以故都封㣲子乃封武庚所以待㣲子者亦甚薄也以愚觀之面縛輿櫬正武庚祈哀請命之態武王不忍絶其商祀使復其所此仁人之心至武庚伺間倡亂而周公誅之而商祀絶㣲子不得已始出而歸周周公固知其賢久矣亟封於宋有客之詩益可想也加封二字且無明證此於事理曉然者莫有辨其誣是亦不免於輕信也至於孔子傳叙叔梁紇與顔氏女野合而生孔子母諱之不以告其父之墓此又何為輕信也書聖人之家世而不典如此何以謂之學者合不以正而生聖人天命必不如是之僭也其書告陳恒弑其君之語謂齊人不與者半以魯之衆加齊之半可克也此是以戰國縦横之士待聖人也聖人以大義告其君豈以利害動其聴哉有曰孔子之歸魯非求仕也以為父母之邦葢將老焉此句大勝太史公其為論也謂夫子於陳蔡無取焉以楚昭葉公之賢前後六年徘徊以俟及浩然有歸志猶反於衞者以須魯人之招也是以世俗鄙夫之意論聖人與前一語如出兩人之手又言孔子以布衣養士著籍三千人其賢者凡十人而已豈非輕信乎其叙孟子也尤率心借不嗜殺人之句自發一段議論又以指習為性為孟子之失其論子夏開後世排偽學之端其意亦有所指也朱子雖謂其晚嵗粗知省悟終曰舊習已安未易猝拔而本原綱領終未明了至哉言乎今必有以細細剖擊之使後世無惑則吾之本原方明而吾之學力亦可以自慰也然其議論之差不勝其多今不暇條列更舉一二言之自入春秋以來鄭荘為一大罪魁天倫蕩滅殆盡而蘇氏猶以賢稱之此大惑也自是之後鄭國數困於兵可亡而不亡者亦有其故齊秦晉楚之争伯而鄭居于中遂為戰場惟其地為中國之險要得之者必强是以兩欲得之而非一國之所能獨有也故雖其敝而不至於亡及子産當國而伯業已衰不然則鄭覆亡已久矣安能待子産之出乎子産之才人孰不知鄭國之所以存亡者未易知也晉文公不汲汲於得國在春秋時固未易多得蘇氏遽以王者之事許之則過矣豈㤀却聖人一譎字乎至悼公頻起諸侯之師以不戰困楚此亦一譎之餘風恐古之屈人兵者不如是也其論樂毅也不知身自墮於戰國之習所言不根於義理反指書生之論以為笑此其深病前乎此齊國伐燕矣孟子教之曰反其旄倪止其重器置君而後去之此則庶㡬乎王者之事齊宣不能用不足責也樂毅自謂數奉教於君子而亦不知出此既已席巻八百年之積聚歸燕顧乃久徘徊於二城之下果何為哉烏在其為奉君子之教蘇氏以為智勇相敵勢固然耳此為實論乎凡此之類豈筆舌之所能既足下潛心今古識見迥特議論淳正比蘇氏尤為峻潔蘇氏之傳惟伯夷傳實以夫子之言此為最淳其論亦簡明抑揚頓挫有餘味也足下已載其論而去其春秋兩辭尤見髙識其間亦尚有些小徇蘇處更望玩索無急急於成甚幸但名曰古史要録未為正大葢蘇氏門下不是著脚處昔司馬温公嘗編稽古録極為簡要稽古之義亦甚大擬欲易為信古録如何夫子曰述而不作信而好古是夫子之謙辭此名也今此録是録其古之可信者此實也又有一說足下别録洙泗師友淵源所以尊道統闡聖學淑人心扶世教掲民彛此舉甚善但不以帝王本紀統之似失其所以上接堯舜禹湯文武周公之道不若於春秋後自作洙泗師友一門然後繼以隠逸異端功利兵法刑名縦衡諸家如何後世封諡不足為聖人輕重盍去之目録中歴代諸臣恐須列其姓名庶分曉易見本中悞字脫落尚亦有之荒陋無以復來教有辜下問之勤不敢不盡所願言程子謂致知用力之方凡三言考古今别是非居其次以讀書講明義理為第一此正是識本原可達聖賢之正路也足下已幸需次差久得以究朱子之淵源一行作吏此事便廢願急急更於四書中夙夜探討涵泳其中義理無窮無盡果能用力於此則考古今别是非特餘事耳更於應事接物得其當也出而事君小則承流宣化大則謀王㫁國真可以闡聖學淑人心扶世教掲民彛不為虛語矣不審髙見然之否不宣答葉通齋某餘日無㡬急於聞道思友朋之誨教如飢如渇故不敢以煩瀆為憚況辱温詞誘進而可甘於自棄乎連拜金薤琳琅之章喜甚慰甚如獲𢎞璧不忍釋手所以藥其狂誕者至矣非一感之可既但某一時之言龎雜有悞尊聴既䝉導之以盡言不敢自嘿竊謂集家語者固出於門人弟子也於家語中集其精粹而為論語者疑子思也尊兄亦以為恐或有之止是其下一必字太死殺爾尊諭曰非子思所著亦明矣然某未嘗言為子思所著也集字與著字大不同集者合衆人之所長著者明一已之所見或恐髙明偶未見察某所謂著書自子思始者指中庸而言非謂家語也措詞不明皇恐若古家語之不存王肅引孔衍之言曰王肅反諸書雜録以補其亡非中庸用王肅之詞是王肅用中庸之言妄加哀公曰之類甚明此朱子所以言家語之多疵是晚年之論無疑朱子於四書至死脩改未畢因門人之疑而脩改者歴歴可攷此朱子遷善之盛徳而不可冺没者但學者不可妄有指議茍有證據不妨致疑於其間是勉齋通釋之例云爾今不曰可疑而徑曰疵此大病也髙明之賜宏矣魯經之編固知犯大不韙駭人觀聴吾兄見愛之深惟恐某得罪於名教諄諄誨諭懇惻真實至矣愧感愧感但尊諭尚有回䕶未忍盡斥其非則愚見猶有未能釋然者不敢不更陳之尚賴傾倒忠告尊諭記録之書非經體也移動未為不可是經體之當然明矣謂夫子之㣲言非可以緒分而類合恐有所未盡是書也若夫子之所自著前後次第有㣲意焉是誠不可移動也三聖之於易夫子之於春秋各自成書而嗣輔杜預與之破碎其罪大矣此書雖集夫子之格言初無前後次第之可考又非上下貫通以相承雜出於衆手之所紀當前者或後當後者反前夫子之言與門人之言雜然失其倫次顯然可見未知其不可移也尊諭謂句句自然意味㣲妙無窮者畧無所損也學者隨其逐條章指曲折優柔饜飫者亦無所妨也南軒類聚言仁此却是摘撮看文字朱子病之誠當也此則於一部全書無少無餘非摘撮比也昔謂之語不為之類合可也今謂之經恐不可不類合也隨步換形各有攸當政所以上承毅齋先生尊經之意未審尊明以為如何區區之愚以尚書一典叙事二謨叙言故欲以事先於言者首以温而厲者以此章包含夫子之徳容渾然全備故欲冠於篇端如堯典之欽明文思也此義既未明今當去之尊諭謂雖記録之書亦自各有意義某亦嘗聞之朱子固曰首篇多務本之意八佾皆禮樂之事公冶長論古今人物先進評弟子之賢否㣲子多記聖賢之出處此亦因其近似可以推測者而言使集論語者果有此意則篇篇有之不應斑殘零亂如此竊恐後學因此强推之必立一說籠罩傅㑹穿鑿為害不小又如堯曰以下雖無子曰發端亦恐夫子嘗言之故録於此若曰門人舉此以見聖人相傳之意恐不應不分不曉如此含糊也若曰始以務本繼以帝王之相傳却是著為此書非記録也孟子篇終却是此意分明此致是著書之體尹氏遂曰以子張問政繼堯曰以明夫子為政可知己蚤是有些傅㑹茍如其言則克已復禮章吾道一貫章又何慊於五美四惡乎若以政為急則為政以徳章又豈不勝於此曰記録則前後無序非病也曰著述則步步可疑尊明以為如何孟子固一手之書也本自有條理政欲學論語故亂其次序惟趙岐解此意總作三節說一曰時君咸謂之迂闊二曰與弟子答問三曰又自撰其法度之言雖曰不可移動而朱子編要畧已創例於前矣尊見以為如何尊諭欲以格言大訓與答問為經餘則為傳此言簡徑明白敢不佩服然只此規橅則亦不免移動矣然鄉黨一書體則經也今當為傳乎堯曰至公說當為傳乎當為經乎更乞明賜提警三陽之慶未遂捧巵為夀於通齋之下仰止耆徳天錫難老以柱石吾道不勝東望頌禱之至不宣魯齋集巻八
