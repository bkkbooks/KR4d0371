body:
  text: 魯齋集巻十三宋王柏撰題䟦古中庸䟦中庸者子思子所著之書所以開大原立大本而承聖緒也義理精微而實難于窺測規撫宏遠而實難于㑹通衆説淆雜而實難于折衷此子朱子以任其責而後學亦已春融而氷釋矣惟愚滯之見常覺其文勢時有斷續語脉時有交互思而不敢言也疑而不敢問也一日偶見西漢藝文志有曰中庸説二篇顔師古註曰今禮記有中庸一篇而不言亡其一也惕然有感然後知班固時尚見其初為二也合而亂之其出於小戴氏之手乎彼不知古人著書未嘗自名其篇目凡題辭皆後人之所分識徒見兩篇之詞義不同遂從而參伍錯綜成就其總題已天賦為命人受為性所賦所受本此實理故中庸二字為道之目未可為綱誠明二字可以為綱不可為目僕不揆妄僭為之隱索取而析之以類相從追還舊觀但見其綱領純而辨也如此之精條目䟽而理也如此之瑩首尾相涵可謂縝密氣脈流通可謂融暢雖各題一性字而其義不同一原其性之所自來一原其性之所實有雖各提一教字而其旨亦異一以行為主故曰脩道一以知為主故曰明誠始于天者終於天始於誠者終於誠分限嚴而不雜塗轍一而不差子思子亦可以無遺憾于千載之上矣或曰自漢晉以來諸儒先未嘗疑也至於朱子章分句析研幾極深而無間言也子何為者而勇于妄論乎曰非敢妄也有所證也此書惟哀公問政章交構為最深加以王肅貿貿然獨掇此章充塞乎家語之中此先儒之所以不疑也幸有在下位不獲乎上民不可得而治矣十有四字鄭氏所謂悞重在此者此感人之根乎其論舊章之痕迹尚未磨也其往參之位置尚莫掩也使後世可以指瑕索瘢正其苟合者殆天意也又以班固中庸説二篇五字不列于諸子之上而晦昧于古禮經之末竊意子朱子未必見也或見而未必注思也不然以朱子之精明剛決辭而闢之乆矣奚俟于今日哉䟦西樓姪孫三帖黃山谷云學子瞻書但臥筆取妍至于老大精神可與顔楊方駕者則未之見也予嘗謂欲識坡公運用之妙當于中筆清圓内求之因有感亡友無適之言為之愴然書于后右坡字朱子字銘云放意則荒取妍則惑此八字足為作字之要訣惟米南宫字當於放中求妍此前一帖是也右米字益公之字端重謹密如其為人此猶中年之作也每觀退傳帖無異往昔此其常徳尤可嘆服於此又識前輩後進愛敬兩盡其道足為世之法矣右周平園字䟦蘇愚翁詩太古蘇兄録示先府君讀先覺録之句雅健感慨如見翁焉猶歐陽公重讀徂徠集也夫生之有死人所共知子路尚何所疑而形于問夫子答以未知生焉知死可謂深切子路不悟終不得其死曾子之疾示門弟子以手足之全且言戰兢自持之功自謂免夫而易簀一段猶在于垂絶之際吁是豈不亦難矣乎愚翁曰潔白事脩持從容中繩墨可謂知生矣曰之死了不惑可謂知死矣曰為此重憂惻亦曾子淵氷之戒云䟦前人垂死兩日前分韻詩身如蟬蛻夢似楊花此不知死者之言故謂之詩䜟愚翁洞達生死兩日前分韻詩有羽翰一息凌霄去之語此不可謂䜟也亦因事微示之意耳彼以偈頌歌詩張皇愰漾者是不安于死者之所為觀此可以知愧矣䟦鄭北山梅花三絶句詩言志志者事之符也北山公賦梅花三絶豈非平生之筮辭乎劵臺之上宜植十數根林立于翁仲之間使公生氣常伸於嚴冬大雪之中勝於豐珉前後之刻多矣雙岩亦然之䟦大愚四帖麗澤輟響而大愚先生實嗣其音故于同門朋友拳拳篤叙若家人然觀此四帖藹然忠厚之意見於言表機杼之感參松之間皆相與之真情王丞諷切之戒所以全交道之不苟寒忩兀兀恍如昨夢此當在明招感成公講道之故迹也不能生還之語尤見守命義之有力兒軰不免為故人累非平日敬愛之深必不輕發此言時慶元乙卯之冬而先生果終於謫所嗚呼悲夫景華吳公之後保守此數帖今七十有餘年家世􅎡然足以不朽族孫珹將以前後二帖登於樂石志趣之雅所可尚也為之書于后書葉西亭鈍漢傳後昔先大父與相國葉公同讀書于野堂同登紹興戊辰第誼甚篤也先君與直閣公契好尤密某㓜孤廢學中年始獲登西亭伯仲之門即獲觀鈍漢傳當時未解公意但知字有樂毅論體襲藏惟謹咸淳辛未之季春公之子天啓擕此傳出示恍然如異世事自念某亦嘗以魯自厲魯猶鈍也鈍亦魯也字義一而用有不同公欲全其鈍無競世之心也某不敢安于魯有願學之志焉今某之魯猶故而公之鈍不特全于一身天啓入仕餘四十年一麾猶未入手可謂能世其鈍者與斯所以為識者之所敬云書鄭北山祭吳忠烈廟文以書生馭宿將危事也豈虛言足以服其心哉每讀北山鄭公吳廟之誄使人躍如凜乎壯哉辭也黙成先生所謂至矣逺哉猶有餘味然不有英氣鼔舞于灌薦之表警戒豈能竦然於稱賛之中乎嗚呼子房妙于機策士也孔明精於才自用也惟裴晉公謂處置得宜者近之後一百三十年里下士王某傷今思古為之長太息書於崖碑之后䟦東邨山谷詩軸古涪翁元豐乙丑在館時畣外甥孫莘老之詩氣和而真力壯音澹而古意完此所以為髙也然世之知公者不過曰老禪曰草聖曰詩𣲖宗祖而已孰能思其名在黨籍艱險百罹蟬蛻南荒而不悔髙風勁節凛然千古東邨先生抑亦尚慕其為人豈徒寳此軸哉幸蚤輟清俸登之堅珉不然則墨必盡剥而迹遂湮微豈不為博雅之恨乎䟦朱子帖乾道丁亥秋文公朱先生訪張宣公於長沙道由昭武拜端明黄公中於里第先之以長書其辭前後有曰八月十一日具位朱某敢齋沐裁書請納再拜之禮於尚書端明丈台座云云今日之來葢將頓首再拜于堂下以償夙昔之願伏惟明公坐而受之使得自進于門人弟子之列而不孤其所以來之意則某之幸也鄉往之深不自知其越僭敢以書先于將命者而立于廡下以聽可否之命其書見於文集九月抵長沙此書則在長沙時遺東萊先生呂成公之手筆也故書中首言見端明事稱其徳履且自愧淺之為丈夫時朱子年三十有八其景行前修氣識宏逺度越一時至今使人躍然興起嘉定乙亥金華後學王柏受是書于成公門人獨善汪公大度之家寳藏于笥又五十有七年矣嗚呼自三先生之聲教絶響後生小子安識前軰敬老尊賢之禮哉至於辭受之宜儒釋之辨當時朋友切磋之實意典則滿紙義理沛然大有補於世教者後欲併刻石於麗澤書院以退弗果慨流風之日逺愳遺墨之遂銷為之三太息敬識其不敏於巻末云一百有五中秋某拜手謹書䟦潘竹真四尖詞竹真以扛鼎之筆力游戱題詠張皇幽𣺌華彩四尖使人畏避不敢逼視正坐山靈水怪不能牢扃深拒漏泄一段風雅于二三君子以發鴻音振古之閟而反嚴號令戒堅壁或者疑此意之未廣彼將復命曰今之王公大人所好正不在此請毋過慮䟦北山畫朱子詩送韋軒朱子逺遊歌雖少年之作已見其器局之廣立志之堅既有以開擴其問學之基矣其送胡籍劉忠肅二詩則紹興己卯時年方三十克己一詩觀書有感二詩則紹興庚辰也挽延平先生二詩則隆興闕也酬南軒贈言則乾道丁亥也齋居感興二十首及分水嶺絶句則乾道壬辰也論啓䝉絶句則淳煕丙辰也題寫真絶句則慶元庚申踰月而易簀矣朱子之詩凡十巻其精微之蘊正大之情皆所以羽翼六經發揮聖道何止此三十有二章而已葢余平日之所涵咏獨于此而有得焉端平丙申請于北山何先生書于一編清勁端楷無一筆匆匆亦足以見其心德深潛淳粹之懿慨北山已不可復見將誰與同此心乎韋軒別駕純實㢘介恪守家法景慕朱子發于誠心歸敬北山意亦獨至於其滿替而歸侍庭也敢以朱子遺成公一帖及此編相其行行必有贐禮也或暇日整衿澄慮披展玩索躍然興起如相與撰杖于滄洲雲谷之間不知古今之逺出處之異庶不負尊賢之初心云䟦竹溪呉君詩集僕聞前人語學詩者須有夙根有記魂有吟骨有逺心然後可以頴異上三者出于天資不可强至於逺心當從學問中來今觀呉君詩集前有吾畏友葉通齋序矣奚待僕之言況感興前三者已窺朱子之遺意學問亦可以得師尤不待僕言者輙書于後而歸之云䟦東邨所藏帖咸淳辛未之冬幙長東邨先生出示本朝名公帖其後有䟦乃李文簡之子校書公及雁湖也校書名在慶元黨禁嘉定辛未偽禁初解起知三湖鴈湖字季章於朱子為尤宻今言得先公手書凡八紙止存其二而已錫山尤公攻槐樓公固先友也若後湖蘇公浮休張公清江劉公相去差逺未必及交内有諱復者不知為誰或疑其姪顧名雖不甚顯字已將滅隱然尚有典刑古人所重墨蹟不特取其字也亦敬其人也世變之開閤盈虛豈有窮哉如慶厯元祐諸賢之帖今已不可多見況晉唐之名家乎雖然物必萃於所好誠能博擷廣受久而不倦豈止晉唐之遺跡尚可得雖鼎鼐之潤篆籀之光照暎于左右亦不難矣吕子曰心思之不可囿而滯也是亦不可不鑒也䟦怡齋吟稿先君子與博士戴公為同門友契好甚密予自束髮常得立侍左右先君之喪博士哭之甚哀撫諸孤甚厚未半年博士竟卒于中都哀誄傳播方知為公夫人之作也益重博士之賢足以掩夫人之文聲與先君同日葬于婺女鄉兩塋相望不半里其後嘗展升堂之拜與公諸子亦密獲觀怡齋吟稿凛然貞潔之操見于比興間自在閒雅殊無粉澤之氣古之列女節婦未必有也夫人卒先兄適莊為書埋銘一時哀挽有曰博士誄文千古恨怡齋吟稿一編塵遂為絶唱不幸風規不振遺書散逸予嘗太息而言曰吟稿與塵俱不見誄文和恨總成空後六十年族孫􅓨擕一巨帙見過吟稿誄文恍然到目而幽刻亦在焉為之驚喜感慨曰後世固有好雅之士不患不傳斯稿也正患斯稿之傳傷夫人之無後也雖然三百五篇多婦人女子之詩聖人未嘗不採所以興起人之善心𨗳性情之正有補於世教也尚矣固不在家藏而私寳也予於是書于巻末云䟦朱子與汪獨善手帖朋友之義實貫人倫如五行之土五常之信不亦重乎昔獨善汪先生從大愚吕先生之在貶所也不惟調䕶扶掖以慰其牢落之懷而又講切磨劘以勉其所未至固無愧于朋友之義也某為兒時及侍杖席言語容貌恂恂和易人不過以謹厚長者名之及義所當為奮袂逕前乃如是之勇有平日言論激烈者之所反不能何也先生嘗書而刻之柱曰君子欲訥于言而敏於行此亦敏行之一驗與今觀文公手筆粲然辭氣慷慨所以嘆息二先生之事凜凜然足以立千載懦夫之志是以起敬而書于後䟦朱子所書出師表聞昔朱文公酒每酣多朗誦出師表而或書之以贈友人今見刻本想其慷慨興起之意猶􅂱然㸃畫間文公嘗曰孔明有王佐之心而道則未盡學者固不可徒讚嘆于文字之間而已要當知其心之所存道之所未盡庶或有得于文公所以書之之意䟦劉撝堂作立齋銘昔夫子教伯魚曰不學禮無以立教門人亦曰立於禮又曰不知禮無以立也則知聖人教人教子無以異也今撝堂所作立齋銘而推廣立之義以是詔其子以是教門人又以是勉其同志可謂得聖人之心者與竊謂士不志于道固無以為立之之本然道之體廣大而禮之用精微是固必存心以極其廣大又必致知以盡其精微二者相資然後能卓然自立故不為事物之所搖奪矣此學者之所當共勉也書尹和靖墓銘後先生戊子所進讜議明大義以破姦謀正君心以立國勢不合而後求去此正是從容進退可法者也今誌墓者不書此一節乃曰朝廷哀其病且老使以奉祠而去是何等語哉徐考其為人乃諂事秦檜方為告訐之舉豈非其邪志方熾反以是舉為先生之病乎讀之令人氣塞不知秉史筆者能發明否䟦滕行父三峽圖巴峽之險古矣然則西方之險與東方之險與水固無分於東西險則因水之髙下南渡恃蜀非恃險也以魏公之倡義二吳之忠武雖有興王之基亦僅僅自保耳數十年來貪風西被蜀産盡而人心離故敵人以數千騎如騁無人之境今之任蜀果有張吳之才與否則所謂巴峽之險方為東南之深虞江山如昔而形勢頓異不知當路者曽以是為慮與因觀圖有感題其後朱子詩選䟦先生之詩見於文集者止十巻每病其比次失倫裒定紛錯無以考其嵗月之後先因以驗其進退之序首巻雖先生手自删取名牧齋淨稿然實少年之作也今觀遠游一篇已見其規廡之大立志之堅既有以開擴其問學之基矣其次巻則自同安既歸受業於延平之後時年二十有八自是往返七年豁然融㑹貫通而寄興於吟咏之際亦往往推原本根闡究微眇一歸于義理之正盡洗詩人嘲弄輕浮之習其挽延平時年三十有四誦其本本存存之句亦可驗其傳河洛之心矣南岳唱酧實乾道丁亥時年三十有七齋居感興二十篇其壬辰癸已之間乎凡篇中所述皆道之大原事之大義前人累千萬言而不能彷彿者今以五言約之此又詩之最精者真所謂自然之奇寳與南康諸篇則己亥之後於是年五十矣晩年詩不多見末巻尤不可考最後題寫真絶句去易簀纔一月其任重道逺之意凛然於十四字之間嗚呼至矣先生道德學問為百世宗師平生所著述以幸學者不為不多而學道者不必求之詩可也然道亦何往而不寓今片言隻字雖出於試筆脱口之下皆足以見其精微之蘊正大之情凡天道之備于上人事之浹于下古今之治亂師友之淵源至于忠君愛國之誠心謹學脩己之大要莫不從容灑落瑩徹光明以至山川草木風雲月露雖一時之所寄亦皆氣韻疏越趣味深永而其變化闔闢又皆古人盡力於詩者莫能闖其戸牖亦未必省其為何等語矣某又於逺逰寫真二詩獨得其為學之始終焉庶幾乎金聲玉振樂之大成也與朱子繫年録䟦朱子繫年録者録朱子之遺事而繫之以年也先生舊有年譜門人各以意裒集往往詳其出處者或略於講學備其著述者或缺於事實殊恨未周某生也晩曾不獲侍滄洲之杖屨髙山景行寤寐不忘近年以來得先生遺書一二而潛心焉每欲考先生著述之前後以驗其進徳之序文字缺略力所未能暇日捜掇姑以其可考者類為此編先之以師友之淵源次之以致君澤民之事業而以易簀淵氷之戒終之故於此三節特加詳焉置之几格時備參訂後有可考又將續之是亦魯鈍者之拙工不足為他人觀也因識其嵗月於后䟦潘子宇還淳集潘頥齋集南渡後諸家之詩為三帙舉以示予暇日嘗觀之玢磷艶逸刻飭嫻冶既富矣乎予少年時嘗酷好之乆而知其無益也遂不復從事于硯席間今乃不能識其用意精妙處葢聞古人之詩也善者興起人之良心惡者懲創人之逸志故可以被之管絃薦之宗廟感鬼神動天地聽之者得性情之和綱常之正其化民善俗功用如此茍作之無所益不作非所欠反使人之逸志肆而良心亡其傷化悖理為害甚大豈獨味漓而質哉今頥齋欲還其淳古之風宜何如當使鄭衞哇淫之習不接乎耳不入乎心潛玩乎三百五篇之精微上求乎英莖韶濩之盛斯可以稱此名矣徳夫弟史斷䟦横渠張先生曰觀書且勿觀史非史之不可觀也實未易觀也史未易觀而亦豈易斷哉寳鑑明而後妍醜可見此心明而後是非可决欲知妍醜先磨此鑑欲决是非先治此心實要法也治心之法無他亦沉潛涵泳乎聖賢經傳之中收歛齋肅而無放肆馳騖之病則此心明矣徳夫以少年時史斷見示遂推其斷史之原本授之非獨可以斷史也立身之道亦不外此復齋書目䟦醫家書目者復齋汪君某之所編也予嘗聞其説則知醫道之甚難昔之聖人妙參二氣精度五行推衰旺生克之由辨虛實盈虧之理著在方册垂世立教於是經之以道緯之以證樞機乎治法圖衍其藥石之性前賢後哲更相發揮至近世而益備世無明師師書可也師不常有書不常存書之功信大矣然媒利逐末者曾不窺見其籓牆每患其少而不患其多何也今復齋驟交扁華頓悟真機契聖規神裒功摭巧嚢篋氣運管籥隂陽艾塋蘭室之精微金匱玉函之秘要莫不粧䕶藻潔題篆端妍不忍輕染丹鉛光生幐笈朋儕似爭求識面目駭神揚比天禄石渠之所藏已五分之四矣然復齋非世其業又非有脂腴饒腐之資而所得乃如此則其用心之勤可知也推是心以往其不倦于濟人又可知也茍或馳騖乎未得之書荒唐乎已見之旨滿其廣博而怠於鑽研如是則不患其少而患其多矣予因䟦其後而併箴之云䟦里積約右通齋先生葉仲成父里積規約條畫周宻議論有本予嘗三復喟然而嘆曰田不井授而比閭之法廢下無相保相賙之心上無綱維聨屬之勢任天牧之責所以厚同體而共明命者視之漠然周官委積吾不得而見之矣隋唐義廩今亦非昔文公朱先生創社倉之法猶可以補王政之缺一時則效者多而皆不能得全其始終者葢不知守其兩言其奏請固曰以鄉之有行義者主之官司不得與後人忽此語而二病交相攻及至于壞譁然詆訾無敢扶持豈知里積之規乃出于僅僅自足之書生葢其學有淵源清修約己開一鄉無窮之惠可謂仁矣予每誦朱子金華社倉記而有感焉彼以婺之甲戸止輸穀五百石以貸十保之民其惠固以甚狹不數十年其富自若而此倉已廢者何哉詩書之澤不流于子孫而仁義之心已亡烏識吾兄弟顛連而無告者所當損有餘而補不足也視通齋今日之舉固有愧矣恨無朱子大手筆以發揚其師友之訓予不佞敢以一言相之願益詔子孫保守必家學不替則此積常豐必有憂色而無徳色則此積常豐必有敬愳之心而無鄙薄之意則此積常豐將見聞者有所興起而里積徧滿天下不待上之令而周官委積之法復見于後世藹然有三代王政之餘風孰謂書生無用于世而利澤不及民哉䟦蘇太古書古禮書敘略一巻永嘉蘇太古所編洞見源委亦間有發明可謂有志于學禮者奈其書亡逸何每思至此未嘗不撫巻太息而有遺恨焉昔韓宣子適魯見易象春秋遽曰周禮盡在魯矣不知當時指何為周禮況去籍于戰國孟子已不得學諸侯之禮而聞其略以是知周之舊典禮經不待秦燄而亡之亦已乆矣河間獻王不知何以得古禮經五十六巻藏于秘府班固既見之乃不登載於八書中遂至於亡此尤為之可恨也今所謂儀禮十七巻或謂此止載行禮之威儀亦非禮之正經朱子然之況二戴又儀禮之傳乎若今之所謂六典之書胡文定父子謂王莽令劉歆撰雖諸儒先不以為然亦以其來歴不明與周官不合且孔孟不曾提出語學者此為可疑耳為今學者之計既幸有三先生經傳集解且宜研窮精究未可遽萌編纂之念因書鄙見而歸之䟦北山遺蹟金華王某受教于北山何先生為甚深而所得遺帖為獨盛未能一裱蹏今取指南之序於此巻之首以其得之為最先就正私淑之二䟦則警誨之綱目俱在而古易䟦于是終焉自是不復有所作矣二䟦皆稿也北山義理滂沛詞義豐潤奬厲勸勉之意隱然見謙徳之中如春風無迹而生意滃然今一字一畫不可復得矣為之感慨酸楚而書于后䟦金八行家傳浮名如潢潦朝盈而暮涸實行如黄流行逺而勢壯況孝者冠冕百行可以動天地感鬼神豈年運滔邁所能湮没哉伏讀純孝先生金公家乗使人感嘆不已乾淳之間習尚忠厚公論坦明士脩于家聲聞于外有好徳之心者莫不起敬愛慕乃合邑莊人雅士聨辭聞於郡郡上於朝隱然有鄉舉里選之遺風吁斯民也三代之所以直道而行也豈不信哉朝省一時報可止令長吏存恤仍復其家公又不敢安上賜且割膏腴為義役倡郡太守南澗韓公於是旌其鄉表其里所以共明命奉天職迪彛明倫崇化善俗可謂兩盡公終于慶元丙辰後七十有三年始克祠于學宫嗚呼往者非有勢利之挾也來者非有要譽之求也非有所為而然也此足以見實行之著于斯人之心者自有不可得而冺也予烏知數百年之後不有移其所以旌於鄉者而旌其邑哉他時㑹有以證予之言云䟦文公與潘月林帖文公之學照耀今古文公之字徧滿東南然門人故家三世得公之尺牘固絶無而僅有而以文稱者尤不多見以月林先生風烈之盛而文公尊禮之嚴如此文集中乃不登載一字僅有墓道一碣而已顧二子一孫姓字猶有存者當時類粹其有所遺逸葢不勝其衆也今裔孫宛丘通守不秘其傳夀諸梓以惠學者而於吾道所關豈曰小哉所以共明命昭祖武追往哲以補缺文也顧不偉歟於是僭書於后䟦思成字詞傳曰禮始於冠其目有二十曰筮日曰筮賔曰宿賔曰為期曰陳器服曰即位曰迎賔曰始加曰再加曰三加曰禮冠者曰見母曰字曰賔出曰見兄弟姑姊曰奠摯曰禮賔曰醮曰殺而又有冠義一篇其義尤備今人於禮之始猶不肯行況三百之經三千之義乎朱子家禮已為節文而立齋之所講行又其節文也然亦足以為學者倡自是亦間有行之者矣昔趙文子冠見欒武子范文子韓獻子智武子各有訓言次見張老張老善四子之言而繼之以志在子三字今觀北山先生思成之命至矣切矣予亦曰志在子吾子勉之魯齋集巻十三
