body:
  text: 魯齋集巻二十宋王柏撰墓誌銘宋金華令蘇公墓誌銘咸淳乙丑七月既望瑞安蘇公解金華組求去甚力太守勉之不可同寅挽之不可帥府移文力留之亦不可越二日邦人士餞公於郊有曰歸装比自来時省公案留教去後看此最為實録莫不惜其去而仰其髙風咸曰金華非大不可為之邑也公非有慊於中而去非有拂於民而去非有獲罪於上而去或有矯於時而然乎抑有冀於後也要其終而后見既而歸家自適不謁選者久之江閫辟之而不出東總辟之而又不出是果無宦情也矣後世進取之謀無所不至自一試之得失一職之陞沈欲心滔天垂死不已公非有阨於勢而不可出非有局於法而不可出非有屈於才而不可出非有疾病於身而不可出其無所為而然乎或有問不出之意公曰吾豈敢借隠以沽名哉吾年已如此必待龍鍾而後止乎或曰何不徑上掛冠之請曰康節有云既閒何用更名為公之心事坦然實無所為也無所為而為之豈不足以厲世範俗哉彼南轅北轍奔走於名利之途㝠行而不知休者聞公之風亦可以少悟矣自公之歸五六年屢得公書相慰藉庚午冬倐聞公訃驚嘆失聲為位於蘭若哭之亟走介弔其子樸復書先君歸家杜門靜坐惟取故書玩味涵泳或乗興吟誦陶韋諸詩暇則抱弄諸孫怡然自得是年春因𦵏季子亦自卜歸藏預備衾襯編古人達死生之詩名先覺録有讀先覺録之句云至死了不惑兩日前草分韻詩有羽翰一息凌霄去之語若微示将行意一朝不疾不藥無一語悠然而逝予執書而悲且感公於死生之際從容如此非有大學力者不能其進退出處所以裕如者特餘事爾然世亦未嘗無知公者或以亷吏舉或以㢘勤辟或薦以不特㢘於利而亦亷於名彼所謂亷止稱其不貪也殊不知㢘之為義何止於不貪吾夫子以亷對忿戾言先儒釋之曰有稜角孟子以亷對頑言先儒釋之曰有分辨有分辨則自然稜角生雖夫子之可仕可止可久可速孟子之可取可無取可與可無與亦不過明此分辨而已盖亷者事之别而義之用也予亦以亷稱公其亦異乎世俗之所謂亷也既月樸書来云某不天無以慰罔極之痛惟是先君墓上之碑敢泣血有請庶幾乎不朽之託噫予何人斯而可以託不朽哉予不忍深拒而亦不敢輕諾越三月書又至介遺事而申其請朗誦三復而益信予之所謂亷也公諱某字基先始祖自閩徙温之瑞安今八世矣曽祖諱某祖諱某積善發聞紹開厥家父諱某擢秀未振降年不永嘗手書前賢種徳詩語為訓伯父桂陽使君為作字辭有培厚根原涵養氣節語公之有分辨盖是基於此年十有八而孤居喪已卓然能自立從師講學朝夕不惰擇交游謹出入諸老先生皆以逺到期之年二十有二中上庠選例以字跡疑似沮監史有竊原巻誘公換易者公正色遣之不以為意端平初廟堂收拾士心凡有小嫌悉試後省復其名既入館下益自淬礪連貢於春官自是坎壈不偶親友有勉其就晩科者公謂自墮地時有無遲速已定不敢逆天命以自速非所當得之譴會丁内艱服除遂登寶祐癸丑第初調臨安府浙江税兼恵民南外局公於是年五十餘矣筦庫雖猥瑣簽署文書外無餘事也人以公為吏隠間攝城南廂閭閻之訟填委公與之剖析化誨皆歡呼而去當路動色爭以闗陞舉再調保寧軍節度推官婺為劇郡前史君尚寛慈公在幕府以振紀綱明剖決佐之事有闗天屬之爭必與之委曲開曉俾還其初而後已聞者感慨擊節史君亦以情理俱闕年七十有二卜以明年某月某日𦵏於帆遊鄉唐嶼先塋之下從治命也娶葉氏繼薛氏男三人長模博雅有識兩薦於浙漕次與權承信郎差充國史實録所主管文字繼從弟将仕後次楷将仕郎先五年卒少俊敏公哭之甚哀女二人長適蔡堅亦先卒次適周麟孫孫男三人芸孫茂孫蓻孫公命茂孫為楷後孫女一人在室有處事録十巻好生録十巻讀書録十巻文集若干巻自號愚翁云初予識公於郡太守傃軒趙公之門繼為邑下士予非有求於公公亦非有徳於我亦未及相與劇論學問文章之淵源雅相敬愛於既去之後而莫知其意今樸之請詞確而情哀予是以不敢堅辭於乎世降俗薄以恬退為矯激以嗜進為真情䝉諂負義媕娿韋脂身雖貴而氣己腐公之風操峭厲檢履純固身雖屈而氣常伸於萬物之表不可不銘也銘曰峻而裕介而不倨有祔斯窆千古永慕過者起敬是曰宋㢘吏蘇公之墓宋故太府寺丞知建昌軍王公墓誌銘江左名家王為著姓其後散居會稽譜牒不紹婺之土邑皆古烏傷之地而隸會稽烏傷有鄉曰鳳林里曰王村皆王氏之聚居皇祐中有諱固者始以進士決科邑人榮之改曰折桂里自鳳林徙於浦陽者未有顯人由浦陽徙於吳門而顯者忠恵公也自浦陽徙於金華而顯者公也公諱夢得字起巖舊名闕之字子俊曽祖諱吉故秉義郎祖諱汝謀擢秀未振兩舉於浙漕父諱朝佐積善發聞筆耕終其身以公顯累贈中奉大夫妣薛氏贈令人竒山先生之孫女也公生於嘉泰癸亥九月辛卯少同闕氏師鄉先生徐公仁傑業勤志專日赬面不避繇京庠陞太學凡三年每試輒中竟擢端平乙未第時方更化召真文恵公典貢舉士氣欣躍發策問大學之要公以敬為一篇綱領援證詳明適契真公意既第往謝真公力疾延見稱賞勉以逺者大者授迪功郎臨安府錢唐縣主簿兼領學事舊有夫子廟而無學公曰兹非缺典歟即白京尹趙公與權尹慨然發帑繼廩命公董其役禮殿講堂齋館門序翼翼沈沈嚴邃深靖欵謁有次公養有廩像設禮器咸應法度既成潼州吳公泳為之記趙公素嚴或呵叱僚寀公獨當其意檄入僉幕攝臬事莫不異之是時水失其性京邑靡寧以修江築垻為急務委公受給物料錢米銳意事功戴星出入靡勞敢憚趙公白於朝連進兩資淳祐辛丑浙漕魏公峻辟充犒賞所凖遣癸卯都承韓公祥領鹽事請於朝差兼浙漕幹官提督鹽場京尹趙公與憲兼漕以和糴賞奏貤乃僚故公自闗陞四轉承直郎以考舉改合入官轉奉議郎差知臨安府鹽官縣時史嵩之當國都承韓公謂公曰某已薦公於廟堂許除掌故矣公力辭僥倖改秩法當作邑不敢躁進韓公竦然未幾嵩之去國人以公有先見之明公以為自立之道當然也京尹以鹽官以次逺因怒於潛宰欲劾以辟公公曰奪人之職不忍為亟奉母東歸弛勞里居訪尋師友益求其所未至丁未十一月趣領縣事是嵗兩浙大旱臨安為甚公即講荒政列為四等以甲户勸分工商自營細民糴貧乏賑米價既翔常平府倉所發有限而續食尚逺於是痛撙縣帑分甲户糴於鄰境凡一千七百石有竒以濟自督四隅分委佐官督六鄉官吏日劵扉屨之費皆優給之不使一毫擾都保巡視既頻訪問又審而欺弊自縮民霑實恵百姓樂業詳見葛應龍賑荒記自公筮仕連七年勤勞盡瘁幸需邑次始得休養精神為作邑之本故宰壮邑詞訴雖繁多據案剖決民無稽訟獄無停囚事至見一定不畏强禦不可轉移或以拘執議之公曰吾平生亦頗得執力淳祐巳酉閏日丁母夫人憂辛亥服闋壬子五月差知和州含山縣王公埜守金陵檄入制幕甲寅復辟為江東帥機王公還朝解職十月差闕邉所主管文字待次丙辰供職本所文字最為繁夥難考一付吏手公為之置籍諸郡課入易於拘𣙜積欠至累鉅萬公疏剔白於朝截界蠲免丞相程公元鳳傾心從焉戊午十月差幹辦行在諸司審計司開慶巳未七月除太常寺簿時丁大全當國有薦公者丁欲除察官使戴慶炣諭意公巽辭又使王立慶来覘之公力言愚不識時豈堪任此立慶復命言必不為用丁怒嗾汪自强劾公未幾丁敗公奉玉局祠辛酉除太府寺丞會朝廷委書擬提領内帑綱解所或疑公隂奪其權讒於侍御史范純夫奏免癸亥又奉祠咸淳乙丑差知建昌軍待次戊辰三月有㫖奏事訖之任公首言典學者帝王第一義有格物致知誠意正心修身之功而後有齊家治國平天下之效茍誦說徒勤而無踐履之素觀美是務而無真實之行則是内外判而為二而帝王之道可以襲而取也使虛言可以修已治人則二帝三王何為兢兢業業為是煩重勤苦哉今日之天下正在於文太盛而質太衰懇惻篤厚之意樸素真純之風幾消泯而無餘媮薄欺偽愈出而愈巧粉飾塗抹日密而日精發號施令可誦而述而奉行脫畧遞相欺蔽分司列職繆為勤勩而畏嫌避跡不究底藴號為良吏者亦不過擇其可以得美名則汲汲行之百姓隠憂未嘗拯恤也最是士大夫心術日壊掇拾先儒緒言以為禆販之地由是起聲譽由是竊髙爵重禄責以實政平日無具臨事顚倒錯謬又善為强辨以文之以至比閭族黨之士終身酣痼於無用之言四方之賈百藝之工懋遷之急制造之勤類皆輕薄纎靡不傳於質舉天下之廣熏蒸鼔盪天地之氣朘削亦薄物産安得而可裕乎願陛下以一身為天下凖發自淵衷允蹈實理體之於身心驗之於宫庭察之於視聴言動一本於典學之實意氣之所感動精神之所振刷人安有不率從者哉進退人才不取白望必考實績凡議論之偏迎合之巧當抑而不用或傳聞之失疑似之混必别真偽不亂於浮言真材實能庶可得而擇治功安有不集者乎第考其大畧謂今日千里長民之寄事之集不暇給者綱解是也綱解之所以難者賦稅陷也於是都省有推排之令布告四方越四載未有就緒者何哉要須先定規模曲盡事情使之持久而不變然後可以成功夫自州而縣而鄉都官而保寸寸而較之夫豈易事其勢不容不自鄉都官始此皆豪家大姓實為之昔者官吏精明覽察嚴而稽考密鄉都有所憚不容其私今也不然州局無可專委之官胥徒皆少年無賴之輩豪家大姓先生慢心釐改在其手少算在其手造籍在其手雖親戚故舊之産猶不容不隠况糾正其自産哉懐私得便平日併吞之心反因是以售其奸况守令更易靡常識見不同規模屢易貧弱長受困苦而賦稅卒不得其實願於户部暫建一司擇通練之才專督其事審定規模守令不得相紊州縣申命一司專任闗割之任就以牙契委之交易必用官紙不許用私紙因得以考其闗割户籍不至陷失一劄自上而下由本以及末二劄自下以上由末以推本非更歴世變之深考察物情之熟不能道也六月至盱江視事盱之地據東南上游山髙而水清故士以經術議論詞章擅名者代不乏人其俗剛而其材武易動而難安挾干戈嗜刦掠亦時有之必一大治而後定不過一二十年又起多由富家征取太苛而民不能堪是時有羅動天者怨其主諶氏相挺刦其家乗勢入縣焚燬公急調兵收捕多立賞格離其黨不旬日擒其渠魁法外梟其黨幾二十人或謂平亂民未有如是之速者前乎此每有警多藉隅總協力其勢不容不俟諸司援兵之至速則縱殺大掠反甚於冦緩則忌功生事此前世之通病也公以自劾待罪有㫖無罪憲司猶上為法受惡之章詔予祠一時賢士大夫公論翕然惜其去公自以為當去無尤也奉祠三年優游自適出於吉凶悔吝之外舊號約齋更曰澹軒辛未之春忽患壅嗽自是脾虛不喜食荏苒半載雖羸弱力疾無惰容一日子姪進藥忽正色曰吾至此何以藥為倦甚将寝左右解其闕索冠冠之扶以寝氣漸微而卒時六月二十八日得年六十有九厯階至朝請大夫娶邢氏先十有九年卒子曰某官女一人在室孫女一人尚幼公檢履純固丰度閒雅未嘗有慢易之色而不失於和未嘗無嫉惡之心而終歸於恕每恨少孤祭必盡敬終日愴然墓木毁於風亦感嘆流涕曰吾不復見此木之成矣奉母事兄怡怡愉愉以禄養為幸中年哭母哭兄哀瘁殊甚敬邱嫂如母撫孤姪如子教之成剡之澤一門和氣人無間言自奉至簡衣食不求豐出仕三十年儒素如故少游鄉校時迂齋樓公典教作興士類尢器重之及驅馳宦轍刮目交譽者皆當世偉人八剡三闕有所挾地凡贊幕府宰畿邑剖決斷擬當代吏師皆印可生平手不釋巻異端雜說不肯一過目與人交未嘗泛予久而彌敬無潝潝訿訿之態戒子姪擇交必取其謹重有識者為友尚謹嚴厭鎸鑿謂寧過於平淡不可過於浮靡每聞四方水旱盗賊及當路政事或未當憂形於色若身任其責者此皆公之實行也予每誦公之奏疏而有感焉㫖哉文之太盛乎古之所謂文者即道也君臣父子之敬愛長幼夫婦之别威儀之則詞章之懿皆天理人事自然之文也以之制禮而作樂以之經天而緯地以之美教化而厚風俗以之播告四方流傳萬世無非此文之全體大用與天地並立而不可泯者吾但憂其未盛而豈憂其太盛哉後世以文取士而文始衰𣙜無用之詞為有用之的上慢於擇下茍於應上下以虛相與遂至於天下無實學無實學則無實才無實才則無實政聖賢明善誠身之本禮義亷恥之教幾泯焉不聞俗弊風訛迭相誇尚心迹言行曉然相違而不以為異事情物理公然相背而不以為羞舉天下驅而囿之於一虛之中而不知變此公之所謂太盛也人競趍於虛公獨趍於實宜宦塗坎壈而卒不得大試也嗚呼悲夫将以明年某月某日𦵏於赤松鄉梅砂湖之東阜從治命也公之子姪以予與伯仲從游之久必知公之實来請銘其墓予以才思刋落固辭而請益堅遂為之銘曰天賦之介而濟以通中立不倚出處從容妙齡筮仕有驅其疾兩寘周行孰媒孰隙白首承鄣入告於庭文弊賦殘本末備陳盱俗易動亂宜速殛曷忌曷仇義當坐黜既適我願既返我廬堅守我約澹然自娱進不隠賢退不茹愧疾病莫昏油油而逝東阜之卜沙湖之旁手植松檜祖阡在望沙湖之旁東阜之卜有勒斯銘永相遺躅徐彦成嵗月記金華徐基之嗣子順字彦成生於嘉定戊辰閏月二十有八日卒於淳祐丙午閏月二十有五日娶時氏無子幼勤敏端重如成人視羣兒相與歡笑跳躑於前漠若不知坐立儼然未嘗有戯慢之色雖有喜相玩狎者亦莫之敢侮讀書不待警策如良馬在御蹀蹀不自止編摩抄録疾如風雨先君深愛之至於談古論事亹亹有本末而聴者輒忘倦與人交若簡淡而忠厚之誠藹然乃有所不為確乎其有守也事親問寒燠藥餌惟謹年来吾敇斷家事善兒亦自力以佚吾老師友稱其可與共學鄉黨許其可以宜家吾亦日望其有與成也今不幸死矣而反有以重吾之悲於乎汝雖得其氣之粗淳而局於數之不永天所命也吾何言哉是年十有一月甲申𦵏於赤松鄉陳家塢之原煙巒風壑永閟汝身千古茫茫藏吾至痛吾亦将卜竁相從於斯云太學進士樓叔茂墓誌銘國家取士沿襲李唐未能復古考諸科名記賢公卿參伍相望此法之幸也盖天下之士氣稟不一詞章亦異遇主司之能猶未免以志尚為離合况承訛襲舛者復不少乎此非科舉之法難中實有司之見難遇耳然其法雖不足以盡天下之竒才猶足以成就天下之賢士方年少銳氣英發芒彩烜燿一鼔有餘勇再而三則餒矣間有介然之悟收斂精華追尋根柢講習討論之業既備省察克治之功亦密陶鎔徳器涵養益宏雖終不遇不失為士之良師至於困躓摧挫厄窮無聊老且死固比比也雖為士者不自愛重而天地英秀之氣沮於科舉者亦不少矣予以是於樓君漢章而有感焉君諱奎舊字叔懋婺之東陽人曽祖諱瑞祖諱允載父諱雷皆不仕樓自漢以来指東陽為望族其後徙於鄞者以參政宣獻公顯居於永康以樞密襄靖公顯惟東峴之宗獨微十二府君允載為鄉曲所尊敬攻媿先生實誌其墓知其後必有人焉君少而穎悟日誦萬言下筆輒出新語人謂東峴之興必此子也既長出從誠齋國録陳公山堂國博章公學皆器重之時迂齋樓公来掌鄉泮以作成人才為己任愛公之文屬以凖度自是骨骼開張精神縝密老成皆放出一頭地謂一第特易易耳既而補上庠以小疵沮抑者累年孔山喬公竒其才授以漕牒即與計偕禮部屢黜之再中上庠成外校與秋薦復為禮部所黜君恐負師友之期父兄之望将斂華就實大其所成天不永年以淳祐辛丑六月甲申終於正寝得年五十有一娶平江朱氏子男二人衎衢卜以辛亥三月丁酉𦵏於縣之孝徳鄉南山君資峭勁尚氣節意度軒豁與四方竒偉之士把酒劇談無所忌往往以功名相避遜然面折不容人過亦或憚之乃若事親從兄友愛弟姪愉睦無間言以君之天才卓犖氣吞餘子乃俯首下志工聲律之業以求合有司之程度固不能不少貶矣何至屢興屢仆終不遇而死哉而謂科舉之法能盡天下之人才予以是歎人才之不幸也於戯悲夫銘曰天與之秀又開以名孰扶孰抑莫究厥成有邱斯閟有石斯銘遹紹爾志相維後人定海縣丞楊公墓誌銘君諱某字元定姓楊氏曽祖諱淵祖諱伯玉父諱林皆不仕世為婺之金華人誠齋先生國録陳公上第也生於淳熙丙午七月甲辰自幼天姿凝重家雖貧約不與凡兒伍父兄異其志命從學刻苦肄業進不可禦里師巷塾不足以應其求始進於大師講下友朋交譽藉藉以儁是時麗澤收聲其門人橘坡王先生山堂章先生與誠齋先生皆以汲引後進為己任而靜軒吕公克紹家世相與切磨其間鄉評之所取重雖不能不以舉業為工程然躬行之實講說之正固已大異於習俗由是學有所宗士有所則數十年儒風不墜者作人之功未泯也君執經誠齋之門克勤克敬如事嚴父誠齋視之亦猶子也賓至多侍講論或至夜分於是多識前言往行得為學之本嘉定庚午貢於鄉辛未中上庠選時絜齋袁公為司成天台潘公子善為正録黨禁初開正道昭著氣象翕然靜軒導君于潘公又得聞學問淵源之懿觀感服習心平氣降律己自是益嚴擇友自是益切功名之念自是而益輕鈍於場屋者凡二十有餘年巳夘僅一薦又屢黜於春官端平乙未因以累試思奏名天府廷對入等授迪功郎常州晉陵縣主簿再調臨安府於潛縣丞逺勢利安澹泊與長官為文字之交戸庭寂然人不知其為官府也未嘗求知於人諸公多得於案牘間皆知其學之有源也交薦於朝秩滿府尹欲羅致之君翩然而歸踰年始謁選更授慶元府定海縣丞宦情既薄不欲矯世掛冠其無意於斯世也久矣寶祐改元二月甲戌以疾終於正寝初移巒居士徐公求賢士以淑諸子君以少年應聘矩度修整言語謹確起公之敬遂以其子妻之子曰瑞國學免解進士女一人適迪功郎紹興府餘姚縣主簿唐爍孫女二人尚幼以是年十一月壬寅𦵏於赤松鄉五石山之原一日璐以墨絰来請曰某已礱石而先君墓上之文未有所屬知吾父者無踰於子願有以紀其平生以慰不肖孤罔極之痛予謂顯親宜求當世聞人昧昧陋巷者何足以垂後曰吾但求其知不知不計其聞不聞也予不得而固辭雖然君嘗察予無用於世勉以為己之學導之以師友之正是君知予者厚而予不足以知君予見君之居家也終日儼然青燈永夜手不釋巻沈潛道體俗事一毫不入於心坐立有常處未嘗傾倒跛倚語黙有當善未嘗戯言茍笑孝友篤至夫婦相敬如賓與人交恭而有信澹而能久不為激訐之言不為表襮之行誠意既格上下益信服之予所知者如此嗚呼士患不知學學患不知厲而固守力行之勇内不為私欲所牽外不為俗習所動斯尤難也自君之亡而為學之士益就寂寞作人之功不幾於泯乎是可為世道懼也而繫之以銘曰人孰不學學必為己斯焉取斯魯之君子既承其原盖取其委亦曰於仕我行我止亦曰於止若無他嗜青燈素編有永於味五石之山窅然爾遂一氣之寧千古之閟我其銘之以篤来裔右詩文二十巻宋魯齋王文憲公之所著也其為言正大純雅閎肆典實而天道之顯晦人事之治否物理之盛衰莫不具焉故其羽翼乎聖賢之學而為一代之所宗者也正統辛酉秋八月予来官金華因公之六世孫四川憲僉王公迪得公遺稿讀之深有契於心如飲醇酎不自知其醉矣遂與貳尹鄱陽劉君仁傑商訂編校命公之鄉生何贊繕寫成書已而謀諸同寅各捐禄米鋟梓以傳復得邑民陳乗忠助力而成始工於壬戌之冬訖工於癸亥之夏予故書此以識嵗月云廬陵劉同識魯齋集巻二十
