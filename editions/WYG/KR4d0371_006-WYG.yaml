body:
  text: 魯齋集巻六宋王栢撰説洪範九疇説或問九疇之所以則洛書者其目可得而易乎曰不可也可易則非聖人之書也失陽變隂合而先生五行故五當一數而不可易人禀五行而見於五事故五事次二而不可易八政者為治之大綱也故八政次三而不可易五紀者天時之大節也有八政而后天時可推此五紀不可先於八政皇極者四方八面之所取則故居中而不可偏三徳者五事之直對也三徳藴於内五事著於外品節剛柔所以定五事之合中也稽疑者八政之横對也有政有疑不能自决必卜之而后吉凶見庶徴者五紀之直對也庶徴之休咎五紀之所以逆順也福極者五行之直對也人禀五行之氣有善惡焉有厚薄焉此福極之所由分也三徳者又庶徴之横對也休咎之形剛柔過不及之偏也五紀者又五事之横對也五事中節而后天地位四時行焉三縮三衡九疇之數昭昭然一定而不可易如此以十數推之而可以如是乎皇極説五居中者統體一太極也八位皆有五數者物物各具一太極也五行五事五紀之五此顯然可見者也八政之有五何也食貨祀賔師五政而已三司者所以統五政故曰八耳三徳之有五何也一正直二剛克二柔克也七之五用卜是也八之五時九之五福是八位之中五無不在五行雖五大分則二實隂陽之所互生也天生水本乎陽位于北隂也地生火本乎隂位于南陽也木為水之穉陽而實生火金為火之穉隂而實生水土則貫四行而無不資焉五事雖五總之以貌惟一二始生之數隂陽互宅葢陽中有隂隂中有陽三數雖曰八政而實統乎三食貨司空之職也祀賔司徒之職也師則司冦之事也八出乎三此八政之所以次三也五紀雖五而嵗月日星辰實總乎厯數星辰雖可析為二合而言之星之辰也實為一紀此五紀之所以次四也卜筮雖二而體則七庶徴雖五體則八曰雨曰暘曰燠曰寒曰風曰時曰休曰咎也一二始生之數隂陽互宅九六老數則互變六老隂也退而變陽故有三徳九老陽也退而變隂故有六極此則隠而難知者也大抵九疇以竒數為主故十不見以對待而全洛書終不出河圖範圍之外者也竒主中而位四正偶退而居四隅一二三四河圖之生數也此皇極之所以立葢有此四者方可以建極也六七八九河圖之成數也此皇極之所由行葢此四者皆自皇極中生也惟皇之極有建不建焉故四成數各有兩端三徳之有剛柔卜筮之有従逆八之有休咎九之有福極是也人君治天下之道固已備於此矣武王之訪箕子之陳直與危㣲精一之傳相為終始於一書之中其條理縝宻不可易也此所以謂之大法與故朱子曰此是人君為治之心法皇極之奥義朱子言之詳矣其餘所未言者敢與同志共講之獲麟説事有出於人之所共喜莫之致而至者謂之祥亦有出於人之所不識卒然而遇者謂之異是以麒麟鳯凰自昔亦以為祥且異也何哉葢其為物也世不常有誦其名詠其徳誇其瑞而不識其形見于詩書傳記寥寂希闊於三千六百年之間謂之異亦宜哉然其性之靈也未嘗輕出必有至治文明之世覽徳輝而後來又安得不謂之祥乎惟聖人之門其理素明其論素講而不以為疑也故有子曰麒麟之於走獸鳯凰之於飛鳥類也聖人之於人亦類也但出乎其類拔乎其萃而已予嘗深味其言而竊嘆夫天地清明純一之氣不常㑹而不易遇也方其幸而交㑹則鍾於人也為聖為賢鍾之於走獸也為麒為麟鍾之於飛鳥也為鳯為凰至於景星甘露之見於天醴泉寳玉之見於地嘉禾紫芝之見於草木龍馬之圖神龜之書其名状雖或不同理則一而已矣然則麒麟鳯凰非為聖人而生也特與聖人同值夫清明純一之㑹同生乎聖人之世也故聖人之時必有麒麟必有鳯凰隠顯之間特因人之見不見耳愚嘗謂鳯凰者有感於陽之靈者也麒麟者有感於隂之靈者也陽者天之道君之象也隂者地之道臣之象也當其天地交泰君臣同徳麒麟鳯凰所以畢至有聖君而或無聖臣此鳯凰之所以獨至也有聖臣而或無聖君此麒麟之所以獨至也夫子嘆鳯鳥之不至感聖王之不作天下不得被中和之化夫子感西狩之獲麟固嘆夫麟出非其時與我相似然既出而見傷又豈不知其非已之嘉瑞也乎夫子之感麟感麟之出也亦感麟之見傷也逍遙曳杖之歌不待夢兩楹之奠而後决其非久於斯世也矣夫子憂患後世之心未嘗少衰於是始脩二百四十二年之事立百王之大法為後世之軌度豈得已哉説公羊者乃謂文成而致麟胡文定公祖之以為與蕭韶作而鳯凰來儀者同一理為先天而天弗違志壹而動氣之驗言亦淵奥矣然文成而麟至固足以大春秋之作麟至而見傷又何春秋之不祥也乎以夫子憂患天下後世之心垂為萬世之法程夫豈小事文成而反致不祥之應豈理也哉但先儒之論既曰麟自聖人而出乃又曰麟出非其時虛其應此為悖理善乎子程子之言見于劉質夫入闗録者足以破千古之惑文定祖述程子而於此獨異焉新竒之病賢者亦有所不免可不慎哉蜀先主託孤説每讀劉先主訪孔明之言曰漢室傾頹奸臣竊命孤不度徳量力欲伸大義于天下詞義正大凛乎有三代之風此孔明所以幡然而起為之鞠躬盡力死而後已者也當其梁益粗定鼎立勢成至于即位漢中經營克復㡬五十年春秋于是亦老矣使𤣥徳誠有興復漢室之心必能擇宗室之賢以托國俾之繼志述事以成吾平生之志願豈不始終光明哉惜乎計不出此臨終數語君子以為漢祖唐宗皆有媿色是固然矣識者精考宻察以為𤣥徳平生心事于是俱敗言若甚公而心甚私庸闇之禪不足以了乃翁家事豈不甚明𤣥徳既不能擇賢宗以授國則當公天下以為心盍於精爽未憊之時播告天下以行堯舜之事以孔明而代𤣥徳授受自可無愧豈不卓超千古今乃不勝老牛䑛犢之愛謾為不得已之詞豈情也哉是知平時魚水之歡皆虛文也明帝告馬后説明帝之告馬后可謂理到之言若可以感動其良心者然使忌嫉者聞之未必不愈増其怨怒尚何望其果能聽従也耶史曰后於是盡心拊育又有若果因此言而後生綏愛之心者皆史臣之病詞非知馬后者也后常以儲嗣未廣憂形于色薦進左右每加隆遇則其無妬忌之行有均一之徳固已久矣所以聞明帝之言欣然領㑹葢其素心也而況兩漢之君未有如明帝頗修宫教登建后嬪必先令徳内無出閫之言權無私謁之授所以正嫡庶之分全母子之恩者固出於平日之誠意非一時之言可以僥倖而轉移也是知齊家之道先在擇賢配此闗雎所以為詩之首也矯齋説夫人之氣質不齊自隂陽五行紛綸雜揉有清濁焉有美惡焉有厚薄焉而清明純一之㑹千百載不一遇也雖聖人亦不能一人之所秉而能和人之所偏是故舜命夔典樂教胄子曰直而温寛而栗剛而無虐簡而無傲所以扶其不足而抑其有餘也教化不作於上而吾夫子講道洙泗私淑諸徒羣弟子雖愚魯喭辟之不齊吾夫子不過進其退而退其兼人者而已世衰教弛人自為學茍欲矯揉其所偏其將何以為準的哉亦曰求之於學問之中乎誠能求之於學問必知無過不及之謂中黙計吾之氣質於何為過於何為不及不及者企而及之過者抑而反之必至於中而后已矯揉云者即變化細宻之工變化云者亦矯揉成就之驗矯之為言治其偏而歸于正之謂也茍能矯枉而過於正則反為矯之累矣或失之激或失之亢則皆非所以當學也然中非易至也亦難識也學問之功非一日所能成就也君子之學不為則已為必要其成非百倍其功不可也中庸曰有弗學學之弗能弗措也止雖柔必强朱子曰明者擇善之功强者固執之効吁是非矯揉變化之準的歟三姪字義説寳祐癸丑之季冬十有一日乙卯奉伯氏命挈諸姪來歸敎養越五日進而告之曰天之生是人也莫不付之以仁義禮智之性不以聖賢而加多亦不以愚不肖而故少也然托於人者為氣禀所拘故有晦有明為物欲所蔽故或絶或續人之可以全其付託之初而不為氣質物欲所勝者其學問之功歟是以大學敎人明明徳必曰如切如磋如琢如磨所以指其得之之由也曰瑟兮僴兮赫兮喧兮者言學問之成徳容之盛而嘆美之也其餘義理詳宻予將次第為汝等言之思昔汝諸父之孤大畧亦汝等之年其間聚散盛衰禍患事變不堪回首今何忍言之哉自是以來予日夜望汝等有所成立以承門户之付託長姪當以學問率之盖有所執持則自有毅然不可犯之威故朱子亦以毅釋僴字長姪先已名僴今字之以子毅次名曰付字之以子全幼曰伲字之以子可三子思其命名之義而勉之敬之以副予望云王岊字説壬申之秋八月壬辰太常寺簿王君爰稽古典肅賔友僎介冠其子岊于庭而命某字之竊嘗聞岊之為字即節也周之官有掌節者以五節授使者輔王命執以行為信守邦國者用玉節山國用虎節即漢之銅虎符也君之世祖侯東陽有玉節久矣君行將授虎節也岊之冠適開其端可無言以勉之夫信者理也節者器也有此器必有此理保此信所以全此節必敬以體之順以達之而後可程子謂敬為體信達順之道敢以體信侑爾名子其懋敬之哉姪孫進父字説天秩之禮有五曰吉凶軍賔嘉禮之首曰冠是之謂重禮夫禮之所以重者將責以成人之行為人子責之以盡其孝為人弟責之以盡其悌為人臣責之以盡其忠為人下責之以盡其順豈徒曰元其冠而已哉今月吉辰良族孫以禮冠其子名之曰壵其師字之以進父迺請問進之義於予予耄矣烏足以推明之抑嘗聞壵者土之髙也土之髙固非一日之積矣夫子曰譬如為山未成一簣止吾止也譬如平地雖覆一簣進吾往也為學葢如是然詩曰髙山仰止景行行止土必進而積之以為髙山必行而升之以為至此進之義也若登髙必自下若陟遐必自邇此進之方也子之所知者如是而已子其勉之時哲夫字説甥孫時塏將冠其宗長為之謁字予嘗聞齊景公謂晏子曰子之宅湫隘囂塵請更諸爽塏者釋者曰爽明也塏燥也後之人又従而釋塏之誼曰髙爽也惟髙則燥且明矣故近世名卿亦以爽侑塏夫人之得於天者虛靈知覺妙衆理而應萬事未嘗不明也拘於氣質誘於物欲則吾之本明者始昏矣揚子雲曰天降生民倥侗顓䝉恣於情性聰明不開可謂誣矣聖人之教亦因人之固有俾復其本明而已人生八嵗皆入小學教之以灑埽應對進退之節禮樂射御書數之文及其十有五年乃入大學教之以明明徳新民而止於至善教之以致知格物誠意正心脩身齊家治國平天下之道吁學之體用備矣此學古之大本也今塏既冠固將責以成人非百倍其力於三綱八目之中則何以明善而復其初哉況敢望其治國平天下書曰爽邦由哲哲智也此吾之固有也請字以哲夫子其勉之葉涵字説咸淳庚午二月吉日通齋葉先生命其友人王某冠其子涵既筮矣宿矣期矣而某以㣲恙不果就列敢推涵之義以字之曰涵者清明之藴也夫天地以生物為心人得天地之心以為心虛靈知覺所以妙衆理而應萬事此所謂清明之藴所以能涵者得此氣之靈也其所涵者即此性之善也仁義禮智乃為之綱百行萬善皆従此出必使之寂然凝然湛然粲然於方寸之中感而遂應則不失其所涵之善不然則聲色或得以誘之利欲或得以撓之貧賤富貴或得以移之百念動搖則吾之所涵者昏矣今子既冠成人之責自此始必開之以學問之道澄之以静定之功俾所藴者常清明而不昧醻酢萬變泛應曲當始可以為成人周子曰山下出泉静而清也汩則亂朱子曰山静泉清所以全其未發之善故其行可果請字之以無垢過庭次幸以此説求正焉呉弱翁字説括蒼友人呉弱翁冠來㑹北山何先生之塟訪予於陋巷求其字之説予讀曲禮二十曰弱陸農師絶句朱子然之冠自為一句弱言其時冠言其事文雖相連而義不相足也今弱既壯而又有室矣朋友猶以弱翁稱之以是自怠非相勉之意也夫冠者將責以成人之道故其目有二十曰筮日云云始加曰順爾成徳三加曰以成厥徳未嘗不以成祝之請字之曰成箴本齋箴餞府博修史榮滿造朝天道發育本於一誠其心生生其徳孔仁人得此仁具此全美本然之性曰善而已聖人之本斯誠獨全真實無妄其動也天人秉五常萬善渾渾其惟誠者五常之本吾郡博士齋以本名鶴山筆舌久焉服膺如木之根培養封埴蔚乎蒼蒼干雲蔽日國本在家家本在身一身之本方寸虛明明徳新民先覺後覺推以教人勉之實學深衣講席音吐琅琅乃製闗鑰乃闢津梁齋必有規兩碑對立題必有義浮華者黜皷之弗躍揮之弗前士心已蠱四顧茫然利欲雖深天理不冺豈無覺者曽未旋軫作之不已久久必成三載一瞬簡書有程得師百年泮水能㡬争長虛文誰云義理立國之本恃此人才學不務實吁其殆哉世道日消永矢一黙有感斯言難免世嫉我居陋巷閉門讀書髙軒數過不鄙其愚冷舍竹林載言載笑雖未深購肝膽相照秋風既老行色駸駸别袂一判翔泳勢分我思古人行必有贈贈君以言情文弗稱知君之宇知學之源何以體之亦惟誠焉君之言行何有不實誠貫始終不誠無物須臾有間私欲乗之其為用者大本已虧薄物細故願君毋忽相期實深共保無斁古鏡箴子意何厚恵我古鏡有鼎斯模有容斯正思人之生心徳本明如彼鏡然萬理具呈物欲交侵甘受塵穢弗磨弗治自暴自棄醻子古書為磨鏡方用力之久炯然其光聖賢雖逺如目斯覩以心照心無間今古惟子勉之致知是先人欲消矣天理湛然惟子勉之力行勿止天理湛然人欲消矣外孫字箴文王之易惟震在東一陽既動勢可亨通為徳之仁為男之長奮于二隂有雷之象洊雷既厲孰不震驚守之以正法度是循夫子傳彖乃曰有則恐懼脩省保其安吉惟汝外孫汝父汝名蚤失所怙㷀然一身伶俜重闈何以色養文獻三世莫不汝望百蠧汝伺百邪汝窺一失其則嗚乎殆而汝毋妄動動必由禮汝毋妄言言必知恥手足耳目皆有常規毫釐之繆百行之虧震無咎者實存乎悔震所以亨惟則㒺悖在昔汝冠欒欒棘心三加之祝既不得聞仲春令日吉服在御字汝保則敬戒毋斁考徳問業箴并序昔聖人自謂五十有五而志於學且約其進徳之序為學者立自考之法後世所學無所志所志非所學故終身猶未至於聖人之立也予生三十六年始知為學之方今又三十年矣可以考徳問業矣其所至僅如斯而已矣惕然内愳而為之箴曰夷攷爾生不志于學三十六年如夢斯覺當其覺時有惰有勤或甘爾誘或膠爾程有赫聖經猶昧厥㫖有卓至善莫得所止振爾墜緒以㑹其歸竭爾餘力以研其㡬孰云日莫而以道逺求仁得仁在乎自勉敬修齋箴為天台周平之作天命爾性其綱有五義禮智信仁為之主氣質内錮物欲外攻其所存者鄙哉空空修已之學心必先正其正惟何曰毋不敬衣冠必肅無惰爾容視聴必謹無汨爾衷一語不妄誠斯可入一動不審行斯有失曰存曰養造次無違曰省曰察無間其㡬在昔仲由嘗問君子孔聖告之已精厥㫖脩已以敬確乎一辭如斯已乎反致其疑再疑再告曰安百姓究其大用堯舜猶病惟聖有教本末具陳惟敬之功其心孔仁仁有専言統乎四徳以是而脩實為學則有揭斯扁相爾齋居我箴匪耄丕哉聖謨中處箴為汪元思作維天巍巍維地回回人於其中參為三才雖曰三才同一太極渾合無間是謂理一乾父坤母維人子如各循其性是謂分殊生生不息均此一理動静屈伸猶魚在水頭圓足方外體其形滿腔惻隠内得其仁君子存存俯仰無媿惟踐爾形斯奠厥位須臾不謹私欲乗之其與禽獸相去㡬希卓爾元思聿來胥宇揭以觀省有曰中處我其箴之俾格此名上帝臨汝毋貳爾心宜齋箴為胡子升作天道發育有萬斯類得氣正通惟人為貴立人之道曰仁曰義乾坤父母四海兄弟兄弟一門父母乾坤分殊為義理一為仁良知良能莫不敬兄兄兄弟弟是乃愛親同此遺體如足如手違曰悖徳孝亦何有夙夜匪懈是保是守惟子升父翼翼怡怡宜兄宜弟伯仲塤箎以宜名齋以善相規以養夀母以貽孫枝尚期力學窮理致知知宜之義得義之宜齊于一家推而一國必有事焉神明厥徳汲齋箴并序昔嘗為葉聖予賦汲齋詩有云當知汲井如克已汲去汚濁清自回之句今又索箴再辭弗獲愧學誠之不進無以異於前日之見也復理舊語為之言曰天賦人受有物有則湛然良心萬化攸出欲動情勝既堙既塞趨彼末流浸以没溺迺激其湍迺窮其力以濁天下以穢邦國曷澄其源曷達其窒惟學有要於已先克制外養中非禮者勿本體清明有未嘗息我觀易象如井濟物寒冽淵澄本源之徳有泥其汚人將焉食渫治既清然後可汲惟聖予甫觀象體易昭揭斯名用警朝夕澡滌天君勿受形役豈汲於用為我心惻勿幙而收勿㫁而繘左右逢原要在自得成汲之功博施無極賛河圖賛河之圖兮開天地􅄨五十有五兮隂陽相索惟皇昊羲兮肇端乎神畫心妙契兮不知其千萬年之隔洛書賛洛有龜兮負文錫神禹兮彛倫夏商之季兮汨堙箕子載陳兮皇極為之一新萬世之大範兮存乎其人漢髙祖像賛世道大變異哉漢祖不階尺寸而有天下三章之約偶中時機董公仁義安識精微唐太宗像賛世道再變太宗有國終始胡風歴年三百萬乗不足一將之雄仁義果效何止嵗豐徐伯光道廪賛道滿天地萬物浩浩道非可廪廪則有道中虛而實日用之寳嘉穀稊稗辨之貴早甲寅畫像賛石笋巖巖曷培而崇繡湖洋洋曷浚而通茫茫遺緒耿耿爾衷孰融爾氣孰肅爾容稜稜霜月習習春風匪範爾徳用警爾慵乾道御書賛皇矣孝宗聖徳天縦翼翼小心親承大統監觀王國宗廟黍離讐恥未復版圖未歸寤寐英材𢎞濟大業昧爽丕顯孜孜聴納爰究爰度是經是營鳶飛魚躍遐不作人有赫其明或黜或陟破削拘攣萬里咫尺于弼于輔于蕃于宣百辟是憲人物藹然中興之際於斯為盛維我先臣恭承眷命昔在乾道試邑長沙政聲上徹召節亟加入覲于庭天顔開豫股肱之郡汝其綏撫于嚴于信宣化兩朞帝曰來汝郎省經帷晝既訪問夜出奎畫貂璫駿奔衣冠駭唶帝意若曰汝言有章既及治具然猶未詳盍罄汝忠裨我政體毋替朕命媚于天子雲漢昭回臣拜稽首對揚天休昌言敢後帝心亹亹帝謨洋洋求治之切度越百王威靈在天遺烈在下日月于邁邈然今古君臣之契自昔所難有進有退惟義之安驪珠陸離三十有九既勒堅珉永鎮塋阜神光發笥匪金厥籝惟忠惟孝百世其承匪忠曷勸匪孝奚則匪臣之榮惟皇之極截㫁提起賛上饒克齋陳先生以截㫁提起四字接引後進亦喫𦂳教人之要法也金華王某因為之賛曰美質難值人欲易昏意必固我四者相因纒繞馳騖綱常日淪孰能勇決盡絶其根毋滋而蔓毋容而存惟精惟一萬境通明右截㫁心本虛靈天理昭晰一敬不存明命斯遏日就汙下淪陷没滅孰能幡然奮發振挈毋間而㫁毋作而輟必常惺惺萬事中節右提起乾道九賛强圉敦牂乃正元日觀族孫珙乾道之章志淳而理該差彊人意猶懼其體之未切也為之推衍先儒之説或可為進學之助知道者不足觀也於穆乾道其徳曰元萬物之始萬化之端氣行在東於時為春天命人受於性為仁君子體之衆善之歸於穆乾道其徳曰亨萬物之通達元之生嘉百會南陽極而隂恭敬退譲禮云禮云君子體之抑抑威儀於穆乾道其徳曰利利匪已私生物之遂斂華就實禾黍嶷嶷義以制心大分斯得君子體之萬事之宜於穆乾道其徳曰貞物理備具物生之成天紀回復為時之冬為性之智藏始於終君子體之正固弗移於穆乾道徳曰剛健一息不停萬古旋轉維健維行剛斯可見雲行雨施乃化乃變君子體之有强無勌於穆乾道徳曰中正寒暑代謝無有偏勝當消而消當晠而晠正或未中惟中無病君子體之卓然有定於穆乾道徳曰純粹體用渾然具美全懿邪惡莫干隂柔莫媚時曰至誠真實不偽君子體之精一無二於穆乾道是曰三陽為夫為父為君之常是曰父天是曰子綱下濟而泰光明四方君子體之吾道斯昌於穆乾道君子體之終日乾乾烏可已而勇猛精進窮理致和獵險摧剛萬里載馳須臾不力明命斯隳古賢像賛并序先祖侍講平時無玩好守鄱陽日於洪丞相家摹傳古賢像六十餘軸皆紙本也其原出於秘府有手澤題其上不幸收藏太宻蟻蠧幾盡得全者無幾而又散留它位某嘗傳寫二十餘本初未之竒也舊本既失益可寳愛近囑潘伯逺篆題其姓名暇時因各賛數語懸之素壁典刑凛然六一居士嘗謂七賢圖歐陽氏之舊物也且使子孫不忘先世之清風某質凡學陋固不足以發揮往哲抑以寓高山仰止之詠尚庶幾來者識先世之清風云郭汾陽子儀巍巍令公再造唐室膽量包海赤忠貫日大姦莫間大兵莫危名將接武皆帳下兒陸宣公贄年少得君正濟大難朝奏夕疏仁義炳煥山東聽詔感泣諸叛前魏後陸時不貞觀韓昌黎愈唐文三變至公而止日光玉潔八代披靡諫佛骨疏上時相書千載是非其嚴矣乎柳河東宗元文盛貞元鏗鏘皇雅絶壑峻崖古匜玉斚従游一悞再斥不歸羅池之上秋鶴與飛趙韓王普五閏將曉大明赫然抑抑人傑佐命之元功銘玉鉉名注金縢風雪夜計一新乾坤曹周王彬帝王之將翼義羽仁汎埽氛祲湛布陽春雷歸電熄天宇清明不矜不伐流慶殷殷李文靖沆風範端凝魯論翼治識逺慮深鎮浮遏銳時雖昇平日陳灾異殁久言存君猶追記王文公旦鬱鬱三槐隂覆萬宇直榦承天屹然八柱棲鸞停鵠蓄雲洩雨穆如清風作宋申甫冦忠愍準有倬萊國恢恢廟謨濟川之志到海之符青衫瘴雨竹柏靈敷澶淵一擲千載偉夫張忠定詠雲出華山雷厲西土以竒制變以神鎮撫猶恨承平閒殺尚書勁節獨步氷霜凛如王沂公曽温温沂公大志厚徳桃李成蹊春風無迹計折姦回理化后戚宗廟之器揚休山立吕文靖夷簡賔日天聖政闗簾帷起賢弭黨慮逺防㣲月殿濟權玉棺破惑舒卷屈伸深哉仁術范文正仲淹雪壓孤根㫁虀力學危言正色蹇蹇諤諤靈府兵精氊裘膽落先天下憂後天下樂韓魏公琦堂堂魏公受天間氣赫奕孤忠鎮定大器手扶日月身佩安危大沛霖雨寂然神機富鄭公弼慶厯人望元豐老成片言折虜訪落戒兵恩浸南北夀配岡陵鶴降星殞始終之靈文潞公彦博元祐黄耉翼日導乾出將入相餘五十年虎老風壯松夀節堅龎眉瑞世遐福不騫曹武穆瑋侍中内舉器識迥殊預勉樞輔逆料胡雛風熄狼烟霜凝金鉞襲慶將壇矯矯聲烈狄武襄青太平名將偉哉氣節卻梁公像留鬢邊涅西折元昊南摧智髙童謡方息角犬成妖歐陽文忠修學授孟母一代文宗追琢大雅剗滌澆蹤諫疏直筆雪壑霜空全節蚤退潁水清風蘇文忠軾奎宿精神烏臺縲絏神龍追電天馬汗血世外文章筆頭風月航海而南平生竒絶林和靖逋野人雲卧孤山蒼蒼梅侑逸興香滿詩嚢湖邊竹户猿鶴徜徉寒泉秋菊千載耿光醉吟先生白居易江州司馬元和諍臣鶴林聲價鑾殿規箴蠻素去矣詩酒陶情西湖浩渺雲水流聲宗忠簡澤雙龍遐驤風埃帝邑秉鉞齋壇揮涕戮力天聲外揚臣姦内抑忠憤莫紓孔明祖逖岳王飛赫赫武穆天開駿功聲震河洛威憺華戎梟檜忌武烏臺勘忠齊名諸將愧死英風張魏公浚中原雲擾閫外専征東潰淮楚西敗富平勢裂南北天摧大勲千載公議一㸃忠誠魯齋集巻六
