body:
  text: 魯齋集巻三宋王柏撰七言律詩和遁澤雨中韻梅霖博得遁翁憐磊磊詩郵忽到前噴霧掃清雲外馬瀑泉呼起耳中蟬妨他種事並芒事知是豐年或歉年陋巷一瓢應易足更無思慮且安眠一雨踰旬勢未休微寒猶欲衣輕裘水精顆顆留蛛網土脉層層起蟻樓正免客車頻倒屐莫將詩句苦埋頭書生事業浩如海鞭辟尤思友誼稠和易嵒韻一身之外􅄣虛名未必虛名果有情詡詡交游何足恃區區世味本来輕三春已過猶無雨四海將枯只是晴利害所闗天様大一毫得失豈難平寄東湖諸友東湖又是一年期雅好綢繆豈不思耳聵臂疼衰甚矣山髙水濶欲何之工夫只在潛心處端的何須對面時堠子分明書八到康莊穏步復奚疑和通齋宻窩韻二首宻宻窩中養妙倪恐囙題扁被人知了無聲臭誰能測縦有神明豈足窺此外不憂還不懼於中何慮更何思浩然一氣充天地誰道吾儕老未衰宻密窩中克已私人心纔動最惟危誠身有道須明善暗室之中莫自欺凛凛知風知顯處兢兢不睹不聞時聖師欲到無言地子貢當年也未知和易嵒梅下韻梅送清香到酒邊東君伎倆巳先傳稜稜梢外殊無冷㸃㸃花中各有天霜潔氷清時未正和風日暖老相便一杯適意毋空度添一年時减一年送趙書記二首相逢雖晚意無加滿腹經綸肯浪誇雅興屢陪郊外樂清談不向酒邊譁忍於栁驛攀金縷記取梅坡嚼玉花木落山空平野濶浩然别思滿天涯只將精思作生涯評古論今吐粲花玉潔氷清官自大雲飛川泳吏無譁偉人落落難重見餘子紛紛未足誇老我不能歌頌語杯中須减飯須加題秋䑓詩巻騷雅馳聲感㡬霜駕言拙懶檀詞塲登䑓甚矣秋容澹得句依然風骨香巻盡辭窮餘古韻筆精墨妙發潛光此中境界真堪樂枕上休貪南面王用希古韻送天台金吉父行李西来又欲東無情雲雨鎖長空窓前細嚼書中味膝上虛傳瑟外風老去苦無佳客語新来忽有賞心同錢塘江上雲霄路相對無因話月篷次前韻寄鄭悦齋單騎衝寒發路東只縁歸計太疎空三年事外多閒日一别花間㡬信風出處莫期當世合功名要與古人同憑君試問真消息應已西興喚短篷和楊石溪璚花詩韻檢㸃春光綠打圍未應造化委蕪䕷雖無紅紫呈新面尚有瓊瑤戀舊枝后土歸根辭帝寵畨易名圃少人知長篇寡和憑花報豈料囙花又得詩孟冬朔旦修翁誕辰韋軒府判寺簿同宴與三姪孫叅陪於僎介之間以紀其事招徕二老冠耆英寳鼎氤氲俎豆􅈿南極玉繩浮列宿西屏綵袖祝千春親親同醉杯中渌老老深推膝下仁看取来年宣勸處松椿桃李轉鴻鈞新隄行借山長韻呈韋軒㡬年麗澤道方亨别駕重来路竟成由是之焉知所止安而行處坦然平疾徐先後將觀禮作屏經營豈為名萬里脩程今放步胸中堠子自分明仲夏游赤松有感堆堆書冊畧抽頭决意兹行不暇籌雨觀風䑓凌絶景雲巒雪瀑壮清游二皇羣石應難覔南澗雙羊已莫求訪我舊題無復有姓名方愧倚人留和曹西溆明月樓韻宣和棟宇鎮東城平野蒼然一眺明叠嶂有情宜晚對兩溪無奈向西傾招邀風月標嚴句麾斥雲烟醒魯楹誰倚䦨干来檢㸃渡頭終日有舟横政聲藹藹拱和平士恱民安訟自清末俗規模多簡陋偉人事業必恢宏一新庭宇蠲餘力三肅溪山訂舊盟休道人生行樂耳詩壇融盡古今情􅄪次前韻一簇樓䑓表郡城月於此處最光明山搖玉彩東南上水暎金波西北傾老木修容賔畫棟女墻嚴陳䕶丹楹西風屈指何時到来慶黄雲萬畝横月指山間頗不平何須江上有風清用之不竭詞雖侈却道平分意末宏嚴子五言終耐久隠侯千載巳寒盟肯於明月相料理定有清風不世情和喜雨韻體天生物以為心喜讀箕疇好雨星我已不疑豐見斗君今何慮井羸瓶只縁報國推心赤自是憂民感帝青若旱作霖人望久雄風那數快哉亭和無適四時賦雪梅蕙歇蘭消菊已乾横枝疎影到癯仙向来買種恨無地我軰鍾情亦有年最是爱他風骨峻如何只喜玉姿妍小園應怪無佳句未放幽香到酒邊九人清賞尚堪誇記得歸時月未斜詩巻寂寥今嵗客虬枝依舊去年花仙宗屢欲編為譜句法深慚不著家多藉孤芳相㸃綴採歸筆下便光華滕六驅車夜叩闗起来四面失􅃄鬟暎書冷艶便窮巷琢句髙情動北山侍立政思伊水上風流不到㶚橋間須臾月上梅花冷人與梅花相對閒寄言青女莫来賔聞道長安凍殺人應瑞豐年占尚早憂時君子慮方新幸聞北境無他警更喜東皇己問津有客方携詩到手天才端的是祥麟送耐翁住天柱延㤙換却鉗鎚過赤城先聲知巳沸騰騰當機棒喝須端的䕶法神通莫盡憑脚底湧泉同瑩澈脊梁天柱共崚嶒果符鼓棹滄溟句海角元来欠一燈南省有感魁文不過欲趨新従此相疎有㡬人箇裏未知全是命平時無用苦勞神後先難必三年事得失同歸萬古塵堪笑近来狂士計求榮就辱太迷津送碩夫兄之武昌年年征䄂拂孤篷飽歴風霜似有功行李又謀千里外别情多在數聨中騷騷荻岸飄新白索索楓江落冷紅若遇雁音頻寄字寒牕時欲對清風舟中和陳子東㡬年不蹋玉京埃今日因何走一回恠石怒吞寒瀨急短篷衝破暮􅃄開賴他清笑千餘度否則浩歌三四盃寄語逋仙詩侣至攙先開著數枝梅低垂紙帳絶纎埃冷透孤衾夢易回宿霧未收沙瀨墨大江纔近水程開細捜景物歸詩句盡逐覉愁入酒盃最是推篷頻問訊崖旁未見一枝梅和曹盤齋積雨韻無端淫雨挟愁来極目丹烏安在哉雲意未闌癡不去天容何事苦難開依紅宿蝶霑新粉㸃綠行蝸篆老苔驚喜盤齋横槊句此心蹔作復然灰題伯兄新樓步轉層樓四望寛了無一面欠雲山龍分玉脊隆隆起溪露銀波隠隠寒詩思細摩僧塔峭壮心不下女墻閒仲宣百尺登髙卧未必當時得恁安夜坐呈外舅傷春心事正無聊短髮蕭蕭任意搔旋買茶芽清睡思不須酒力助詩豪生涯狹處餘多味世路險時才忌髙我為獨醒愁不奈羡君萬事赴陶陶畧無家具可經營有子頑㝠祕錮深嵗月自催忙裏客功名不著静中心詩非得意貧難遣酒已忘情恨莫禁坐對氷翁無可語孤燈殘火伴清吟贈曾敬仲歸三衢切切蛩吟雨後繁急催客子整歸轅臨行慷慨有忠告前此賡酬􅄣戯言先世聲名期逺紹故家風範要長存花朋月友終無益膏火青編𦂳閉門題果齋集後童髽及侍果齋賢白璧深埋二十年師道倦為蓮幕客詩魂蜚伴雪堂仙同游諸老無人在所幸斯文有子傳讀到徐卿珠玉句撫膺三歎愧遺編題西樓有感往事傷心不可論髙情還許小通門旋鋤荒草追風景因種殘花剗雪痕敗壁古苔權作主破窓夜雨暗消魂青山不管興亡事依舊樓頭挹暮樽送金華趙宰二首絃歌聲裏一瓢安士友催詩送長官律己十分無可議愛民一念未嘗寒更知耐事如公少留取清名作様看百姓越疆歸令問㤙流職外此尤難六龍潛處起宗英来作金華有脚春人被撫摩稱是佛事歸聼㫁果如神忍看鳬舄雙飛去趂得葭灰一㸃新近世柏䑓冠豸者多求作邑有聲人和徳夫弟韻偶随沮溺問年豐負笈肩琴恨不同春草池塘君有夢秋風燈火我何工年時猶望文加進老大方憂道未洪妙手自堪修五鳯繩樞茅舎愧吾窮題承菴二首十年足不到承菴無事興思重愴然風急雁行斜漠漠夜深蟾影弄娟娟爐亭暖徹今宵火魚板驚殘向曉眠欲識本来真面目杖藜未免再流連神封王爵號優游衆水奔歸祠下流沃若郊原真可隠悠然心景自相投綿綿野徑蟠山腹瑟瑟枯溪㵼石頭直到法華髙處望天珍未許有心求有感嵗月飄零事轉乖未能憑酒放眉開蕭蕭棠棣悲離黍寂寂芝蘭閟野莱生計半随豪氣壊放心猶傍聖經廻秋来旱勢滔滔逺誰念蒼生正可哀適荘兄游山誰閣重隂一日晴清游應是惬髙情遙知雨後山光好但想雲邊屐齒清素壁雖曽題舊字沈痾不許挿新盟囙知闗吏留魚鑰䕶遣奚奴候晚程元夕後即事夜来風色作輕寒燈火殘時人意䦨歸路月華猶皎皎今朝雪影亂漫漫比他栁絮真無賴損盡梅花不忍看獨坐不知時節變一襟和氣有餘歡題潘氏髙逺䑓數曲梯階稍欠寛略移武步到仙寰詩懐納盡雙溪景眼力推開千里山方檻小欹􅃄雨外飛篷斜挿斗牛間憑虛似駕臨臯鶴棲鶻危巢不足攀送蒙齋姪宰餘姚鳬舄攙先伯仲間迎陽帶雨渡天闗向来邑為貧風壊此去民思善政安三百里同開魯國二千石即繼壺山蒲封正次東溟側要拓胸襟箇様寛和胡子升大欠韻能踐其形亦甚難天髙地下我中間讀書未造精㣲閫處世應迷利欲闗勉勉工夫何假字區區繪事豈真顔須知天賦元無欠還爾當時勿恃還新秋自警直諒之言久不聞秋来囙作讀書吟時時涵泳味無味句句研窮深又深老去巳辜朋友望閒中粗得聖賢心無窮嵗月垂垂盡夕秀朝華豈暇尋長短歌黄華歌太極動兮兩儀分四序綱領秋與春機緘宻運乎三百六十五度之外浩浩萬物資生成清明純淑不易遇間禀英氣俱異人堂堂忠定公獨得東方仁維持帝出震嵩岱鍾精神定䇿慶元初皇宋二百四十年社稷歸經綸肆我東陽侯獨得金天晶兊正秋兮萬寳説宗星夜挟長庚精扶珪綴組真相種来與十有四葉天子蘇寰瀛春生秋殺造化功始備前輝後映行見旂常新炯炯御屏上髙掲刺史名仁風藹四郡溪山草木俱被循良聲須女曉浮南極瑞山光水氣騰祥雲百姓欣欣有喜色一步拜手祈松椿日君煥赫停寳馭月妃婐􅛭留文茵金風玉露澄象緯洞洞下鑑民之情一祝吾侯早歸絳闕佐明主坐使天下風俗還真淳冄祝吾侯多男子森森蘭玉盈階庭三祝吾侯春秋八千嵗瓊漿玉斚長對黄華斟竹石屏歌謝遁澤好古博雅時遁澤往嵗贈我墨圗柏今年揆予初度臨又復持贈竹石屏柏以祝我老竹以堅我心長歌短歌先後發書室夜夜生光熒君才固磊落愛我何獨深此石不知出何地来自紫陽夫子門紫陽緣督兩授受謂宜永作傳家珍所寳又有大於此餘光委照非其人以我所願紫陽學以我生作石笋孫石笋固宜有石竹笋竹生成同一根當時竹上嵗寒句先逹難賞流傳今去年忽得紫陽嵗寒字如約屏石来同盟朝夕歛身對二妙儼然拱侍滄洲之竹林萬物敬慕度義全幽真不有畏友相勉勵安得凖繩磨琢箴句中雅意巳佩服石中有竹誰能評歐梅蘇范六君子絶識雄辨萬口稱珠犀砂玉亦似矣髣髴未得此理真頋我生既晚欲説口巳瘖造化發育固難測嘗聞古有剛柔分柔土既發萬物之生氣剛土故涵萬物之隂精人之所見自有限孰識萬象俱妙凝此非物之影真是竹之形遺梢墜葉積於土土化為石竹自存生物不随凝結變請觀琥珀與水晶我疑此石生渭濵土石變化嵗一層嵗嵗層層應萬状直欲盡磨翠壁鋪作千畝帳和希夷木樨韻秋来望月如水犀忽有香風鼻觀吹徧尋不得見花面若得見花敢輕賤徐徐步轉墻角来草色芊芊一徑開儼然嘉樹奠南服環佩鏘鏘萬圭緑陽艶多情不敢媒平生偶與西風熟皇天清則土方真耿耿誰如受命獨三閭愁兮洞庭波辛蓀蘭芷方並蓄只有海南招隠句攀援千古資膏馥希夷雅好異於是萬斛清香金一粟曜靈西征易侵尋緑鬢朱顔不待人秋花不比春花早開到秋花也是春吟花㺯葉何時足年少須㬰成老宿一根生意貴栽培力到自然文郁郁君不見岩花獨步秋葉中穿天出月莫敢相過従和易嵒春雪韻臘前雷春半雪顛倒失其時相去踰一月一月不争多燠寒異厥罰垤戸當堅凝陽氣乃舒發草木既萌動龍蛇起窟穴萬物欣向榮獰風夜狂悖曉鷄噤不鳴但見􅐼間白戰慄起推戸瓊瑤巳㡬尺陋巷書生釡不􅃄闗河甲士氷到骨俯仰天地間芽甲盡摧折萬境寂無聲群動亦僵裂當其懐煦煦蠢蠢競懽悦和立齋抱膝吟三章帝腹加頑足上干天象速造膝論當世従容金殿旭人生莫不有行藏誰把行藏較短長要識行藏無所為時哉出處􅄣輝光誰卧草廬中能専一壑風當時天地閉豪傑不相容中原河岳應如舊虎豹出沒非人有祗今不是卧龍時自是君才掣君肘山澤兩癯叟交情㡬昏曉擁衾風雪夜竒論互傾倒妙處不盡千張紙直到無言忘寤寐如何漏泄此髙吟一洒龍蛇駭塵世和易嵒木樨韻秋光未為老老桂開墻隈誰與春風背依吐心未灰香浮玉宇逺體破金粟㣲詩翁被花惱深夜燈重吹今朝恰重九更㵼茱萸巵霜螯未堪把菊蕊青滿畦景物自冉冉氣候猶遲遟對花莫冷淡行樂姑随時清歡既易遇不飲復何為兄弟琴瑟合子姪鴻雁随月明人影散泚筆賡新詩詩力薾天馬不可衘勒羈詩壇峻極謝推轂莫學檀公三十六和叔􅀈人心乗氣機投閒肆馳逐飛天忽淪淵忘生以徇欲大而名節䘮甚者邦家覆一狂方寸亂一安萬事足簞瓢樂陋巷梁肉怕書腹平時工用深舉動自絶俗倀倀無所守有為皆碌碌一堕荆榛中終身困躑躅世事豈有常烏可執卷贖學問在我母自棄富貴在天毋自辱和立齋元日韻之子善遊逺西征酹歐陽亹亹嵗月換作詩思故鄉老我絶世念孤燈耿寒光坐對三古書繹繹搴純英天地時一泰吾道何時昌莫以一日腴博此千載香茍不新厥徳正亦王春常只今自煮一斗酒待子醉我琴書旁夀立齋思泉種徳懋后皇命淳羙髧髦傳正學一念不妄起真固滿腔仁兢兢日増累甲子正一周龎眉追甪綺年年三月初南極何煒煒預酌長生尊家慶合庭鯉今嵗南極光一照千餘里我有百靈丹逺寄螺江邊殷勤為子夀角亢光芒寒一丸當一嵗送以華池泉初進雙目清再進華顛𤣥三進毛骨換四進還童顔五進志氣神六七八進生羽翰進進誠不已俯拍洪厓肩不須駕黄鵠炯炯天地之方圎只恐獨立無與侣不如歸来嵗寒之下相周旋贈朱道人道人跨鶴徧天涯偉觀絶景收拾歸㸃頭濡墨茅屋下乗興吐出胸中竒百尺生綃氷様潔落筆一掃風雨馳逺水柏天窮萬折恠石磽确蹲熊羆槎枒古木蛟龍走㫁雲寂寞無心飛淡粧濃抹西子靣天梯石棧猿猱悲野騎殘僧小橋險酒帘漁棹搖斜暉生綃有限意難盡兀坐静境窺天機豈知造化無盡藏奔㑹筆底無盈虧射洪川幅非我有且遣楮君百軰供指麾夜宿赤松梅師房梅師有松度蕭散意態真皮冠簮白雪布褐貯陽春房計任簡淡了無一慮塵茶一碗酒一尊熈熈天地一閒人名山浮爽秀朝暮瀹爾神餐霞煉日氣井竈永遺珍希夷仙境本不逺何用􅈽樸終其身汲齋吟我有一泓水清明如鑑開妍醜自来往曾不留纎埃静而􅇽萬古動時濡九垓人與我同得是名為靈䑓胡乃忍蕪穢漂淪良可哀當知克已如汲井汲去汚濁清自回洙泗淵源初不息河洛流𣲖空争猜為學工夫孰大此莫翻波浪驚兒孩昌黎修綆志徒苦瘦島轆轤用未􅔜請觀朱子方塘喻要識源頭活水来夀藤杖行君不見竒章咨嗟削方竹老杜作詩誇紫玉又不見東坡驚喜鐡鏗然靈夀曽為漢臣辱我有恠藤㡬千嵗老髯乳節雷斧斸古苔蒼蘚封䕶祕風刪雨剥枝幹秃頭角軒昻曲虬勢皮毛冷滑鳥蛇腹鶴膝銅環不敢班武夷湘水皆退縮不借山翁荷蓧去未逢太乙然藜讀祥光閃閃意有在殷勤来夀徐平叔平叔樂道𤣥又𤣥姹女嬰兒丹久熟兩脚蹋在真實地一善滿載長生籙採芝覔藥扶峻險敲雲挑月相追逐有時化作葛陂龍先生騎上蓬莱宿廣曽敬仲功名須少年老大意終懶學問本無窮青春嗟有限用處不需多雲霄路坦坦賈生正英鋭郎潛自羞赩文字浩如山奏功五寸管逹者未必長窮者未必短人生窮逹各有時脩為在我當自反螢案尚研摩况有五花館當年驕惰氣猶賴世情剗只有學道心歉然不自滿庭外槐花任爾黄逹人髙視供一莞和立齋嵗寒歌五章𦍑人生之秉貞兮孰無陽秋惟澹而無欲兮斯能無求宜此心之永堅兮凛此風之正遒嵗寒之堂兮足以自修憶昔堅保兮銘著心腑故迹堙蕪兮茫茫墜緒瞻翠碧之萬竿兮猶有遺矩嵗寒之句兮儼然如覩聖人體物兮萬世之訓究厥後凋兮基於不競使與春争妍兮曷保常真嵗寒之知兮寕不謂性有朂我人兮先君之思有陟爾岵兮我心傷悲望松柏之蒼蒼兮我無令姿嵗寒之操兮炯炯心期車馬南歸兮恵我五闋一唱三歎兮亦孔之惙盍置諸左右兮觀省昭揭嵗寒之歌兮聲聲激烈和廬山髙韻北山之北㡬千古兮崷嵐層嶂數百叠巋然横枕乎浙江歴潛岳石磴綿延而上是為山橋之絶景兮驚霆噴雪終嵗聲擊撞風柔日暖花氣發綦屦杖䇿而一游兮躋攀分寸獵犖确如躡太虛之渾厖峭壁立之萬仞兮著亭對峙窺谽谾雲中泉石更磊磊玉虹步步鳴淙淙清風滿峡振衣袂清湍修竹飛斜矼目極千里倚層檻烟光晻曖兮樓䑓城壘隠隠呈紛上有陽精隂魄走飛轂下有蜷松偃柏驂旌􅓚安期碁局在何處時有平空特起雲車雙洞陽有館足髙卧神融氣一澄世痝参横斗轉萬籟寂夜夜山鬼窺燈缸羡君胸中隘宇宙通明疏暢開八窓手闢書堂攬竒秀芳聲聞帝所錫奎畫昭回五色琱貞玒涵蓄平生霖雨志不應懐寳迷其邦羞芝餱菊我軰事春猿秋鶴心空降誠欲遂公赤松黄石約更書旂常功業垂朱杠五言絶句題玉澗八景八首畫出女墻月老子興不淺誰識春光中解使平湖歛㫁嶼數行樹孤舟一葉横前山風雨暗此岸已天明山外江村晚縦横八九家過橋無路處人思𣺌天涯㸃㸃飛来雁空中若有音詩翁正牢落識汝别離心梵宇出林杪暝色歛􅃄樹鐘聲有無中聼於無聼處落日下大野江邊漁事收小舟横㫁㟁長笛一聲秋惨淡經營中落筆景已換不見片帆歸危檣還泊岸獨跨藍闗馬茫茫道且長誰知寒徹骨一雪到瀟湘題時遁澤畫卷十首㫁岸臨江渚風聲瑟瑟寒蒼髯五君子莫作大夫看浩浩雲横塢霏霏雨不收野橋人少度寂寞卧清秋虎嘯風生壑龍藏氣吐雲草廬勿髙卧天地正絪緼礉礉林石立滃滃雲壑閟萬杉最深中莫有前朝寺江村依宻樹目逺送征鴻不盡暮天碧誰續蘆花風巨石聳鰲脊飛泉潄雪濤一聲何處笛呼雨到江臯一壑雲屏展江横萬里長漁舟下灘去寂寞舞斜陽一雲山萬重天地混不分須臾風浪惡舟楫泊江濆精藍夹江干鐘皷時相應兩山遮不㫁樓閣若争勝浩浩乾坤濶㣲㣲見㫁山頗興浮海意吾道正多艱題澤翁小卷緑隂最深處樓閣出林杪江濶野橋閒目㫁行人少㫁岸江波濶迢迢十里寛人􅃄藏處宻霽色媚寒灘石護山溪口溪溪自有原若非江海量曷受百川奔寂寞小橋前山人住何處村童沽酒随䇿杖同歸去兩水滙長江絶壁上蒼翠前頭風浪􅁖危檣且深避縹𣺌雲􅃄外迢迢江水明數家藏宻樹一塔峭孤城野渡人歸處縦横八九家晚来寒力健風颭酒帘斜晚得知心友芳樽日日開不辭江路逺依舊􅈽琴来名利馳驅急江山自古今舟行水上意人立渡頭心㟁到未為了行行萬里途舉頭岐路惑岩畔遇樵夫題潘氏山水壁壘巘雲􅃄表茅檐竹樹中起予深隠趣筆底有髙風呆官人三絶直道難行久前程豈易裁遜齋薑辣口奄有世間獃冷面無慚色真心不脱空雖然獃在我終是與人忠獃本非嘉徳如何樂此名能於獃外看方見業之精題梅萬物正搖落梅花獨可人空中三五㸃天地便精神七言絶句題流觴圗東晉群賢事已荒却於紙上見清狂茂林修竹今何在一段風流付夕陽題浴沂圗一時言志聖師前鼓瑟聲中三月天誰識詠歸真樂意如何却向畫圗傳題長江圗三絶一目長江萬里長㡬多興廢要商量時人莫作畫圗看説著源頭正可傷魚腹江邊八陣圗嶙峋於此豈良謨後来浪道長虵勢用勢還須烈丈夫𤓰􅇍洲前水最深㡬人恃此縦荒淫誰云天意分南北自是人無混一心獨坐看海棠二首萬翠千紅各賦形源源生意到春深誰開錦帳藏妖艶應是東皇有蕩心沉香亭下太真妃一哂嫣然國已危當日杜陵深有恨何心更作海棠詩題山橋十首軋軋飛車入翠㣲人於妙處未深知自従標榜新拈掇碎却山橋一段竒北山之北兩山馳一徑蜿蜒石作梯脚力倦時山始好芙蓉東畔赤松西石磴斜蹊下水隈玉虹噴雪下崔嵬雖然只是泉三叠滂湃聲搖萬壑雷危嵐鐵面太巖巖少憩茅欄石下龕壁立晴空㡬萬仞承天一柱在東南世事難憑轉眼空可人泉石在雲中此心多少閒丘壑且發㣲機與衆同修竹清湍記永和山隂陳迹已消磨四時佳興随人寓曲水流觴未足多􅇍随流水覔清隂亂石穿林窈窕深澗谷未能忘磊磊何如虛豁一生心吹盡塵襟亦快哉心期千古一時開清風滿峡誰收拾即此清風播後来滔滔利欲著人深灑灑襟懐可出塵指日洞陽斤斧息開山一著要當人風雲下走若憑虛目極長空千里餘每日城中望山色却来倚檻認吾廬題易道傳心圗圗書表裏用功深此道相傳直到今書裏有圗圗有句圗中即是聖人心和易嵒木樨韻昨夜西風作意凉吹開粟粟繞枝黄有時月窟閒来往天上人間一様香對花只是月宫遊浥彼黄流注玉舟莫被清光虛度了此生更有㡬中秋和前人韻屢作家書欲寄人姓名愁堕軟紅塵眼邊忽見傷春句屈指别来猶是春庭前日日見蘭芽誰把青山特地遮雁影寂寥君又逺歸期夜夜卜燈花春雪兩絶開嵗晴天亦太慳六花日日舞簷端渾然一色無分别也把梅花作雪看無端雨雪恣癡頑弱甚東君太失權一白但為羣醜幸雪消羣醜只依然和叔􅑂兩絶道心常要攝人心有徳之人必有隣愧我空虛無一善安能交義契蘭金春来風雪無虛日老去光隂如箭急窓外梅花猶未殘髙標却被寒留得拜明招二先生墓有感憶昔龍門續㫁絃滎陽一脉浚家傳誰知麗澤收聲蚤夢奠於今八十年神臯王氣𣺌荒烟爵命於今下日邊俎豆孔堂新劒佩風􅃄晋國舊山川一原英魄一山蔵回首懐忠道路長天意未開南北限要教北學至南方林麓幽幽氣象閒三年肄習萃衣冠自従引翼無求地荆棘叢中路頓寛炯炯長空一片心東南鼎立統斯文卷藏萬古春歸去只有餘光在此君研席嘗棲一拍堂至今魚皷訴凄凉溪山不掩中和氣發見随時草木香竹轝侵曉出山阿宿露清圎憶舊哦當日解衣磅礴意明明分付一池荷多少門人迹已空後生久矣失遺風聖賢立教無今古時有汚隆道不窮束髮家庭識所宗平生心在瓣香中白頭始下劵䑓拜的的精誠自感通仲氏孤忠徹九天青原淡月惨遺編摩挲朱子嗚呼字寂寂庭前重愴然和叔崇清明後四絶把酒留春尚肯留㡬多生意聚詩眸可憐桃李無涵養只有桑麻自進修安期老子肎過従每恨清尊不肎空好句忽来今日雨髙情終是古人風昌黎空作送春詩只道門前栁絮飛豈識一犂江上雨春風於此大知非緩步㣲吟竹一枝情懐不比少年時少年春思無歸宿却是如今老㑹嬉題立齋天台圗留題已是十年前展巻重看思惘然汝以不言傳至道豈如吾道以言傳出處於人不偶然當時已報赤城縁丹青有筆誰能畫聖則堂前月滿川元正開正又展一年期霞臉醺醺酒半巵獨坐晴牕無一事呼童和墨寫梅詩吟詩猶是少年情要復當初赤子心心出入時何以御手持一巻敬齋箴和玉成書秋䑓詩巻韻龍蛇筆底􅋥枯籐兩巻風騷泣鬼神此是玉成衣鉢庋他年出語定驚人韋軒遊山遇雨踏碎羊山黄葉堆天飛細雨相車回二皇應訝来何晚不忍聼君話别杯和前人韻名山終是欠徘徊小隊輕車决意来他日相思無覔處敫勤先贈嶺頭梅山靈豈是少恩哉兩載従容自不来羊石豈能留得住和羮消息到寒梅答子宣雪中惠呉中珍味誰枉袁安雪裏車忽然䑓餽入吾廬平生安識呉中味攪碎衰翁滿腹蔬䟦潘黙成詩不動心齋有素規稜稜風骨太清竒殘書㫁帖人争寳誰識先生愧禄詩書補之梅玉質旉腴宫様粧風流終愧水雲鄉一枝飛落人間世添却逃禪百倍香題王伯忠雪月圗片紙裁成數寸慳王孫風致寄毫端只於天地交光裏認得前程萬里寛除夜訪楊此齋除夕家家整世氛老来天賜一閒身正當風雪翻空急面拂氷花訪故人一别癯仙已八年伶俜鶴骨尚彈􅃣相逢逆旅歡然處各著精神子細看秋興年少荒唐徳頗慚了無佳客伴清談相親幸有坡詩在秋晚堂深燈一龕巷底蕭蕭絶市塵供愁疎雨打黄昏悠然一曲泉鳴調燒了夜香深閉門途中即景溪邊栁色露新芽春透㣲波漠漠斜一陣随風香頗異定知前面有梅花宿寧庵聞溪聲清溪㵼出瀑泉鳴記得昌黎語不平要識中流多峙柱故能千古振英聲感舊三首年時清話㡬黄昏雙桂庭前竹外門離合盛衰方感舊忽逢新句動詩魂交契綢繆事未磨月牕再得共婆娑君今有子全無恨頋我伶俜奈老何却為清貧識世情人於淡處味方珍未終舊話君還去賴有梅花似故人湖上木落孤山分外孤尖風索索響枯蘆暗香全未傳消息和靖還曽著意無聲歌只解閙花天誰肻敲氷掉小船要識湖山真面目偷他冷月訪三賢歸舟三絶江邊蹋月入孤舟水月流光一片浮夜静海門雷怒吼潮頭凍殺未甘休波聲拍枕不成眠擁被推篷月尚圎霜下夜深人正悄數聲飛雁度林巔幸脫塵氛入帝城又携幽恨滿歸程雁行不整闗心事深愧漢人千慮輕伯兄新樓十首斂牆縮地保隣懽巧作規模不見慳初轉層梯心似隘一開牕了便寛閒不嫌陋巷據坡頭旋􅓯􅃄莱著小樓面面有山殊不惡倚欄銷盡半生愁東山護曉日葱曨一簇樓䑓紫翠中鴛瓦露漙鱗甲動参差翬影掛斜紅野色晴暉展畫屏緑槐古樾兩娉婷却嫌一帶無情竹只放金華半段青投西眼力拓天寛收得􅃄林透入闗雙鶩㫁霞飛不盡九峰斜抹有無間林間塔影欝蒼蒼向晚風傳供佛香燈熖萬龕時炯炯恍然文筆吐光芒未說樓居即是仙自然髙處隔塵寰誰家雙鶴鳴清曉聲在東邊竹樹間月滿䦨干風滿衿浪囙景物動清吟鐘驚老鶴翻金刹角引棲鴉投暮林樓頭小圃徑斜通種竹休教勢倚空好是故廬猶在眼未應修幹障西風七絃之外數聨詩裊裊爐􅃄酒半巵豈獨對床堪聼雨不如話到月斜時謝葉聖予送笋誰念篔簹一飯貧蟄龍頭角正森森殷勤恵我清貞節减却君家㡬畝隂寄題江山葉氏翠香亭此君来與小山盟共挹周揚一世英何用偷他當日意男兒自要立芳名取平園相君記誠齋三三徑内有竹翠搖空桂香馥䄂之句遙想琅玕百頃强旋栽應哂子猷忙絶憐羽葆搖新綠更有風来細細香誰竊清香下廣寒霜風染就粟膚丹須知葉葉蒼圭色花未開時自可觀小詩越境論交情不見新亭句未精寄語主人猶缺典梅花應恨不同清白荷花玉娥獨自到書屏不管人間暑氣深待得詩成花已謝應無好句惬花心三衢紀所聞青幙紅裾忠懿孫如今流落不堪聼丹書鐵劵山河誓却與春閨贖濫刑過趙清獻故居隠隠數間清獻宅只在城東竹樹中龜鶴不知何處去誰將白鹿繼髙風題思泉庵一時人物久飛仙詩竹和庵盡變遷尚有禪師風味在野人門外汲寒泉赤松夜宿香火悠長仙力重山川布濩妙難控詩魂飛繞翠屏中冷雨疎風時入夢中秋中秋天氣似重陽幸有庭前桂子香書冊眼邊無一事任他風雨送凄凉寄題胡子升讀易亭韻梅花亭外倚霜晴讀易亭中一老成亭在道傍還有意㡬多行客想風聲葉西廬惠冬菊三絶風𦂳東籬長舊荄主人杖履日徘徊後時獨立應無恨少待梅花相伴開霜天無物不彫殘忽見青㽔羽葆攅欲制頺齡須耐冷一陽定有落英餐誰知造化用工深處士陶潛獨返魂白髮書生留晚節従今嵗嵗典型存和乗雪游山韻千丈層崕玉作堆瑤林璀璨路縈回寒光徹骨清無敵第一軒中第一盃右遙想清致蕭然窮巷凍堆堆髙卧袁生夢正回擁被㣲吟燒榾柮茅柴也薦兩三盃右自安清况三閭大夫一絶愛國􅁨民感慨深沅湘浩浩魄沈沈懐沙哀郢成何事日月争光只此心魯齋集巻三
