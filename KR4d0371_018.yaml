body:
  text: 魯齊集卷十八宋王柏撰哀挽詞章挽曺叔獻野草何青青野花亦蒼蒼王園翳煙樹東風開泉扃靈辰倐祥練祖載何因循半生安陋巷簞瓢淡無營天命有窮達書生多苦辛北邙同一路元廬等枯榮我本里中子升堂托微姻每懷杯渡語惟士有常心几杖雖疏闊眷眷敬愛深故家喬木瘁不復典刑存流水桃花窅飄零薤露音幽宫一以閟清淚灑芳春挽汪帥參一世欽齊老聲名四十年氷融南省日春滿洞庭天笑語當時密交情晚節堅秀英今已矣新閣獨巋然右一世路艱危極人情政可歎未聞親子在而有外邪干軒冕多為纍簞瓢未必寒此皆身外事且閟一丘安右二挽潛齊王樞相忠簡流餘慶文忠印此心詞章傳世久事業得君深不盡風雲會寧知嵗月侵九重驚殄瘁讒者舌方瘖右一治命深衣斂親題石像鐫精神傳巨扁風月掩遺編流落人間境陶鎔物外天建安名教在他日配先賢右二總角思先友同宗麗澤傳典刑諸老盡文獻舊家全交道從公晚知音去我先淵源誰與遡愁絶伯牙絃右三精舍北之北幽宫南復南兩山生死寄千古姓名諳地勢蟠空壯溪聲戰晚酣青烏發天祕萬壑拱遺龕右四代挽王潛齊自立西山雪聲名四十年清忠奎畫重忠簡壁闕廊廟風雲斷園林嵗月遷潛齊元不死有子續遺編右一先世論交早名公不忍忘共期霖雨施忽掩斗樞光北墅風煙慘南山草木香片雲開白日恤典耀龍㡛右二挽丁知縣蚤識北平貴從遊五十年遲遲登虎榜急急到鳬仙振起非無地榮枯自有天老成雕落盡一壑鎖蒼煙挽施子華哭子天倫變賢哉更可傷毅翁悲祚斷學者悼師良缺月窺元室凄風鎖奧岡身雖隨物幻名筆起潛光挽郡博士待班劉公歌東風變九野萬物負生意素韠何欒欒清血灑幽隧猗歟靜夀翁歸全可無愧人生托溟滓消息同一氣過化來者續自昔歎川逝溫溫夙好修甄陶瑚璉器凝乎觚自度淡乎靚且邃詩書以為糧忠信以為饎人皆崇榮途公獨徐攬轡三轉坐臯比五鶚爭自致上培德誼種下開文字瑞一子通金閨一子需大對衣冠繪慶圖豈料造物忌學校失師模鄉閭思善類梅花已流水草木誰臭味惟有篤厚心叮嚀期嗣世桐陽散翁挽詩縠水之西巍然一峯是曰道堅翔舞而東林巒蓊蔚丘壑渾融雍雍聚落惟金之宗五世積纍鍾此散翁散翁頎頎生有異質學敏而博心廣而實乃孝乃睦乃大其識教子一經維寬而栗教人盡已維久無斁選舉法壞取士以文決於一夫升沈遂分良才美德所甘隱淪負我求我負人非人兩語垂訓風俗反淳我之識翁因翁二子典刑是親翼翼亹亹曽不幾見翁遽不起我來哭翁亦已晚矣匍匐之義真可愧死我既哭翁亦相佳城千嶂矗矗萬壑沄沄一丘永閟昭明上征萬壑沄沄千嶂矗矗子子孫孫載昌載育哭錢學老魯國黔婁死升堂弔者誰不邪能至此千載有妻知凜凛默成德清風百世師舅甥貧到底終老外家祠挽汪約叟幸有靈光在天乎作麼亡生來最真實病裏亦康強和氣留丹鼎清塵凝筆床溪山呈秀處風露悄凄涼右一憶昔先君子金蘭氣味投中間有生死一别幾春秋晚漏傳幽夢英魂覔舊游城東煙月冷應是訪新丘右二挽鄧夫人霜冷留賓髮心融篆貝經疏金重錦誥琢玉璨芝庭方祿參軍養俄丹夀母銘可憐萱草露也解泣儀型挽司直兄老厭鴛行武騎鯨不肯留空存丹棘讞未告紫宸猷黃老辜初志青山揚晚謀夕陽無限好心事竟悠悠右一典重班諸老聲名始壁流開尊拉佳士襆被闖前修月冷金閨籍塵生玉杖鳩梅岩傷目處鴈影正賓秋右二晚始親荆玉劬愈氣誼稠泰壇霜月下暑枕夜江頭一困關公念連書釋我憂平生知已淚寂寞灑新楸右三挽朱侍郎國論多同異身名有險夷一從離紫槖再不上丹墀慷慨風雲斷飄零嵗月移却因聞得早冷眼看人癡右一渺渺康湖水峩峩蜀野山是翁元不死蛻骨此中間草木劵臺緑莓苔翁仲斑白雲傷北望清淚更潸潸右二宗夫人挽章勳烈髙忠簡夫人衍慶源春風南澗藻秋雨北堂萱鸞鑑傷孤影芝庭茂兩孫清霜凝素仗璀璨滿西原挽何無適二五之精清通瑩徹有鍾於躬非賢則哲嗚呼無適自幼卓絶奴僕選騷銓衡莊列鞭霆走電不可追薾一操而存肅整轡轍著書未就不幸短折既賦以竒未易泯滅世外精神筆頭風月有閲斯立有安斯魄既妥爾魄既築爾阡是曰反終是曰歸全人生斯世豈必百年欲動情勝萬事出焉孰好孰惡孰嗤孰妍孰過而改孰善而遷一征物表浩浩其天風定水止月印萬川隂陽不獨動靜不偏既靜復動太極炯然馬華父母葉氏挽章力疾呼兒語民方弄潢池兒職不可緩母疾尚可為繡衣才出境肅斧旋芟夷百姓得奠枕歸來拜慈帷母訓不敢墜母喜開雙眉隂功覃雨露慶報當期頤孟夏草木長庭萱何遽萎平生事儉約猶有嬪時衣熏爐經卷靜不復朝莫披西風秋又晚萸菊思年時瞿瞿臨祖奠清血應漣洏明朝􅀢岩道舊冢連新悲挽頤軒張朝奉藹然一氣備天和不盡人間嵗月多鄉里同聲稱佛子兒孫相繼奮儒科蠲租捐廩今無有判豕然燈可奈何德在人心真不朽幾多麟碣汙山河右一挺挺長松施女蘿平生能得幾相過繐帷逺辱雙絇到淚眼猶瞻兩鬢皤曽未經年成契闊至今一慟竟蹉跎吉人已矣難重見山口悽悽薤露歌右二挽張佛子嘉慶圖傳世所稀夫何佛子遽西歸平生施豫心無為時事艱難衆有依德誼百年猶積纍詩書五世漸光輝兒童父老傾山谷灑淚追隨丹旐飛右二陟屺雖頻莫慰心見公猶幸母如存東山何事遽陳迹西路如今又斷魂栁翣忽臨新冢道林花空滿舊時園一襟和氣歸何處化作功名遺子孫右二挽徐郎中郎潛不復坦襟期留得清名舉世知老矣空還新虎節歸來只是舊鴻禧危言寧免班行忌已死猶聞海內推病裏僅能成大厦當時燕雀不勝悲挽趙龍泉闕闕水蒼煙迹己塵右一少公禀氣後三年易簀翻居三日先學數弟兄猶間有夀隨父母獨誰全悲哉易感精神往造化難憑禍福遷應恨南山人逺去從今獨卧北山阡右二籬落縱橫一徑分平生杖履幾登臨某山某水機緘露彼室彼廬情分深檢校舊規心欲折摩挲新志淚難禁素車白馬人歸後鶴唳猿啼總此音右三林省吾挽辭羌若人兮大帶而深衣張拱徐趍兮儼乎其若思動有則兮神定淡無欲兮心夷便儇嶔􅥤之紛吾前兮醯雞起滅忠信傳習之省吾躬兮聖賢我師伊春陽之冉冉兮生意方懋何雪霜之不仁兮荃蘭遽萎搴三后之純英兮時不得而榮悴抱太極而永歸兮哀與我之其誰雲沈沈兮凄巘風稜稜兮斷澌長田長田兮寂寂永夜暢㫖獨立兮千古名垂滕勾齊內楊氏挽詞東風捲地兮摧千紅松柏青葱兮啓幽宫龍㡛廣栁兮辭簾櫳埋香掩玉兮甘長終芳草萋萋兮春又空東君寂寞兮誰與同右一吳門山少兮煙水寬一鍤千金兮尚云慳夫人勤儉兮同艱難子荆茍美兮營元關平生首丘兮志應寒雙溪渺渺兮何時還右二憶昔登堂兮拜淑儀小子丱角兮勤將攜夫君念我兮力不遺嵗月滔邁兮鬢成絲西望紫翣兮清魂飛緘哀千里兮空漣洏右三陳卿內邵氏挽詞羣山峨峨兮屏下環鍾為人英兮司賢關風雅解頤兮簮佩珊珊有女穎悟兮拱聽帷間識性情之正兮婦德間雞鳴戒旦兮夜漫漫氷清玉潤兮卿月相傳夫君騎鯨兮今幾年綱紀繩繩兮閨門肅然樂山堂兮花木正妍蕙槁蘭萎兮棄叉鈿凄凄東塢兮藏風煙畫翣流雲兮去翩翩飛絮寂寞兮隨珠軿忍看雙璧兮沈黃泉龜趺螭首兮何時鐫山靈呵護兮祚綿綿鄭寺正挽辭北山崚嶒兮配井絡之勳名子孫繩繩兮聿彰厥聲一麾不顧兮番禺君甘領祠官兮挂長纓操存益固兮涵養益深臨行一念兮之清明右一坦溪渺瀰兮配流慶之深長園林帶宅兮風月無疆鷗鷺受盟兮舉清觴胡不百年兮長徜徉澡身更服兮神氣安詳遺頌灑然兮墨耿光右二北山寂寞兮號東風坦溪嗚咽兮繞元宫曉露滴滴兮泣蒼松芳草萋萋兮劵臺窿窿體魄永藏兮魂遊太空一聲蒿里兮春無容右三馬華父母葉氏挽詞苕溪猩鬼兮呼嘯幽篁繡衣一出兮血膏斧鋩笳鼓歸來兮拜舞北堂潢池夷靖兮母訓是將慈顔開喜兮家國之祥薰風自南兮草木正長胡不百年兮俾夀而康庭萱夜殞兮奩玉晝藏使者菲屨兮桐杖皇皇一道生靈兮悲如我傷右一瑶岩嵯峨兮龍翔鳳飛元廬肅啓兮松楸露晞東望宰隴兮劵臺依依靈辰不留兮夷牀曉移紫萸黃菊兮奠祖一巵熏爐經卷兮儼如生時靈幄香銷兮猶有嬪衣音容寂寂兮萬古永歸龍㡛黼翣兮驂神魌一聲蒿里兮風號谷悲右二李三朝奉哀詞羌與公别兮幾二十年思渺渺兮路漫漫棹剡溪兮乘興訪故迹兮愴然下晉齊之拜兮如夢挑燈道舊兮猶平生歡我少公兮六嵗悼彼此兮華顚解豫佩兮授豫館言未終兮嵗已䦨會公疾兮孔熾怛醫窮兮技殫聞易簀兮數語意穆穆兮詞嚴湛神爽兮不變驗學力兮罙堅自磐川與玉局兮交一世之名賢宜公之好修兮羞芳蕙而糗荃蘭退靜處而莫我知兮老冉冉其流連厭塵世之轇轇兮倐昭明而遂仙幸與公兮永訣撫往事兮自憐言告言歸兮邁邁有懷渭水兮淵淵棲遲故隱兮全純愚而孤處當嵗莫之急景兮聞公窀穸之有端皎皎兮懿行卓卓兮瑶鐫涵泳以適意兮鳳岡樵隱之遺稿纂記以廣業兮春秋族系之巨編豈待是而不朽掩既往之孤搴蘭風之臯兮望不極歌薤露兮有淚懸泉蔣叔行挽辭萬山蟠兮有宅一區吁嗟吉士兮心古而色愈平生激烈兮談忠義之事求師教子兮必有道之儒流德誼兮鼎鼎浸䇿定兮功名之途引壺觴兮自適玩日月之雙車有淑兮爾配絲枲兮劬劬指期頤兮二豎立疾既偕老兮亦相繼而長徂望雙旌兮有慟酹一束兮生芻右一萬山蟠兮新此一丘吁嗟乎吉士兮靈辰不留佳城鬱鬱兮馬局不進前岡隱隱兮牛眠是求竁蜿蜒兮有隧枕臯隰兮沃流東望兮廬舍西望兮松楸白雲兮生死同壑黃壚兮杖履昔遊孤哀哀兮罔極悼愁愁兮千秋悵素紼兮莫執相爾些兮商謡右二朱昭父挽些春風初開兮别君南浦誄君輁軸兮冬又暮曽嵗律之未改兮生死異路吁嗟乎實齊兮有前修之風度瑟瑟僴僴兮凝然寒素不忮不求兮未嘗偭繩墨而改錯視萬馬之奔逸兮斂組轡而獨駐安於一實兮豈斯世之足語天何賦之厚兮而奪之遽何旅翣之未返兮合豺虎而哮呼凜世道之􅌓兮良士瞿瞿想君一笑於冥冥兮豁然大悟山靡靡兮旁圍水潺潺兮在下付萬事兮雲空顓一壑兮千古悼蔡修齊羌世運之緯繣兮何故老之不愸遺持寸膠而救千丈渾兮誰與同而共治身一約而蹈遺烈兮不沽直而不徇時西極八桂東連吳會兮貫南紀以周馳以節用愛人兮以靜重為威謂直方大之德才學識之長兮親結上知方增重乎本朝兮而疾疢以乘之猶癯癯乎筆削之志兮浩浩乎汗青之未期遺稿山積兮孰續而孰維擅一代之巨典兮疑造物之好虧吁嗟乎修齊之典刑兮蹇長歌乎已而余幼好此竒服兮今冉冉而華顚悼窘步之數竒兮安陋巷之瓢簞公獨閔其寂落兮攬微芳而遐搴時舒愛而申情兮曽不間夫郵傳弭婺節而西來兮拱茂行之淵淵吸松齊之沆瀣兮飽坐嘯之蘭荃鳳髙飛而莫縶兮徒延佇而路漫漫何音問之不淑兮駭騎箕而遂仙睇長江而太息兮涕淫淫而惘然撫巨編之遺則兮神馳乎洋奧之佳阡念嵗律之云莫兮奈狂風之鼓天挽時僉判靈辰不留兮挽者何悲羌茂行之皎皎兮而今已而惟孝友百行之首兮何習俗之日漓惟不虧其降衷兮何足尚乎浮辭靈辰不留兮斯人永歸薤露一聲兮行人淚垂右一靈辰不留兮挽者徘徊羌若人之秉德兮佩先訓之不回以直道事人兮任當路之疑猜坎壈一官兮窮達何有於我哉靈辰不留兮君社塘之夜臺薤露再歌兮亦孔之哀右二靈辰不留兮挽者邁邁羌前修之典刑兮何後生之昧昧平鄉常人之號兮豈直欲以之而自晦靜觀世道之日詭兮蓋亦惡夫竒竒而怪怪靈辰不留兮路曼曼乎長夜歌薤露之三章兮識者為之永慨右三徐制參挽歌北風髙兮嵗律將殘望東隴兮目斷旌丹有美君子兮攬衆芳而自飾直哉惟清兮不亢不激鬱十五年之朝望兮僅彯纓於列院參幕府以自詭兮乃劬劬而忘倦宜表世而厲俗兮曷止於斯靈辰不留兮祖奠載期薤歌之一章兮孰不孔悲右一嵗律殘兮北風正南渡梅花之橋兮龍㡛鑣鑣有美君子兮蒼梧翠竹善繼善述兮恢韋齊之芳躅羌世道之緯繣兮孰識夫異體而同氣惟不忘其所由生兮合羣從而一視慨垂絶之吁嚀兮欲蛻而理融靈辰不留兮將永閟于幽宫再歌薤露之章兮號萬壑之長松右二北風北風兮嵗律告終豈惟嵗律兮嗟世道之益窮有美君子兮非斯世之人物有古人之風兮有無我之德我亦何知兮託先世之餘契兩書相勞苦兮藹然敬愛之意迹雖疏兮此心不忘死生契闊兮悵十二里之髙岡歌薤露之卒章兮有淚滂滂右三挽邵公容春北風獵獵兮申原之幽元扉啓兮靈辰不留蘇黃之像兮儼其如在容春之人兮杳不可求一棺兮厚德萬古兮髙丘右一申原幽幽兮北風正髙薤露一聲兮山鬼夜號古人考終兮如蛻遺編不朽兮風騷一丘兮安固萬古兮滔滔右二北風北風兮丹旐飛飛申原邁邁兮鐸聲孔悲素韠欒欒兮二子皇皇如有望兮魂其來歸地有靈兮人傑表爾隧兮豐碑右三宋史館檢閲所性先生時天彞父挽些大專槃物兮剛柔蕩摩五行雜揉兮顓䝉孔多陶一氣之竒佹兮奄宇宙之幾何握異采之陸離兮蹇儃佪而逶迤襲正軌之茂則兮恥踐迹而循科御長轅而獵太空兮摧九折之峨峨孑不羣而介立兮衆囂囂而肆呵𤣥虬蹶泥兮浸雄虹於頽波隴亷孟娵之莫辨兮世䝉瞀其層睋神渺渺而上征兮訴緯繣於太和忽修靈之聿皇兮任侏儒之傞傞咎將誰執兮豈天賦之未薖落日下大野兮慨髙風之吟哦羌若人之莫見兮感生意於庭柯卓豐詞兮九里亘千秋兮不磨挽蔡文叔南風之薰兮五絃絶可以解愠兮憂心益惙念寓形於溟涬兮藐一漚之起滅前乎數千年之名世兮後方來而未歇往者不我留兮來者不我接何彼頑之弗夭兮而獨萎乎此哲非夫人之立極兮凜世路之迫厄惟聖斯惻兮建學校以夀吾道之脈士不可辱兮又焉可殺孰悟我聖明兮幾襲秦之亂轍我公之忠憤貫日兮所以疾驅而朅朅一去國兮一隂方猾再去國兮重隂栗烈鄙夫熟視兮壯羣邪之蟠結目斷留田兮歌南風之闋右一南風之時兮吹彼棘薪喬木斯壞兮棟梁曷任欂櫨椳闑與扂楔兮匠眯眯而弗尋况承天之八柱兮窮嵗月而莫登天豈不生材兮鬱牛山之嶙峋雨露之所潤兮存日夜之肫肫及大厦之將顚兮無一木之可乘羌小民之怨咨兮謂天不仁非道通乎三極兮孰識天心天既仁愛我民兮篤生偉人一去就兮治亂攸分天亦仁愛我公兮不使見强敵之駭奔危機發兮衆寐昏昏秉離明以為燭兮魂營營而上征目斷留田兮歌南風之再吟右二南風南風兮莫蘇槁質坎離互宅兮已翩翩乎月窟駕朱鳥以啓路兮潛元宫而永息終長夜之漫漫兮委人間之正則道所以經世兮名不可以虛得方一去而即悟兮可以淑艾乎士習倘再去而能悟兮庶姦諛之屏迹使長孺居中司馬遂相兮狂酋當為之怵惕又何至於闖江踰嶺兮喋血上國思魏徵而奠九齡兮吁其何及公雖九原兮疑遺忠之尚盡我被公之知兮始終如一不得哭公於堂兮不得執公之紼我何負於神明兮兩足如縶歌南風之三疊兮恨無極右三哀倪孟容父詞憶昔見公兮季原之堂兄弟怡怡兮清約是將藹子姓之弦歌兮頭角昂昂來者起敬兮知德義之日昌造化無情兮慨有季之先亡氣象少異兮燈火凄涼幸二子之自奮兮視前有光何祿養之不久兮遽驚風木之傷痛日月之未改兮已變故常以公之剛介兮豈北面於緇黃我知公之心兮縈不足以挽其恨之長東風作惡雪絮正狂黃壚曉啓兮松楸蒼蒼勞生兮永佚世事兮茫茫交之道兮日落老有淚兮滂滂盛化州挽些悼世習之緯繣兮爭騖乎險厄藴異采而儃佪兮已喧豗而吠怪孰視衣冠之故宇兮藂雜菅蒯酣一盎之醯蚋兮較得失乎䁆曖公胡為乎髙搴兮提一劒以北指恐修名之不立兮氣軒軒而有偉捫風以談當世之務兮江東莫比燼世讎於蔡焰兮同雪國恥驅馳乎蠶叢魚鳬兮上功萬里中原咫尺兮莫歸寸疆素志剝落兮怊惝恍而凄涼霾輪縶馬兮猛思故鄉晚得一障兮遙遙乎南荒時繽紛而易變兮又何可以久留謫星墮境內兮吾將奚求魂營營而上征兮叩太儀之幽幽斂智囊而不售兮遺恨千秋夙聞公名兮意卓犖而不羈解后公之揮塵兮心朗氣夷嘗叩公之所歷兮動中事機將欵密乎山扉兮杳璜佩而莫追悲風起兮江村白日下兮大墅表獨立兮雄碑間一丘兮今古挽通守陳帑院羌西方之屹然兮鍾此竒才方世道之緯繣兮棄騏驥而駕駑駘以一尉而誅二凶兮宜異言之喧豗炯此念而安民兮皇恤乎身災公論雖屢蝕兮猶有時而復開開之何未久兮而終不能遂公之壯懷詩書兮自適優游兮力齊扶疾而告修善之訓兮俄怛焉而順隤彼西方之無情兮忍璜佩之沈薶生於是死於是兮湛一氣之去來惟心無愧而氣不餒之言兮萬古莫得而塵埃况有不朽之銘兮表獨立於崔嵬挽施子華二五交運兮雜揉乎剛柔美惡厚薄兮何稟生之不侔厚者未必薰兮薄者未必蕕羌寓形於溟涬兮藐起滅之一漚惟父母之哭子兮蹇彼蒼之大尤吾嘗抱此至痛兮知毅翁之恨難收雖我不識子兮知謹實而好修撫新碑而感慨兮相鐸聲之謳奧山兮泉瀏凄巘兮雲幽夫子有命矣夫之嘆兮可以釋而翁之憂憂挽王夫人秋山蕭蕭兮連山之岡有幽一宫兮千古其藏育野堂之世則兮綿瓜瓞以承芳來宗牖而自度兮如奉姑嫜相君子之婉婉兮發軔康莊囿一世之天兮遽瘞佩而沈璜秋風蕭蕭兮連山之岡右一連山之岡兮秋風蕭蕭有永千古兮幽宫迢迢一編之女訓兮慨遺音之寂寥藹清芬其如在兮鞶帨彯彯忍雙親之望望兮遲女歸而魂消靈辰不留誰其擬招連山之岡秋風蕭蕭右二魯齊集卷十八
